# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
# renovate: datasource=docker depName=ghcr.io/siderolabs/installer
talosVersion: v1.13.0
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.36.0

clusterName: kubernetes
endpoint: https://192.168.55.10:6443

clusterPodNets:
  - "10.69.0.0/16"
clusterSvcNets:
  - "10.96.0.0/16"

additionalApiServerCertSans: &sans
  - "192.168.55.10"
  - "k8s.example.com"
  - "127.0.0.1"
additionalMachineCertSans: *sans

# Disable built-in Flannel to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "k8s-nuc14-01"
    ipAddress: "192.168.55.11"
    installDiskSelector:
      serial: "S5GXNS0X201738E"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/43b3cbfc2957259b4588d362709d47387607901d4d3506c1ea46d7ea74cb99a3
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "88:ae:dd:66:5f:7c"
        dhcp: false
        addresses:
          - "192.168.55.11/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.55.1"
        mtu: 1500
        vip:
          ip: "192.168.55.10"
  - hostname: "k8s-nuc14-02"
    ipAddress: "192.168.55.12"
    installDiskSelector:
      serial: "S5GXNS0X207008P"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/43b3cbfc2957259b4588d362709d47387607901d4d3506c1ea46d7ea74cb99a3
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "88:ae:dd:66:61:78"
        dhcp: false
        addresses:
          - "192.168.55.12/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.55.1"
        mtu: 1500
        vip:
          ip: "192.168.55.10"
  - hostname: "k8s-nuc14-03"
    ipAddress: "192.168.55.13"
    installDiskSelector:
      serial: "S6Z1NU0XC43615L"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/43b3cbfc2957259b4588d362709d47387607901d4d3506c1ea46d7ea74cb99a3
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "88:ae:dd:65:a0:38"
        dhcp: false
        addresses:
          - "192.168.55.13/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.55.1"
        mtu: 1500
        vip:
          ip: "192.168.55.10"

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-intelgpu.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-network-rps.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"
  - "@./patches/global/machine-udev.yaml"

# Controller patches
controlPlane:
  patches:
    # NOTE: admission-controller-patch.yaml was removed 2026-04-30. It used to
    # `op: remove /cluster/apiServer/admissionControl` to neutralize Talos's
    # default cluster-wide PodSecurity admissionControl (enforce: baseline).
    # Equivalent effect now achieved via per-namespace
    # pod-security.kubernetes.io/enforce labels — see
    # kubernetes/flux/components/common/namespace.yaml for the cluster-wide
    # privileged label, and follow-up #40 for per-namespace tightening.
    - "@./patches/controller/cluster.yaml"

