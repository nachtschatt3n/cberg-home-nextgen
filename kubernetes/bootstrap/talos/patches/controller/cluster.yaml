cluster:
  allowSchedulingOnControlPlanes: true
  # Enable the in-cluster (kubernetes) discovery registry alongside the external
  # discovery.talos.dev service, so member discovery survives a Sidero/WAN outage
  # instead of erroring (talhelper disables this registry by default).
  discovery:
    enabled: true
    registries:
      kubernetes:
        disabled: false
  apiServer:
    extraArgs:
      # https://kubernetes.io/docs/tasks/extend-kubernetes/configure-aggregation-layer/
      enable-aggregator-routing: true
  controllerManager:
    extraArgs:
      bind-address: 0.0.0.0
  coreDNS:
    disabled: true
  etcd:
    extraArgs:
      listen-metrics-urls: http://0.0.0.0:2381
    advertisedSubnets:
      - 192.168.55.0/24
  proxy:
    disabled: true
  scheduler:
    extraArgs:
      bind-address: 0.0.0.0
