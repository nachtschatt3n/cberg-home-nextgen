machine:
  kubelet:
    nodeIP:
      validSubnets:
        - 192.168.55.0/24
    extraConfig:
      # Reserve resources so kubelet/containerd don't starve under burst load.
      # NUC14 has 18 logical CPUs / 62 GiB — 1 CPU + 2 GiB total reservation is ~5% overhead.
      # Ref: https://kubernetes.io/docs/tasks/administer-cluster/reserve-compute-resources/
      systemReserved:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 2Gi
      kubeReserved:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 2Gi
      # Parallel image pulls (faster cold-start). Ref: tyriis/home-ops
      serializeImagePulls: false
      maxParallelImagePulls: 5
      # Default 110 was tight on node 03 post-upgrade (descheduler ignorePvcPods=true
      # leaves storage replicas pinned). Pod CIDR is /24 (~250 IPs/node), hardware has
      # 18 vCPU + 62 GiB; 200 leaves comfortable headroom. Triggered KubeletTooManyPods
      # alert at 98% in 2026-04-30 audit.
      maxPods: 200
