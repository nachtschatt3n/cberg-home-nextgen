machine:
  kernel:
    modules:
      # Longhorn v2 SPDK target prereqs (loaded but idle until Longhorn v2 is enabled)
      - name: vfio_pci
      - name: uio_pci_generic
  install:
    # Talos v1.12+ defaults grubUseUKICmdline to true for new installs which
    # conflicts with extraKernelArgs. Force grub-style cmdline so our args apply.
    grubUseUKICmdline: false
    extraKernelArgs:
      - i915.enable_guc=3                   # Meteor Lake CPU / iGPU (GuC + HuC firmware)
      - apparmor=0                          # Less security, faster puter
      - init_on_alloc=0                     # Less security, faster puter
      - init_on_free=0                      # Less security, faster puter
      - intel_iommu=on                      # PCI Passthrough
      - iommu=pt                            # PCI Passthrough
      - mitigations=off                     # Less security, faster puter
      - security=none                       # Less security, faster puter
      - sysctl.kernel.kexec_load_disabled=1 # Meteor Lake CPU / iGPU
      - talos.auditd.disabled=1             # Less security, faster puter
      - hugepages=1024                      # Longhorn v2 prereq (2 GiB of 2 MiB hugepages)
