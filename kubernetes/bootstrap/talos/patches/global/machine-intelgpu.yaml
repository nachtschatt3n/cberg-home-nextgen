# Kernel args (i915.enable_guc=3, apparmor=0, init_on_alloc=0, etc.) and
# hugepages=1024 are now baked into the factory schematic
# (b85cceaceed63261e4c7457faeef595485d98a65bbc841f62812d1abcd7268da). v1.12+
# KSPP defaults filter most of those args from install.extraKernelArgs, so the
# only reliable injection point is the schematic itself.
#
# What stays here: the Longhorn-v2 SPDK target prereq kernel modules. These
# load at boot via Talos's machine.kernel.modules block (NOT a kernel arg).
machine:
  kernel:
    modules:
      - name: vfio_pci
      - name: uio_pci_generic
