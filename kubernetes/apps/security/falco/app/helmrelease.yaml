---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
spec:
  interval: 30m
  chart:
    spec:
      chart: falco
      version: 9.0.0
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  # DaemonSet upgrades require sequential pod replacement on each node.
  # Default 5m timeout is too tight (privileged BPF init can take 30-60s
  # per node × 3 nodes); bump to 15m so the v8.0.3→v9.0.0 upgrade can
  # actually complete instead of rolling back at the deadline.
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # ──────────────────────────────────────────────────────────────────────
    # Falco DaemonSet — runtime syscall monitoring on every node.
    # Outputs JSON to /var/run/falco/falco.log; the Wazuh agent DaemonSet
    # tails that path (mounted via host /var/run) and forwards events to the
    # Wazuh manager, where the bundled `falco-json` decoder + Socfortress
    # ruleset surface them as wazuh-alerts events.
    # Reference: https://wazuh.com/blog/cloud-native-security-with-wazuh-and-falco/
    # ──────────────────────────────────────────────────────────────────────
    driver:
      kind: modern_ebpf  # Talos kernel >= 5.8 supports CO-RE eBPF; no kmod build needed
    collectors:
      enabled: true
      docker:
        enabled: false  # Talos uses containerd, not Docker socket
      containerd:
        enabled: true
        socket: /run/containerd/containerd.sock
      kubernetes:
        enabled: true
    falco:
      json_output: true                # Wazuh `falco-json` decoder needs JSON
      json_include_output_property: true
      json_include_tags_property: true
      log_level: warning               # info-level is too verbose for syscall events
      priority: notice                 # surface notice and above
      buffered_outputs: false
      # Append-only file output that the Wazuh agent will tail.
      file_output:
        enabled: true
        keep_alive: false
        filename: /var/run/falco/falco.log
      # Disable stdout output so the wazuh-agent doesn't double-collect via
      # /host/var/log/containers/*.log AND via /var/run/falco/falco.log.
      stdout_output:
        enabled: false
      syslog_output:
        enabled: false
      http_output:
        enabled: false
    # Mount the falco file_output dir on the host so the wazuh-agent
    # (also a DaemonSet) can read it. /var/run/falco is created on the host.
    # Chart 8.x uses `mounts.volumes` / `mounts.volumeMounts` (not extraVolumes).
    mounts:
      volumes:
        - name: falco-host-output
          hostPath:
            path: /var/run/falco
            type: DirectoryOrCreate
      volumeMounts:
        - name: falco-host-output
          mountPath: /var/run/falco
          readOnly: false
    # Resource budget per node: 100m CPU + 192Mi RAM × 3 nodes = 300m / 576Mi
    # cluster-wide. Modest given the 18-core, 192GiB cluster.
    resources:
      requests:
        cpu: 100m
        memory: 192Mi
      limits:
        cpu: 1000m
        memory: 512Mi
    # Run on every node including the (hyper-converged) control planes.
    tolerations:
      - operator: Exists
    # Falco needs CAP_SYS_ADMIN + privileged to attach BPF programs and
    # read syscall trace ring buffers. Documented as accepted in
    # docs/security-accepted-risks.md AR-026 (added in same PR).
    podSecurityContext:
      runAsNonRoot: false
    securityContext:
      privileged: true
    # ServiceMonitor: keep off for now. Falco exposes Prometheus metrics
    # but we don't have a corresponding alert ruleset yet.
    serviceMonitor:
      create: false
    # Disable Falcosidekick; events go to file → Wazuh, not external webhooks.
    falcosidekick:
      enabled: false
    # Local rule overrides. The default Falco rule
    # `Executing binary not part of base image` fires on legitimate
    # py3compile / dpkg postinst invocations during package setup —
    # observed ~1900 events/day from openclaw container alone (rule 100404
    # in Wazuh). Suppress when the ancestor chain is dpkg/py3compile.
    customRules:
      apt-dpkg-noise.yaml: |-
        - rule: Drop and execute new binary in container
          desc: An attacker emplaced an executable not part of the base image and executed it.
          condition: >
            spawned_process
            and container
            and (proc.is_exe_upper_layer=true or proc.is_exe_lower_layer=false)
            and thread.cap_effective contains CAP_SYS_ADMIN
            and not (proc.aname[1] in (py3compile, dpkg, apt, dpkg-reconfigure, dpkg-deb) or
                     proc.aname[2] in (py3compile, dpkg, apt, dpkg-reconfigure, dpkg-deb))
          output: >
            Executing binary not part of base image
            (proc_exe=%proc.exe proc_sname=%proc.sname gparent=%proc.aname[2]
            proc_exe_ino_ctime=%proc.exe_ino.ctime
            proc_exe_ino_mtime=%proc.exe_ino.mtime
            proc_exe_ino_ctime_duration_proc_start=%proc.exe_ino.ctime_duration_proc_start
            proc_cwd=%proc.cwd container_start_ts=%container.start_ts evt_type=%evt.type
            user=%user.name user_uid=%user.uid user_loginuid=%user.loginuid process=%proc.name
            proc_exepath=%proc.exepath parent=%proc.pname command=%proc.cmdline terminal=%proc.tty
            exe_flags=%evt.arg.flags %container.info)
          priority: CRITICAL
          tags: [maturity_stable, container, process, mitre_persistence, T1546]
          override:
            condition: replace
            output: replace
