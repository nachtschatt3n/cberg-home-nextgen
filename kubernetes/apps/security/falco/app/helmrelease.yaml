---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
spec:
  interval: 30m
  chart:
    spec:
      chart: falco
      version: 9.1.0
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  # DaemonSet upgrades require sequential pod replacement on each node.
  # Default 5m timeout is too tight (privileged BPF init can take 30-60s
  # per node × 3 nodes); bump to 15m so the v8.0.3→v9.0.0 upgrade can
  # actually complete instead of rolling back at the deadline.
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # ──────────────────────────────────────────────────────────────────────
    # Falco DaemonSet — runtime syscall monitoring on every node.
    # Outputs JSON to /var/run/falco/falco.log; the Wazuh agent DaemonSet
    # tails that path (mounted via host /var/run) and forwards events to the
    # Wazuh manager, where the bundled `falco-json` decoder + Socfortress
    # ruleset surface them as wazuh-alerts events.
    # Reference: https://wazuh.com/blog/cloud-native-security-with-wazuh-and-falco/
    # ──────────────────────────────────────────────────────────────────────
    driver:
      kind: modern_ebpf  # Talos kernel >= 5.8 supports CO-RE eBPF; no kmod build needed
    collectors:
      enabled: true
      docker:
        enabled: false  # Talos uses containerd, not Docker socket
      containerd:
        enabled: true
        socket: /run/containerd/containerd.sock
      kubernetes:
        enabled: true
    falco:
      json_output: true                # Wazuh `falco-json` decoder needs JSON
      json_include_output_property: true
      json_include_tags_property: true
      log_level: warning               # info-level is too verbose for syscall events
      priority: notice                 # surface notice and above
      buffered_outputs: false
      # Append-only file output that the Wazuh agent will tail.
      file_output:
        enabled: true
        keep_alive: false
        filename: /var/run/falco/falco.log
      # Disable stdout output so the wazuh-agent doesn't double-collect via
      # /host/var/log/containers/*.log AND via /var/run/falco/falco.log.
      stdout_output:
        enabled: false
      syslog_output:
        enabled: false
      http_output:
        enabled: false
    # Mount the falco file_output dir on the host so the wazuh-agent
    # (also a DaemonSet) can read it. /var/run/falco is created on the host.
    # Chart 8.x uses `mounts.volumes` / `mounts.volumeMounts` (not extraVolumes).
    mounts:
      volumes:
        - name: falco-host-output
          hostPath:
            path: /var/run/falco
            type: DirectoryOrCreate
      volumeMounts:
        - name: falco-host-output
          mountPath: /var/run/falco
          readOnly: false
    # Resource budget per node: 100m CPU + 256Mi RAM × 3 nodes = 300m / 768Mi
    # cluster-wide. Modest given the 18-core, 192GiB cluster.
    # Limit raised 512Mi→768Mi on 2026-06-18: falco's working set peaks ~537Mi
    # on busy nodes, so the old 512Mi ceiling caused page-cache reclaim thrash
    # (NodeMemoryMajorPagesFaults storm) and a liveness SIGKILL. 768Mi gives
    # ~40% headroom over the observed peak.
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 768Mi
    # Run on every node including the (hyper-converged) control planes.
    tolerations:
      - operator: Exists
    # Falco needs CAP_SYS_ADMIN + privileged to attach BPF programs and
    # read syscall trace ring buffers. Documented as accepted in
    # docs/security-accepted-risks.md AR-026 (added in same PR).
    podSecurityContext:
      runAsNonRoot: false
    securityContext:
      privileged: true
    # ServiceMonitor: keep off for now. Falco exposes Prometheus metrics
    # but we don't have a corresponding alert ruleset yet.
    serviceMonitor:
      create: false
    # Disable Falcosidekick; events go to file → Wazuh, not external webhooks.
    falcosidekick:
      enabled: false
    # Local rule overrides. The default Falco rule
    # `Executing binary not part of base image` fires on legitimate
    # py3compile / dpkg postinst invocations during package setup —
    # observed ~1900 events/day from openclaw container alone (rule 100404
    # in Wazuh). Suppress when the ancestor chain is dpkg/py3compile.
    customRules:
      apt-dpkg-noise.yaml: |-
        - rule: Drop and execute new binary in container
          # APPEND (not replace) — keep Falco 0.44.0's built-in exclusions
          # intact and only add ours. A prior `replace` discarded the base
          # exclusions and made the rule fire on Longhorn's /data/longhorn
          # engine binary (10k+ alerts/hr).
          # Exclude package-manager activity. paperclip is a build container
          # that runs apt/dpkg at runtime. Earlier passes covered dpkg as an
          # ANCESTOR (proc.aname) and the session leader (proc.sname), but
          # missed the case where the package-manager binary IS the executed
          # process (proc.name=dpkg, proc.exe=/usr/bin/dpkg, gparent=bash) —
          # that left ~9 level-12 events/day. proc.name covers it. Also keep
          # the Longhorn engine-launcher exclusion.
          #
          # install-openclaw: an initContainer (apps/ai/openclaw) whose sole
          # job is `python3 -m pip install` of ~52 CLIs (obsidian-cli, hactl,
          # …) on every pod start. Each pip'd binary executes from a writable
          # overlay layer → ~52 level-12 events PER pod start (observed 104/24h
          # over 2 restarts). proc.name=python3 running pip isn't a package
          # manager so the clauses above miss it. The container only ever
          # installs — there's no long-running workload to protect — so scope
          # the exclusion to the whole init container by name.
          #
          # mount-cgroup / apply-sysctl-overwrites: cilium-agent's own
          # privileged init containers (cilium-mount mounts the cgroup2 fs,
          # cilium-sysctlfix applies sysctls). They execute a binary from a
          # writable layer on every cilium agent start → ~6 level-12 events per
          # cluster-wide cilium roll (upgrades / node reboots). Known-good CNI
          # bootstrap; scope-exclude by container name.
          #
          # nextcloud Collabora Office: the built-in Nextcloud Office (Collabora
          # / richdocumentscode) ships as an AppImage that self-extracts to
          # /tmp/appimage_extracted_* and runs coolwsd/coolforkit(-ns)/coolmount
          # from there on every document edit → ~9 level-12 events/day (verified
          # 2026-06-07: 9/37). Legitimate office workload. Scope TIGHTLY to those
          # binaries / the AppImage path inside the nextcloud container only — a
          # different dropped binary in that pod still fires.
          #
          # mcpo runtime-setup: the mcpo pod (apps/ai/mcpo, MCP-over-OpenAPI
          # proxy for open-webui) runs an initContainer named `runtime-setup` on
          # a stock python:3.11-slim base whose sole job is to bootstrap the
          # Node/npm toolchain and pip/npm-install the MCP servers into a shared
          # volume on every pod start. That means curl (fetch nodesource gpg
          # key), gpg (--dearmor the key), and node (npm install -g) all execute
          # from a writable overlay layer (EXE_WRITABLE|EXE_UPPER_LAYER) → 3
          # level-12 events per pod start (verified 2026-07-14 via falco.log:
          # curl + gpg + node, container_name=runtime-setup, k8s_ns_name=ai).
          # These aren't package-manager binaries (curl/gpg/node), so the apt/
          # dpkg clauses above miss them, and the init container has no long-
          # running workload to protect. Scope TIGHTLY to the ai-ns mcpo pod's
          # runtime-setup container on the stock python image — a dropped binary
          # in the mcpo `app` container, a differently-named pod, or any other
          # namespace still fires (finding F-2804f72b).
          condition: >
            and not (
              proc.name in (dpkg, dpkg-trigger, dpkg-deb, dpkg-split, dpkg-reconfigure, apt, apt-get, apt-config, py3compile) or
              proc.sname in (dpkg, apt, apt-get, dpkg-trigger, frontend) or
              proc.aname[1] in (py3compile, dpkg, apt, dpkg-reconfigure, dpkg-deb, dpkg-trigger) or
              proc.aname[2] in (py3compile, dpkg, apt, dpkg-reconfigure, dpkg-deb, dpkg-trigger) or
              proc.aname[3] in (py3compile, dpkg, apt, dpkg-reconfigure, dpkg-deb) or
              proc.exe startswith /data/longhorn or
              proc.exepath startswith /data/longhorn or
              container.name in (install-openclaw, mount-cgroup, apply-sysctl-overwrites) or
              (container.name = nextcloud and (proc.exepath startswith /tmp/appimage_extracted or proc.name in (coolwsd, coolforkit, coolforkit-ns, coolmount))) or
              (k8s.ns.name = ai and k8s.pod.name startswith mcpo and container.name = runtime-setup and container.image.repository = docker.io/library/python)
            )
          override:
            condition: append
      # Allowlist legitimate K8s-API-contact and socket-stdio workloads so the
      # two noisiest default "Notice" rules stop flooding the SIEM low tier
      # (~2470/24h "Redirect STDOUT/STDIN" + ~150/24h "Contact K8S API", all
      # benign). Both rules gate on a user_known_* macro that defaults to
      # (never_true); replace each with an image-scoped allowlist. Sources
      # confirmed via 24h Wazuh triage:
      #   - Redirect STDOUT/STDIN: Longhorn gRPC instance-managers (longhornio/*)
      #     + Authentik proxy/server (socket-connected stdio is normal for both)
      #   - Contact K8S API: the ai-sre agent + standalone kubectl pods
      #     (their whole purpose is querying the cluster) + longhorn-manager
      # Image-scoped (not namespace-wide) so a rogue pod in the same namespace
      # still trips the rule.
      k8s-api-noise.yaml: |-
        - macro: user_known_contact_k8s_api_server_activities
          condition: >
            (container.image.repository = ghcr.io/nachtschatt3n/ai-sre or
             container.image.repository = docker.io/bitnamilegacy/kubectl or
             container.image.repository startswith docker.io/longhornio/)
          override:
            condition: replace
        - macro: user_known_stand_streams_redirect_activities
          condition: >
            (container.image.repository startswith docker.io/longhornio/ or
             container.image.repository in (ghcr.io/goauthentik/proxy, ghcr.io/goauthentik/server))
          override:
            condition: replace
