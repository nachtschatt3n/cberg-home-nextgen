---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wazuh-dashboard
  namespace: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wazuh-dashboard
  template:
    metadata:
      labels:
        app: wazuh-dashboard
    spec:
      containers:
        - name: wazuh-dashboard
          image: wazuh/wazuh-dashboard:4.14.5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          env:
            - name: OPENSEARCH_HOSTS
              value: "https://wazuh-indexer:9200"
            - name: WAZUH_API_URL
              value: "https://wazuh-manager-master:55000"
            - name: API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: API_USERNAME
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: API_PASSWORD
            - name: DASHBOARD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: DASHBOARD_USERNAME
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: DASHBOARD_PASSWORD
            - name: SERVER_SSL_ENABLED
              value: "true"
            - name: SERVER_SSL_CERTIFICATE
              value: /etc/wazuh-dashboard/certs/dashboard.pem
            - name: SERVER_SSL_KEY
              value: /etc/wazuh-dashboard/certs/dashboard-key.pem
            - name: OPENSEARCH_SSL_VERIFICATIONMODE
              value: certificate
            - name: OPENSEARCH_SSL_CERTIFICATEAUTHORITIES
              value: "[/etc/wazuh-dashboard/certs/root-ca.pem]"
          ports:
            - name: dashboard
              containerPort: 5601
          volumeMounts:
            - name: wazuh-certs
              mountPath: /etc/wazuh-dashboard/certs/root-ca.pem
              subPath: root-ca.pem
              readOnly: true
            - name: wazuh-certs
              mountPath: /etc/wazuh-dashboard/certs/dashboard.pem
              subPath: dashboard.pem
              readOnly: true
            - name: wazuh-certs
              mountPath: /etc/wazuh-dashboard/certs/dashboard-key.pem
              subPath: dashboard-key.pem
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 5601
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 6
      volumes:
        - name: wazuh-certs
          secret:
            secretName: wazuh-certs
