---
# Local rule overrides for Wazuh manager — drop intracluster Longhorn POST
# noise that fires upstream rule 31533 "High amount of POST requests = likely
# bot". The agent-side <exclude> on /host/var/log/containers/longhorn-manager-*
# is in place but doesn't suppress these for reasons we haven't isolated; this
# manager-side override is the belt-and-braces fix.
#
# Mounted at /var/ossec/etc/rules/local/local_rules.xml; the master.conf's
# <rule_dir>etc/rules/local</rule_dir> entry pulls it into the active ruleset.
apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-local-rules
data:
  local_rules.xml: |
    <group name="local,attack,homelab">
      <!-- Suppress rule 31533 ("high POST volume = likely bot") entirely.
           In this cluster it fires ONLY on internal Longhorn volume-management
           traffic (POST /v1/volumes/...?action=trimFilesystem|snapshotCRList
           from longhorn-manager pods) — never real external bots, which are
           covered separately by the ingress-nginx decoder rules watching
           cf_connecting_ip. The earlier srcip-scoped child rules (100600-602
           matching 10.0.0.0/8 etc.) did NOT suppress it — the <srcip> element
           wasn't matching the decoder's data.srcip field, so 31533 kept
           flooding (4857 events/24h after the penpot migration added more
           Longhorn volumes). An unconditional <if_sid> child fires for every
           31533 match at level 0, which reliably drops it. -->
      <rule id="100600" level="0">
        <if_sid>31533</if_sid>
        <description>Suppress 31533 — internal Longhorn volume-mgmt POST noise, not bots</description>
      </rule>
      <!-- NOTE: the UniFi 100110 access-login suppression (rule 100610) lives in
           unifi_rules.xml, NOT here. A child rule's <if_sid> only resolves
           against rules already loaded; local_rules.xml loads BEFORE
           unifi_rules.xml, so an if_sid=100110 here is dropped ("Signature ID
           100110 was not found"). 100600 works only because 31533 is a built-in
           rule loaded early. -->

      <!-- Suppress benign Nextcloud Office (Collabora) web-accesslog 4xx/5xx
           noise. The bundled built-in CODE server (richdocumentscode app, the
           latest appstore build for NC34) does not ship every LibreOffice
           command icon the richdocuments frontend requests, so opening a doc
           emits a burst of 404s for missing `lc_*.svg` toolbar icons via
           `/custom_apps/richdocumentscode/proxy.php?...` — plus WOPI 400s,
           notifications-API 404s, and whiteboard 4xx. In 24h this was 128
           level≥5 events, ALL from internal users (e.g. 192.168.50.146), zero
           external/attack signatures — the upstream rules 31101/31122/31151
           ("web 400/5xx error code", "multiple 400s from same IP") classify
           them as attack/recon, a permanent false positive that flagged the
           sweep's "high K8s container alert volume" warning.

           Scoped by data.url to the three benign Office/collab paths only, so a
           real web attack (path traversal, SQLi, cred-stuffing) on any other
           URL still fires normally, and the signature-based web-attack rules
           (31103/31104+) are untouched on every path. OS_Regex `|` alternation
           on the static <url> field; srcip scoping is deliberately avoided (the <srcip>
           element does not match this decoder's data.srcip field — see 100600
           history above). -->
      <rule id="100620" level="0">
        <if_sid>31101</if_sid>
        <url>richdocumentscode|/apps/notifications/api|/apps/whiteboard/</url>
        <description>Suppress 31101 — benign Nextcloud Office/Collabora editor 4xx (missing toolbar icons, WOPI), internal users</description>
      </rule>
      <rule id="100621" level="0">
        <if_sid>31122</if_sid>
        <url>richdocumentscode|/apps/notifications/api|/apps/whiteboard/</url>
        <description>Suppress 31122 — benign Nextcloud Office/Collabora editor 5xx churn on the editor asset path</description>
      </rule>
      <rule id="100622" level="0">
        <if_sid>31151</if_sid>
        <url>richdocumentscode|/apps/notifications/api|/apps/whiteboard/</url>
        <description>Suppress 31151 — benign repeated Nextcloud Office 400s from same internal user (icon probing)</description>
      </rule>
    </group>
