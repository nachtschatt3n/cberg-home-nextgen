---
# Wazuh decoder + rules for external ingress-nginx access logs.
#
# Why this exists:
#   security-check.py section 6 (s6_attack_patterns / cf_connecting_ip
#   correlation) wants to slice 4xx/5xx volume by source IP to detect
#   scanners and brute-force attempts. The data is *already produced* —
#   ingress-nginx writes structured JSON access logs containing
#   cf_connecting_ip (real client IP, injected by Cloudflare and trusted
#   via `forwarded-for-header: CF-Connecting-IP`), and the wazuh-agent
#   DaemonSet already tails /host/var/log/containers/*.log on every node.
#
#   What was missing: wazuh-agent ships those lines under
#   <log_format>syslog</log_format>, so the JSON body never gets
#   parsed into structured fields. Querying `cf_connecting_ip:*` in
#   wazuh-alerts-* returned 0 — not because no data was flowing, but
#   because the field didn't exist as a structured field in the index.
#
# What this configmap adds:
#   1. Decoder `cri-ingress-nginx` — matches the CRI envelope
#      (`<RFC3339-ish-ts> stdout F {`) AND the ingress-nginx-specific
#      JSON shape (`{"time":...,"remote_addr":...`), then runs Wazuh's
#      built-in JSON_Decoder which finds the first `{` and parses every
#      field (status, cf_connecting_ip, vhost, path, method, etc.) into
#      structured form usable in indexer queries.
#   2. Rules 100500-100503 — silent baseline + 4xx/5xx escalation +
#      50-4xx-in-60s-from-same-IP scanner detection.
#
# Mounted into the manager at:
#   /var/ossec/etc/decoders/ingress-nginx/ingress-nginx_decoders.xml
#   /var/ossec/etc/rules/ingress-nginx/ingress-nginx_rules.xml
#
# When you edit this configmap, also bump
# `checksum/ingress-nginx-decoder` on the wazuh-manager StatefulSet
# template (recipe in that manifest), otherwise wazuh-analysisd won't
# reload the ruleset and the changes are inert (same failure mode that
# kept rule 100412 dormant 2026-05-09 → 2026-05-10).
#
# Validate after deploy with:
#   kubectl -n security exec wazuh-manager-master-0 -- \
#     /var/ossec/bin/wazuh-logtest << 'LOG'
#   2026-05-10T10:00:00.123456Z stdout F {"time":"2026-05-10T10:00:00+00:00","remote_addr":"10.42.0.1","x_forwarded_for":"1.2.3.4","request_id":"abc","remote_user":"","bytes_sent":1234,"request_time":0.05,"status":404,"vhost":"example.test","request_proto":"HTTP/2.0","path":"/admin","request_query":"","request_length":42,"duration":0.05,"method":"GET","http_referrer":"","http_user_agent":"curl/8.0","cf_connecting_ip":"1.2.3.4","cf_ray":"abc-DUS","cf_country":"DE"}
#   LOG
# Expected: cri-ingress-nginx decoder hit, status=404, cf_connecting_ip=1.2.3.4,
# vhost=example.test, rule 100501 (4xx, level 3) fires.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-decoder
  namespace: security
data:
  ingress-nginx_decoders.xml: |
    <!--
      CRI-prefixed nginx access log shape (each line in
      /var/log/containers/external-ingress-nginx-controller-*.log):

        <RFC3339Nano-ts> stdout F {"time":"...","remote_addr":"...",...
                                                 ^^^^^^^^^^^^^^
                                                 fixed-order JSON

      log-format-upstream is defined in
      kubernetes/apps/network/external/ingress-nginx/helmrelease.yaml and
      always emits these 19 fields in this order:

        time, remote_addr, x_forwarded_for, request_id, remote_user,
        bytes_sent, request_time, status, vhost, request_proto, path,
        request_query, request_length, duration, method, http_referrer,
        http_user_agent, cf_connecting_ip, cf_ray, cf_country

      The prematch below pins on the first three keys (time + remote_addr
      + x_forwarded_for) which are unique to this log format — no other
      CRI-wrapped JSON in this cluster matches. JSON_Decoder then parses
      the body from the first `{` to the matching `}`, producing one
      indexer field per JSON key.
    -->
    <!--
      Note on the prematch shape: Wazuh's Phase 1 pre-decoder consumes a
      RFC3339-shaped timestamp at the start of every line and stuffs it
      into a generic `timestamp` field, leaving an altered remainder
      for Phase 2 decoders. Sample run with the original CRI-anchored
      prematch had Phase 1 eat "2026-05-10T10:00:00.123456Z std" into
      the timestamp field, leaving "out F {…}" for decoders — so an
      anchor on `^\d{4}-…stdout F` never fires. Pin the prematch on
      the JSON shape that follows instead. The first three keys
      (time, remote_addr, x_forwarded_for) are unique to the
      ingress-nginx log-format-upstream defined in
      kubernetes/apps/network/external/ingress-nginx/helmrelease.yaml,
      so this still doesn't false-fire on other JSON-emitting apps.
    -->
    <decoder name="cri-ingress-nginx">
      <!--
        Allow whitespace between every JSON token. nginx's
        log_format-upstream emits `", "next_key":` (comma + SPACE), but
        wazuh-logtest validation 2026-05-10 was performed against a
        no-space sample (which Wazuh accepted) — production lines never
        matched until 2026-05-11 sweep flagged 0 hits over 24h. Always
        include `\s*` after every separator. JSON_Decoder still parses
        the body correctly regardless of whitespace.
      -->
      <prematch type="pcre2">\{\s*"time":\s*"[^"]+"\s*,\s*"remote_addr":\s*"[^"]*"\s*,\s*"x_forwarded_for":</prematch>
      <plugin_decoder>JSON_Decoder</plugin_decoder>
    </decoder>

  ingress-nginx_rules.xml: |
    <group name="web,ingress,homelab,">

      <!--
        Baseline match — silent (level 0). Required as the parent for
        the child escalation rules below; without it, JSON_Decoder
        extracts the fields but Wazuh discards the event because no rule
        fired. Keeping it level 0 means 2xx/3xx traffic does not get
        archived (would be ~hundreds of MB/day on the indexer); only the
        error-class events surface via 100501/100502 children below.
        Trade-off: legitimate attack traffic that returns 2xx (already-
        valid creds, valid endpoints) is invisible to this pipeline.
        That's acceptable because scanners/probers generate 4xx by
        nature (unknown endpoints, malformed requests).
      -->
      <rule id="100500" level="0">
        <decoded_as>cri-ingress-nginx</decoded_as>
        <description>Ingress-nginx access log (decoded baseline)</description>
        <group>web,ingress,</group>
      </rule>

      <!--
        IMPORTANT — TWO FAILED APPROACHES, NOW USING <match>:

        (1) `<field name="status">` crashes wazuh-analysisd with
            "Field 'status' is static." (caught 2026-05-10 commit
            9e4697ec, reverted in 361bb46c). `status` is a reserved
            decoder slot name and `<field>` rejects reserved names.

        (2) `<status>` reserved match element fires against the
            corresponding reserved-slot value, but JSON_Decoder run
            as a plugin_decoder does NOT populate reserved slots —
            empirically tested 2026-05-10 with both string ("404")
            and integer (404) JSON values, both produced 0 matches
            on `<status>^4\d\d$</status>`. Wazuh's JSON_Decoder
            stores extracted keys under `data.*` (or just as custom
            fields, depending on version), not in reserved slots.

        Working approach: pcre2 substring match against the original
        JSON text via `<match type="pcre2">`. Crude but reliable —
        the JSON shape is fixed by our nginx log_format and `"status":`
        is unique enough to not false-match. Key correlation values
        (cf_connecting_ip, vhost, path, etc.) ARE accessible via
        `<field name="...">` because they aren't reserved names —
        same_field correlation in 100503 still works that way.
      -->

      <!-- 4xx — typical of scanners, missing-auth probes, broken clients. -->
      <rule id="100501" level="3">
        <if_sid>100500</if_sid>
        <match type="pcre2">"status":\s*"?4\d\d"?</match>
        <description>Ingress-nginx 4xx response from $(cf_connecting_ip)</description>
        <group>web,ingress,attack,</group>
      </rule>

      <!-- 5xx — server errors. Higher signal: usually backend bugs but
           sustained 5xx from one source IP can indicate a fuzzing
           attack or denial-of-service attempt. -->
      <rule id="100502" level="6">
        <if_sid>100500</if_sid>
        <match type="pcre2">"status":\s*"?5\d\d"?</match>
        <description>Ingress-nginx 5xx response from $(cf_connecting_ip)</description>
        <group>web,ingress,attack,</group>
      </rule>

      <!-- Suppress the Tube Archivist channel-search 500. TA v0.5.10 returns
           HTTP 500 from /api/channel/search/ whenever yt-dlp can't resolve the
           searched @handle (typo / deleted / region-blocked / not a real
           handle): an upstream bug where a False return isn't guarded and
           ChannelSerializer chokes on it ('bool' has no attribute channel_id,
           channel/views.py:283). It's benign WebUI search usage, not a backend
           outage, but ~160/24h inflate the level>=5 alert volume (sweep finding
           "high K8s container alert volume"). Scoped tightly to TA's search
           path + vhost prefix so every other 5xx stays fully visible. vhost is
           matched by prefix to keep the secret domain out of this public repo. -->
      <rule id="100520" level="0">
        <if_sid>100502</if_sid>
        <field name="vhost">^tube-archivist</field>
        <field name="path">^/api/channel/search/</field>
        <description>Suppress TA channel-search 500 — upstream yt-dlp/bool bug on unresolved channel handle, not an outage</description>
        <group>web,ingress,homelab,</group>
      </rule>

      <!-- Same-source-IP 4xx burst — classic scanner/enumeration
           shape. 50+ 4xx in 60s from one cf_connecting_ip is way above
           any legitimate-user pattern at this homelab's traffic
           volume. Level 10 = "log+alert" but not paged. -->
      <rule id="100503" level="10" frequency="50" timeframe="60">
        <if_matched_sid>100501</if_matched_sid>
        <same_field>cf_connecting_ip</same_field>
        <description>Ingress-nginx: 50+ 4xx in 60s from same cf_connecting_ip — likely scanner/enumeration</description>
        <group>web,ingress,attack,recon,</group>
      </rule>

    </group>
