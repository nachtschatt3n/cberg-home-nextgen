---
# Authentik forward-auth annotations removed — auth is now handled by the
# Wazuh dashboard itself via SAML SSO (Authentik as IdP). The dashboard
# redirects unauthenticated users to /_opendistro/_security/saml/acs which
# in turn redirects to Authentik's SAML SSO endpoint.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wazuh-dashboard
  namespace: security
  labels:
    gethomepage.dev/enabled: "true"
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Wazuh"
    gethomepage.dev/group: "Security"
    gethomepage.dev/icon: "wazuh.png"
    gethomepage.dev/description: "XDR/SIEM platform"
    # wazuh-dashboard pods carry `app=wazuh-dashboard` (not the
    # `app.kubernetes.io/name` convention homepage defaults to). Without
    # this explicit selector homepage emits "no pods found" every poll.
    gethomepage.dev/pod-selector: "app=wazuh-dashboard"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
    # The SAML flow can produce large redirect URLs / cookies — bump nginx
    # buffer sizes so large headers don't get rejected with 502.
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
spec:
  ingressClassName: internal
  rules:
    - host: "wazuh.${SECRET_DOMAIN}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wazuh-dashboard
                port:
                  number: 5601
  tls:
    - hosts:
        - "wazuh.${SECRET_DOMAIN}"
