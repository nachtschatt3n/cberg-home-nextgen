---
# Wazuh Indexer — single-node OpenSearch for homelab event volume.
# Multi-node clustering is overkill at our event rate (3 agents + UniFi syslog)
# and required ${HOSTNAME} substitution in opensearch.yml that the OpenSearch
# YAML parser does NOT do natively, leaving node.name literal "${HOSTNAME}"
# on every replica → cluster_manager_not_discovered_exception.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-indexer
  namespace: security
spec:
  selector:
    matchLabels:
      app: wazuh-indexer
  replicas: 1
  serviceName: wazuh-indexer
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: wazuh-indexer
    spec:
      initContainers:
        - name: volume-mount-hack
          image: busybox:1.37.0
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          command:
            - sh
            - -c
            - chown -R 1000:1000 /var/lib/wazuh-indexer
          volumeMounts:
            - name: wazuh-indexer-data
              mountPath: /var/lib/wazuh-indexer
        - name: increase-vm-max-map
          image: busybox:1.37.0
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          command:
            - sysctl
            - -w
            - vm.max_map_count=262144
          securityContext:
            privileged: true
      containers:
        - name: wazuh-indexer
          image: wazuh/wazuh-indexer:4.14.5
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          env:
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms2g -Xmx2g"
            - name: OPENSEARCH_PATH_CONF
              value: /usr/share/wazuh-indexer/config
          ports:
            - name: indexer-rest
              containerPort: 9200
            - name: indexer-nodes
              containerPort: 9300
          volumeMounts:
            - name: wazuh-indexer-data
              mountPath: /var/lib/wazuh-indexer
            - name: wazuh-indexer-config
              mountPath: /usr/share/wazuh-indexer/config/opensearch.yml
              subPath: opensearch.yml
              readOnly: true
            - name: wazuh-certs
              mountPath: /usr/share/wazuh-indexer/config/certs/root-ca.pem
              subPath: root-ca.pem
              readOnly: true
            - name: wazuh-certs
              mountPath: /usr/share/wazuh-indexer/config/certs/indexer.pem
              subPath: indexer.pem
              readOnly: true
            - name: wazuh-certs
              mountPath: /usr/share/wazuh-indexer/config/certs/indexer-key.pem
              subPath: indexer-key.pem
              readOnly: true
            - name: wazuh-certs
              mountPath: /usr/share/wazuh-indexer/config/certs/admin.pem
              subPath: admin.pem
              readOnly: true
            - name: wazuh-certs
              mountPath: /usr/share/wazuh-indexer/config/certs/admin-key.pem
              subPath: admin-key.pem
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 6
      volumes:
        - name: wazuh-indexer-config
          configMap:
            name: wazuh-indexer-config
        - name: wazuh-certs
          secret:
            secretName: wazuh-certs
  volumeClaimTemplates:
    - metadata:
        name: wazuh-indexer-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 10Gi
---
# ConfigMap for OpenSearch configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-indexer-config
  namespace: security
data:
  opensearch.yml: |
    network.host: "0.0.0.0"
    node.name: wazuh-indexer
    cluster.name: wazuh-indexer-cluster
    discovery.type: single-node

    plugins.security.ssl.transport.pemcert_filepath: /usr/share/wazuh-indexer/config/certs/indexer.pem
    plugins.security.ssl.transport.pemkey_filepath: /usr/share/wazuh-indexer/config/certs/indexer-key.pem
    plugins.security.ssl.transport.pemtrustedcas_filepath: /usr/share/wazuh-indexer/config/certs/root-ca.pem
    plugins.security.ssl.transport.enforce_hostname_verification: false
    plugins.security.ssl.transport.resolve_hostname: false
    plugins.security.ssl.http.enabled: true
    plugins.security.ssl.http.pemcert_filepath: /usr/share/wazuh-indexer/config/certs/indexer.pem
    plugins.security.ssl.http.pemkey_filepath: /usr/share/wazuh-indexer/config/certs/indexer-key.pem
    plugins.security.ssl.http.pemtrustedcas_filepath: /usr/share/wazuh-indexer/config/certs/root-ca.pem
    plugins.security.nodes_dn:
      - CN=wazuh-indexer,O=cberg-home,C=DE
    plugins.security.authcz.admin_dn:
      - CN=admin,O=cberg-home,C=DE
    plugins.security.allow_default_init_securityindex: true
    plugins.security.restapi.roles_enabled:
      - all_access
      - security_rest_api_access
