---
# Wazuh Agent DaemonSet — one privileged agent pod per cluster node
# Monitors host /var/log and root filesystem read-only
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wazuh-agent
  namespace: security
spec:
  selector:
    matchLabels:
      app: wazuh-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: wazuh-agent
    spec:
      tolerations:
        - operator: Exists
      hostPID: false
      hostNetwork: false
      securityContext:
        runAsUser: 0
      containers:
        - name: wazuh-agent
          image: wazuh/wazuh-agent:4.11.2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            privileged: true
          env:
            - name: WAZUH_MANAGER
              value: "wazuh-manager-master.security.svc.cluster.local"
            - name: WAZUH_MANAGER_PORT
              value: "1514"
            - name: WAZUH_AGENT_GROUP
              value: "kubernetes"
            - name: WAZUH_REGISTRATION_SERVER
              value: "wazuh-manager-master.security.svc.cluster.local"
            - name: WAZUH_REGISTRATION_PORT
              value: "1515"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: var-log
              mountPath: /var/log
              readOnly: true
            - name: host-root
              mountPath: /host
              readOnly: true
              mountPropagation: HostToContainer
      volumes:
        - name: var-log
          hostPath:
            path: /var/log
        - name: host-root
          hostPath:
            path: /
