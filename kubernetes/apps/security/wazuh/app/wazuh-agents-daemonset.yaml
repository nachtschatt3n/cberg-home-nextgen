---
# Wazuh Agent DaemonSet — one privileged agent pod per cluster node
# Monitors host /var/log and root filesystem read-only
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wazuh-agent
  namespace: security
spec:
  selector:
    matchLabels:
      app: wazuh-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: wazuh-agent
      annotations:
        # Restart trigger — agent.conf is subPath-mounted from wazuh-config
        # ConfigMap. Kubelet does NOT propagate subPath ConfigMap updates
        # to running pods (only direct ConfigMap volume mounts auto-update),
        # so configmap edits are inert until the pod restarts. Bumping this
        # hash whenever wazuh-config-configmap.yaml changes makes the
        # StatefulSet template diff and forces a DaemonSet rolling update —
        # GitOps-safe equivalent of `kubectl rollout restart daemonset`.
        # Recipe (run after any wazuh-config-configmap edit):
        #   sha256sum kubernetes/apps/security/wazuh/app/wazuh-config-configmap.yaml | awk '{print substr($1,1,12)}'
        checksum/wazuh-config: "85c1150b41c4"
    spec:
      tolerations:
        - operator: Exists
      hostPID: false
      hostNetwork: false
      securityContext:
        runAsUser: 0
      containers:
        - name: wazuh-agent
          image: wazuh/wazuh-agent:4.14.5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            privileged: true
          env:
            # The 4.14.5 image's 0-wazuh-init reads WAZUH_MANAGER_SERVER (not
            # WAZUH_MANAGER) and only sed-substitutes CHANGE_* placeholders
            # in the default ossec.conf — placeholders that no longer exist.
            # We bypass that by mounting a complete agent.conf below; these
            # vars stay set as belt-and-braces in case the image ever fixes
            # the substitution path.
            - name: WAZUH_MANAGER_SERVER
              value: "wazuh-manager-master.security.svc.cluster.local"
            - name: WAZUH_MANAGER_PORT
              value: "1514"
            - name: WAZUH_REGISTRATION_SERVER
              value: "wazuh-manager-master.security.svc.cluster.local"
            - name: WAZUH_REGISTRATION_PORT
              value: "1515"
            - name: WAZUH_AGENT_GROUP
              value: "kubernetes"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Pin agent identity to the node name. Without this, the agent
            # falls back to "wazuh-agent-<HOSTNAME>" (= pod name), so each
            # DaemonSet rollout creates a new pod name → new agent ID,
            # leaving the old enrollment as a Disconnected zombie. Pinning
            # to NODE_NAME means a rollout reuses the same identity. The
            # 0-wazuh-init script substitutes the CHANGE_AGENT_NAME
            # placeholder we now include in agent.conf with this value.
            - name: WAZUH_AGENT_NAME
              value: "$(NODE_NAME)"
          volumeMounts:
            # mount_files in the image's 0-wazuh-init copies everything under
            # /wazuh-config-mount/* into /var/ossec/* (preserving structure).
            # Mounting agent.conf at .../etc/ossec.conf overwrites the empty
            # default with our pre-populated config.
            - name: agent-config
              mountPath: /wazuh-config-mount/etc/ossec.conf
              subPath: agent.conf
              readOnly: true
            - name: var-log
              mountPath: /var/log
              readOnly: true
            - name: host-root
              mountPath: /host
              readOnly: true
              mountPropagation: HostToContainer
            # Falco DaemonSet writes JSON syscall events here on each node;
            # the agent tails /var/run/falco/falco.log via this mount.
            - name: falco-host-output
              mountPath: /var/run/falco
              readOnly: true
      volumes:
        - name: agent-config
          configMap:
            name: wazuh-config
            items:
              - key: agent.conf
                path: agent.conf
        - name: var-log
          hostPath:
            path: /var/log
        - name: host-root
          hostPath:
            path: /
        - name: falco-host-output
          hostPath:
            path: /var/run/falco
            type: DirectoryOrCreate
