---
# Wazuh Manager Master — single replica, primary node for agent enrollment and clustering
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-manager-master
  namespace: security
spec:
  selector:
    matchLabels:
      app: wazuh-manager
      node-type: master
  replicas: 1
  serviceName: wazuh-cluster
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: wazuh-manager
        node-type: master
    spec:
      containers:
        - name: wazuh-manager
          image: wazuh/wazuh-manager:4.14.5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          env:
            - name: INDEXER_URL
              value: "https://wazuh-indexer:9200"
            - name: INDEXER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: INDEXER_USERNAME
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: INDEXER_PASSWORD
            - name: FILEBEAT_SSL_VERIFICATION_MODE
              value: full
            - name: SSL_CERTIFICATE_AUTHORITIES
              value: /etc/ssl/root-ca.pem
            - name: SSL_CERTIFICATE
              value: /etc/ssl/filebeat.pem
            - name: SSL_KEY
              value: /etc/ssl/filebeat-key.pem
            - name: API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: API_USERNAME
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: API_PASSWORD
          ports:
            - name: agent-events
              containerPort: 1514
            - name: agent-enroll
              containerPort: 1515
            - name: cluster
              containerPort: 1516
            - name: api
              containerPort: 55000
            - name: syslog-udp
              containerPort: 514
              protocol: UDP
          volumeMounts:
            - name: wazuh-manager-data
              mountPath: /var/ossec/data
            - name: wazuh-manager-logs
              mountPath: /var/ossec/logs
            - name: wazuh-manager-etc
              mountPath: /var/ossec/etc
            - name: wazuh-config
              mountPath: /wazuh-config-mount/etc/ossec.conf
              subPath: ossec.conf
              readOnly: true
            - name: unifi-decoders
              mountPath: /var/ossec/etc/decoders/unifi
              readOnly: true
            - name: unifi-rules
              mountPath: /var/ossec/etc/rules/unifi
              readOnly: true
            - name: wazuh-certs
              mountPath: /etc/ssl/root-ca.pem
              subPath: root-ca.pem
              readOnly: true
            - name: wazuh-certs
              mountPath: /etc/ssl/filebeat.pem
              subPath: indexer.pem
              readOnly: true
            - name: wazuh-certs
              mountPath: /etc/ssl/filebeat-key.pem
              subPath: indexer-key.pem
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 1515
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 1515
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 6
      volumes:
        - name: wazuh-config
          configMap:
            name: wazuh-config
        - name: unifi-decoders
          configMap:
            name: unifi-decoder
            items:
              - key: unifi_decoders.xml
                path: unifi_decoders.xml
        - name: unifi-rules
          configMap:
            name: unifi-decoder
            items:
              - key: unifi_rules.xml
                path: unifi_rules.xml
        - name: wazuh-certs
          secret:
            secretName: wazuh-certs
  volumeClaimTemplates:
    - metadata:
        name: wazuh-manager-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: wazuh-manager-logs
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 5Gi
    - metadata:
        name: wazuh-manager-etc
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 1Gi
---
# Wazuh Manager Worker — single replica, connects to master via cluster protocol
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-manager-worker
  namespace: security
spec:
  selector:
    matchLabels:
      app: wazuh-manager
      node-type: worker
  replicas: 1
  serviceName: wazuh-cluster
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: wazuh-manager
        node-type: worker
    spec:
      containers:
        - name: wazuh-manager
          image: wazuh/wazuh-manager:4.14.5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          env:
            - name: INDEXER_URL
              value: "https://wazuh-indexer:9200"
            - name: INDEXER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: INDEXER_USERNAME
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: INDEXER_PASSWORD
            - name: FILEBEAT_SSL_VERIFICATION_MODE
              value: full
            - name: SSL_CERTIFICATE_AUTHORITIES
              value: /etc/ssl/root-ca.pem
            - name: SSL_CERTIFICATE
              value: /etc/ssl/filebeat.pem
            - name: SSL_KEY
              value: /etc/ssl/filebeat-key.pem
          ports:
            - name: agent-events
              containerPort: 1514
            - name: cluster
              containerPort: 1516
          volumeMounts:
            - name: wazuh-manager-data
              mountPath: /var/ossec/data
            - name: wazuh-manager-logs
              mountPath: /var/ossec/logs
            - name: wazuh-manager-etc
              mountPath: /var/ossec/etc
            - name: wazuh-config-worker
              mountPath: /wazuh-config-mount/etc/ossec.conf
              subPath: ossec-worker.conf
              readOnly: true
            - name: wazuh-certs
              mountPath: /etc/ssl/root-ca.pem
              subPath: root-ca.pem
              readOnly: true
            - name: wazuh-certs
              mountPath: /etc/ssl/filebeat.pem
              subPath: indexer.pem
              readOnly: true
            - name: wazuh-certs
              mountPath: /etc/ssl/filebeat-key.pem
              subPath: indexer-key.pem
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 1514
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 1514
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 6
      volumes:
        - name: wazuh-config-worker
          configMap:
            name: wazuh-config
        - name: wazuh-certs
          secret:
            secretName: wazuh-certs
  volumeClaimTemplates:
    - metadata:
        name: wazuh-manager-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: wazuh-manager-logs
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 5Gi
    - metadata:
        name: wazuh-manager-etc
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 1Gi
