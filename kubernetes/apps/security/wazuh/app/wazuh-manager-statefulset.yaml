---
# Wazuh Manager — single-node, adapted from upstream wazuh-kubernetes v4.14.1.
# Single PVC with subPath mounts: idiomatic K8s pattern that lets the image's
# entrypoint create all needed subdirs on first start. fsGroup=999 matches the
# wazuh user inside the 4.14.5 container (uid=999, gid=999).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-manager-master
  namespace: security
spec:
  selector:
    matchLabels:
      app: wazuh-manager
      node-type: master
  replicas: 1
  serviceName: wazuh-cluster
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: wazuh-manager
        node-type: master
      annotations:
        # Restart triggers — wazuh-analysisd reads decoders/rules only at
        # process start, not on configmap mount changes. Bumping these
        # hashes whenever the corresponding decoder configmap changes
        # forces a rolling restart of the manager pod via the StatefulSet
        # template, which is the GitOps-safe way to pick up new rules
        # (e.g. 100410/100411/100412 Falco silences added in commits
        # 645caf4b / e05e2b18 / 848acce9; ingress-nginx CRI/JSON decoder
        # added with this commit). One annotation per decoder configmap
        # so a single configmap edit is a minimal-diff template change.
        # Recipe (run after any decoder configmap edit):
        #   sha256sum kubernetes/apps/security/wazuh/app/<configmap>.yaml | awk '{print substr($1,1,12)}'
        checksum/wazuh-config: "d6212dd4b98d"
        checksum/unifi-decoder: "4557a5534913"
        checksum/ingress-nginx-decoder: "cc95eb2394c2"
        checksum/wazuh-local-rules: "a3c7ca6e7f98"
    spec:
      securityContext:
        fsGroup: 999
      volumes:
        - name: wazuh-config
          configMap:
            name: wazuh-config
        - name: wazuh-entrypoint-scripts
          configMap:
            name: wazuh-config
            defaultMode: 0755
            items:
              - key: 00-init-shared.sh
                path: 00-init-shared.sh
        - name: unifi-decoders
          configMap:
            name: unifi-decoder
            items:
              - key: unifi_decoders.xml
                path: unifi_decoders.xml
        - name: unifi-rules
          configMap:
            name: unifi-decoder
            items:
              - key: unifi_rules.xml
                path: unifi_rules.xml
        - name: ingress-nginx-decoders
          configMap:
            name: ingress-nginx-decoder
            items:
              - key: ingress-nginx_decoders.xml
                path: ingress-nginx_decoders.xml
        - name: ingress-nginx-rules
          configMap:
            name: ingress-nginx-decoder
            items:
              - key: ingress-nginx_rules.xml
                path: ingress-nginx_rules.xml
        - name: local-rules
          configMap:
            name: wazuh-local-rules
            items:
              - key: local_rules.xml
                path: local_rules.xml
        - name: wazuh-certs
          secret:
            secretName: wazuh-certs
      containers:
        - name: wazuh-manager
          image: wazuh/wazuh-manager:4.14.5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              # 1000m is the right size after the gitlab-rules exclusion
              # broke the feedback loop on wazuh-manager's own container
              # log. Steady state with K8s container-log fan-in is now
              # ~30m (3% of 1000m). We briefly bumped this to 4000m chasing
              # what turned out to be a false-positive storm; reverted
              # because the actual workload doesn't need it.
              cpu: 1000m
              memory: 2Gi
          securityContext:
            capabilities:
              add: ["SYS_CHROOT"]
          env:
            - name: INDEXER_URL
              value: "https://wazuh-indexer:9200"
            - name: INDEXER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: INDEXER_USERNAME
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: INDEXER_PASSWORD
            - name: FILEBEAT_SSL_VERIFICATION_MODE
              value: full
            - name: SSL_CERTIFICATE_AUTHORITIES
              value: /etc/ssl/root-ca.pem
            - name: SSL_CERTIFICATE
              value: /etc/ssl/filebeat.pem
            - name: SSL_KEY
              value: /etc/ssl/filebeat.key
            - name: API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: API_USERNAME
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-secret
                  key: API_PASSWORD
          ports:
            - name: agent-events
              containerPort: 1514
            - name: agent-enroll
              containerPort: 1515
            - name: cluster
              containerPort: 1516
            - name: api
              containerPort: 55000
            - name: syslog-udp
              containerPort: 514
              protocol: UDP
          volumeMounts:
            # Config (mounted as the source path the image reads from)
            - name: wazuh-config
              mountPath: /wazuh-config-mount/etc/ossec.conf
              subPath: master.conf
              readOnly: true
            # Entrypoint scripts run by the image's 2-manager init step,
            # before `wazuh-control start`. We use this to create
            # /var/ossec/etc/shared/ which the data_tmp tree doesn't supply.
            - name: wazuh-entrypoint-scripts
              mountPath: /entrypoint-scripts/00-init-shared.sh
              subPath: 00-init-shared.sh
              readOnly: true
            # Indexer/Filebeat TLS material
            - name: wazuh-certs
              mountPath: /etc/ssl/root-ca.pem
              subPath: root-ca.pem
              readOnly: true
            - name: wazuh-certs
              mountPath: /etc/ssl/filebeat.pem
              subPath: indexer.pem
              readOnly: true
            - name: wazuh-certs
              mountPath: /etc/ssl/filebeat.key
              subPath: indexer-key.pem
              readOnly: true
            # UniFi decoders/rules (extends the user-defined ruleset directory)
            - name: unifi-decoders
              mountPath: /var/ossec/etc/decoders/unifi
              readOnly: true
            - name: unifi-rules
              mountPath: /var/ossec/etc/rules/unifi
              readOnly: true
            # Ingress-nginx decoder/rules (CRI-wrapped JSON access logs from
            # external ingress; produces structured cf_connecting_ip / status /
            # vhost / path fields for security-check.py section 6 attacker
            # correlation.)
            - name: ingress-nginx-decoders
              mountPath: /var/ossec/etc/decoders/ingress-nginx
              readOnly: true
            - name: ingress-nginx-rules
              mountPath: /var/ossec/etc/rules/ingress-nginx
              readOnly: true
            # Local rule overrides (RFC1918 srcip suppression for rule 31533).
            - name: local-rules
              mountPath: /var/ossec/etc/rules/local
              readOnly: true
            # Single PVC, mounted at all paths Wazuh persists, via subPath.
            - name: wazuh-manager-master
              mountPath: /var/ossec/api/configuration
              subPath: wazuh/var/ossec/api/configuration
            - name: wazuh-manager-master
              mountPath: /var/ossec/etc
              subPath: wazuh/var/ossec/etc
            - name: wazuh-manager-master
              mountPath: /var/ossec/logs
              subPath: wazuh/var/ossec/logs
            - name: wazuh-manager-master
              mountPath: /var/ossec/queue
              subPath: wazuh/var/ossec/queue
            - name: wazuh-manager-master
              mountPath: /var/ossec/var/multigroups
              subPath: wazuh/var/ossec/var/multigroups
            - name: wazuh-manager-master
              mountPath: /var/ossec/integrations
              subPath: wazuh/var/ossec/integrations
            - name: wazuh-manager-master
              mountPath: /var/ossec/active-response/bin
              subPath: wazuh/var/ossec/active-response/bin
            - name: wazuh-manager-master
              mountPath: /var/ossec/agentless
              subPath: wazuh/var/ossec/agentless
            - name: wazuh-manager-master
              mountPath: /var/ossec/wodles
              subPath: wazuh/var/ossec/wodles
            - name: wazuh-manager-master
              mountPath: /etc/filebeat
              subPath: filebeat/etc/filebeat
            - name: wazuh-manager-master
              mountPath: /var/lib/filebeat
              subPath: filebeat/var/lib/filebeat
          readinessProbe:
            tcpSocket:
              port: 1515
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 1515
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 6
  volumeClaimTemplates:
    - metadata:
        name: wazuh-manager-master
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          # NOTE: this template is immutable once the StatefulSet exists,
          # which is why we can't bump it from 10Gi → 20Gi here. The live
          # PVC was already patched in-cluster to 20Gi (Longhorn supports
          # online resize), so the running pod sees 20Gi. If you ever
          # delete the StatefulSet + PVC and recreate, set this to 20Gi
          # before re-bootstrapping.
          requests:
            storage: 10Gi
