---
# ossec.conf for the Wazuh manager (single-node, homelab)
# Adapted from upstream wazuh-kubernetes v4.14.1 master.conf with:
#   - cluster disabled (single-node, no scaling needed)
#   - UniFi syslog listener on UDP/514
#   - indexer hosts pointing at our internal wazuh-indexer service
apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-config
  namespace: security
data:
  # The wazuh-manager 4.14.5 image's `mount_permanent_data` step does NOT
  # populate /var/ossec/etc/shared/ (the official data_tmp tree only has
  # the top-level etc/ files). Without it, wazuh-analysisd fails on first
  # start with "Could not open file 'etc/shared/ar.conf'".
  #
  # The image's 2-manager init runs every script in /entrypoint-scripts/
  # before `wazuh-control start`. Mount this script there to create the
  # missing dirs + an empty ar.conf right after data_tmp mount completes.
  00-init-shared.sh: |
    #!/bin/bash
    set -e
    mkdir -p /var/ossec/etc/shared/default
    touch /var/ossec/etc/shared/ar.conf
    chown -R wazuh:wazuh /var/ossec/etc/shared
    chmod 750 /var/ossec/etc/shared /var/ossec/etc/shared/default
    chmod 640 /var/ossec/etc/shared/ar.conf

  # Wazuh agent ossec.conf — fully-populated with manager addresses.
  # The 4.14.5 wazuh/wazuh-agent image's 0-wazuh-init script sed-substitutes
  # CHANGE_MANAGER_IP placeholders, but the default config in the image has
  # empty <address></address> with no placeholder, so the substitution
  # never fires and wazuh-agentd crashes with "Invalid server address: ''".
  # We bypass the env-var path by mounting a complete agent.conf.
  agent.conf: |
    <ossec_config>
      <client>
        <server>
          <address>wazuh-manager-master.security.svc.cluster.local</address>
          <port>1514</port>
          <protocol>tcp</protocol>
        </server>
        <config-profile>amzn, amzn2023</config-profile>
        <notify_time>20</notify_time>
        <time-reconnect>60</time-reconnect>
        <auto_restart>yes</auto_restart>
        <crypto_method>aes</crypto_method>
        <enrollment>
          <enabled>yes</enabled>
          <manager_address>wazuh-manager-master.security.svc.cluster.local</manager_address>
          <port>1515</port>
          <!-- No <groups> set — agents land in the default group. -->
        </enrollment>
      </client>

      <client_buffer>
        <disabled>no</disabled>
        <queue_size>5000</queue_size>
        <events_per_second>500</events_per_second>
      </client_buffer>

      <rootcheck>
        <disabled>no</disabled>
        <check_files>yes</check_files>
        <check_trojans>yes</check_trojans>
        <check_dev>yes</check_dev>
        <check_sys>yes</check_sys>
        <check_pids>yes</check_pids>
        <check_ports>yes</check_ports>
        <check_if>yes</check_if>
        <frequency>43200</frequency>
        <skip_nfs>yes</skip_nfs>
      </rootcheck>

      <wodle name="syscollector">
        <disabled>no</disabled>
        <interval>1h</interval>
        <scan_on_start>yes</scan_on_start>
        <hardware>yes</hardware>
        <os>yes</os>
        <network>yes</network>
        <packages>yes</packages>
        <ports all="no">yes</ports>
        <processes>yes</processes>
      </wodle>

      <syscheck>
        <disabled>no</disabled>
        <frequency>43200</frequency>
        <scan_on_start>yes</scan_on_start>
        <directories check_all="yes" realtime="yes">/etc,/usr/bin,/usr/sbin</directories>
        <directories check_all="yes" realtime="yes">/bin,/sbin,/boot</directories>
        <ignore>/etc/mtab</ignore>
        <ignore>/etc/random-seed</ignore>
        <ignore>/etc/adjtime</ignore>
        <skip_nfs>yes</skip_nfs>
        <skip_dev>yes</skip_dev>
        <skip_proc>yes</skip_proc>
        <skip_sys>yes</skip_sys>
      </syscheck>

      <!-- Talos doesn't use journald nor /var/log/{messages,secure} —
           leave these in for any non-Talos hosts that ever join, but they
           harmlessly produce no events on Talos. -->
      <localfile>
        <log_format>journald</log_format>
        <location>journald</location>
      </localfile>
      <localfile>
        <log_format>syslog</log_format>
        <location>/var/log/messages</location>
      </localfile>
      <localfile>
        <log_format>syslog</log_format>
        <location>/var/log/secure</location>
      </localfile>

      <!-- Kubernetes container logs (CRI format) — every pod on this node.
           Reads via /host/var/log/containers/*.log (host root mounted read-only
           by the DaemonSet). 150+ symlinks pointing at /host/var/log/pods/*. -->
      <localfile>
        <log_format>syslog</log_format>
        <location>/host/var/log/containers/*.log</location>
      </localfile>

      <!-- Talos / Kubernetes node-level logs.
           kubelet emits structured JSON; etcd is JSON; kernel is syslog;
           machined is mixed. We use json where it's reliably JSON, syslog
           otherwise. -->
      <localfile>
        <log_format>json</log_format>
        <location>/host/var/log/kubelet.log</location>
      </localfile>
      <localfile>
        <log_format>syslog</log_format>
        <location>/host/var/log/kernel.log</location>
      </localfile>
      <localfile>
        <log_format>syslog</log_format>
        <location>/host/var/log/machined.log</location>
      </localfile>
      <localfile>
        <log_format>syslog</log_format>
        <location>/host/var/log/containerd.log</location>
      </localfile>
      <localfile>
        <log_format>syslog</log_format>
        <location>/host/var/log/cri.log</location>
      </localfile>

      <!-- Kubernetes API audit log (if Talos enabled it).
           Owned by uid=nobody with mode 700; the privileged agent (runAsUser:
           0) traverses via the host mount. If the file doesn't exist Wazuh
           skips it gracefully. -->
      <localfile>
        <log_format>json</log_format>
        <location>/host/var/log/audit/kube/audit.log</location>
      </localfile>

      <active-response>
        <disabled>no</disabled>
      </active-response>
    </ossec_config>

  master.conf: |
    <ossec_config>
      <global>
        <jsonout_output>yes</jsonout_output>
        <alerts_log>yes</alerts_log>
        <!-- logall=no — UniFi/agent flow validated 2026-05-08. Re-enable
             temporarily by flipping both to yes if you need to debug
             unmatched events at /var/ossec/logs/archives/archives.{log,json}.
             The wazuh-archives-* indexer indices are also covered by the
             wazuh-retention-14d ISM policy if logall is ever turned back on. -->
        <logall>no</logall>
        <logall_json>no</logall_json>
        <email_notification>no</email_notification>
        <smtp_server>smtp.example.wazuh.com</smtp_server>
        <email_from>ossecm@example.wazuh.com</email_from>
        <email_to>recipient@example.wazuh.com</email_to>
        <email_maxperhour>12</email_maxperhour>
        <email_log_source>alerts.log</email_log_source>
        <queue_size>131072</queue_size>
        <agents_disconnection_time>10m</agents_disconnection_time>
        <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
      </global>

      <alerts>
        <log_alert_level>3</log_alert_level>
        <email_alert_level>12</email_alert_level>
      </alerts>

      <logging>
        <log_format>plain</log_format>
      </logging>

      <!-- Agent communications listener (TCP/1514) -->
      <remote>
        <connection>secure</connection>
        <port>1514</port>
        <protocol>tcp</protocol>
        <queue_size>131072</queue_size>
      </remote>

      <!-- UniFi CEF syslog listener (UDP/514) -->
      <remote>
        <connection>syslog</connection>
        <port>514</port>
        <protocol>udp</protocol>
        <allowed-ips>192.168.30.0/24</allowed-ips>
        <allowed-ips>192.168.55.0/24</allowed-ips>
      </remote>

      <!-- Policy monitoring -->
      <rootcheck>
        <disabled>no</disabled>
        <check_unixaudit>yes</check_unixaudit>
        <check_files>yes</check_files>
        <check_trojans>yes</check_trojans>
        <check_dev>yes</check_dev>
        <check_sys>yes</check_sys>
        <check_pids>yes</check_pids>
        <check_ports>yes</check_ports>
        <check_if>yes</check_if>
        <frequency>43200</frequency>
        <rootkit_files>/var/ossec/etc/rootcheck/rootkit_files.txt</rootkit_files>
        <rootkit_trojans>/var/ossec/etc/rootcheck/rootkit_trojans.txt</rootkit_trojans>
        <skip_nfs>yes</skip_nfs>
      </rootcheck>

      <!-- System inventory -->
      <wodle name="syscollector">
        <disabled>no</disabled>
        <interval>1h</interval>
        <scan_on_start>yes</scan_on_start>
        <hardware>yes</hardware>
        <os>yes</os>
        <network>yes</network>
        <packages>yes</packages>
        <ports all="yes">yes</ports>
        <processes>yes</processes>
      </wodle>

      <!-- Vulnerability detection disabled — pulls multi-GB CVE feeds and writes
           a 7-8 GB SQLite DB to /var/ossec/queue/vd. Re-enable only if you want
           CVE-vs-syscollector matching and have bumped the PVC well past 20Gi. -->
      <vulnerability-detection>
        <enabled>no</enabled>
      </vulnerability-detection>

      <indexer>
        <enabled>yes</enabled>
        <hosts>
          <host>https://wazuh-indexer:9200</host>
        </hosts>
        <ssl>
          <certificate_authorities>
            <ca>/etc/ssl/root-ca.pem</ca>
          </certificate_authorities>
          <certificate>/etc/ssl/filebeat.pem</certificate>
          <key>/etc/ssl/filebeat.key</key>
        </ssl>
      </indexer>

      <!-- File integrity monitoring -->
      <syscheck>
        <disabled>no</disabled>
        <frequency>43200</frequency>
        <scan_on_start>yes</scan_on_start>
        <alert_new_files>yes</alert_new_files>
        <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>

        <directories check_all="yes">/etc,/usr/bin,/usr/sbin</directories>
        <directories check_all="yes">/bin,/sbin,/boot</directories>

        <ignore>/etc/mtab</ignore>
        <ignore>/etc/hosts.deny</ignore>
        <ignore>/etc/mail/statistics</ignore>
        <ignore>/etc/random-seed</ignore>
        <ignore>/etc/random.seed</ignore>
        <ignore>/etc/adjtime</ignore>
        <ignore>/etc/httpd/logs</ignore>
        <ignore>/etc/utmpx</ignore>
        <ignore>/etc/wtmpx</ignore>
        <ignore>/etc/cups/certs</ignore>
        <ignore>/etc/dumpdates</ignore>
        <ignore>/etc/svc/volatile</ignore>
        <ignore>/sys/kernel/security</ignore>
        <ignore>/sys/kernel/debug</ignore>

        <nodiff>/etc/ssl/private.key</nodiff>

        <skip_nfs>yes</skip_nfs>
        <remove_old_diff>yes</remove_old_diff>
        <restart_audit>yes</restart_audit>
      </syscheck>

      <!-- Active response whitelist -->
      <global>
        <white_list>127.0.0.1</white_list>
        <white_list>^localhost.localdomain$</white_list>
        <white_list>192.168.55.0/24</white_list>
      </global>

      <command>
        <name>disable-account</name>
        <executable>disable-account.sh</executable>
        <expect>user</expect>
        <timeout_allowed>yes</timeout_allowed>
      </command>

      <command>
        <name>restart-ossec</name>
        <executable>restart-ossec.sh</executable>
        <expect></expect>
      </command>

      <command>
        <name>firewall-drop</name>
        <executable>firewall-drop</executable>
        <timeout_allowed>yes</timeout_allowed>
      </command>

      <command>
        <name>host-deny</name>
        <executable>host-deny.sh</executable>
        <expect>srcip</expect>
        <timeout_allowed>yes</timeout_allowed>
      </command>

      <command>
        <name>route-null</name>
        <executable>route-null.sh</executable>
        <expect>srcip</expect>
        <timeout_allowed>yes</timeout_allowed>
      </command>

      <!-- Localfiles / log collection -->
      <localfile>
        <log_format>command</log_format>
        <command>df -P</command>
        <frequency>360</frequency>
      </localfile>

      <localfile>
        <log_format>full_command</log_format>
        <command>netstat -tulpn | sed 's/\([[:alnum:]]\+\)\ \+[[:digit:]]\+\ \+[[:digit:]]\+\ \+\(.*\):\([[:digit:]]*\)\ \+\([0-9\.\:\*]\+\).\+\ \([[:digit:]]*\/[[:alnum:]\-]*\).*/\1 \2 == \3 == \4 \5/' | sort -k 4 -g | sed 's/ == \(.*\) ==/:\1/' | sed 1,2d</command>
        <alias>netstat listening ports</alias>
        <frequency>360</frequency>
      </localfile>

      <localfile>
        <log_format>full_command</log_format>
        <command>last -n 20</command>
        <frequency>360</frequency>
      </localfile>

      <ruleset>
        <!-- Default ruleset -->
        <decoder_dir>ruleset/decoders</decoder_dir>
        <rule_dir>ruleset/rules</rule_dir>
        <rule_exclude>0215-policy_rules.xml</rule_exclude>
        <list>etc/lists/audit-keys</list>
        <list>etc/lists/amazon/aws-sources</list>
        <list>etc/lists/amazon/aws-eventnames</list>
        <list>etc/lists/malicious-ioc/malicious-ip</list>
        <list>etc/lists/malicious-ioc/malicious-domains</list>
        <list>etc/lists/malicious-ioc/malware-hashes</list>

        <!-- User-defined ruleset (UniFi decoders/rules mounted here).
             NOTE: <decoder_dir> is non-recursive — subdirectories are
             skipped silently. UniFi decoders are mounted at
             etc/decoders/unifi/ (so the ConfigMap projection volume
             can manage them as a unit), so we list that path
             explicitly. -->
        <decoder_dir>etc/decoders</decoder_dir>
        <decoder_dir>etc/decoders/unifi</decoder_dir>
        <rule_dir>etc/rules</rule_dir>
        <rule_dir>etc/rules/unifi</rule_dir>
      </ruleset>

      <rule_test>
        <enabled>yes</enabled>
        <threads>1</threads>
        <max_sessions>64</max_sessions>
        <session_timeout>15m</session_timeout>
      </rule_test>

      <!-- Agent enrollment service (REQUIRED for wazuh-authd to start) -->
      <auth>
        <disabled>no</disabled>
        <port>1515</port>
        <use_source_ip>no</use_source_ip>
        <force>
          <enabled>yes</enabled>
          <key_mismatch>yes</key_mismatch>
          <disconnected_time enabled="yes">1h</disconnected_time>
          <after_registration_time>1h</after_registration_time>
        </force>
        <purge>no</purge>
        <use_password>no</use_password>
        <ciphers>HIGH:!ADH:!EXP:!MD5:!RC4:!3DES:!CAMELLIA:@STRENGTH</ciphers>
        <ssl_verify_host>no</ssl_verify_host>
        <ssl_manager_cert>/var/ossec/etc/sslmanager.cert</ssl_manager_cert>
        <ssl_manager_key>/var/ossec/etc/sslmanager.key</ssl_manager_key>
        <ssl_auto_negotiate>no</ssl_auto_negotiate>
      </auth>

      <!-- Cluster disabled — single-node manager for homelab.
           Re-enable later by setting <disabled>no</disabled> and injecting a
           valid 32-char hex key from a SOPS secret via WAZUH_CLUSTER_KEY env. -->
      <cluster>
        <name>wazuh</name>
        <node_name>wazuh-manager-master</node_name>
        <node_type>master</node_type>
        <key>00000000000000000000000000000000</key>
        <port>1516</port>
        <bind_addr>0.0.0.0</bind_addr>
        <nodes>
          <node>wazuh-manager-master-0.wazuh-cluster</node>
        </nodes>
        <hidden>no</hidden>
        <disabled>yes</disabled>
      </cluster>
    </ossec_config>

    <ossec_config>
      <localfile>
        <log_format>syslog</log_format>
        <location>/var/ossec/logs/active-responses.log</location>
      </localfile>
    </ossec_config>
