---
# UniFi decoders + rules for Wazuh, sourced from
#   https://github.com/mattsimpson/unifi-wazuh (main branch, fetched 2026-05-08)
#
# Why this fork (not Halino/Wazuh-Unifi):
#   - Halino's regex is anchored to "Ubiquiti|UniFi Network[ Application]"
#     and doesn't decode UDM Pro / Cloud Gateway events that ship as
#     "Ubiquiti|UniFi OS|..."
#   - mattsimpson's fork uses <program_name>CEF</program_name> as the master
#     decoder + pcre2 offset="after_parent" for clean child extraction, and
#     adds explicit decoders for UniFi OS, LAN_LAN, LAN_WAN, kv pairs.
#   - Verified on UniFi OS 5.0.16 + Network 10.2.105 + Wazuh 4.14.
#
# Mounted into the manager at:
#   /var/ossec/etc/decoders/unifi/unifi_decoders.xml
#   /var/ossec/etc/rules/unifi/unifi_rules.xml
apiVersion: v1
kind: ConfigMap
metadata:
  name: unifi-decoder
  namespace: security
data:
  unifi_decoders.xml: |
    <!-- Network App samples
    Jul 30 05:18:58 udr7 CEF:0|Ubiquiti|UniFi Network|9.3.45|546|Admin Made Config Changes|2|UNIFIcategory=System UNIFIsubCategory=Admin UNIFIhost=udr7 UNIFIsettingsChanges=this_controller: false UNIFIaccessMethod=web UNIFIsettingsSection=SETTINGS_SYSTEM UNIFIsettingsEntry=rsyslogd UNIFIadmin=admin src=172.20.0.5 msg=admin made a change to  in System settings. Source IP: 172.20.0.5
    
    Jul 30 05:35:34 udr7 CEF:0|Ubiquiti|UniFi Network|9.3.45|400|WiFi Client Connected|1|UNIFIcategory=Monitoring UNIFIsubCategory=WiFi UNIFIhost=udr7 UNIFIconnectedToDeviceName=udr7 UNIFIconnectedToDeviceIp=172.20.0.1 UNIFIconnectedToDeviceMac=1c:0b:8b:46:ff:11 UNIFIconnectedToDeviceModel=UDR7 UNIFIconnectedToDeviceVersion=4.2.15 UNIFIclientAlias=Apple iPhone 11:ff UNIFIclientIp=172.20.0.10 UNIFIclientMac=c2:ba:c4:27:11:ff UNIFIwifiChannel=60 UNIFIwifiChannelWidth=40 UNIFIwifiName=WIFIbaby UNIFIwifiBand=na UNIFIauthMethod=wpapsk UNIFIWiFiRssi=-68 UNIFInetworkName=Silo UNIFInetworkSubnet=172.20.0.0/24 UNIFInetworkVlan=3 msg=Apple iPhone 11:ff connected to WIFIbaby on udr7. Connection Info: Ch. 60 (5 GHz, 40 MHz), -68 dBm. IP: 172.20.0.5
    -->
    
    <!-- LOCAL OVERRIDE: upstream uses <program_name>CEF</program_name>, but
         our actual UniFi syslog format is "<src-ip> <timestamp> <hostname>
         CEF:0|..." which Wazuh's syslog pre-decoder can't parse into
         program_name=CEF. Use <prematch> on the CEF header substring
         instead — fires regardless of pre-decoder behaviour. -->
    <decoder name="unifi">
      <prematch>CEF:0\|Ubiquiti\|UniFi</prematch>
    </decoder>
    
    <!-- traffic (syslog) -->
    <decoder name="unifi-lan2lan">
      <prematch>LAN_LAN</prematch>
      <regex type="pcre2" offset="after_prematch">^-(\w)-\d+\] DESCR=\"(.*)\" IN=(\w+) OUT=(\w+) MAC=(\w{2}:\w{2}:\w{2}:\w{2}:\w{2}:\w{2}):(\w{2}:\w{2}:\w{2}:\w{2}:\w{2}:\w{2}):\w{2}:\w{2} SRC=(\d+\.\d+\.\d+\.\d+) DST=(\d+\.\d+\.\d+\.\d+) LEN=\d+ TOS=\d+ PREC=\w+ TTL=\d+ ID=\d+ PROTO=(\w+) SPT=(\d+) DPT=(\d+)</regex>
      <order>type, uni_rulename, inbound, outbound, intmac, devmac, srcip, dstip, proto, srcprt, dstprt</order>
    </decoder>
    
    <decoder name="unifi-lan2wan">
      <prematch>LAN_WAN</prematch>
      <regex type="pcre2" offset="after_prematch">^-(\w)-\d+\] DESCR=\"(.*)\" IN=(\w+) OUT=(\w+) MAC=(\w{2}:\w{2}:\w{2}:\w{2}:\w{2}:\w{2}):(\w{2}:\w{2}:\w{2}:\w{2}:\w{2}:\w{2}):\w{2}:\w{2} SRC=(\d+\.\d+\.\d+\.\d+) DST=(\d+\.\d+\.\d+\.\d+) LEN=\d+ TOS=\d+ PREC=\w+ TTL=\d+ ID=\d+.*?PROTO=(\w+) SPT=(\d+) DPT=(\d+)</regex>
      <order>type, uni_rulename, inbound, outbound, intmac, devmac, srcip, dstip, proto, srcprt, dstprt</order>
    </decoder>
    
    <!-- base -->
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2" offset="after_parent">0\|Ubiquiti\|(.+)\|(\d*\.*\d*\.*\d*)\|(\d+)\|(.+)\|(\d{1,2})\|</regex>
      <order>uni_app, app_version, event_id, type, severity</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <!-- Aug 23 17:55:30 udr7 CEF:0|Ubiquiti|UniFi OS|4.3.9|updates|1|msg=Network has been updated to 9.3.45. -->
      <regex type="pcre2">UniFi OS\|(\d*\.*\d*\.*\d*)\|(\w+)\|(\d)\|msg=(.+)</regex>
      <order>app_version, type, severity, message</order>
    </decoder>
    
    <!-- kv start -->
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIcategory=(\w+)</regex>
      <order>uni_cat</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIsubCategory=(.+?)(?=\s(?:UNIFI\w+=|src=|dst=|spt=|dpt=|proto=|msg=))</regex>
      <order>uni_subcat</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIhost=(.+?)(?=\s(?:UNIFI\w+=|src=|dst=|spt=|dpt=|proto=|msg=))</regex>
      <order>uni_host</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIaccessMethod=(\w+)</regex>
      <order>uni_accessway</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">src=((?:(?:\d{1,3}\.){3}\d{1,3}|[0-9a-fA-F:]{2,39}))</regex>
      <order>srcip</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">msg=(.+)</regex>
      <order>message</order>
    </decoder>
    
    <!-- config changes -->
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIsettingsSection=(.+?)(?=\s(?:UNIFI\w+=|src=|dst=|spt=|dpt=|proto=|msg=))</regex>
      <order>uni_changedsection</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIsettingsEntry=(.+?)(?=\s(?:UNIFI\w+=|src=|dst=|spt=|dpt=|proto=|msg=))</regex>
      <order>uni_changedentry</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIadmin=(.+?)(?=\s(?:UNIFI\w+=|src=|dst=|spt=|dpt=|proto=|msg=))</regex>
      <order>uni_changeagent</order>
    </decoder>
    
    <!-- wifi -->
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIclientAlias=(.+?)(?=\s(?:UNIFI\w+=|src=|dst=|spt=|dpt=|proto=|msg=))</regex>
      <order>uni_clientdev</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIclientIp=((?:(?:\d{1,3}\.){3}\d{1,3}|[0-9a-fA-F:]{2,39}))</regex>
      <order>uni_clientip</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIwifiName=(.+?)(?=\s(?:UNIFI\w+=|src=|dst=|spt=|dpt=|proto=|msg=))</regex>
      <order>uni_ssid</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIWiFiRssi=(.+?)(?=\s(?:UNIFI\w+=|src=|dst=|spt=|dpt=|proto=|msg=))</regex>
      <order>uni_rssi</order>
    </decoder>
    
    <!-- threat -->
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">proto=(\w+)</regex>
      <order>proto</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">spt=(\d+)</regex>
      <order>srcprt</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">dst=((?:(?:\d{1,3}\.){3}\d{1,3}|[0-9a-fA-F:]{2,39}))</regex>
      <order>dstip</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">dpt=(\d+)</regex>
      <order>dstprt</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIrisk=(\w+)</regex>
      <order>uni_risk</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIipsSignature=(.+?)(?=\s(?:UNIFI\w+=|src=|dst=|spt=|dpt=|proto=|msg=))</regex>
      <order>uni_signature</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIipsSignatureId=(\d+)</regex>
      <order>uni_sigid</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIutcTime=(.+?)(?=\s(?:UNIFI\w+=|src=|dst=|spt=|dpt=|proto=|msg=))</regex>
      <order>uni_utctime</order>
    </decoder>
    
    <!-- client/device/network KV fields -->
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIclientMac=([0-9a-fA-F:]{17})</regex>
      <order>uni_clientmac</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFInetworkName=(.+?)(?=\s(?:UNIFI\w+=|src=|dst=|spt=|dpt=|proto=|msg=))</regex>
      <order>uni_netname</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFInetworkSubnet=(.+?)(?=\s(?:UNIFI\w+=|src=|dst=|spt=|dpt=|proto=|msg=))</regex>
      <order>uni_netsubnet</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFInetworkVlan=(\d+)</regex>
      <order>uni_netvlan</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIdeviceName=(.+?)(?=\s(?:UNIFI\w+=|src=|dst=|spt=|dpt=|proto=|msg=))</regex>
      <order>uni_devname</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIdeviceModel=(.+?)(?=\s(?:UNIFI\w+=|src=|dst=|spt=|dpt=|proto=|msg=))</regex>
      <order>uni_devmodel</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIdeviceIp=((?:(?:\d{1,3}\.){3}\d{1,3}|[0-9a-fA-F:]{2,39}))</regex>
      <order>uni_devip</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIdeviceMac=([0-9a-fA-F:]{17})</regex>
      <order>uni_devmac</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIduration=(\d+)</regex>
      <order>uni_duration</order>
    </decoder>
    
    <decoder name="unifi">
      <parent>unifi</parent>
      <regex type="pcre2">UNIFIipsSessionId=(.+?)(?=\s(?:UNIFI\w+=|src=|dst=|spt=|dpt=|proto=|msg=))</regex>
      <order>uni_ipssessionid</order>
    </decoder>
    
    <!-- hostapd device syslog -->
    <decoder name="unifi-hostapd">
      <program_name>hostapd</program_name>
    </decoder>
    
    <decoder name="unifi-hostapd">
      <parent>unifi-hostapd</parent>
      <regex type="pcre2">(\S+): STA ([0-9a-fA-F:]{17}) [\w ]+ (associated|disassociated)</regex>
      <order>uni_iface, srcmac, uni_action</order>
    </decoder>
    
    <decoder name="unifi-hostapd">
      <parent>unifi-hostapd</parent>
      <regex type="pcre2">(\S+): STA ([0-9a-fA-F:]{17}) [\w ]+ RADIUS (authentication|accounting) (succeeded|failed)</regex>
      <order>uni_iface, srcmac, uni_action, uni_radius_result</order>
    </decoder>

  unifi_rules.xml: |
    <group name="unifi">
      <!-- base rule (silent parent) -->
      <rule id="100102" level="0">
        <decoded_as>unifi</decoded_as>
        <match>Ubiquiti</match>
        <description>UniFi $(type) event</description>
      </rule>
    
      <!-- console events -->
      <rule id="100103" level="3">
        <if_sid>100102</if_sid>
        <match>UniFi OS</match>
        <description>UniFi Console $(type) event</description>
        <group>mitre_t1078</group>
      </rule>
    
      <!-- traffic allow -->
      <rule id="100104" level="3">
        <decoded_as>unifi-lan2lan</decoded_as>
        <match>LAN_LAN</match>
        <field name="type">A</field>
        <description>Traffic Internal Allow</description>
        <group>pci_dss_10.2.1,nist_800_53_AU-3,hipaa_164.312(b),mitre_t1021</group>
      </rule>
      <rule id="100105" level="3">
        <decoded_as>unifi-lan2wan</decoded_as>
        <match>LAN_WAN</match>
        <field name="type">A</field>
        <description>Traffic External Allow</description>
        <group>pci_dss_10.2.1,nist_800_53_AU-3,hipaa_164.312(b),mitre_t1048</group>
      </rule>
    
      <!-- traffic block -->
      <rule id="100106" level="7">
        <decoded_as>unifi-lan2lan</decoded_as>
        <match>LAN_LAN</match>
        <field name="type">D</field>
        <description>Traffic Internal Block</description>
        <group>pci_dss_1.3.2,pci_dss_10.2.4,nist_800_53_SC-7,nist_800_53_AU-3,hipaa_164.312(e)(1),mitre_t1046</group>
      </rule>
      <rule id="100107" level="7">
        <decoded_as>unifi-lan2wan</decoded_as>
        <match>LAN_WAN</match>
        <field name="type">D</field>
        <description>Traffic External Block</description>
        <group>pci_dss_1.3.2,pci_dss_10.2.4,nist_800_53_SC-7,nist_800_53_AU-3,hipaa_164.312(e)(1),mitre_t1071</group>
      </rule>
    
      <!-- config changes -->
      <rule id="100110" level="8">
        <if_sid>100102</if_sid>
        <field name="uni_changeagent">\w+</field>
        <description>UniFi Config Change by $(uni_changeagent) in $(uni_changedsection)</description>
        <group>pci_dss_10.5.5,pci_dss_11.5,nist_800_53_CM-3,nist_800_53_CM-6,nist_800_53_AU-12,hipaa_164.312(b),mitre_t1562</group>
      </rule>
    
      <!-- threat detection -->
      <rule id="100111" level="10">
        <if_sid>100102</if_sid>
        <field name="uni_risk">\w+</field>
        <description>UniFi IPS Threat Detected: $(uni_signature)</description>
        <group>pci_dss_11.4,nist_800_53_SI-4,nist_800_53_SI-3,hipaa_164.308(a)(5)(ii)(B),mitre_t1190</group>
      </rule>
    
      <!-- wifi events -->
      <rule id="100112" level="3">
        <if_sid>100102</if_sid>
        <field name="event_id">400</field>
        <description>WiFi Client Connected: $(uni_clientdev) to $(uni_ssid)</description>
        <group>pci_dss_10.2.5,nist_800_53_AC-17,nist_800_53_AU-3,hipaa_164.312(b),mitre_t1078</group>
      </rule>
      <rule id="100113" level="3">
        <if_sid>100102</if_sid>
        <field name="event_id">401</field>
        <field name="uni_cat">Monitoring</field>
        <description>WiFi Client Disconnected: $(uni_clientdev) from $(uni_ssid)</description>
        <group>pci_dss_10.2.5,nist_800_53_AC-17,nist_800_53_AU-3,hipaa_164.312(b),mitre_t1078</group>
      </rule>
    
      <!-- admin access -->
      <rule id="100114" level="5">
        <if_sid>100102</if_sid>
        <field name="event_id">544</field>
        <description>Admin Accessed UniFi via $(uni_accessway)</description>
        <group>pci_dss_10.2.2,nist_800_53_AC-6,nist_800_53_AU-3,hipaa_164.312(a)(1),mitre_t1078</group>
      </rule>
    
      <!-- device events -->
      <rule id="100115" level="5">
        <if_sid>100102</if_sid>
        <field name="event_id">200</field>
        <description>UniFi Device Adopted: $(uni_devname)</description>
        <group>pci_dss_11.2,nist_800_53_CM-8,hipaa_164.310(d)(1),mitre_t1200</group>
      </rule>
      <rule id="100116" level="8">
        <if_sid>100102</if_sid>
        <field name="event_id">201</field>
        <description>UniFi Device Offline: $(uni_devname)</description>
        <group>pci_dss_10.6,nist_800_53_SI-4,hipaa_164.312(b),mitre_t1489</group>
      </rule>
    
      <!-- wifi roaming -->
      <rule id="100117" level="3">
        <if_sid>100102</if_sid>
        <field name="event_id">304</field>
        <description>WiFi Client Roaming: $(uni_clientdev)</description>
        <group>pci_dss_10.2.5,nist_800_53_AC-17,hipaa_164.312(b),mitre_t1078</group>
      </rule>
    
      <!-- wired client events -->
      <rule id="100118" level="3">
        <if_sid>100102</if_sid>
        <field name="event_id">302</field>
        <description>Wired Client Connected: $(uni_clientdev)</description>
        <group>pci_dss_10.2.5,nist_800_53_AC-17,nist_800_53_AU-3,hipaa_164.312(b),mitre_t1078</group>
      </rule>
      <rule id="100119" level="3">
        <if_sid>100102</if_sid>
        <field name="event_id">303</field>
        <description>Wired Client Disconnected: $(uni_clientdev)</description>
        <group>pci_dss_10.2.5,nist_800_53_AC-17,nist_800_53_AU-3,hipaa_164.312(b),mitre_t1078</group>
      </rule>
    
      <!-- security events -->
      <rule id="100120" level="12">
        <if_sid>100102</if_sid>
        <field name="event_id">401</field>
        <field name="uni_cat">Security</field>
        <description>Honeypot Triggered from $(srcip)</description>
        <group>pci_dss_11.4,nist_800_53_SI-4,nist_800_53_SI-3,hipaa_164.308(a)(5)(ii)(B),mitre_t1046</group>
      </rule>
      <rule id="100121" level="10">
        <if_sid>100102</if_sid>
        <field name="event_id">402</field>
        <description>Blocked by Firewall: $(uni_signature)</description>
        <group>pci_dss_1.3.2,pci_dss_11.4,nist_800_53_SC-7,nist_800_53_SI-4,hipaa_164.312(e)(1),mitre_t1071</group>
      </rule>
    
      <!-- WAN events -->
      <rule id="100122" level="8">
        <if_sid>100102</if_sid>
        <field name="event_id">500</field>
        <description>WAN Failover Detected</description>
        <group>pci_dss_10.6,nist_800_53_CP-10,nist_800_53_SI-4,hipaa_164.312(b),mitre_t1499</group>
      </rule>
      <rule id="100123" level="5">
        <if_sid>100102</if_sid>
        <field name="event_id">501</field>
        <description>High Latency Detected on WAN</description>
        <group>pci_dss_10.6,nist_800_53_SI-4,hipaa_164.312(b),mitre_t1499</group>
      </rule>
      <rule id="100124" level="7">
        <if_sid>100102</if_sid>
        <field name="event_id">502</field>
        <description>Packet Loss Detected on WAN</description>
        <group>pci_dss_10.6,nist_800_53_SI-4,hipaa_164.312(b),mitre_t1499</group>
      </rule>
    
      <!-- PoE events -->
      <rule id="100125" level="7">
        <if_sid>100102</if_sid>
        <field name="event_id">600</field>
        <description>Insufficient PoE Output on $(uni_devname)</description>
        <group>pci_dss_10.6,nist_800_53_PE-1,hipaa_164.310(a)(2)(ii),mitre_t1200</group>
      </rule>
      <rule id="100126" level="5">
        <if_sid>100102</if_sid>
        <field name="event_id">601</field>
        <description>AP Underpowered: $(uni_devname)</description>
        <group>pci_dss_10.6,nist_800_53_PE-1,hipaa_164.310(a)(2)(ii),mitre_t1200</group>
      </rule>
      <rule id="100127" level="7">
        <if_sid>100102</if_sid>
        <field name="event_id">602</field>
        <description>PoE Availability Exceeded on $(uni_devname)</description>
        <group>pci_dss_10.6,nist_800_53_PE-1,hipaa_164.310(a)(2)(ii),mitre_t1200</group>
      </rule>
    
      <!-- enrichment: IPS threat from internal source -->
      <rule id="100128" level="13">
        <if_sid>100111</if_sid>
        <srcip>10.0.0.0/8</srcip>
        <srcip>172.16.0.0/12</srcip>
        <srcip>192.168.0.0/16</srcip>
        <description>IPS Threat from Internal Host $(srcip): $(uni_signature)</description>
        <group>pci_dss_11.4,nist_800_53_SI-4,nist_800_53_IR-4,hipaa_164.308(a)(6)(ii),mitre_t1190</group>
      </rule>
    
      <!-- correlation / frequency rules -->
      <rule id="100150" level="10" frequency="10" timeframe="120">
        <if_matched_sid>100106</if_matched_sid>
        <same_source_ip />
        <description>Multiple Internal Blocks from $(srcip) (possible lateral scan)</description>
        <group>pci_dss_1.3.2,pci_dss_10.2.4,nist_800_53_SC-7,nist_800_53_SI-4,hipaa_164.312(e)(1),mitre_t1046</group>
      </rule>
      <rule id="100151" level="10" frequency="10" timeframe="120">
        <if_matched_sid>100107</if_matched_sid>
        <same_source_ip />
        <description>Multiple External Blocks from $(srcip) (possible exfiltration attempts)</description>
        <group>pci_dss_1.3.2,pci_dss_10.2.4,nist_800_53_SC-7,nist_800_53_SI-4,hipaa_164.312(e)(1),mitre_t1048</group>
      </rule>
      <rule id="100152" level="13" frequency="5" timeframe="300">
        <if_matched_sid>100111</if_matched_sid>
        <description>Multiple IPS Threats Detected (possible active attack)</description>
        <group>pci_dss_11.4,nist_800_53_SI-4,nist_800_53_IR-4,hipaa_164.308(a)(6)(ii),mitre_t1190</group>
      </rule>
      <rule id="100153" level="8" frequency="8" timeframe="60">
        <if_matched_sid>100113</if_matched_sid>
        <same_field>uni_clientdev</same_field>
        <description>Frequent WiFi Disconnects for $(uni_clientdev) (possible deauth attack)</description>
        <group>pci_dss_10.2.5,nist_800_53_AC-17,nist_800_53_SI-4,hipaa_164.312(b),mitre_t1498</group>
      </rule>
    
      <!-- catch-all for unmatched CEF events -->
      <rule id="100199" level="3">
        <if_sid>100102</if_sid>
        <description>UniFi CEF Event: $(type) (event_id $(event_id))</description>
      </rule>
    
      <!-- hostapd rules -->
      <rule id="100200" level="0">
        <decoded_as>unifi-hostapd</decoded_as>
        <description>UniFi hostapd event</description>
      </rule>
      <rule id="100201" level="3">
        <if_sid>100200</if_sid>
        <field name="uni_action">associated</field>
        <description>STA $(srcmac) Associated on $(uni_iface)</description>
        <group>pci_dss_10.2.5,nist_800_53_AC-17,hipaa_164.312(b),mitre_t1078</group>
      </rule>
      <rule id="100202" level="3">
        <if_sid>100200</if_sid>
        <field name="uni_action">disassociated</field>
        <description>STA $(srcmac) Disassociated from $(uni_iface)</description>
        <group>pci_dss_10.2.5,nist_800_53_AC-17,hipaa_164.312(b),mitre_t1078</group>
      </rule>
      <rule id="100203" level="5">
        <if_sid>100200</if_sid>
        <field name="uni_action">authentication</field>
        <field name="uni_radius_result">succeeded</field>
        <description>RADIUS Auth Success for $(srcmac) on $(uni_iface)</description>
        <group>pci_dss_10.2.5,nist_800_53_IA-2,nist_800_53_AU-3,hipaa_164.312(d),mitre_t1078</group>
      </rule>
      <rule id="100204" level="8">
        <if_sid>100200</if_sid>
        <field name="uni_action">authentication</field>
        <field name="uni_radius_result">failed</field>
        <description>RADIUS Auth Failed for $(srcmac) on $(uni_iface)</description>
        <group>pci_dss_10.2.4,nist_800_53_IA-2,nist_800_53_AU-3,hipaa_164.312(d),mitre_t1110</group>
      </rule>
    
      <!-- hostapd correlation -->
      <rule id="100210" level="10" frequency="5" timeframe="120">
        <if_matched_sid>100204</if_matched_sid>
        <same_field>srcmac</same_field>
        <description>Multiple RADIUS Auth Failures for $(srcmac) (possible brute force)</description>
        <group>pci_dss_10.2.4,pci_dss_11.4,nist_800_53_IA-2,nist_800_53_SI-4,hipaa_164.312(d),mitre_t1110</group>
      </rule>
    </group>

    <!-- ──────────────────────────────────────────────────────────────────
         Cluster-local rule overrides (not UniFi-specific, but lives in this
         configmap because the manager already loads etc/rules/unifi/*.xml
         via <rule_dir>etc/rules/unifi</rule_dir>).
         ────────────────────────────────────────────────────────────────── -->
    <group name="local,homelab,">
      <!-- Suppress rule 510 (rootcheck "Host-based anomaly detection event")
           when it fires on /dev/termination-log, which is a standard Kubernetes-
           injected file present in every container by design. ~34 false
           positives per 24h before this override. -->
      <rule id="100300" level="0" overwrite="yes">
        <if_sid>510</if_sid>
        <match>termination-log</match>
        <description>Rootcheck: ignore Kubernetes-injected /dev/termination-log file (false positive)</description>
        <group>rootcheck,homelab,</group>
      </rule>

      <!-- ─────────────────────────────────────────────────────────────────
           Falco syscall events (P2.2). Falco DaemonSet writes JSON to
           /var/run/falco/falco.log on each node (commit 74241572). The
           wazuh-agent localfile (in agent.conf) tails it; events flow to
           the manager and get JSON-decoded by Wazuh's built-in json
           decoder. These rules surface them as wazuh-alerts.

           Mapping Falco priority → Wazuh level (0-15 scale):
             Notice/Informational → 3 (informational)
             Warning              → 6 (low-medium)
             Error                → 8 (medium)
             Critical/Alert/Emerg → 12 (high — auto-CRITICAL in section 13)
           ───────────────────────────────────────────────────────────── -->
      <rule id="100400" level="0">
        <decoded_as>json</decoded_as>
        <field name="source">syscall</field>
        <field name="rule" type="pcre2">.+</field>
        <field name="priority" type="pcre2">.+</field>
        <description>Falco syscall event (silent parent — children categorize by priority)</description>
        <group>falco,homelab,</group>
      </rule>

      <!-- Suppress Falco "Read sensitive file untrusted" when the reader is
           any Wazuh internal module (wazuh-syscheckd, wazuh-modulesd,
           wazuh-agentd, wazuh-execd, wazuh-logcollector). Wazuh's modules
           routinely read /etc/shadow / /etc/gshadow / /etc/passwd as part
           of FIM scans, syscollector inventory, and module reports. Place
           BEFORE the priority-mapped rules so the rule engine matches the
           noise pattern first and demotes to level 0. ~950+ false-positive
           100402 events per hour cluster-wide before this (initially we
           only matched wazuh-syscheckd; live data showed wazuh-modulesd
           is the dominant source — broadened to the whole wazuh-* family). -->
      <rule id="100410" level="0">
        <if_sid>100400</if_sid>
        <field name="output" type="pcre2">process=wazuh-\w+|proc_exepath=/var/ossec/bin/wazuh-</field>
        <description>Falco: ignore Wazuh-internal module reads (false positive — FIM/syscollector/agent doing their job)</description>
        <group>falco,homelab,</group>
      </rule>

      <!-- Suppress Falco "Drop and execute new binary in container" when
           triggered by Cilium CNI's plugin invocation. cilium-cni binary
           runs on every pod creation by Cilium's design (the CNI plugin
           is invoked by containerd-shim each time). ~50+ false-positive
           100404 Critical events per hour during pod churn. -->
      <rule id="100411" level="0">
        <if_sid>100400</if_sid>
        <field name="output" type="pcre2">cilium-cni</field>
        <description>Falco: ignore Cilium CNI binary execution (CNI plugin invocation, normal)</description>
        <group>falco,homelab,</group>
      </rule>

      <!-- Suppress Falco "Read sensitive file untrusted" when triggered by
           PostgreSQL's pg_isready liveness/readiness probe. Every postgres-
           backed app (sure-pg, langfuse-pg, traccar-postgres, affine-pg,
           authentik-pg, etc.) runs pg_isready every few seconds; the
           binary is wrapped by a perl shell helper that reads /etc/shadow
           as part of its uid/gid lookup. Evidence: 11,001 of 11,033 (99.7%)
           rule.id=100402 hits in a 50k-line alerts.json sample on
           2026-05-10 came from `process=pg_isready`. Without this exclude,
           pg_isready dominates the SIEM noise floor and drowns out real
           "non-trusted program reads /etc/shadow" signals. -->
      <rule id="100412" level="0">
        <if_sid>100400</if_sid>
        <field name="output" type="pcre2">process=pg_isready|command=pg_isready</field>
        <description>Falco: ignore PostgreSQL pg_isready liveness probe reading /etc/shadow (false positive, ~99% of 100402 noise)</description>
        <group>falco,homelab,</group>
      </rule>

      <!-- Suppress Falco "Drop and execute new binary in container" when
           triggered by the paperclip ai-tools sidecar. paperclip is an
           AI agent platform whose `tools` container is a uid=0 ubuntu
           sidecar that runs apt-get + dpkg + update-alternatives during
           bootstrap to install language/tool dependencies on the fly.
           Each apt/dpkg invocation modifies binaries under /usr/bin/*
           AFTER the container has started, which Falco's "drop+exec
           new binary" rule (parent rule 100404, Critical) treats as
           potential compromise. Volume on 2026-05-12 was 1,461/24h on
           k8s-nuc14-03 (100% of the entire high-sev bucket); AR-009
           documents the privileged tools sidecar as expected.

           Match shape: pcre2 on the `output` string, anchoring on
           k8smeta_pod_name=paperclip- AND container_image_repository=
           docker.io/library/ubuntu. Specific enough that no
           false-silence happens — paperclip is the only ubuntu-based
           workload in the cluster, and the `paperclip-` pod-name
           prefix doesn't collide with anything else. -->
      <rule id="100413" level="0">
        <if_sid>100404</if_sid>
        <field name="output" type="pcre2">k8smeta_pod_name=paperclip-.*container_image_repository=docker\.io/library/ubuntu</field>
        <description>Falco: ignore paperclip ai-tools sidecar apt/dpkg postinst (AR-009, expected)</description>
        <group>falco,homelab,suppress,</group>
      </rule>

      <!-- Suppress Falco "Drop and execute new binary in container" when
           triggered by the Nextcloud Collabora Online (richdocumentscode)
           AppImage extraction. The richdocumentscode app ships a bundled
           Collabora CODE AppImage that cannot mount FUSE in-pod, so it
           extracts to /tmp/appimage_extracted_<rand>/ and executes its
           binaries (cpio, coolwsd, coolforkit-ns, coolmount) from there
           on every pod start and on first office-document open.
           Triggered by parent rule 100404 (Critical, level 12). Volume
           on 2026-05-13: 3 events on k8s-nuc14-02 after node-wide reboot
           at 15:06; recurs on every Nextcloud pod restart. Image is the
           official docker.io/nextcloud:33.0.0. -->
      <rule id="100414" level="0">
        <if_sid>100404</if_sid>
        <field name="output" type="pcre2">k8smeta_pod_name=nextcloud-.*proc_exepath=/tmp/appimage_extracted_</field>
        <description>Falco: ignore Nextcloud Collabora CODE AppImage extraction (cpio/coolwsd/coolforkit-ns/coolmount, expected)</description>
        <group>falco,homelab,suppress,</group>
      </rule>

      <rule id="100401" level="3">
        <if_sid>100400</if_sid>
        <field name="priority" type="pcre2">^(Notice|Informational|Debug)$</field>
        <description>Falco $(priority): $(rule)</description>
        <group>falco,homelab,</group>
      </rule>
      <rule id="100402" level="6">
        <if_sid>100400</if_sid>
        <field name="priority" type="pcre2">^Warning$</field>
        <description>Falco Warning: $(rule)</description>
        <group>falco,homelab,</group>
      </rule>
      <rule id="100403" level="8">
        <if_sid>100400</if_sid>
        <field name="priority" type="pcre2">^Error$</field>
        <description>Falco Error: $(rule)</description>
        <group>falco,homelab,</group>
      </rule>
      <rule id="100404" level="12">
        <if_sid>100400</if_sid>
        <field name="priority" type="pcre2">^(Critical|Alert|Emergency)$</field>
        <description>Falco $(priority): $(rule)</description>
        <group>falco,homelab,attack,</group>
      </rule>
    </group>
