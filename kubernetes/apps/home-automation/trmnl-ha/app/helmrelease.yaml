apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trmnl-ha
  namespace: home-automation
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      trmnl-ha:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/usetrmnl/trmnl-ha-amd64
              tag: latest
            env:
              TZ: "Europe/Berlin"
              HOME_ASSISTANT_URL: "http://home-assistant.home-automation.svc.cluster.local:8123"
              KEEP_BROWSER_OPEN: "true"
            envFrom:
              - secretRef:
                  name: trmnl-ha-secret
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: trmnl-ha
        ports:
          http:
            port: 10000
    ingress:
      main:
        enabled: true
        className: internal
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "TRMNL HA"
          gethomepage.dev/description: "Home Assistant screenshots for TRMNL e-ink display"
          gethomepage.dev/group: "Home Automation"
          gethomepage.dev/icon: "https://avatars.githubusercontent.com/u/139822699"
        labels:
          gethomepage.dev/enabled: "true"
        hosts:
          - host: "trmnl-ha.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /data
