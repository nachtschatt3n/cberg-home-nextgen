apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
  namespace: home-automation
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      home-assistant:
        pod:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
        initContainers:
          # Recent home-assistant images dropped "DigiCert Global Root CA" (the
          # legacy 2006 root) from the certifi bundle, keeping only Global Root
          # G2/G3. api.wyzecam.com serves a valid chain terminating at that
          # legacy root, and HA's aiohttp client_context() loads certifi.where()
          # directly (ignoring SSL_CERT_FILE), so the wyzeapi integration fails
          # device-list TLS verification. This init container copies the image's
          # certifi bundle to a shared volume and appends the missing root; the
          # app container mounts the patched bundle back over certifi.where().
          certifi-patch:
            image:
              repository: ghcr.io/home-assistant/home-assistant
              tag: 2026.7.1
            command:
              - /bin/sh
              - -c
              - |
                set -eu
                SRC="$(python3 -c 'import certifi; print(certifi.where())')"
                EXPECTED="/usr/local/lib/python3.14/site-packages/certifi/cacert.pem"
                if [ "$SRC" != "$EXPECTED" ]; then
                  echo "certifi path changed ($SRC != $EXPECTED) — update the app-container mount path in helmrelease.yaml" >&2
                  exit 1
                fi
                cp "$SRC" /patched-ca/cacert.pem
                if ! grep -q "BEGIN CERTIFICATE" /extra-ca/digicert-global-root-ca.pem; then
                  echo "extra-ca configMap missing a PEM certificate" >&2; exit 1
                fi
                printf '\n' >> /patched-ca/cacert.pem
                cat /extra-ca/digicert-global-root-ca.pem >> /patched-ca/cacert.pem
                echo "patched certifi bundle: $(grep -c 'BEGIN CERTIFICATE' /patched-ca/cacert.pem) certs"
        containers:
          app:
            image:
              repository: ghcr.io/home-assistant/home-assistant
              tag: 2026.7.1
            env:
              - name: TZ
                value: "Europe/Berlin"
              # Point OpenSSL's default trust (used by Python's
              # ssl.create_default_context(), and therefore by aiohttp's default
              # SSLContext) at the certifi-patch bundle. HA core uses
              # certifi.where() directly (already fixed via the mount), but
              # integrations like wyzeapi/wyzeapy create their own
              # aiohttp.ClientSession() with the *system* store — which lacks
              # DigiCert Global Root CA. SSL_CERT_FILE redirects that path to the
              # patched bundle. Verified in-pod: a real aiohttp GET to
              # api.wyzecam.com returns HTTP 200 with this set.
              - name: SSL_CERT_FILE
                value: "/usr/local/lib/python3.14/site-packages/certifi/cacert.pem"
            resources:
              requests:
                cpu: 1000m
                memory: 2Gi
              limits:
                memory: 4Gi
    service:
      main:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "192.168.55.24"
        controller: home-assistant
        ports:
          http:
            port: 8123
            primary: true
          colot:
            enabled: true
            protocol: UDP
            port: 5683
    ingress:
      main:
        enabled: true
        className: external
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "Home Assistant"
          gethomepage.dev/description: "Open source home automation platform"
          gethomepage.dev/group: "Home Automation"
          gethomepage.dev/icon: "home-assistant.png"
          external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
        labels:
          gethomepage.dev/enabled: "true"
        hosts:
          - host: "hass.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: home-assistant-config
        advancedMounts:
          home-assistant:
            app:
              - path: /config
      # Public DigiCert Global Root CA, consumed only by the certifi-patch init.
      extra-ca:
        type: configMap
        name: home-assistant-extra-ca
        advancedMounts:
          home-assistant:
            certifi-patch:
              - path: /extra-ca
                readOnly: true
      # Shared scratch: init writes the patched certifi bundle here, the app
      # container mounts the single file back over certifi.where().
      patched-ca:
        type: emptyDir
        advancedMounts:
          home-assistant:
            certifi-patch:
              - path: /patched-ca
            app:
              - path: /usr/local/lib/python3.14/site-packages/certifi/cacert.pem
                subPath: cacert.pem
                readOnly: true
