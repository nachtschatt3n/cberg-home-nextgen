---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traccar
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 1
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: false
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: traccar-postgres
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: traccar/traccar
              tag: "6.13.0"
            # Wrapper to surface Traccar's file-based logs to stdout for kubectl logs
            command:
              - /bin/sh
              - -c
              - |
                cd /opt/traccar
                ./jre/bin/java -jar tracker-server.jar conf/traccar.xml &
                JAVA_PID=$!
                sleep 3
                tail -f logs/tracker-server.log &
                wait $JAVA_PID
            env:
              - name: TZ
                value: "Europe/Berlin"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server
                    port: &port 8082
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: *port
      osmand:
        controller: main
        type: LoadBalancer
        loadBalancerIP: "192.168.55.26"
        ports:
          osmand:
            port: 5055
            protocol: TCP

    ingress:
      main:
        enabled: true
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "Traccar"
          gethomepage.dev/group: "Home Automation"
          gethomepage.dev/icon: "mdi-map-marker-path"
          gethomepage.dev/description: "AirTag GPS tracking"
        labels:
          gethomepage.dev/enabled: "true"
        hosts:
          - host: traccar.${SECRET_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - hosts:
              - traccar.${SECRET_DOMAIN}

    persistence:
      # traccar.xml (with DB password) stored in SOPS-encrypted secret
      traccar-config:
        type: secret
        name: traccar-secret
        advancedMounts:
          main:
            main:
              - path: /opt/traccar/conf/traccar.xml
                subPath: traccar.xml
      logs:
        type: emptyDir
        globalMounts:
          - path: /opt/traccar/logs
