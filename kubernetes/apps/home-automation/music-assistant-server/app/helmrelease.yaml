---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: music-assistant-server
  namespace: home-automation
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      music-assistant-server:
        pod:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
        containers:
          app:
            image:
              repository: ghcr.io/music-assistant/server
              tag: 2.9.5
            env:
              - name: TZ
                value: "Europe/Berlin"
              - name: MUSIC_ASSISTANT_CONFIG_PATH
                value: "/config"
              - name: MUSIC_ASSISTANT_CACHE_PATH
                value: "/cache"
              - name: MASS_SERVER_URL
                value: "https://music.${SECRET_DOMAIN}"
            ports:
              - name: http
                containerPort: 8095
                protocol: TCP
              # MA streamserver: bind_port=80 (MA setting; publish_ip=music-stream.<domain>).
              # MA has no separate publish_port, so the published stream URL is
              # http://music-stream.<domain>:80 and must route via ingress to :80 here.
              - name: stream
                containerPort: 80
                protocol: TCP
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 1Gi
          # NOTE: former standalone alexa-api sidecar (:3000) removed 2026-07-12 —
          # upstream folded the API into the skill container (mounted at /ma).
          alexa-skill:
            image:
              repository: ghcr.io/alams154/music-assistant-skill
              # upstream only publishes :latest — pin the digest and bump manually
              # (MA server's Alexa provider and this skill API must stay in sync)
              tag: latest@sha256:ad7ec55a51d9304032a74d8ae0fda43743bf64ae68afa49dd6949d9477726ccf
            env:
              # Public HTTPS host fronting MA's stream port (8097) via external
              # ingress + Cloudflare. The skill rewrites stream URLs to this
              # host for Alexa devices (scheme must be https).
              - name: MA_HOSTNAME
                value: "https://music-stream.${SECRET_DOMAIN}"
              - name: PORT
                value: "5000"
              # Locale of /alexa/intents served to MA's Alexa provider (the
              # utterance set MA sends to the Echos; account region amazon.de)
              - name: LOCALE
                value: "de-DE"
            ports:
              - name: alexa-skill
                containerPort: 5000
                protocol: TCP
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      main:
        controller: music-assistant-server
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "192.168.55.29"
        ports:
          http:
            port: 80
            targetPort: 8095
            primary: true
          http-alt:
            port: 8095
            targetPort: 8095
          stream:
            port: 8097
            targetPort: 80 # MA streamserver bind_port (hostNetwork)
          alexa-skill:
            port: 5000
            targetPort: 5000
    ingress:
      main:
        enabled: true
        className: internal
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "Music Assistant"
          gethomepage.dev/description: "Music for Home Assistant"
          gethomepage.dev/group: "Home Automation"
          gethomepage.dev/icon: "music-assistant.png"
        labels:
          gethomepage.dev/enabled: "true"
        hosts:
          - host: "music.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - hosts:
              - "music.${SECRET_DOMAIN}"
    persistence:
      data:
        enabled: true
        existingClaim: music-assistant-config
        globalMounts:
          - path: /data
      cache:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /cache

