---
# Explicit ServiceMonitor for the mosquitto-exporter sidecar metrics endpoint
# on the mosquitto-metrics ClusterIP service (port 9234, /metrics).
#
# The bjw-s app-template chart can generate a ServiceMonitor via a
# `serviceMonitor:` block in values, but other apps in this namespace
# (zero-export-controller, pallet-price-monitor) have hit a Prometheus
# scrape-discovery gap with chart-generated SMs and use explicit YAML
# instead — matching that convention here.
#
# Selector targets the `mosquitto-metrics` service by its app-template
# `app.kubernetes.io/service` label so it doesn't accidentally match the
# `mosquitto-main` (LoadBalancer 1883/9001) or `mosquitto-internal`
# (ClusterIP 1883) services, neither of which expose Prometheus metrics.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mosquitto-metrics
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - home-automation
  selector:
    matchLabels:
      app.kubernetes.io/name: mosquitto
      app.kubernetes.io/service: mosquitto-metrics
  endpoints:
    - port: metrics
      path: /metrics
      scheme: http
      interval: 30s
      scrapeTimeout: 15s
