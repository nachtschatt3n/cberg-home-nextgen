apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: home-automation
components:
  - ../../flux/components/common
resources:
 - ./esphome/ks.yaml
 - ./ha-ai-harness/ks.yaml
 - ./frigate-nvr/ks.yaml
 - ./home-assistant/ks.yaml
 - ./iobroker/ks.yaml
 - ./matter-server/ks.yaml
 - ./mosquitto/ks.yaml
 - ./mqttx-web/ks.yaml
 - ./music-assistant-server/ks.yaml
 - ./n8n/ks.yaml
 - ./node-red/ks.yaml
 - ./otbr/ks.yaml  # re-enabled 2026-04-30 — Talos v1.13.0 kernel has CONFIG_IPV6_MROUTE=y
 - ./scrypted-nvr/ks.yaml
 - ./solarfocus-scraper/ks.yaml
 - ./teslamate/ks.yaml
 - ./traccar/ks.yaml
 - ./trmnl-ha/ks.yaml
 - ./zigbee2mqtt/ks.yaml

---
# Override the cluster-default PSA baseline back to privileged.
# Required because: home-assistant (privileged init), frigate (privileged for
# camera/USB), and otbr (hostNetwork for Thread mDNS).
apiVersion: v1
kind: Namespace
metadata:
  name: home-automation
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/warn-version: latest
