apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: home-automation
components:
  - ../../flux/components/common
resources:
 - ./esphome/ks.yaml
 - ./ha-ai-harness/ks.yaml
 - ./frigate-nvr/ks.yaml
 - ./home-assistant/ks.yaml
 - ./iobroker/ks.yaml
 - ./matter-server/ks.yaml
 - ./mosquitto/ks.yaml
 - ./mqttx-web/ks.yaml
 - ./music-assistant-server/ks.yaml
 - ./n8n/ks.yaml
 - ./node-red/ks.yaml
 # - ./otbr/ks.yaml  # DISABLED 2026-05-29 pending SMLIGHT RMA — SLZB-06P7 LAN port dead,
 #   WiFi too jittery for Thread RCP spinel. Commenting out prunes the HelmRelease
 #   (Deployment + 1Gi longhorn otbr-data PVC + Service + Ingress), which clears the
 #   detached-volume findings + replica-mismatch/crashloop alerts. Re-enable once the
 #   coordinator is on a wired link. (Was re-enabled 2026-04-30 for Talos v1.13.0 CONFIG_IPV6_MROUTE=y.)
 - ./pallet-price-monitor/ks.yaml
 - ./scrypted-nvr/ks.yaml
 - ./solarfocus-scraper/ks.yaml
 - ./teslamate/ks.yaml
 - ./traccar/ks.yaml
 - ./trmnl-ha/ks.yaml
 - ./zero-export-controller/ks.yaml
 - ./zigbee2mqtt/ks.yaml
patches:
  # PSA override: privileged required for HA init, frigate, otbr (hostNetwork).
  # Target = not-used (namespace transformer runs after patches).
  - target:
      kind: Namespace
      name: not-used
    patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: not-used
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
