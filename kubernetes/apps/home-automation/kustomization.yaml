  - ../../flux/components/common
resources:
 - ./esphome/ks.yaml
 - ./frigate-nvr/ks.yaml
 - ./home-assistant/ks.yaml
 - ./iobroker/ks.yaml
 - ./matter-server/ks.yaml
 - ./mosquitto/ks.yaml
