# Source registry — runtime knobs for every plugin.
#
# Adding a new source: drop a module under src/pellet_monitor/sources/ and a
# matching `from .<name> import ...` line in registry.py, then append a row
# below. enabled=false hides a source without removing the import.

defaults:
  primary_zip: "65520"
  primary_amount_kg: 6000
  user_agent: "pellet-price-monitor/0.1 (+https://github.com/nachtschatt3n/pellet-price-monitor)"
  request_timeout_s: 20

sources:
  # --- v1: PRICE (every_run) -----------------------------------------------
  # heizpellets24 — German national average from the SSR'd home-page widget.
  # heizpellets24_offers — per-PLZ offer list via Playwright (JS-rendered).
  # esyoil — PLZ-specific via static GET.
  # baywa_pellets — DEAD. BayWa removed the public Pelletspreisrechner;
  #   /waerme_strom/holzpellets/pelletspreisrechner now redirects to a
  #   marketing landing page with no price data. Disabled permanently.
  heizpellets24:        { enabled: true,  cadence: every_run, authority: 5 }
  heizpellets24_offers: { enabled: true,  cadence: every_run, authority: 5 }
  esyoil:               { enabled: true,  cadence: every_run, authority: 4 }
  baywa_pellets:        { enabled: false, cadence: every_run, authority: 4 }

  # --- v1: SENTIMENT / DELIVERY-DAYS ---------------------------------------
  # The Kaufbarometer widget is not actually present on heizpellets24.de's
  # home page anymore (verified 2026-05-01: only price + WoW delta show, no
  # buyer-sentiment %). Disabled. The week-over-week price delta is captured
  # directly by `heizpellets24` as an indicator.
  hp24_barometer:   { enabled: false, cadence: every_run, authority: 5 }

  # --- v1: SUBSTITUTE FUELS ------------------------------------------------
  heizoel24:        { enabled: true,  cadence: every_run, authority: 5 }

  # --- v1: LEADING INDICATORS ----------------------------------------------
  # destatis_epi_*: GENESIS-Online retired the GAST/GAST guest credentials
  # for data download (verified 2026-05-01); free user registration now
  # required. Disabled until we wire up an account.
  # eurostat_hs_440131: now points at the comext host with dataset
  # DS-045409 (the dissemination host returns 404 for trade datasets).
  # propellets_at — DEAD. The site embeds 23degrees.eu chart iframes that
  #   render data in JS-managed canvas; no public JSON API surfaces the
  #   underlying values. Disabled permanently.
  destatis_epi_pellets: { enabled: false, cadence: monthly,   authority: 5 }
  destatis_epi_sawdust: { enabled: false, cadence: monthly,   authority: 5 }
  eurostat_hs_440131:   { enabled: true,  cadence: monthly,   authority: 5 }
  propellets_at:        { enabled: false, cadence: monthly,   authority: 5 }

  # --- v1: WEATHER ---------------------------------------------------------
  dwd_hdd:          { enabled: true,  cadence: daily,     authority: 5 }

  # --- v1: NEWS ------------------------------------------------------------
  agrarheute:       { enabled: true,  cadence: daily,     authority: 5 }
  holzkurier:       { enabled: true,  cadence: daily,     authority: 5 }
  depv_press:       { enabled: true,  cadence: weekly,    authority: 5 }

  # --- v1: BORKENKÄFER -----------------------------------------------------
  hessen_forst:     { enabled: true,  cadence: weekly,    authority: 4 }
  fva_bw_kaefer:    { enabled: true,  cadence: weekly,    authority: 5 }
  nrw_borkenkaefer: { enabled: true,  cadence: weekly,    authority: 4 }

  # --- v1: STEP-CHANGE EVENTS ---------------------------------------------
  # toll_collect — DEAD. The mauttarif page restructured; the canonical URL
  # `bezahlen/maut_tarife/p1745_mauttarife_07_2024.html` returns 200 but the
  # per-km values are rendered inside a complex table that doesn't yield to
  # regex extraction (~700 KB of HTML, zero numeric matches near 'pro km').
  # A Playwright-based parser could probably extract them but for an
  # `on_change` source the value/effort ratio is poor — disabled.
  toll_collect:     { enabled: false, cadence: on_change, authority: 5 }

  # --- v2 follow-ups (flip enabled→true when modules land) -----------------
  # kfw_beg_em_458:     { enabled: false, cadence: quarterly, authority: 5 }
  # bafa_be:            { enabled: false, cadence: quarterly, authority: 5 }
  # bdh_absatz:         { enabled: false, cadence: quarterly, authority: 5 }
  # depi_anlagen:       { enabled: false, cadence: yearly,    authority: 5 }
  # usda_fas_gain:      { enabled: false, cadence: yearly,    authority: 5 }
  # holzpellets_net:    { enabled: false, cadence: weekly,    authority: 4 }
  # hoyer:              { enabled: false, cadence: every_run, authority: 4 }
  # ec_bioenergie:      { enabled: false, cadence: every_run, authority: 4 }
  # energienutzer_de:   { enabled: false, cadence: monthly,   authority: 3 }
  # naturbrennstoffe24: { enabled: false, cadence: every_run, authority: 3 }
