---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zero-export-controller
  namespace: home-automation
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      zero-export-controller:
        annotations:
          # Roll the pod when the controller.py ConfigMap changes
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/library/python
              tag: 3.12-slim
              pullPolicy: IfNotPresent
            command:
              - sh
              - -c
              - |
                pip install --no-cache-dir --root-user-action=ignore \
                  httpx==0.27.2 prometheus-client==0.20.0 && \
                exec python -u /app/controller.py
            env:
              - name: TZ
                value: "Europe/Berlin"
              - name: HA_BASE_URL
                value: "http://home-assistant.home-automation.svc.cluster.local:8123"
              - name: HA_TOKEN
                valueFrom:
                  secretKeyRef:
                    # Reuse the existing HA long-lived token from trmnl-ha
                    name: trmnl-ha-secret
                    key: ACCESS_TOKEN
              - name: DRY_RUN
                value: "true"
              - name: METRICS_PORT
                value: "8080"
              - name: GRID_SENSOR
                value: "sensor.tibber_pulse_schulstrasse_105_power"
              - name: PV_TOTAL_SENSOR
                value: "sensor.opendtu_3c647c_ac_power"
              - name: INVERTERS
                value: "s1,s2,s3"
              - name: LOG_LEVEL
                value: "INFO"
              - name: HEARTBEAT_PATH
                value: "/tmp/heartbeat"
              - name: PIP_DISABLE_PIP_VERSION_CHECK
                value: "1"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: 8080
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
        pod:
          securityContext:
            runAsNonRoot: false
            fsGroup: 1000

    service:
      app:
        controller: zero-export-controller
        ports:
          metrics:
            port: 8080

    serviceMonitor:
      app:
        serviceName: zero-export-controller
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 30s
            scrapeTimeout: 15s
        labels:
          release: kube-prometheus-stack

    persistence:
      source:
        type: configMap
        name: zero-export-controller-source
        advancedMounts:
          zero-export-controller:
            app:
              - path: /app/controller.py
                subPath: controller.py
                readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
