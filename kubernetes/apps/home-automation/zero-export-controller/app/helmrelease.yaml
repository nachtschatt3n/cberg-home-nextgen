---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zero-export-controller
  namespace: home-automation
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      zero-export-controller:
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/nachtschatt3n/zero-export-controller
              tag: 0.3.1
              pullPolicy: IfNotPresent
            env:
              - name: TZ
                value: "Europe/Berlin"
              - name: HA_BASE_URL
                value: "http://home-assistant:8123"
              - name: HA_TOKEN
                valueFrom:
                  secretKeyRef:
                    # Reuse the existing HA long-lived token from trmnl-ha
                    name: trmnl-ha-secret
                    key: ACCESS_TOKEN
              - name: DRY_RUN
                value: "false"
              - name: METRICS_PORT
                value: "8080"
              - name: GRID_SENSOR
                value: "sensor.tibber_pulse_schulstrasse_105_power"
              - name: PV_TOTAL_SENSOR
                value: "sensor.opendtu_3c647c_ac_power"
              - name: INVERTERS
                value: "s1,s2,s3"
              - name: LOG_LEVEL
                value: "INFO"
              - name: HEARTBEAT_PATH
                value: "/tmp/heartbeat"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: 8080
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault

    service:
      app:
        controller: zero-export-controller
        ports:
          metrics:
            port: 8080

    serviceMonitor:
      app:
        serviceName: zero-export-controller
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 30s
            scrapeTimeout: 15s
        labels:
          release: kube-prometheus-stack

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
