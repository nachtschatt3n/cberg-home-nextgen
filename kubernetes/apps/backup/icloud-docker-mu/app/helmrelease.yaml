---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: icloud-docker-mu
  namespace: backup
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      main:
        strategy: Recreate
        containers:
          app:
            image:
              repository: mandarons/icloud-drive
              # Pinned to the `main` build (2026-06-06) that bundles icloudpy 0.9.0,
              # which adds trigger_2fa_push_notification() — REQUIRED for iOS 26.4+
              # 2FA re-auth. The latest RELEASE (v1.25.0) still ships the broken
              # icloudpy 0.8.0, so Apple never pushes the code and no 2FA dialog
              # appears on any device. Move back to a release tag once icloud-docker
              # cuts >= v1.26.0 with icloudpy 0.9.0. See docs/sops/icloud-docker-reauth.md.
              tag: "main@sha256:91486ec1eaeb382e7af264b7ffa935c5ba110f11c3c2f1805976782ff5017917"
              pullPolicy: IfNotPresent
            env:
              TZ: ${TIMEZONE}
              PUID: 1000
              PGID: 1000
              ENV_CONFIG_FILE_PATH: /config/config.yaml
              ENV_ICLOUD_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: icloud-docker-mu-secrets
                    key: SECRET_ICLOUD_PASSWORD
            envFrom:
              - secretRef:
                  name: icloud-docker-mu-secrets
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                # Bumped 1Gi → 2Gi after 3 OOMKills in 2h on 2026-05-01.
                # Steady-state is ~136Mi but photo-sync (every 500s) and
                # drive-sync (every 300s) cycles spike past 1Gi briefly.
                memory: 2Gi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
    defaultPodOptions:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        runAsNonRoot: false
        fsGroupChangePolicy: "OnRootMismatch"

    service:
      main:
        controller: main
        enabled: false

    ingress:
      main:
        enabled: false

    persistence:
      config:
        enabled: true
        type: configMap
        name: icloud-docker-mu-config
        globalMounts:
          - path: /config/config.yaml
            subPath: config.yaml
      data:
        enabled: true
        existingClaim: icloud-docker-mu-data
        globalMounts:
          - path: /icloud
            readOnly: false
      session:
        enabled: true
        existingClaim: icloud-docker-mu-session
        globalMounts:
          - path: /config/session_data
