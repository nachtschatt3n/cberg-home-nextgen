---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-gateway
spec:
  interval: 30m
  chart:
    spec:
      chart: k8s-gateway
      version: 2.4.0
      sourceRef:
        kind: HelmRepository
        name: k8s-gateway
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    fullnameOverride: k8s-gateway
    domain: "${SECRET_DOMAIN}"
    # TTL 1 was pathologically low: the UniFi gateway's dnsmasq couldn't
    # keep the positive A-record cached (expired every 1s) while latching
    # the 60s NODATA negative SOA, so newly-added ingress hosts (e.g. the
    # `sweep` subdomain) got stuck returning empty in a self-renewing loop.
    # Match the SOA neg-TTL (60s) so positive answers actually stick.
    ttl: 60
    service:
      type: LoadBalancer
      loadBalancerIP: "192.168.55.101"
      port: 53
      annotations:
        lbipam.cilium.io/ips: "192.168.55.101"
      externalTrafficPolicy: Cluster
    watchedResources: ["Ingress", "Service"]
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
