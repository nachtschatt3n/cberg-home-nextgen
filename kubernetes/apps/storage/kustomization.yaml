---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: storage
components:
  - ../../flux/components/common
resources:
  - ./longhorn/ks.yaml
  - ./longhorn/recurringjobs-ks.yaml
patches:
  # PSA override: privileged required for longhorn-manager, instance-manager,
  # csi-driver, share-manager (privileged + hostPath). This was the
  # 2026-04-30 upgrade incident root cause when PSA baseline was new default.
  # Target = not-used (namespace transformer runs after patches).
  - target:
      kind: Namespace
      name: not-used
    patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: not-used
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
