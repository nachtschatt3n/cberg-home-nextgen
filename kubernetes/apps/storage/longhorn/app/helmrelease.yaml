---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: storage
spec:
  interval: 5m
  chart:
    spec:
      chart: longhorn
      version: "1.11.1"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  values:
    longhorn:
      namespaceOverride: storage
      defaultSettings:
        defaultDataPath: /var/lib/longhorn
        replicaSoftAntiAffinity: true
        replicaAutoBalance: best-effort
        createDefaultDiskLabeledNodes: false
        defaultReplicaCount: 2
        defaultDataLocality: best-effort
        # Reserve less CPU per instance-manager pod to reduce artificial
        # cluster overcommit while still keeping non-zero headroom for Longhorn.
        guaranteedInstanceManagerCpu: 8
        defaultLonghornStaticStorageClass: longhorn-static
        backupTarget: "cifs://192.168.31.230/backups?cifsOptions=soft,cache=loose,retrans=5,actimeo=10,closetimeo=10,echo_interval=60"
        backupTargetCredentialSecret: "longhorn-backup-credentials"
        allowRecurringJobWhileVolumeDetached: true
        storageOverProvisioningPercentage: 100
        storageMinimalAvailablePercentage: 25
        # Default 30% reserved was leaving nuc14-03 at 71.8% scheduled
        # (over the 70% schedulable threshold) blocking new replica
        # placement. Lower to 20% — frees ~100 GiB scheduling headroom
        # per node while still keeping a safety margin. Existing disks
        # retain their old reservation until patched manually.
        storageReservedPercentageForDefaultDisk: 20
        backupstorePollInterval: 300
        taintToleration: ""
        systemManagedComponentsNodeSelector: ""
        allowNodeDrainWithLastHealthyReplica: true
        nodeDrainPolicy: block-if-contains-last-replica
        offlineReplicaRebuilding: enabled
        disableSchedulingOnCordonedNode: true
        replicaZoneSoftAntiAffinity: true
        removeSnapshotsDuringFilesystemTrim: true
        snapshotDataIntegrity: disabled
        snapshotDataIntegrityImmediateCheckAfterSnapshotCreation: false
        snapshotMaxCount: 250
        backupCompressionMethod: lz4
        backupExecutionTimeout: 5
        defaultBackupBlockSize: 16
        backupConcurrentLimit: 5
        concurrentVolumeBackupRestorePerNodeLimit: 10
        restoreConcurrentLimit: 2
        failedBackupTTL: 1440
        fastReplicaRebuildEnabled: true
        engineReplicaTimeout: 12
        instanceManagerPodLivenessProbeTimeout: 60
        replicaFileSyncHttpClientTimeout: 30
        replicaDiskSoftAntiAffinity: true
        autoDeletePodWhenVolumeDetachedUnexpectedly: false
        replicaReplenishmentWaitInterval: 300
        concurrentReplicaRebuildPerNodeLimit: 2
        systemManagedPodsImagePullPolicy: if-not-present
        allowVolumeCreationWithDegradedAvailability: true
        mkfsExt4Parameters: ""
        priorityClass: longhorn-critical
        autoCleanupRecurringJobBackupSnapshot: true
        autoCleanupSystemGeneratedSnapshot: true
        recurringSuccessfulJobsHistoryLimit: 1
        recurringFailedJobsHistoryLimit: 1
        recurringJobMaxRetention: 2
        restoreVolumeRecurringJobs: false
        orphanAutoDeletion: false
        detachManuallyAttachedVolumesWhenCordoned: false
        nodeDownPodDeletionPolicy: do-nothing
        allowEmptyDiskSelectorVolume: true
        allowEmptyNodeSelectorVolume: true
        allowCollectingLonghornUsageMetrics: true
        kubernetesClusterAutoscalerEnabled: false
        logLevel: Info
        upgradeChecker: false
        v1DataEngine: true
        v2DataEngine: false
        v2DataEngineGuaranteedInstanceManagerCPU: 1250
        v2DataEngineHugepageLimit: 2048
      persistence:
        defaultClass: true
        defaultClassReplicaCount: 2
      ui:
        enabled: true
        service:
          type: ClusterIP
      csi:
        kubeletRootDir: /var/lib/kubelet
