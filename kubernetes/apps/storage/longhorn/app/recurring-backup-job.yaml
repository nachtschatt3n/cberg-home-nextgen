---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: daily-backup-all-volumes
  namespace: storage
spec:
  # Backup task type
  task: backup
  # Run at 3:00 AM daily (UTC)
  cron: "0 3 * * *"
  # Keep a week of daily backups (was 1). Motivated by the 2026-06-04 Z2M
  # database injection incident: with retain=1, a corruption that went
  # unnoticed for 24h would leave only the corrupted state as recovery.
  # 7 daily backups give a usable rollback window without unbounded growth.
  retain: 7
  # Default concurrency (2 volumes at a time)
  concurrency: 2
  # Apply to all volumes with this label
  # If empty, applies to all volumes by default via group "default"
  groups:
    - default
  # Optional: Add labels to identify backups created by this job
  labels:
    backup-type: daily
    managed-by: recurring-job
