---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system
components:
  - ../../flux/components/common
resources:
  - ./cilium/ks.yaml
  - ./coredns/ks.yaml
  - ./metrics-server/ks.yaml
  - ./reloader/ks.yaml
  - ./spegel/ks.yaml
  - ./csi-driver-smb/ks.yaml
  - ./intel-device-plugin/ks.yaml
  - ./node-feature-discovery/ks.yaml
  - ./descheduler/ks.yaml
  - ./authentik/ks.yaml
patches:
  # PSA override: privileged required for cilium (eBPF + hostNetwork),
  # csi-driver-smb (mount), and other system-level workloads.
  # Target = not-used (namespace transformer runs after patches).
  - target:
      kind: Namespace
      name: not-used
    patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: not-used
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
