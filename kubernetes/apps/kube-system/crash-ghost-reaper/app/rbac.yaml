---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crash-ghost-reaper
  namespace: kube-system
---
# Cluster-wide, but minimal: list pods to find ghosts, delete pods to reap them.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crash-ghost-reaper
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crash-ghost-reaper
subjects:
  - kind: ServiceAccount
    name: crash-ghost-reaper
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: crash-ghost-reaper
  apiGroup: rbac.authorization.k8s.io
