---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/cilium.io/ciliumloadbalancerippool_v2alpha1.json
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: pool
spec:
  allowFirstLastIPs: "No"
  # Reserve 192.168.55.0–.24 for the upstream / out-of-band:
  #   .1            — UniFi gateway for VLAN 55 (k8s-network gw_ip)
  #   .11/.12/.13   — Talos node IPs
  #   .2–.10/.14–.24 — manual / reserved for future static-IP needs
  # Cilium LBIPAM previously picked .1 for Plex (lowest free) which
  # collided with the gateway and silently black-holed all traffic.
  # Start the pool at .25 so the gateway and reserved range can't be
  # auto-assigned. Existing services already on .1–.24 remain in
  # place; only future allocations are bounded.
  blocks:
    - start: "192.168.55.25"
      stop: "192.168.55.254"
