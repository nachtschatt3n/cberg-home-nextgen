---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/cilium.io/ciliumloadbalancerippool_v2alpha1.json
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: pool
spec:
  allowFirstLastIPs: "No"
  # Exclude only .1 (UniFi VLAN 55 gateway). The original .25-.254
  # narrowing in ac95aeb8 was too aggressive — it kicked unpinned
  # services off their auto-allocated low IPs (notably AdGuard at .5,
  # broke cluster DNS). Starting at .2 preserves every existing
  # auto-allocation while keeping Cilium from grabbing the gateway IP.
  # Node IPs .11/.12/.13 are routed (DHCP), not in this pool, so they
  # don't collide.
  blocks:
    - start: "192.168.55.2"
      stop: "192.168.55.254"
