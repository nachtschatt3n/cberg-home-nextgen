---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/cilium.io/ciliumloadbalancerippool_v2alpha1.json
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: pool
spec:
  allowFirstLastIPs: "No"
  # REVERTED to /24 in commit (see below) after the .25-.254 narrowing
  # in commit ac95aeb8 booted services that didn't have explicit
  # `lbipam.cilium.io/ips` annotations off their auto-allocated low
  # IPs (notably AdGuard at .5 → cluster DNS broken). To narrow this
  # safely later, every service in the .1–.24 range must first get an
  # explicit pin annotation.
  blocks:
    - cidr: "192.168.55.0/24"
