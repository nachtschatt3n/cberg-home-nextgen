---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: my-software-production
components:
  - ../../flux/components/common
resources:
  - ./absenty/ks.yaml
  - ./andreamosteller/ks.yaml
  - ./rainbow-rescue/ks.yaml
# PSA = baseline (cluster default). Inline Namespace resource was silently
# ignored by kustomize. rainbow-rescue currently uses CHOWN/SETUID/SETGID/
# DAC_OVERRIDE caps — baseline-allowed but NOT restricted-allowed. Tighten
# to restricted only after switching the chart to runAsNonRoot+drop-all.
