---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gas-price-monitor
  namespace: my-software-production
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      gas-price-monitor:
        # Single replica is non-negotiable: cache is on-disk emptyDir.
        # Two replicas = two caches = double Tankerkoenig API hits, violates
        # the 5-minute fair-use cache and risks getting the API key banned.
        # See ~/code/gas-price-monitor/CLAUDE.md "Architecture decisions".
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/nachtschatt3n/gas-price-monitor
              tag: sha-6ebfcbc
              pullPolicy: IfNotPresent
            # NOTE: TANKERKOENIG_API_KEY is intentionally NOT set in this first
            # deploy. The app's parseEnv() tolerates a missing key (defaults to
            # "") and server.ts only logs a warning. `/api/stations` will 500
            # until the key is wired in; `/` (dashboard HTML) and `/api/config`
            # (probes) work without it. Follow-up: author secret.sops.yaml +
            # add the env entry below once the look-and-feel pass is signed off.
            env:
              - name: TZ
                value: "Europe/Berlin"
              - name: PORT
                value: "3000"
              - name: CACHE_DIR
                value: /cache
              - name: DATA_DIR
                value: /data
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/config
                    port: 3000
                  initialDelaySeconds: 5
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/config
                    port: 3000
                  initialDelaySeconds: 2
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 256Mi
        pod:
          securityContext:
            runAsNonRoot: true

    service:
      app:
        controller: gas-price-monitor
        ports:
          http:
            port: 80
            targetPort: 3000

    # Ephemeral state (history + alerts) is intentional — pod restart wipes both.
    # Per the source repo CLAUDE.md, switching to a PVC also requires reconsidering
    # the single-replica rule (shared-fs caches can race on writes).
    persistence:
      cache:
        type: emptyDir
        globalMounts:
          - path: /cache
      data:
        type: emptyDir
        globalMounts:
          - path: /data
