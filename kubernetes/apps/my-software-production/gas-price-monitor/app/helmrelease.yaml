---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gas-price-monitor
  namespace: my-software-production
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      gas-price-monitor:
        # Single replica is non-negotiable: cache is on-disk emptyDir.
        # Two replicas = two caches = double Tankerkoenig API hits, violates
        # the 5-minute fair-use cache and risks getting the API key banned.
        # See ~/code/gas-price-monitor/CLAUDE.md "Architecture decisions".
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/nachtschatt3n/gas-price-monitor
              tag: sha-bd934d1
              pullPolicy: IfNotPresent
            # TANKERKOENIG_API_KEY is sourced from the SOPS-encrypted Secret
            # `gas-price-monitor` (see ./secret.sops.yaml). The reloader
            # annotation on the controller picks up secret changes and
            # restarts the pod. Currently set to the public Tankerkönig demo
            # key (00000000-0000-0000-0000-000000000002) which returns fixed
            # example payloads, not real station prices — rotate to a real
            # key by editing the SOPS file in place.
            #
            # PHOTON_USER_AGENT is REQUIRED at boot (server exits 1 if unset).
            # It identifies this deployment to komoot's Photon geocoder so they
            # can contact the owner if our traffic ever misbehaves. Plain env
            # (not SOPS) — the value is a public contact string, not a secret.
            env:
              - name: TZ
                value: "Europe/Berlin"
              - name: PORT
                value: "3000"
              - name: CACHE_DIR
                value: /cache
              - name: DATA_DIR
                value: /data
              - name: PHOTON_USER_AGENT
                value: "gas-price-monitor (mu@nachtschatt3n)"
            envFrom:
              - secretRef:
                  name: gas-price-monitor
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/config
                    port: 3000
                  initialDelaySeconds: 5
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/config
                    port: 3000
                  initialDelaySeconds: 2
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 256Mi
    # Image USER is non-numeric ("bun"). Kubelet refuses to enforce
    # runAsNonRoot without a numeric UID, so pin runAsUser/runAsGroup/fsGroup
    # explicitly. bun in oven/bun:*-alpine is uid=1000 gid=1000.
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: gas-price-monitor
        ports:
          http:
            port: 80
            targetPort: 3000

    # Ephemeral state (history + alerts) is intentional — pod restart wipes both.
    # Per the source repo CLAUDE.md, switching to a PVC also requires reconsidering
    # the single-replica rule (shared-fs caches can race on writes).
    persistence:
      cache:
        type: emptyDir
        globalMounts:
          - path: /cache
      data:
        type: emptyDir
        globalMounts:
          - path: /data
