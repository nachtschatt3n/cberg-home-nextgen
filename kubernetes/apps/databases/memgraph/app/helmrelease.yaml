---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app memgraph
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      memgraph:
        strategy: Recreate
        containers:
          app:
            image:
              repository: memgraph/memgraph-mage
              tag: "3.9.0"
              pullPolicy: IfNotPresent
            args:
              - --bolt-address=0.0.0.0
              - --bolt-port=7687
              - --monitoring-port=7444
              - --also-log-to-stderr
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 2Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 7687
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 7687
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 3
      lab:
        strategy: Recreate
        containers:
          app:
            image:
              repository: memgraph/lab
              tag: "3.9.0"
              pullPolicy: IfNotPresent
            env:
              QUICK_CONNECT_MG_HOST: memgraph.databases.svc.cluster.local
              QUICK_CONNECT_MG_PORT: "7687"
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 3
    service:
      memgraph:
        controller: memgraph
        ports:
          bolt:
            port: 7687
          monitoring:
            port: 7444
      lab:
        controller: lab
        ports:
          http:
            port: 3000
    ingress:
      lab:
        enabled: true
        className: internal
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "Memgraph Lab"
          gethomepage.dev/group: "Databases"
          gethomepage.dev/icon: "memgraph.png"
          gethomepage.dev/description: "Graph database visualization and querying"
        labels:
          gethomepage.dev/enabled: "true"
        hosts:
          - host: memgraph.${SECRET_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: lab
                  port: http
        tls:
          - hosts:
              - memgraph.${SECRET_DOMAIN}
    persistence:
      data:
        existingClaim: memgraph-data
        advancedMounts:
          memgraph:
            app:
              - path: /var/lib/memgraph
