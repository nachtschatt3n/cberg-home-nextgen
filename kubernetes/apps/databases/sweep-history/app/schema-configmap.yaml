---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sweep-history-schema
  namespace: databases
data:
  # NOTE on $${VAR} double-dollar escapes: Flux postBuild.substituteFrom is
  # applied to every Kustomization in this cluster (see
  # kubernetes/flux/cluster/ks.yaml). It substitutes ${VAR}-style references
  # before kubectl apply, which would otherwise strip the bash variables here
  # to empty strings. `$${VAR}` survives as a literal `${VAR}` in the rendered
  # ConfigMap and bash then expands it normally at runtime.
  bootstrap.sh: |
    #!/usr/bin/env bash
    # Idempotent bootstrap of sweep-history DB on the shared postgresql instance.
    # Runs as the postgres admin user. Safe to re-run on every Flux reconcile.
    set -euo pipefail

    : "$${PGHOST:?PGHOST required}"
    : "$${PGUSER:?PGUSER required}"
    : "$${PGPASSWORD:?PGPASSWORD required}"
    : "$${SWEEP_WRITER_PASSWORD:?SWEEP_WRITER_PASSWORD required}"
    : "$${SWEEP_READER_PASSWORD:?SWEEP_READER_PASSWORD required}"

    export PGCONNECT_TIMEOUT=10

    psql_admin() { PGDATABASE=postgres psql -v ON_ERROR_STOP=1 "$@"; }
    psql_sweep() { PGDATABASE=sweep_history psql -v ON_ERROR_STOP=1 "$@"; }

    # Passwords are SOPS-managed and alphanumeric-only by convention. Refuse
    # to run if a rotation has introduced a single quote — the SOPS+Flux path
    # can't carry a SQL-safe shell-escape reliably, so inline interpolation
    # is the simplest correct form (covered by this assert).
    case "$${SWEEP_WRITER_PASSWORD}" in *"'"*) echo "FATAL: writer password contains single quote — rotate to alphanumeric only" >&2; exit 1;; esac
    case "$${SWEEP_READER_PASSWORD}" in *"'"*) echo "FATAL: reader password contains single quote — rotate to alphanumeric only" >&2; exit 1;; esac

    echo "==> Ensure roles exist (sweep_writer, sweep_reader)"
    psql_admin -tAc "SELECT 1 FROM pg_roles WHERE rolname='sweep_writer'" | grep -q 1 \
      || psql_admin -c "CREATE ROLE sweep_writer LOGIN"
    psql_admin -tAc "SELECT 1 FROM pg_roles WHERE rolname='sweep_reader'" | grep -q 1 \
      || psql_admin -c "CREATE ROLE sweep_reader LOGIN"
    psql_admin -c "ALTER ROLE sweep_writer WITH PASSWORD '$${SWEEP_WRITER_PASSWORD}'"
    psql_admin -c "ALTER ROLE sweep_reader WITH PASSWORD '$${SWEEP_READER_PASSWORD}'"

    echo "==> Ensure database sweep_history exists (owner: sweep_writer)"
    psql_admin -tAc "SELECT 1 FROM pg_database WHERE datname='sweep_history'" | grep -q 1 \
      || psql_admin -c "CREATE DATABASE sweep_history OWNER sweep_writer"

    echo "==> Apply schema migrations"
    psql_sweep -f /sql/schema.sql

    echo "==> Apply grants (writer = DML, reader = SELECT)"
    # Reader
    psql_sweep -c "GRANT CONNECT ON DATABASE sweep_history TO sweep_reader"
    psql_sweep -c "GRANT USAGE ON SCHEMA public TO sweep_reader"
    psql_sweep -c "GRANT SELECT ON ALL TABLES IN SCHEMA public TO sweep_reader"
    psql_sweep -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO sweep_reader"
    # Writer — needs DML + sequence USAGE for BIGSERIAL columns
    psql_sweep -c "GRANT CONNECT ON DATABASE sweep_history TO sweep_writer"
    psql_sweep -c "GRANT USAGE ON SCHEMA public TO sweep_writer"
    psql_sweep -c "GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO sweep_writer"
    psql_sweep -c "GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO sweep_writer"
    psql_sweep -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO sweep_writer"
    psql_sweep -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO sweep_writer"

    echo "==> Done"

  schema.sql: |
    -- sweep-history schema v1
    -- Idempotent — every statement uses IF NOT EXISTS or a guarded form.

    CREATE TABLE IF NOT EXISTS sweep_cycles (
      cycle_id    UUID PRIMARY KEY,
      started_at  TIMESTAMPTZ NOT NULL,
      finished_at TIMESTAMPTZ,
      trigger     VARCHAR(16) NOT NULL,
      git_head    VARCHAR(40),
      verdict     VARCHAR(16),
      notes       TEXT
    );

    CREATE TABLE IF NOT EXISTS sweep_findings (
      id              BIGSERIAL PRIMARY KEY,
      finding_id      VARCHAR(32) NOT NULL,
      fingerprint     VARCHAR(64) NOT NULL,
      section         VARCHAR(32) NOT NULL,
      severity        VARCHAR(16) NOT NULL,
      title           TEXT        NOT NULL,
      status          VARCHAR(32) NOT NULL,
      action          TEXT,
      evidence_path   TEXT,
      first_seen      TIMESTAMPTZ NOT NULL,
      last_seen       TIMESTAMPTZ NOT NULL,
      resolved_at     TIMESTAMPTZ,
      resolved_commit VARCHAR(40),
      cycle_id        UUID        NOT NULL REFERENCES sweep_cycles(cycle_id),
      metadata        JSONB
    );

    CREATE INDEX IF NOT EXISTS idx_findings_open
      ON sweep_findings(section, severity)
      WHERE resolved_at IS NULL;
    CREATE INDEX IF NOT EXISTS idx_findings_fingerprint
      ON sweep_findings(fingerprint);
    CREATE INDEX IF NOT EXISTS idx_findings_first_seen
      ON sweep_findings(first_seen);

    CREATE TABLE IF NOT EXISTS slo_snapshots (
      id                   BIGSERIAL PRIMARY KEY,
      slo_name             VARCHAR(64) NOT NULL,
      taken_at             TIMESTAMPTZ NOT NULL,
      compliance_pct       NUMERIC(5,2),
      target_pct           NUMERIC(5,2),
      burn_rate_1h         NUMERIC,
      burn_rate_6h         NUMERIC,
      budget_remaining_pct NUMERIC(5,2),
      window_size          VARCHAR(8),   -- 7d|30d; `window` is a Postgres reserved word
      source               VARCHAR(16),
      raw_numerator        NUMERIC,
      raw_denominator      NUMERIC
    );
    CREATE INDEX IF NOT EXISTS idx_slo_snapshots_name_time
      ON slo_snapshots(slo_name, taken_at DESC);

    -- ─── schema v3: operator-curated policy tables ──────────────────
    -- Replaces docs/security-accepted-risks.md, runbooks/slo-catalog.yaml,
    -- runbooks/noise_allowlist.yaml, runbooks/security_check_acceptances.py.
    -- Editing happens via runbooks/policy-cli.py (sweep_writer DSN).
    -- All four tables use `enabled BOOLEAN` for soft-disable; loaders
    -- treat enabled=false rows as if absent.

    -- 1. accepted_risks — replaces docs/security-accepted-risks.md
    CREATE TABLE IF NOT EXISTS accepted_risks (
      ar_id            VARCHAR(16) PRIMARY KEY,   -- AR-001 … AR-NNN
      severity         VARCHAR(16) NOT NULL,
      description      TEXT        NOT NULL,     -- substring-match needle
      justification    TEXT,
      status           VARCHAR(16) NOT NULL DEFAULT 'accepted',
      enabled          BOOLEAN     NOT NULL DEFAULT true,
      accepted_at      TIMESTAMPTZ NOT NULL DEFAULT now(),
      last_reviewed_at TIMESTAMPTZ NOT NULL DEFAULT now(),
      metadata         JSONB
    );
    CREATE INDEX IF NOT EXISTS idx_ar_status
      ON accepted_risks(status) WHERE enabled = true;

    -- 2. slo_definitions — replaces runbooks/slo-catalog.yaml
    CREATE TABLE IF NOT EXISTS slo_definitions (
      name              VARCHAR(64) PRIMARY KEY,
      description       TEXT,
      source            VARCHAR(16) NOT NULL,    -- prom|es|hactl
      kind              VARCHAR(16) NOT NULL,    -- ratio
      target            NUMERIC(5,4) NOT NULL,   -- 0.0–1.0
      window_size       VARCHAR(8)   NOT NULL,   -- 7d|30d
      query_json        JSONB NOT NULL,          -- source-specific block
      burn_rate_windows JSONB,                    -- null = inherit defaults
      tags              TEXT[],
      enabled           BOOLEAN NOT NULL DEFAULT true,
      created_at        TIMESTAMPTZ NOT NULL DEFAULT now(),
      updated_at        TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    -- 3. noise_suppressions — replaces runbooks/noise_allowlist.yaml
    CREATE TABLE IF NOT EXISTS noise_suppressions (
      id          BIGSERIAL PRIMARY KEY,
      category    VARCHAR(40) NOT NULL,
      match_key   VARCHAR(64),
      match_value TEXT,
      threshold   INTEGER,
      note        TEXT,
      enabled     BOOLEAN NOT NULL DEFAULT true,
      created_at  TIMESTAMPTZ NOT NULL DEFAULT now()
    );
    CREATE INDEX IF NOT EXISTS idx_noise_category
      ON noise_suppressions(category) WHERE enabled = true;

    -- 4. security_acceptances — replaces runbooks/security_check_acceptances.py
    CREATE TABLE IF NOT EXISTS security_acceptances (
      id          BIGSERIAL PRIMARY KEY,
      category    VARCHAR(40) NOT NULL,
      pattern     TEXT NOT NULL,
      note        TEXT,
      ar_id       VARCHAR(16),                    -- optional ref to accepted_risks.ar_id
      enabled     BOOLEAN NOT NULL DEFAULT true,
      created_at  TIMESTAMPTZ NOT NULL DEFAULT now()
    );
    CREATE INDEX IF NOT EXISTS idx_secacc_category
      ON security_acceptances(category) WHERE enabled = true;
