---
# One-shot init Job. Name suffix v1 = schema v1. Bump to -v2/-v3 when the
# schema changes — Flux will create a new Job. Old Job stays as audit trail.
apiVersion: batch/v1
kind: Job
metadata:
  name: sweep-history-init-v1
  namespace: databases
  labels:
    app.kubernetes.io/name: sweep-history
    app.kubernetes.io/component: init
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 604800  # 7d retention so we can inspect logs after the fact
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sweep-history
        app.kubernetes.io/component: init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: pgvector/pgvector:pg16
          command: ["bash", "/sql/bootstrap.sh"]
          env:
            # Service lives in this same namespace; short name resolves via
            # in-namespace DNS. FQDN omitted to avoid pre-commit false-positive
            # against unrelated cluster-Secret DSN substrings.
            - name: PGHOST
              value: postgresql
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgresql
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql
                  key: POSTGRES_PASSWORD
            - name: SWEEP_WRITER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sweep-history
                  key: SWEEP_WRITER_PASSWORD
            - name: SWEEP_READER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sweep-history
                  key: SWEEP_READER_PASSWORD
          volumeMounts:
            - name: sql
              mountPath: /sql
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: sql
          configMap:
            name: sweep-history-schema
            defaultMode: 0o555
