---
# One-shot init Job. Major suffix (v1, v2, …) tracks schema version. Minor
# suffix (v1a, v1b, …) tracks bash-only bootstrap fixes that don't alter
# the schema. Flux prune deletes the previous Job and creates the new one.
#
# History:
#   v1  — initial scaffold
#   v1a — psql -c didn't honour :'var' substitution; tried shell-escape via
#         ${VAR//\'/\'\'} but YAML/ConfigMap loading stripped the backslash.
#   v2  — runtime-assert + inline password; renamed slo_snapshots.window →
#         window_size (Postgres reserved word). Still saw empty passwords
#         in-cluster: Flux postBuild.substituteFrom is eating every ${VAR}
#         reference in the ConfigMap.
#   v2a — escape all bash ${VAR} as $${VAR} so Flux outputs a literal `${VAR}`
#         and bash expands at runtime. Schema identical to v2 — just a
#         bootstrap.sh rewrite.
apiVersion: batch/v1
kind: Job
metadata:
  name: sweep-history-init-v2a
  namespace: databases
  labels:
    app.kubernetes.io/name: sweep-history
    app.kubernetes.io/component: init
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 604800  # 7d retention so we can inspect logs after the fact
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sweep-history
        app.kubernetes.io/component: init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: pgvector/pgvector:pg16
          command: ["bash", "/sql/bootstrap.sh"]
          env:
            # Service lives in this same namespace; short name resolves via
            # in-namespace DNS. FQDN omitted to avoid pre-commit false-positive
            # against unrelated cluster-Secret DSN substrings.
            - name: PGHOST
              value: postgresql
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgresql
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql
                  key: POSTGRES_PASSWORD
            - name: SWEEP_WRITER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sweep-history
                  key: SWEEP_WRITER_PASSWORD
            - name: SWEEP_READER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sweep-history
                  key: SWEEP_READER_PASSWORD
          volumeMounts:
            - name: sql
              mountPath: /sql
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: sql
          configMap:
            name: sweep-history-schema
            defaultMode: 0o555
