---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: superset
  namespace: databases
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Superset"
    gethomepage.dev/description: "Data exploration & visualization"
    gethomepage.dev/group: "Databases"
    # dashboard-icons catalog has no Superset entry; simpleicons 404s on
    # "apachesuperset". Use the Apache project's own logo PNG directly.
    gethomepage.dev/icon: "https://raw.githubusercontent.com/apache/superset/master/superset-frontend/src/assets/images/superset-logo-horiz.png"
    gethomepage.dev/pod-selector: "app=superset"
  labels:
    gethomepage.dev/enabled: "true"
spec:
  ingressClassName: internal
  rules:
    - host: superset.${SECRET_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: superset
                port:
                  number: 8088
  tls:
    - hosts:
        - superset.${SECRET_DOMAIN}
      secretName: superset-tls
