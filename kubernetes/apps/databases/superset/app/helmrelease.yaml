---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: superset
  namespace: databases
spec:
  interval: 30m
  chart:
    spec:
      chart: superset
      version: 0.15.2
      sourceRef:
        kind: HelmRepository
        name: apache-superset
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    image:
      repository: apache/superset
      tag: 5.0.0
      pullPolicy: IfNotPresent

    # Keep chart's default config Secret (contains bootstrap script + superset_config.py scaffold);
    # add our OIDC/DB/Redis creds via a second envFrom reference.
    envFromSecrets:
      - superset-secrets

    # Install postgres + redis + OAuth drivers into the Superset venv.
    # apache/superset:5.0.0 uses `uv` for package management (no pip inside the venv).
    # `uv pip install --python /app/.venv/bin/python` targets the runtime venv's
    # site-packages, matching where the app imports from.
    bootstrapScript: |
      #!/bin/bash
      uv pip install --python /app/.venv/bin/python \
        psycopg2-binary==2.9.6 \
        redis==4.5.4 \
        authlib==1.3.0
      if [ ! -f ~/bootstrap ]; then echo "Running Superset with UID $(id -u)" > ~/bootstrap; fi

    # Superset Python config (OIDC + role mapping)
    # Chart generates a ConfigMap `superset-config` and mounts as /app/pythonpath/{key}
    configOverrides:
      oidc.py: |
        import os
        from flask_appbuilder.security.manager import AUTH_OAUTH

        AUTH_TYPE = AUTH_OAUTH
        AUTH_USER_REGISTRATION = True
        AUTH_USER_REGISTRATION_ROLE = "Gamma"
        AUTH_ROLES_SYNC_AT_LOGIN = True
        AUTH_ROLES_MAPPING = {
            "superset-admins": ["Admin"],
            "superset-users":  ["Gamma"],
        }

        OAUTH_PROVIDERS = [{
            "name": "authentik",
            "icon": "fa-key",
            "token_key": "access_token",
            "remote_app": {
                "client_id": os.environ["OIDC_CLIENT_ID"],
                "client_secret": os.environ["OIDC_CLIENT_SECRET"],
                "server_metadata_url": "https://auth.${SECRET_DOMAIN}/application/o/superset/.well-known/openid-configuration",
                "client_kwargs": {"scope": "openid email profile"},
            },
        }]

        FEATURE_FLAGS = {"EMBEDDED_SUPERSET": False, "ALERT_REPORTS": True}

    # --- Bundled PostgreSQL (metadata DB) — binds to pre-created longhorn-static PVC ---
    # Bitnami removed old tags from docker.io/bitnami/*; use bitnamilegacy mirror.
    postgresql:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/postgresql
      auth:
        username: superset
        database: superset
        existingSecret: superset-secrets
        secretKeys:
          adminPasswordKey: postgres-password
          userPasswordKey: postgresql-password
      primary:
        persistence:
          enabled: true
          existingClaim: superset-postgresql-data
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 1Gi

    # --- Bundled Redis (broker/cache) ---
    # Same Bitnami image-mirror workaround as above.
    redis:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/redis
      auth:
        enabled: true
        existingSecret: superset-secrets
        existingSecretPasswordKey: redis-password
      master:
        persistence:
          enabled: false
        resources:
          requests:
            cpu: 50m
            memory: 64Mi

    # --- Superset web/UI pods ---
    supersetNode:
      replicaCount: 1
      strategy:
        type: Recreate
      podAnnotations:
        secret.reloader.stakater.com/reload: "superset-secrets"
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 2Gi

    # --- Celery workers (async SQL, email reports) ---
    # Celery spawns N worker processes per pod (default = CPU count = 18 on nuc14);
    # OOM at 1Gi → either bump to 2Gi or cap concurrency. Cap concurrency for lower idle cost.
    supersetWorker:
      replicaCount: 1
      podAnnotations:
        secret.reloader.stakater.com/reload: "superset-secrets"
      command:
        - /bin/sh
        - -c
        - . /app/pythonpath/superset_bootstrap.sh; celery --app=superset.tasks.celery_app:app worker --concurrency=4
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 2Gi

    # --- Celery beat (scheduler for alerts/reports) ---
    supersetCeleryBeat:
      enabled: true
      podAnnotations:
        secret.reloader.stakater.com/reload: "superset-secrets"

    # --- init/boot: creates admin user, initdb, runs migrations ---
    init:
      createAdmin: true
      adminUser:
        username: admin
        firstname: Admin
        lastname: User
        email: admin@${SECRET_DOMAIN}
        password: placeholder   # overridden by ADMIN_PASSWORD env from Secret

    # Expose via our ingress.yaml, not chart's built-in
    service:
      type: ClusterIP
      port: 8088
    ingress:
      enabled: false
