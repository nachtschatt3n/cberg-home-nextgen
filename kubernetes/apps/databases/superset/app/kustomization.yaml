---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: databases
# NOTE: longhorn-volume.yaml is in this directory for reference but NOT listed here
# because Flux `targetNamespace: databases` would override its `namespace: storage`
# field and create a duplicate/broken Volume in the wrong namespace. The Longhorn
# Volume CR must be applied once manually against the `storage` namespace:
#   kubectl apply -f longhorn-volume.yaml
# This matches pgadmin/postgresql convention in this repo.
resources:
  - pv.yaml
  - data-pvc.yaml
  - secret.sops.yaml
  - helmrelease.yaml
  - ingress.yaml
