# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: databases
components:
  - ../../flux/components/common
resources:
  - ./postgresql/ks.yaml
  - ./nocodb/ks.yaml
  - ./mariadb/ks.yaml
  - ./redis/ks.yaml
  - ./influxdb/ks.yaml
  - ./phpmyadmin/ks.yaml
  - ./pgadmin/ks.yaml
  - ./redisinsight/ks.yaml
  - ./memgraph/ks.yaml
  - ./superset/ks.yaml
patches:
  # PSA override: privileged required for postgres init-sysctl etc.
  # Target name must be `not-used` because the namespace transformer
  # runs AFTER patches — see flux/components/common/namespace.yaml.
  - target:
      kind: Namespace
      name: not-used
    patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: not-used
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
