# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: databases
components:
  - ../../flux/components/common
resources:
  - ./postgresql/ks.yaml
  - ./nocodb/ks.yaml
  - ./mariadb/ks.yaml
  - ./redis/ks.yaml
  - ./influxdb/ks.yaml
  - ./phpmyadmin/ks.yaml
  - ./pgadmin/ks.yaml
  - ./redisinsight/ks.yaml
  - ./memgraph/ks.yaml
  - ./superset/ks.yaml
patches:
  # PSA override: privileged required for postgres init-sysctl etc.
  # Cluster default is baseline; this lifts only this namespace.
  - target:
      kind: Namespace
      name: databases
    patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: databases
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
