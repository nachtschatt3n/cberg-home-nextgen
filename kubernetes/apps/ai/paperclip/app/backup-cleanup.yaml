---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: paperclip-backup-cleanup
  namespace: ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: paperclip-backup-cleanup
  namespace: ai
rules:
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "deployments"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: paperclip-backup-cleanup
  namespace: ai
subjects:
  - kind: ServiceAccount
    name: paperclip-backup-cleanup
    namespace: ai
roleRef:
  kind: Role
  name: paperclip-backup-cleanup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: paperclip-backup-cleanup
  namespace: ai
spec:
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          serviceAccountName: paperclip-backup-cleanup
          restartPolicy: Never
          containers:
            - name: cleanup
              image: bitnami/kubectl:1.34
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  DEPLOY="paperclip"
                  NS="ai"

                  # Always restore the deployment on exit
                  restore() {
                    echo "Scaling $DEPLOY back to 1..."
                    kubectl scale deployment "$DEPLOY" -n "$NS" --replicas=1
                    echo "Waiting for $DEPLOY pod to be ready..."
                    kubectl rollout status deployment "$DEPLOY" -n "$NS" --timeout=300s || true
                    echo "Restore complete"
                  }
                  trap restore EXIT

                  # Scale down and wait for pod termination
                  echo "Scaling $DEPLOY to 0..."
                  kubectl scale deployment "$DEPLOY" -n "$NS" --replicas=0
                  echo "Waiting for pods to terminate..."
                  kubectl wait --for=delete pod -n "$NS" -l app.kubernetes.io/name=paperclip --timeout=120s 2>/dev/null || true

                  # Run backup cleanup
                  echo "Starting backup cleanup..."
                  cd /paperclip/instances/default/data/backups 2>/dev/null || { echo "No backups directory, nothing to clean"; exit 0; }
                  cutoff=$(date -d "7 days ago" +%Y%m%d)
                  deleted=0
                  for f in *.sql; do
                    [ -f "$f" ] || continue
                    fdate=$(echo "$f" | sed 's/paperclip-\([0-9]*\)-.*/\1/')
                    if [ "$fdate" -lt "$cutoff" ] 2>/dev/null; then
                      rm "$f"
                      deleted=$((deleted + 1))
                    fi
                  done
                  remaining=$(ls -1 *.sql 2>/dev/null | wc -l)
                  echo "Cleaned $deleted backups older than $cutoff, $remaining remaining"
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              volumeMounts:
                - name: data
                  mountPath: /paperclip
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: paperclip-data
