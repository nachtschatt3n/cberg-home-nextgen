---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperclip-postgresql-data
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperclip-postgresql
  namespace: ai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: paperclip-postgresql
  template:
    metadata:
      labels:
        app: paperclip-postgresql
    spec:
      containers:
      - name: postgresql
        image: postgres:17-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: paperclip
        - name: POSTGRES_USER
          value: paperclip
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: paperclip-secret
              key: POSTGRES_PASSWORD
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        readinessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - pg_isready -U paperclip -d paperclip
          initialDelaySeconds: 15
          timeoutSeconds: 2
        livenessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - pg_isready -U paperclip -d paperclip
          initialDelaySeconds: 30
          timeoutSeconds: 2
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: paperclip-postgresql-data
---
apiVersion: v1
kind: Service
metadata:
  name: paperclip-postgresql
  namespace: ai
spec:
  selector:
    app: paperclip-postgresql
  ports:
  - port: 5432
    targetPort: 5432
