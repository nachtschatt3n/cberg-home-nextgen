---
# Longhorn-static PV bound to a specific Longhorn Volume restored from backup
# on 2026-04-30 (Stage A salvage corruption). Underlying Volume CR recreated
# out-of-band from backup-8c99b2ddb933420b. PV name kept UUID-style to match
# the existing cluster state and Longhorn Volume name (volumeHandle).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pvc-773cc06e-4984-4bcf-ae38-64fe77f68a5c
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 5Gi
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: paperclip-postgresql-data
    namespace: ai
  csi:
    driver: driver.longhorn.io
    fsType: ext4
    volumeAttributes:
      dataEngine: v1
      dataLocality: disabled
      fsType: ext4
      numberOfReplicas: "2"
      staleReplicaTimeout: "30"
    volumeHandle: pvc-773cc06e-4984-4bcf-ae38-64fe77f68a5c
  persistentVolumeReclaimPolicy: Retain
  storageClassName: longhorn-static
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperclip-postgresql-data
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn-static
  volumeName: pvc-773cc06e-4984-4bcf-ae38-64fe77f68a5c
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperclip-postgresql
  namespace: ai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: paperclip-postgresql
  template:
    metadata:
      labels:
        app: paperclip-postgresql
    spec:
      containers:
      - name: postgresql
        image: postgres:17-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: paperclip
        - name: POSTGRES_USER
          value: paperclip
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: paperclip-secret
              key: POSTGRES_PASSWORD
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        readinessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - pg_isready -U paperclip -d paperclip
          initialDelaySeconds: 15
          timeoutSeconds: 2
        livenessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - pg_isready -U paperclip -d paperclip
          initialDelaySeconds: 30
          timeoutSeconds: 2
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: paperclip-postgresql-data
---
apiVersion: v1
kind: Service
metadata:
  name: paperclip-postgresql
  namespace: ai
spec:
  selector:
    app: paperclip-postgresql
  ports:
  - port: 5432
    targetPort: 5432
