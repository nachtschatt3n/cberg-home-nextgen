---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperclip
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 1
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: false
    remediation:
      retries: 1
  uninstall:
    keepHistory: false
  values:
    controllers:
      paperclip:
        pod:
          securityContext:
            fsGroup: 1000
        initContainers:
          mise-install:
            image:
              repository: node
              tag: lts-slim
            command:
              - /bin/sh
              - -c
              - |
                set -e
                NEED_APT=0
                [ -f /paperclip/.mise-bin/mise ] || NEED_APT=1
                [ -f /paperclip/.local/bin/zsh ] || NEED_APT=1
                [ -d /paperclip/.local/share/zsh ] || NEED_APT=1
                [ -f /paperclip/.local/bin/unifictl ] || NEED_APT=1
                if [ "$NEED_APT" = "1" ]; then
                  echo "Updating apt and installing dependencies..."
                  apt-get update -qq && apt-get install -y -qq curl zsh-static git build-essential openssh-client
                fi
                if [ ! -f /paperclip/.mise-bin/mise ]; then
                  echo "Installing mise to /paperclip/.mise-bin..."
                  mkdir -p /paperclip/.mise-bin
                  curl -fsSL https://mise.run | MISE_INSTALL_PATH=/paperclip/.mise-bin/mise sh
                  echo "mise installed: $(/paperclip/.mise-bin/mise --version)"
                else
                  echo "mise already installed, skipping"
                fi
                if [ ! -f /paperclip/.local/bin/zsh ] || [ ! -d /paperclip/.local/share/zsh ]; then
                  echo "Installing zsh-static and function files to /paperclip/.local..."
                  mkdir -p /paperclip/.local/bin /paperclip/.local/share
                  ZSH_BIN=$(dpkg -L zsh-static 2>/dev/null | grep -E 'zsh' | grep -v man | grep -v share | head -1)
                  echo "zsh binary found at: $ZSH_BIN"
                  cp "$ZSH_BIN" /paperclip/.local/bin/zsh
                  chmod +x /paperclip/.local/bin/zsh
                  cp -r /usr/share/zsh /paperclip/.local/share/zsh
                  chmod -R a-w /paperclip/.local/share/zsh
                  echo "zsh installed: $(/paperclip/.local/bin/zsh --version)"
                else
                  echo "zsh already installed, skipping"
                fi
                if [ ! -d /paperclip/.oh-my-zsh ]; then
                  echo "Installing oh-my-zsh to /paperclip/.oh-my-zsh..."
                  git clone --depth=1 https://github.com/ohmyzsh/ohmyzsh.git /paperclip/.oh-my-zsh
                  echo "oh-my-zsh installed"
                else
                  echo "oh-my-zsh already installed, skipping"
                fi
                if [ ! -f /paperclip/.local/bin/gh ]; then
                  echo "Installing gh CLI..."
                  GH_VERSION=$(curl -fsSL https://api.github.com/repos/cli/cli/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
                  curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" | \
                    tar -xz -C /tmp
                  cp /tmp/gh_${GH_VERSION}_linux_amd64/bin/gh /paperclip/.local/bin/gh
                  chmod +x /paperclip/.local/bin/gh
                  rm -rf /tmp/gh_${GH_VERSION}_linux_amd64
                  echo "gh installed: $(/paperclip/.local/bin/gh --version)"
                fi
                # Always ensure gh uses HTTPS (SSH may not be available in container)
                /paperclip/.local/bin/gh config set git_protocol https --host github.com 2>/dev/null || true
                echo "gh git_protocol set to https"
                if [ ! -f /paperclip/.local/bin/unifictl ]; then
                  echo "Installing rust and unifictl..."
                  RUSTUP_HOME=/paperclip/.rustup CARGO_HOME=/paperclip/.cargo \
                    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path --quiet
                  RUSTUP_HOME=/paperclip/.rustup CARGO_HOME=/paperclip/.cargo \
                    /paperclip/.cargo/bin/cargo install unifictl@5.3.1 --root /paperclip/.local
                  echo "unifictl installed: $(/paperclip/.local/bin/unifictl --version)"
                else
                  echo "unifictl already installed, skipping"
                fi
                # Patch oh-my-zsh to suppress unavailable module errors in zsh-static
                sed -i 's/^zmodload zsh\/system$/zmodload zsh\/system 2>\/dev\/null || true/' /paperclip/.oh-my-zsh/lib/async_prompt.zsh 2>/dev/null || true
                sed -i "s/regexp-replace 'functions\[VCS_INFO_formats\]'$/regexp-replace 'functions[VCS_INFO_formats]' 2>\/dev\/null/" /paperclip/.oh-my-zsh/lib/vcs_info.zsh 2>/dev/null || true
                sed -i 's/if \[\[ "\$byte" =~ "\$dont_escape" \]\]/if [[ "$byte" == $${~dont_escape} ]]/' /paperclip/.oh-my-zsh/lib/functions.zsh 2>/dev/null || true
                # Build a sysroot at /paperclip/toolroot so native gem linking works for
                # non-root users. The core problem: ld linker scripts (libc.so etc.) contain
                # hardcoded absolute paths like /usr/lib/x86_64-linux-gnu/libc_nonshared.a
                # which LIBRARY_PATH cannot override. gcc --sysroot prepends a prefix to those
                # absolute paths, making them resolve correctly without system install access.
                # Wrapper scripts at /paperclip/.local/bin/gcc|cc|g++ bake in --sysroot so
                # mkmf/extconf.rb compile native gems with zero extra flags.
                if [ ! -f /paperclip/.local/bin/gcc ]; then
                  echo "Building sysroot at /paperclip/toolroot..."
                  mkdir -p /tmp/pkgs /paperclip/toolroot
                  # Always update apt here — NEED_APT may have been 0 (tools already installed),
                  # so apt-get install was skipped above and gcc-N is not in the container dpkg db.
                  apt-get update -qq
                  # Detect the versioned gcc/g++/cpp packages via apt-cache (works even when
                  # the package is not yet installed in this container run).
                  GCC_PKG=$(apt-cache depends gcc 2>/dev/null | awk '/Depends: gcc-[0-9]/{print $2; exit}')
                  GPP_PKG=$(apt-cache depends g++ 2>/dev/null | awk '/Depends: g\+\+-[0-9]/{print $2; exit}')
                  CPP_PKG=$(apt-cache depends cpp 2>/dev/null | awk '/Depends: cpp-[0-9]/{print $2; exit}')
                  echo "Downloading: gcc=$GCC_PKG g++=$GPP_PKG cpp=$CPP_PKG"
                  cd /tmp/pkgs
                  apt-get download \
                    gcc g++ make \
                    binutils binutils-x86-64-linux-gnu binutils-common \
                    ${GCC_PKG:+$GCC_PKG} ${GPP_PKG:+$GPP_PKG} ${CPP_PKG:+$CPP_PKG} \
                    libgmp10 libmpc3 libmpfr6 libisl23 libzstd1 \
                    libctf0 libctf-nobfd0 libbinutils \
                    libc6 libc6-dev linux-libc-dev \
                    libssl-dev libreadline-dev zlib1g-dev \
                    libpq-dev libsqlite3-dev 2>/dev/null || true
                  for deb in /tmp/pkgs/*.deb; do
                    dpkg -x "$deb" /paperclip/toolroot/ 2>/dev/null || true
                  done
                  rm -rf /tmp/pkgs
                  # Create wrapper scripts with --sysroot so ld resolves linker-script absolute
                  # paths (libc_nonshared.a etc.) against the toolroot, not /usr/...
                  # LD_LIBRARY_PATH is set inside wrapper only to avoid poisoning the app runtime.
                  GCC_REAL=$(ls /paperclip/toolroot/usr/bin/gcc-[0-9]* 2>/dev/null | sort -V | tail -1)
                  GPP_REAL=$(ls /paperclip/toolroot/usr/bin/g++-[0-9]* 2>/dev/null | sort -V | tail -1)
                  GCC_B=$(dirname "$(find /paperclip/toolroot/usr/libexec/gcc -name cc1 2>/dev/null | head -1)" 2>/dev/null)
                  TOOLROOT_LIBS="/paperclip/toolroot/usr/lib/x86_64-linux-gnu"
                  mkdir -p /paperclip/.local/bin
                  if [ -n "$GCC_REAL" ] && [ -n "$GCC_B" ]; then
                    printf '#!/bin/sh\nexport LD_LIBRARY_PATH="%s${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"\nexec %s -B %s --sysroot=/paperclip/toolroot "$@"\n' \
                      "$TOOLROOT_LIBS" "$GCC_REAL" "$GCC_B" \
                      | tee /paperclip/.local/bin/gcc /paperclip/.local/bin/cc > /dev/null
                    chmod +x /paperclip/.local/bin/gcc /paperclip/.local/bin/cc
                    echo "gcc wrapper -> $GCC_REAL (B=$GCC_B)"
                  else
                    echo "ERROR: gcc wrapper not created: GCC_REAL=$GCC_REAL GCC_B=$GCC_B" >&2
                  fi
                  if [ -n "$GPP_REAL" ] && [ -n "$GCC_B" ]; then
                    printf '#!/bin/sh\nexport LD_LIBRARY_PATH="%s${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"\nexec %s -B %s --sysroot=/paperclip/toolroot "$@"\n' \
                      "$TOOLROOT_LIBS" "$GPP_REAL" "$GCC_B" \
                      | tee /paperclip/.local/bin/g++ /paperclip/.local/bin/c++ > /dev/null
                    chmod +x /paperclip/.local/bin/g++ /paperclip/.local/bin/c++
                  fi
                  MAKE_REAL=/paperclip/toolroot/usr/bin/make
                  [ -f "$MAKE_REAL" ] && cp "$MAKE_REAL" /paperclip/.local/bin/make && chmod +x /paperclip/.local/bin/make || true
                  for bin in as ld ld.bfd ar nm strip objdump; do
                    src=/paperclip/toolroot/usr/bin/$bin
                    [ -f "$src" ] && cp "$src" /paperclip/.local/bin/ && chmod +x "/paperclip/.local/bin/$bin" || true
                  done
                  [ -f /paperclip/.local/bin/gcc ] && echo "Sysroot ready: $(cat /paperclip/.local/bin/gcc | grep exec)" || echo "ERROR: gcc wrapper missing after build" >&2
                else
                  echo "Build toolchain already present, skipping"
                fi
                if true; then
                  echo "Writing /paperclip/.zshenv..."
                  printf 'export FPATH="/paperclip/.local/share/zsh/functions:/paperclip/.local/share/zsh/vendor-completions"\nexport HOME="/paperclip"\n' > /paperclip/.zshenv
                  echo ".zshenv written"
                else
                  echo ".zshenv already exists, skipping"
                fi
                if true; then
                  echo "Writing /paperclip/.zshrc..."
                  cat > /paperclip/.zshrc << 'ZSHRC'
                # Provide a secure (non-group-writable) fake compaudit so compinit
                # does not strip our zsh function dirs from fpath due to fsGroup permissions
                _sf=/tmp/zsh-secure-funcs
                mkdir -p "$_sf" && chmod 755 "$_sf"
                printf "compaudit () { return 0 }\n" > "$_sf/compaudit"
                chmod 644 "$_sf/compaudit"
                # Build fpath: secure stub first, then all zsh function subdirs (recursive)
                fpath=($_sf)
                for _d in /paperclip/.local/share/zsh/functions/**/; do
                  fpath+=($_d)
                done
                fpath+=(/paperclip/.local/share/zsh/vendor-completions)
                export ZSH="/paperclip/.oh-my-zsh"
                DISABLE_AUTO_UPDATE=true
                DISABLE_AUTO_TITLE=true
                ZSH_THEME="robbyrussell"
                plugins=(git)
                source $ZSH/oh-my-zsh.sh
                export PATH="/paperclip/.local/bin:/paperclip/.mise-bin:/paperclip/.mise/shims:$PATH"
                export MISE_DATA_DIR="/paperclip/.mise"
                export MISE_CACHE_DIR="/paperclip/.cache/mise"
                export GCC_EXEC_PREFIX="/paperclip/toolroot/usr/"
                ZSHRC
                  echo ".zshrc written"
                else
                  echo ".zshrc already exists, skipping"
                fi
            env:
              - name: HOME
                value: "/paperclip"
        containers:
          app:
            image:
              repository: reeoss/paperclipai-paperclip
              tag: latest
            env:
              - name: HOST
                value: "0.0.0.0"
              - name: NODE_ENV
                value: "production"
              - name: PAPERCLIP_PORT
                value: "3100"
              - name: PAPERCLIP_PUBLIC_URL
                value: "https://paperclip.${SECRET_DOMAIN}"
              - name: PAPERCLIP_HOME
                value: "/paperclip"
              - name: MISE_DATA_DIR
                value: "/paperclip/.mise"
              - name: MISE_CACHE_DIR
                value: "/paperclip/.cache/mise"
              - name: HOME
                value: "/paperclip"
              - name: PATH
                value: "/paperclip/.local/bin:/paperclip/.mise-bin:/paperclip/.mise/shims:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              - name: FPATH
                value: "/paperclip/.local/share/zsh/functions:/paperclip/.local/share/zsh/vendor-completions"
              - name: GCC_EXEC_PREFIX
                value: "/paperclip/toolroot/usr/"
            envFrom:
              - secretRef:
                  name: paperclip-secret
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3100
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 6
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3100
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  failureThreshold: 3
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                cpu: 2000m
                memory: 4Gi
          tools:
            image:
              repository: ubuntu
              tag: "24.04"
            command:
              - /bin/bash
              - -c
              - |
                export DEBIAN_FRONTEND=noninteractive
                apt-get update -qq
                apt-get install -y -qq \
                  build-essential curl git wget vim nano less \
                  libssl-dev libreadline-dev zlib1g-dev \
                  libpq-dev libsqlite3-dev
                exec sleep infinity
            env:
              - name: HOME
                value: "/paperclip"
              - name: DEBIAN_FRONTEND
                value: "noninteractive"
              - name: PATH
                value: "/paperclip/.local/bin:/paperclip/.mise-bin:/paperclip/.mise/shims:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              - name: MISE_DATA_DIR
                value: "/paperclip/.mise"
              - name: MISE_CACHE_DIR
                value: "/paperclip/.cache/mise"
            securityContext:
              runAsUser: 0
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 512Mi

    service:
      main:
        controller: paperclip
        ports:
          http:
            port: 3100

    ingress:
      main:
        enabled: true
        className: internal
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "Paperclip"
          gethomepage.dev/description: "AI agent orchestration — multi-agent company management"
          gethomepage.dev/group: "AI"
          gethomepage.dev/icon: "mdi-paperclip"
          gethomepage.dev/pod-selector: app.kubernetes.io/name=paperclip
        labels:
          gethomepage.dev/enabled: "true"
        hosts:
          - host: &host "paperclip.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - hosts:
              - *host

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 5Gi
        globalMounts:
          - path: /paperclip
