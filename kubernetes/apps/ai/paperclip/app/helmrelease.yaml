---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperclip
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 1
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: false
    remediation:
      retries: 1
  uninstall:
    keepHistory: false
  values:
    controllers:
      paperclip:
        pod:
          securityContext:
            fsGroup: 1000
        initContainers:
          mise-install:
            image:
              repository: debian
              tag: trixie-slim
            command:
              - /bin/sh
              - -c
              - |
                set -e
                NEED_APT=0
                [ -f /paperclip/.mise-bin/mise ] || NEED_APT=1
                [ -f /paperclip/.local/bin/zsh ] || NEED_APT=1
                [ -d /paperclip/.local/share/zsh ] || NEED_APT=1
                [ -f /paperclip/.local/bin/unifictl ] || NEED_APT=1
                if [ "$NEED_APT" = "1" ]; then
                  echo "Updating apt and installing dependencies..."
                  apt-get update -qq && apt-get install -y -qq curl zsh-static git build-essential openssh-client
                fi
                if [ ! -f /paperclip/.mise-bin/mise ]; then
                  echo "Installing mise to /paperclip/.mise-bin..."
                  mkdir -p /paperclip/.mise-bin
                  curl -fsSL https://mise.run | MISE_INSTALL_PATH=/paperclip/.mise-bin/mise sh
                  echo "mise installed: $(/paperclip/.mise-bin/mise --version)"
                else
                  echo "mise already installed, skipping"
                fi
                if [ ! -f /paperclip/.local/bin/zsh ] || [ ! -d /paperclip/.local/share/zsh ]; then
                  echo "Installing zsh-static and function files to /paperclip/.local..."
                  mkdir -p /paperclip/.local/bin /paperclip/.local/share
                  ZSH_BIN=$(dpkg -L zsh-static 2>/dev/null | grep -E 'zsh' | grep -v man | grep -v share | head -1)
                  echo "zsh binary found at: $ZSH_BIN"
                  cp "$ZSH_BIN" /paperclip/.local/bin/zsh
                  chmod +x /paperclip/.local/bin/zsh
                  cp -r /usr/share/zsh /paperclip/.local/share/zsh
                  chmod -R a-w /paperclip/.local/share/zsh
                  echo "zsh installed: $(/paperclip/.local/bin/zsh --version)"
                else
                  echo "zsh already installed, skipping"
                fi
                if [ ! -d /paperclip/.oh-my-zsh ]; then
                  echo "Installing oh-my-zsh to /paperclip/.oh-my-zsh..."
                  git clone --depth=1 https://github.com/ohmyzsh/ohmyzsh.git /paperclip/.oh-my-zsh
                  echo "oh-my-zsh installed"
                else
                  echo "oh-my-zsh already installed, skipping"
                fi
                if [ ! -f /paperclip/.local/bin/gh ]; then
                  echo "Installing gh CLI..."
                  GH_VERSION=$(curl -fsSL https://api.github.com/repos/cli/cli/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
                  curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" | \
                    tar -xz -C /tmp
                  cp /tmp/gh_${GH_VERSION}_linux_amd64/bin/gh /paperclip/.local/bin/gh
                  chmod +x /paperclip/.local/bin/gh
                  rm -rf /tmp/gh_${GH_VERSION}_linux_amd64
                  echo "gh installed: $(/paperclip/.local/bin/gh --version)"
                fi
                # Always ensure gh uses HTTPS (SSH may not be available in container)
                /paperclip/.local/bin/gh config set git_protocol https --host github.com 2>/dev/null || true
                echo "gh git_protocol set to https"
                if [ ! -f /paperclip/.local/bin/unifictl ]; then
                  echo "Installing rust and unifictl..."
                  RUSTUP_HOME=/paperclip/.rustup CARGO_HOME=/paperclip/.cargo \
                    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path --quiet
                  RUSTUP_HOME=/paperclip/.rustup CARGO_HOME=/paperclip/.cargo \
                    /paperclip/.cargo/bin/cargo install unifictl@5.3.1 --root /paperclip/.local
                  echo "unifictl installed: $(/paperclip/.local/bin/unifictl --version)"
                else
                  echo "unifictl already installed, skipping"
                fi
                # Patch oh-my-zsh to suppress unavailable module errors in zsh-static
                sed -i 's/^zmodload zsh\/system$/zmodload zsh\/system 2>\/dev\/null || true/' /paperclip/.oh-my-zsh/lib/async_prompt.zsh 2>/dev/null || true
                sed -i "s/regexp-replace 'functions\[VCS_INFO_formats\]'$/regexp-replace 'functions[VCS_INFO_formats]' 2>\/dev\/null/" /paperclip/.oh-my-zsh/lib/vcs_info.zsh 2>/dev/null || true
                sed -i 's/if \[\[ "\$byte" =~ "\$dont_escape" \]\]/if [[ "$byte" == $${~dont_escape} ]]/' /paperclip/.oh-my-zsh/lib/functions.zsh 2>/dev/null || true
                # Build a sysroot at /paperclip/toolroot so native gem linking works for
                # non-root users. The core problem: ld linker scripts (libc.so etc.) contain
                # hardcoded absolute paths like /usr/lib/x86_64-linux-gnu/libc_nonshared.a
                # which LIBRARY_PATH cannot override. gcc --sysroot prepends a prefix to those
                # absolute paths, making them resolve correctly without system install access.
                # Wrapper scripts at /paperclip/.local/bin/gcc|cc|g++ bake in --sysroot so
                # mkmf/extconf.rb compile native gems with zero extra flags.
                if [ ! -f /paperclip/.local/bin/gcc ]; then
                  echo "Building sysroot at /paperclip/toolroot..."
                  # Wipe stale toolroot from previous image versions before rebuilding.
                  # Without this, gcc-N binaries from a previous distro upgrade linger and
                  # confuse the version-detection glob (sort -V picks the wrong gcc).
                  rm -rf /paperclip/toolroot
                  mkdir -p /paperclip/toolroot
                  # Always update apt here — NEED_APT may have been 0 (tools already installed),
                  # so apt-get install was skipped above and gcc-N is not in the container dpkg db.
                  apt-get update -qq
                  # Detect the versioned gcc/g++/cpp packages via apt-cache (works even when
                  # the package is not yet installed in this container run).
                  GCC_PKG=$(apt-cache depends gcc 2>/dev/null | awk '/Depends: gcc-[0-9]/{print $2; exit}')
                  GPP_PKG=$(apt-cache depends g++ 2>/dev/null | awk '/Depends: g\+\+-[0-9]/{print $2; exit}')
                  CPP_PKG=$(apt-cache depends cpp 2>/dev/null | awk '/Depends: cpp-[0-9]/{print $2; exit}')
                  # libgcc-N-dev provides crtbeginS.o and libgcc.a needed for native gem linking
                  LIBGCC_DEV_PKG=$(echo "$GCC_PKG" | sed 's/^gcc-/libgcc-/')"-dev"
                  echo "Installing: gcc=$GCC_PKG g++=$GPP_PKG cpp=$CPP_PKG libgcc-dev=$LIBGCC_DEV_PKG"
                  # Install all build packages (init runs as root); apt-get install is more reliable
                  # than apt-get download because it handles deps and won't silently skip packages
                  # due to version mismatches (e.g. libsframe0 on bookworm vs libsframe1 on trixie).
                  LOGF=/paperclip/toolchain.log
                  echo "=== toolchain install log ===" > "$LOGF"
                  DEBIAN_FRONTEND=noninteractive apt-get install -y -q --no-install-recommends \
                    gcc g++ make \
                    ${GCC_PKG:+$GCC_PKG} ${GPP_PKG:+$GPP_PKG} ${CPP_PKG:+$CPP_PKG} \
                    binutils binutils-x86-64-linux-gnu binutils-common \
                    libgmp10 libmpc3 libmpfr6 libisl23 libzstd1 \
                    libctf0 libctf-nobfd0 libbinutils \
                    libjansson4 \
                    libc6-dev linux-libc-dev \
                    libssl-dev libreadline-dev zlib1g-dev \
                    libpq-dev libsqlite3-dev >> "$LOGF" 2>&1 || echo "WARN: bulk install had errors" >> "$LOGF"
                  # Copy toolchain files into toolroot using find + cp -L to dereference
                  # symlink chains. The dpkg -L approach was unreliable on Debian bookworm:
                  # gcc/ld binaries are multi-hop symlinks (gcc-12 → x86_64-linux-gnu-gcc-12)
                  # and install -D silently fails to follow them correctly.
                  # cp -L copies the dereferenced content to the destination name.
                  echo "--- cp-copy /usr/bin ---" >> "$LOGF"
                  mkdir -p /paperclip/toolroot/usr/bin
                  find /usr/bin -maxdepth 1 \( -type f -o -type l \) 2>/dev/null | \
                    while IFS= read -r f; do
                      cp -Lf "$f" "/paperclip/toolroot/usr/bin/$(basename "$f")" 2>/dev/null || true
                    done
                  echo "--- cp-copy /usr/lib/x86_64-linux-gnu ---" >> "$LOGF"
                  mkdir -p /paperclip/toolroot/usr/lib/x86_64-linux-gnu
                  find /usr/lib/x86_64-linux-gnu -maxdepth 1 \( -type f -o -type l \) 2>/dev/null | \
                    while IFS= read -r f; do
                      cp -Lf "$f" "/paperclip/toolroot/usr/lib/x86_64-linux-gnu/$(basename "$f")" 2>/dev/null || true
                    done
                  echo "--- cp-copy /lib/x86_64-linux-gnu ---" >> "$LOGF"
                  mkdir -p /paperclip/toolroot/lib/x86_64-linux-gnu
                  find /lib/x86_64-linux-gnu -maxdepth 1 \( -type f -o -type l \) 2>/dev/null | \
                    while IFS= read -r f; do
                      cp -Lf "$f" "/paperclip/toolroot/lib/x86_64-linux-gnu/$(basename "$f")" 2>/dev/null || true
                    done
                  echo "--- cp-copy /lib64 ---" >> "$LOGF"
                  mkdir -p /paperclip/toolroot/lib64
                  find /lib64 -maxdepth 1 \( -type f -o -type l \) 2>/dev/null | \
                    while IFS= read -r f; do
                      cp -Lf "$f" "/paperclip/toolroot/lib64/$(basename "$f")" 2>/dev/null || true
                    done
                  echo "--- find-copy /usr/lib/gcc/ ---" >> "$LOGF"
                  find /usr/lib/gcc/ -type f 2>/dev/null | while IFS= read -r f; do
                    install -D "$f" "/paperclip/toolroot$f" 2>/dev/null || true
                  done
                  # Debian trixie+ moves cc1 and other gcc internals to /usr/libexec/gcc/
                  echo "--- find-copy /usr/libexec/gcc/ ---" >> "$LOGF"
                  find /usr/libexec/gcc/ -type f 2>/dev/null | while IFS= read -r f; do
                    install -D "$f" "/paperclip/toolroot$f" 2>/dev/null || true
                  done
                  # Copy all system headers so gcc --sysroot can find stdio.h etc.
                  echo "--- find-copy /usr/include/ ---" >> "$LOGF"
                  find /usr/include/ -type f 2>/dev/null | while IFS= read -r f; do
                    install -D "$f" "/paperclip/toolroot$f" 2>/dev/null || true
                  done
                  # Recreate top-level symlinks in /usr/include (e.g. ncurses.h -> curses.h).
                  # find -type f skips these; copy any that exist in the init container.
                  find /usr/include -maxdepth 1 -type l 2>/dev/null | while IFS= read -r link; do
                    target=$(readlink "$link" 2>/dev/null)
                    name=$(basename "$link")
                    ln -sfn "$target" "/paperclip/toolroot/usr/include/$name" 2>/dev/null || true
                  done
                  # On Debian trixie, linux-libc-dev:all no longer provides arch-specific asm/
                  # headers or the /usr/include/asm symlink pointing to them. Create a fallback
                  # asm -> asm-generic symlink, which is correct for user-space compilation
                  # (Ruby gems, etc. use <asm/types.h> which maps fine to asm-generic).
                  if [ ! -e /paperclip/toolroot/usr/include/asm ] && \
                     [ -d /paperclip/toolroot/usr/include/asm-generic ]; then
                    ln -sfn asm-generic /paperclip/toolroot/usr/include/asm
                    echo "  created fallback: asm -> asm-generic" >> "$LOGF"
                  fi
                  echo "--- crtbeginS.o: $(find /paperclip/toolroot/usr/lib/gcc -name crtbeginS.o 2>/dev/null | head -1 | grep -q . && echo YES || echo NO) ---" >> "$LOGF"
                  echo "--- stdio.h: $([ -f /paperclip/toolroot/usr/include/stdio.h ] && echo YES || echo NO) ---" >> "$LOGF"
                  echo "--- libgcc_s.so.1: $([ -f /paperclip/toolroot/usr/lib/x86_64-linux-gnu/libgcc_s.so.1 ] && echo YES || echo NO) ---" >> "$LOGF"
                  # Patch linker scripts in the toolroot so --sysroot is applied to GROUP paths.
                  # GNU ld only applies --sysroot to paths prefixed with '=' in linker scripts.
                  # Without '=', paths like /usr/lib/.../libc_nonshared.a are treated as absolute
                  # (pointing to the host system, not the toolroot), causing "file not found" errors
                  # when the app container has no libc6-dev installed.
                  echo "--- patching linker scripts for sysroot-relative paths ---" >> "$LOGF"
                  find /paperclip/toolroot -name "*.so" -type f 2>/dev/null | while IFS= read -r f; do
                    grep -q "GROUP" "$f" 2>/dev/null || continue
                    # Add = prefix to bare absolute paths inside GROUP ( ... ) directives.
                    # Matches paths starting with /lib, /usr/lib, /lib64 that are not already = prefixed.
                    sed -i \
                      -e 's|GROUP ( /|GROUP ( =/|g' \
                      -e 's| /lib\([/ ]\)| =/lib\1|g' \
                      -e 's| /usr/lib\([/ ]\)| =/usr/lib\1|g' \
                      -e 's| /lib64\([/ ]\)| =/lib64\1|g' \
                      "$f" 2>/dev/null || true
                    echo "  patched: $f" >> "$LOGF"
                  done
                  # Create wrapper scripts with --sysroot so ld resolves linker-script absolute
                  # paths (libc_nonshared.a etc.) against the toolroot, not /usr/...
                  # LD_LIBRARY_PATH is set inside wrapper only to avoid poisoning the app runtime.
                  # Ensure ld-linux-x86-64.so.2 exists in toolroot/lib64.
                  # The libc.so linker script AS_NEEDED path (=/lib64/ld-linux-x86-64.so.2)
                  # resolves to /paperclip/toolroot/lib64/ with --sysroot. On merged-usr systems
                  # /lib64/ld-linux-x86-64.so.2 is a symlink; find the real file and copy it.
                  mkdir -p /paperclip/toolroot/lib64
                  for _ldlinux in /lib64/ld-linux-x86-64.so.2 /lib/x86_64-linux-gnu/ld-linux-x86-64.so.2 /usr/lib/x86_64-linux-gnu/ld-linux-x86-64.so.2; do
                    _real=$(readlink -f "$_ldlinux" 2>/dev/null)
                    if [ -f "$_real" ]; then
                      cp -f "$_real" /paperclip/toolroot/lib64/ld-linux-x86-64.so.2 2>/dev/null && break || true
                    fi
                  done
                  [ -f /paperclip/toolroot/lib64/ld-linux-x86-64.so.2 ] && \
                    echo "ld-linux: OK" >> "$LOGF" || echo "WARN: ld-linux-x86-64.so.2 missing from toolroot/lib64" >> "$LOGF"
                  # Derive GCC_REAL from the detected package name to avoid picking up stale binaries.
                  GCC_REAL=/paperclip/toolroot/usr/bin/${GCC_PKG}
                  GPP_REAL=/paperclip/toolroot/usr/bin/${GPP_PKG}
                  [ -f "$GCC_REAL" ] || GCC_REAL=$(ls /paperclip/toolroot/usr/bin/gcc-[0-9]* 2>/dev/null | sort -V | tail -1)
                  [ -f "$GPP_REAL" ] || GPP_REAL=$(ls /paperclip/toolroot/usr/bin/g++-[0-9]* 2>/dev/null | sort -V | tail -1)
                  # Debian trixie moved cc1 to usr/libexec/gcc/ but kept crt*.o in usr/lib/gcc/.
                  # GCC_EXEC_PREFIX must point to the libexec dir (finds cc1 at runtime).
                  # -B must point to the lib/gcc dir (finds crtbeginS.o, libgcc.a, etc.).
                  CC1_DIR=$(dirname "$(find /paperclip/toolroot/usr/libexec/gcc /paperclip/toolroot/usr/lib/gcc -name cc1 2>/dev/null | head -1)" 2>/dev/null)
                  GCC_LIB_DIR=$(dirname "$(find /paperclip/toolroot/usr/lib/gcc -name crtbeginS.o 2>/dev/null | head -1)" 2>/dev/null)
                  TOOLROOT_LIBS="/paperclip/toolroot/usr/lib/x86_64-linux-gnu"
                  mkdir -p /paperclip/.local/bin
                  # GCC_EXEC_PREFIX must be the PARENT of the arch/version dir, because gcc
                  # appends "x86_64-linux-gnu/14/" automatically. If we set it to the full
                  # CC1_DIR, gcc double-appends and looks in a non-existent path.
                  # E.g.: CC1_DIR = .../libexec/gcc/x86_64-linux-gnu/14
                  #       correct GCC_EXEC_PREFIX = .../libexec/gcc/  (two levels up)
                  CC1_PREFIX=$(dirname "$(dirname "$CC1_DIR")")/
                  if [ -n "$GCC_REAL" ] && [ -n "$CC1_DIR" ] && [ "$CC1_DIR" != "." ] && [ -n "$GCC_LIB_DIR" ] && [ "$GCC_LIB_DIR" != "." ]; then
                    printf '#!/bin/sh\nexport GCC_EXEC_PREFIX="%s"\nexport LD_LIBRARY_PATH="%s${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"\nexec %s -B %s --sysroot=/paperclip/toolroot "$@"\n' \
                      "$CC1_PREFIX" "$TOOLROOT_LIBS" "$GCC_REAL" "$GCC_LIB_DIR" \
                      | tee /paperclip/.local/bin/gcc /paperclip/.local/bin/cc > /dev/null
                    chmod +x /paperclip/.local/bin/gcc /paperclip/.local/bin/cc
                    echo "gcc wrapper -> $GCC_REAL (prefix=$CC1_PREFIX lib=$GCC_LIB_DIR)"
                  else
                    echo "ERROR: gcc wrapper not created: GCC_REAL=$GCC_REAL CC1_DIR=$CC1_DIR GCC_LIB_DIR=$GCC_LIB_DIR" >&2
                  fi
                  if [ -n "$GPP_REAL" ] && [ -n "$CC1_DIR" ] && [ "$CC1_DIR" != "." ] && [ -n "$GCC_LIB_DIR" ] && [ "$GCC_LIB_DIR" != "." ]; then
                    printf '#!/bin/sh\nexport GCC_EXEC_PREFIX="%s"\nexport LD_LIBRARY_PATH="%s${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"\nexec %s -B %s --sysroot=/paperclip/toolroot "$@"\n' \
                      "$CC1_PREFIX" "$TOOLROOT_LIBS" "$GPP_REAL" "$GCC_LIB_DIR" \
                      | tee /paperclip/.local/bin/g++ /paperclip/.local/bin/c++ > /dev/null
                    chmod +x /paperclip/.local/bin/g++ /paperclip/.local/bin/c++
                  fi
                  MAKE_REAL=/paperclip/toolroot/usr/bin/make
                  [ -f "$MAKE_REAL" ] && cp "$MAKE_REAL" /paperclip/.local/bin/make && chmod +x /paperclip/.local/bin/make || true
                  for bin in as ar nm strip objdump; do
                    src=/paperclip/toolroot/usr/bin/$bin
                    [ -f "$src" ] && cp "$src" /paperclip/.local/bin/ && chmod +x "/paperclip/.local/bin/$bin" || true
                  done
                  # ld needs its private libs (libbfd, libjansson, libsframe) — use a wrapper
                  # that scopes LD_LIBRARY_PATH only to the linker invocation, not the app runtime
                  LD_REAL=/paperclip/toolroot/usr/bin/ld.bfd
                  if [ -f "$LD_REAL" ]; then
                    printf '#!/bin/sh\nexport LD_LIBRARY_PATH="/paperclip/toolroot/usr/lib/x86_64-linux-gnu${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"\nexec %s "$@"\n' "$LD_REAL" \
                      | tee /paperclip/.local/bin/ld /paperclip/.local/bin/ld.bfd > /dev/null
                    chmod +x /paperclip/.local/bin/ld /paperclip/.local/bin/ld.bfd
                    echo "ld wrapper -> $LD_REAL"
                  else
                    echo "WARNING: ld.bfd not found in toolroot" >&2
                  fi
                  [ -f /paperclip/.local/bin/gcc ] && echo "Sysroot ready: $(cat /paperclip/.local/bin/gcc | grep exec)" || echo "ERROR: gcc wrapper missing after build" >&2
                else
                  echo "Build toolchain already present, skipping"
                fi
                if true; then
                  echo "Writing /paperclip/.zshenv..."
                  printf 'export FPATH="/paperclip/.local/share/zsh/functions:/paperclip/.local/share/zsh/vendor-completions"\nexport HOME="/paperclip"\n' > /paperclip/.zshenv
                  echo ".zshenv written"
                else
                  echo ".zshenv already exists, skipping"
                fi
                if true; then
                  echo "Writing /paperclip/.zshrc..."
                  cat > /paperclip/.zshrc << 'ZSHRC'
                # Provide a secure (non-group-writable) fake compaudit so compinit
                # does not strip our zsh function dirs from fpath due to fsGroup permissions
                _sf=/tmp/zsh-secure-funcs
                mkdir -p "$_sf" && chmod 755 "$_sf"
                printf "compaudit () { return 0 }\n" > "$_sf/compaudit"
                chmod 644 "$_sf/compaudit"
                # Build fpath: secure stub first, then all zsh function subdirs (recursive)
                fpath=($_sf)
                for _d in /paperclip/.local/share/zsh/functions/**/; do
                  fpath+=($_d)
                done
                fpath+=(/paperclip/.local/share/zsh/vendor-completions)
                export ZSH="/paperclip/.oh-my-zsh"
                DISABLE_AUTO_UPDATE=true
                DISABLE_AUTO_TITLE=true
                ZSH_THEME="robbyrussell"
                plugins=(git)
                source $ZSH/oh-my-zsh.sh
                export PATH="/paperclip/.local/bin:/paperclip/.mise-bin:/paperclip/.mise/shims:$PATH"
                export MISE_DATA_DIR="/paperclip/.mise"
                export MISE_CACHE_DIR="/paperclip/.cache/mise"
                export GCC_EXEC_PREFIX="/paperclip/toolroot/usr/"
                ZSHRC
                  echo ".zshrc written"
                else
                  echo ".zshrc already exists, skipping"
                fi
            env:
              - name: HOME
                value: "/paperclip"
        containers:
          app:
            image:
              repository: reeoss/paperclipai-paperclip
              tag: latest
            env:
              - name: HOST
                value: "0.0.0.0"
              - name: NODE_ENV
                value: "production"
              - name: PAPERCLIP_PORT
                value: "3100"
              - name: PAPERCLIP_PUBLIC_URL
                value: "https://paperclip.${SECRET_DOMAIN}"
              - name: PAPERCLIP_HOME
                value: "/paperclip"
              - name: MISE_DATA_DIR
                value: "/paperclip/.mise"
              - name: MISE_CACHE_DIR
                value: "/paperclip/.cache/mise"
              - name: HOME
                value: "/paperclip"
              - name: PATH
                value: "/paperclip/.local/bin:/paperclip/.mise-bin:/paperclip/.mise/shims:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              - name: FPATH
                value: "/paperclip/.local/share/zsh/functions:/paperclip/.local/share/zsh/vendor-completions"
            envFrom:
              - secretRef:
                  name: paperclip-secret
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3100
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 6
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3100
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  failureThreshold: 3
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                cpu: 2000m
                memory: 4Gi
          tools:
            image:
              repository: ubuntu
              tag: "24.04"
            command:
              - /bin/bash
              - -c
              - |
                export DEBIAN_FRONTEND=noninteractive
                apt-get update -qq
                apt-get install -y -qq \
                  build-essential curl git wget vim nano less \
                  libssl-dev libreadline-dev zlib1g-dev \
                  libpq-dev libsqlite3-dev
                exec sleep infinity
            env:
              - name: HOME
                value: "/paperclip"
              - name: DEBIAN_FRONTEND
                value: "noninteractive"
              - name: PATH
                value: "/paperclip/.local/bin:/paperclip/.mise-bin:/paperclip/.mise/shims:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              - name: MISE_DATA_DIR
                value: "/paperclip/.mise"
              - name: MISE_CACHE_DIR
                value: "/paperclip/.cache/mise"
            securityContext:
              runAsUser: 0
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 512Mi

    service:
      main:
        controller: paperclip
        ports:
          http:
            port: 3100

    ingress:
      main:
        enabled: true
        className: internal
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "Paperclip"
          gethomepage.dev/description: "AI agent orchestration — multi-agent company management"
          gethomepage.dev/group: "AI"
          gethomepage.dev/icon: "mdi-paperclip"
          gethomepage.dev/pod-selector: app.kubernetes.io/name=paperclip
        labels:
          gethomepage.dev/enabled: "true"
        hosts:
          - host: &host "paperclip.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - hosts:
              - *host

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 15Gi
