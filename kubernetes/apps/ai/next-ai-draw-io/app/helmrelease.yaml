---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: next-ai-draw-io
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 1
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: false
    remediation:
      retries: 1
  uninstall:
    keepHistory: false
  values:
    controllers:
      next-ai-draw-io:
        containers:
          app:
            image:
              repository: ghcr.io/dayuanjiang/next-ai-draw-io
              tag: 0.4.13
            env:
              - name: AI_PROVIDER
                value: "ollama"
              - name: AI_MODEL
                value: "gemma4:26b"
              - name: OLLAMA_BASE_URL
                value: "http://192.168.30.111:11434/api"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  successThreshold: 1
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi

    service:
      main:
        controller: next-ai-draw-io
        ports:
          http:
            port: 3000

    ingress:
      main:
        enabled: true
        className: internal
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "AI Draw.io"
          gethomepage.dev/description: "Create and edit diagrams using natural language AI"
          gethomepage.dev/group: "AI"
          gethomepage.dev/icon: "draw-io.png"
          gethomepage.dev/pod-selector: app.kubernetes.io/name=next-ai-draw-io
        labels:
          gethomepage.dev/enabled: "true"
        hosts:
          - host: &host "next-ai-draw-io.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - hosts:
              - *host
