# Read-only OpenClaw skills mounted at /home/node/.openclaw/skills/.
# Symlinked into PATH so the agent can shell out to them by name.
#
# Each skill:
#   - reads URLs/tokens from the openclaw-secret env vars
#   - constructs only GET requests (enforced in code, not just convention)
#   - emits JSON to stdout for the agent to consume
#
# Surfaces:
#   paperless   — search/get/download Paperless documents
#   sure        — accounts/transactions read + whitelisted writes
#                 (categorize / tag / note — confirm-first)
#   ha          — read entity state + whitelisted service calls
#                 (light/switch/scene/etc. — confirm-first)
#   mail        — Nextcloud Mail REST API: accounts / mailboxes / messages
#                 / body / thread / save-draft (fans out to GMX/iCloud/Gmail)
#   nc          — scoped read+write under Nextcloud /openclaw-drafts/
#   say         — synthesize text via ElevenLabs and send back through
#                 Telegram as a voice message (Opus/OGG) or audio (MP3)
#   pallet      — read-only access to the wood-pellet price monitor's
#                 Postgres DB: latest verdict, signal history, per-source
#                 prices, run logs.
#   arag-plan   — prompt template for the Paperless ↔ Sure ↔ ARAG flow
