---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 1
  install:
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    cleanupOnFail: false
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      openclaw:
        pod:
          annotations:
            secret.reloader.stakater.com/reload: openclaw-secret
            configmap.reloader.stakater.com/reload: openclaw-mcp-servers,openclaw-skills
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

        initContainers:
          install-openclaw:
            image:
              repository: node
              tag: 22-bookworm
            command:
              - bash
              - -lc
              - |
                set -euo pipefail

                # Migrate .clawdbot -> .openclaw if needed
                if [ -d "/home/node/.clawdbot" ] && [ ! -L "/home/node/.clawdbot" ]; then
                  echo "Migrating .clawdbot → .openclaw..."
                  mv /home/node/.clawdbot /home/node/.openclaw
                  ln -sf /home/node/.openclaw /home/node/.clawdbot
                fi

                # Migrate old clawdbot.json -> openclaw.json
                if [ -f "/home/node/.openclaw/clawdbot.json" ] && [ ! -f "/home/node/.openclaw/openclaw.json" ]; then
                  echo "Renaming clawdbot.json → openclaw.json..."
                  mv /home/node/.openclaw/clawdbot.json /home/node/.openclaw/openclaw.json
                fi

                # Remove legacy clawdbot.json — openclaw reads it as fallback
                rm -f /home/node/.openclaw/clawdbot.json

                # Fix .clawdbot paths in session/state files — openclaw rejects
                # session file paths that resolve outside the sessions directory
                find /home/node/.openclaw -maxdepth 5 -name "*.json" -not -path "*/node_modules/*" 2>/dev/null | while read f; do
                  if grep -q '\.clawdbot' "$f" 2>/dev/null; then
                    sed -i 's|/home/node/.clawdbot/|/home/node/.openclaw/|g' "$f"
                    echo "Fixed .clawdbot paths in: $f"
                  fi
                done

                export HOME="/home/node/.openclaw"
                mkdir -p "$HOME"
                export NPM_CONFIG_CACHE="/home/node/.npm"
                mkdir -p "$NPM_CONFIG_CACHE"
                export PYTHONUSERBASE="/home/node/.openclaw"
                echo "Cleaning existing runtimes to free space..."
                rm -rf /home/node/.openclaw/.cache
                # node:22-bookworm ships Python 3.11. Pip installs land in
                # lib/python3.11/site-packages; PYTHONPATH must match.
                export PYTHONPATH="/home/node/.openclaw/lib/python3.11/site-packages"
                export PIP_DISABLE_PIP_VERSION_CHECK=1

                echo "Installing git and build dependencies..."
                apt-get update
                DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                  bash \
                  python3 python3-pip python3-venv python3-dev \
                  build-essential pkg-config \
                  git openssh-client ca-certificates curl sudo \
                  libatlas-base-dev libopenblas-dev libssl-dev libffi-dev

                echo "Configuring passwordless sudo for node user..."
                useradd -u 1000 -m -s /bin/bash node || true
                echo "node ALL=(ALL:ALL) NOPASSWD: ALL" > /etc/sudoers.d/node
                chmod 0440 /etc/sudoers.d/node
                echo "Passwordless sudo configured for user 'node'"

                BIN_DIR="/home/node/.openclaw/bin"
                mkdir -p "$BIN_DIR"
                ln -sf /usr/bin/git "$BIN_DIR/git"
                ln -sf /usr/bin/python3 "$BIN_DIR/python3"
                rm -f "$BIN_DIR/gh" "$BIN_DIR/jq" "$BIN_DIR/ffmpeg" "$BIN_DIR/ffprobe"

                echo "Installing kubectl..."
                # Use a known stable version as fallback if latest check fails
                KUBECTL_VER="$(curl -L -s https://dl.k8s.io/release/stable.txt 2>/dev/null || echo 'v1.31.4')"
                echo "Kubectl version: ${KUBECTL_VER}"
                KUBECTL_URL="https://dl.k8s.io/release/${KUBECTL_VER}/bin/linux/amd64/kubectl"
                if curl -L -f "${KUBECTL_URL}" -o "$BIN_DIR/kubectl" 2>/dev/null; then
                  chmod +x "$BIN_DIR/kubectl"
                  echo "kubectl installed successfully"
                  "$BIN_DIR/kubectl" version --client --short 2>/dev/null || true
                else
                  echo "Failed to download kubectl from ${KUBECTL_URL}, trying v1.31.4..."
                  # Fallback to known version
                  if curl -L -f "https://dl.k8s.io/release/v1.31.4/bin/linux/amd64/kubectl" -o "$BIN_DIR/kubectl"; then
                    chmod +x "$BIN_DIR/kubectl"
                    echo "kubectl v1.31.4 installed successfully"
                  else
                    echo "kubectl installation failed"
                  fi
                fi

                echo "Installing mise..."
                MISE_TMP="$(mktemp -d)"
                curl -fsSL https://mise.jdx.dev/install.sh -o "${MISE_TMP}/install.sh"
                sh "${MISE_TMP}/install.sh" --yes --bin-dir "$BIN_DIR"
                rm -rf "${MISE_TMP}"

                echo "Installing gh CLI..."
                rm -rf /tmp/gh-cli
                mkdir -p /tmp/gh-cli
                cd /tmp/gh-cli
                if apt-get download gh; then
                  dpkg -x gh_*.deb /tmp/gh-cli
                else
                  echo "Failed to download gh via apt" >&2
                  exit 1
                fi
                if [ ! -x "/tmp/gh-cli/usr/bin/gh" ]; then
                  echo "Failed to unpack gh CLI" >&2
                  exit 1
                fi
                cp "/tmp/gh-cli/usr/bin/gh" "$BIN_DIR/gh"
                chmod +x "$BIN_DIR/gh"
                rm -rf /tmp/gh-cli gh_*.deb
                rm -rf /var/lib/apt/lists/*
                cd "$HOME"

                echo "Installing jq..."
                # GitHub release downloads occasionally TLS-flake on the
                # redirect leg; retry a few times before giving up.
                jq_ok=0
                for attempt in 1 2 3 4 5; do
                  if curl -fsSL --retry 3 --retry-delay 5 --retry-connrefused \
                       "https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64" \
                       -o "$BIN_DIR/jq" 2>/dev/null; then
                    chmod +x "$BIN_DIR/jq"
                    jq_ok=1
                    break
                  fi
                  echo "jq download attempt $attempt failed, sleeping..."
                  sleep 5
                done
                if [ "$jq_ok" != "1" ]; then
                  echo "WARN: jq install failed after retries (continuing)"
                fi

                echo "Installing ffmpeg static build..."
                FFMPEG_TMP="$(mktemp -d)"
                curl -fsSL "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" -o "$FFMPEG_TMP/ffmpeg.tar.xz"
                tar -xf "$FFMPEG_TMP/ffmpeg.tar.xz" -C "$FFMPEG_TMP"
                FFMPEG_DIR="$(find "$FFMPEG_TMP" -maxdepth 1 -type d -name 'ffmpeg-*static' | head -n 1)"
                if [ -z "$FFMPEG_DIR" ]; then
                  echo "Failed to unpack ffmpeg" >&2
                  exit 1
                fi
                cp "$FFMPEG_DIR/ffmpeg" "$BIN_DIR/ffmpeg"
                cp "$FFMPEG_DIR/ffprobe" "$BIN_DIR/ffprobe"
                chmod +x "$BIN_DIR/ffmpeg" "$BIN_DIR/ffprobe"
                rm -rf "$FFMPEG_TMP"

                echo "Linking tools into /usr/local/bin for interactive shells..."
                for tool in "$BIN_DIR"/*; do
                  [ -f "$tool" ] || continue
                  ln -sf "$tool" "/usr/local/bin/$(basename "$tool")"
                done

                echo "Installing openclaw CLI + coding agent runtimes to shared volume..."
                export PATH="/home/node/.openclaw/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
                export LD_LIBRARY_PATH="/usr/local/lib:/usr/lib:/lib"
                export GIT_EXEC_PATH="/usr/lib/git-core"
                export GIT_SSH_COMMAND="ssh -oStrictHostKeyChecking=accept-new"
                rm -f "$HOME/.gitconfig"
                git config --system --add url."https://github.com/".insteadOf "ssh://git@github.com/"
                git config --system --add url."https://github.com/".insteadOf "ssh://git@github.com"
                git config --system --add url."https://github.com/".insteadOf "git@github.com:"
                git config --system --add url."https://github.com/".insteadOf "git@github.com"
                git config --system --add url."https://github.com/".insteadOf "git+ssh://git@github.com/"
                git config --system --add url."https://github.com/".insteadOf "git+ssh://git@github.com"
                git config --system --add url."https://github.com/".insteadOf "git://github.com/"
                git config --system --add url."https://github.com/".insteadOf "git://github.com"
                git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
                git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com"
                git config --global --add url."https://github.com/".insteadOf "git@github.com:"
                git config --global --add url."https://github.com/".insteadOf "git@github.com"
                git config --global --add url."https://github.com/".insteadOf "git+ssh://git@github.com/"
                git config --global --add url."https://github.com/".insteadOf "git+ssh://git@github.com"
                git config --global --add url."https://github.com/".insteadOf "git://github.com/"
                git config --global --add url."https://github.com/".insteadOf "git://github.com"
                git config -l --show-origin | grep url || true

                install_npm() {
                  pkg="$1"
                  echo "npm install -g $pkg..."
                  if ! npm install -g --prefix /home/node/.openclaw "$pkg"; then
                    echo "WARN: npm install failed for $pkg (continuing)"
                  fi
                }
                install_pip() {
                  pkg="$1"
                  echo "pip install $pkg..."
                  if ! timeout 240 python3 -m pip install --user --no-cache-dir --break-system-packages "$pkg"; then
                    echo "WARN: pip install failed for $pkg (continuing)"
                  fi
                }

                install_npm openclaw@latest
                install_npm @openai/codex
                install_npm @google/gemini-cli
                install_npm claude
                install_npm @mariozechner/pi-coding-agent
                install_npm clawdhub
                install_npm mcporter
                install_npm goplaces
                install_npm gog
                install_npm opencode-ai
                install_npm summarize
                install_npm sag
                install_npm playwright
                install_npm @playwright/mcp

                export PIP_ROOT_USER_ACTION=ignore
                install_pip obsidian-cli
                install_pip himalaya
                install_pip openai-whisper
                install_pip "git+https://github.com/nachtschatt3n/hactl.git@v1.1.1"

                # Playwright browsers + apt deps for the @playwright/mcp server.
                # Browsers land in the PVC so they survive pod restarts.
                export PLAYWRIGHT_BROWSERS_PATH=/home/node/.openclaw/playwright-browsers
                mkdir -p "$PLAYWRIGHT_BROWSERS_PATH"
                PLAYWRIGHT_BIN="/home/node/.openclaw/bin/playwright"
                if [ -x "$PLAYWRIGHT_BIN" ]; then
                  echo "Installing Playwright chromium + system deps..."
                  if ! "$PLAYWRIGHT_BIN" install-deps chromium; then
                    echo "WARN: playwright install-deps failed (continuing)"
                  fi
                  if ! "$PLAYWRIGHT_BIN" install chromium; then
                    echo "WARN: playwright install chromium failed (continuing)"
                  fi
                else
                  echo "WARN: playwright CLI not found at $PLAYWRIGHT_BIN — skipping browser install"
                fi

                echo "Creating symlink..."
                ln -sf /home/node/.openclaw/bin/openclaw /home/node/.openclaw/openclaw
                echo "OpenClaw installed at: /home/node/.openclaw/bin/openclaw"
                /home/node/.openclaw/bin/openclaw --version
                echo "Seeding Ollama auth profile..."
                AUTH_DIR="/home/node/.openclaw/agents/main/agent"
                mkdir -p "$AUTH_DIR"
                printf '%s\n' \
                  '{' \
                  '  "ollama": {' \
                  '    "api_key": "ollama",' \
                  '    "api_base": "http://192.168.30.111:11435/v1"' \
                  '  }' \
                  '}' > "$AUTH_DIR/auth-profiles.json"

                echo "Fixing permissions..."
                chown -R 1000:1000 /home/node/.openclaw
                # Fix ownership of backward-compat symlink created during migration
                chown -h 1000:1000 /home/node/.clawdbot 2>/dev/null || true
            env:
              # GitHub token for mise and git operations during init
              - name: GITHUB_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secret
                    key: GITHUB_TOKEN
            securityContext:
              runAsUser: 0
              runAsGroup: 0

        containers:
          app:
            image:
              repository: node
              tag: 22-bookworm
              pullPolicy: IfNotPresent

            command:
              - bash
              - -lc
              - |
                set -euo pipefail

                export PATH="/home/node/.openclaw/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
                export LD_LIBRARY_PATH="/usr/local/lib:/usr/lib:/lib"
                export GIT_EXEC_PATH="/usr/lib/git-core"
                export PYTHONUSERBASE="/home/node/.openclaw"
                # node:22-bookworm ships Python 3.11. Pip installs land in
                # lib/python3.11/site-packages; PYTHONPATH must match.
                export PYTHONPATH="/home/node/.openclaw/lib/python3.11/site-packages"
                CONFIG_PATH="/home/node/.openclaw/openclaw.json"
                STATE_DIR="/home/node/.openclaw"

                mkdir -p "$STATE_DIR" /home/node/clawd /home/node/.ssh
                SHELL_PATH="/home/node/.openclaw/bin:/home/node/.local/bin:/home/node/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
                for f in .bashrc .profile .bash_logout; do
                  if [ ! -f "/home/node/$f" ] && [ -f "/etc/skel/$f" ]; then
                    cp "/etc/skel/$f" "/home/node/$f"
                  fi
                done
                if ! grep -q "OPENCLAW_PATH_EXPORT" /home/node/.bashrc 2>/dev/null; then
                  printf '\n# OPENCLAW_PATH_EXPORT\nexport PATH="%s:$PATH"\n' "$SHELL_PATH" >> /home/node/.bashrc
                fi
                if ! grep -q "OPENCLAW_PATH_EXPORT" /home/node/.profile 2>/dev/null; then
                  printf '\n# OPENCLAW_PATH_EXPORT\nexport PATH="%s:$PATH"\n' "$SHELL_PATH" >> /home/node/.profile
                fi
                chown -R 1000:1000 /home/node 2>/dev/null || true

                node - <<'NODE'
                  const fs = require('fs');
                  const path = '/home/node/.openclaw/openclaw.json';
                  const modelName = process.env.OLLAMA_MODEL || 'gemma4:26b';
                  const ollamaBase = process.env.OLLAMA_BASE || 'http://192.168.30.111:11434/v1';
                  const ollamaKey = process.env.OLLAMA_API_KEY || 'ollama';
                  const displayModel = modelName.includes('/') ? modelName : 'ollama/' + modelName;
                  const modelId = displayModel;
                  const baseCfg = {
                    gateway: {
                      mode: 'local',
                      bind: 'lan',
                      port: 18789,
                      trustedProxies: ['10.69.0.35', '10.0.0.0/8', '192.168.0.0/16', '172.16.0.0/12', '127.0.0.1', 'localhost', '::1'],
                      controlUi: { allowedOrigins: ['https://openclaw.' + (process.env.OPENCLAW_DOMAIN || 'example.com')] },
                    },
                    agents: {
                      defaults: {
                        workspace: '/home/node/clawd',
                        model: { primary: modelId },
                      },
                    },
                    models: {
                      providers: {
                        ollama: {
                          baseUrl: ollamaBase,
                          apiKey: ollamaKey,
                          api: 'openai-completions',
                          models: [{
                            id: modelName,
                            name: modelName,
                            reasoning: false,
                            input: ['text'],
                            cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 },
                            contextWindow: 32768,
                            maxTokens: 4096,
                          }],
                        },
                      },
                    },
                  };

                  // Load existing config if it exists, otherwise start with baseCfg
                  let cfg = baseCfg;
                  if (fs.existsSync(path)) {
                    try {
                      const existing = JSON.parse(fs.readFileSync(path, 'utf8'));
                      // Preserve existing config but update key sections
                      cfg = existing;
                    } catch (e) {
                      console.log('Failed to parse existing config, using defaults:', e.message);
                    }
                  }

                  // Update gateway settings (preserve other gateway fields like devices)
                  cfg.gateway = cfg.gateway || {};
                  cfg.gateway.mode = cfg.gateway.mode || 'local';
                  cfg.gateway.bind = cfg.gateway.bind || 'lan';
                  cfg.gateway.port = cfg.gateway.port || 18789;
                  cfg.gateway.trustedProxies = ['10.69.0.35', '10.0.0.0/8', '192.168.0.0/16', '172.16.0.0/12', '127.0.0.1', 'localhost', '::1'];
                  cfg.gateway.controlUi = cfg.gateway.controlUi || {};
                  cfg.gateway.controlUi.allowedOrigins = ['https://openclaw.' + process.env.OPENCLAW_DOMAIN];

                  // Update agents defaults
                  cfg.agents = cfg.agents || {};
                  cfg.agents.defaults = cfg.agents.defaults || {};
                  cfg.agents.defaults.workspace = cfg.agents.defaults.workspace || '/home/node/clawd';
                  cfg.agents.defaults.model = cfg.agents.defaults.model || {};
                  // OPENCLAW_DEFAULT_MODEL overrides the routed model.
                  // For openai/* models, the codex harness is wired below
                  // under models.providers.openai.agentRuntime.id; the
                  // agents.defaults.agentRuntime.id field is documented as
                  // legacy and ignored by runtime selection.
                  cfg.agents.defaults.model.primary = process.env.OPENCLAW_DEFAULT_MODEL || displayModel;
                  delete cfg.agents.defaults.agentRuntime;

                  // Update models
                  cfg.models = cfg.models || {};
                  cfg.models.providers = cfg.models.providers || {};
                  cfg.models.providers.ollama = {
                    baseUrl: ollamaBase,
                    apiKey: ollamaKey,
                    api: 'openai-completions',
                    models: [{
                      id: modelName,
                      name: modelName,
                      reasoning: false,
                      input: ['text'],
                      cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 },
                      contextWindow: 32768,
                      maxTokens: 4096,
                    }],
                  };

                  // The codex CLI backend is registered automatically by
                  // the bundled openai plugin (see extensions/openai/
                  // cli-backend.js — registers id "codex-cli"). Models
                  // referenced as "codex-cli/<model>" are routed through
                  // the local `codex` CLI without any explicit provider
                  // entry here, so the OPENCLAW_DEFAULT_MODEL env var
                  // (e.g. "codex-cli/gpt-5.5") is the only switch needed.
                  // Clean up any leftover openai provider override from
                  // earlier (wrong) attempts.
                  if (cfg.models.providers.openai && cfg.models.providers.openai.agentRuntime && cfg.models.providers.openai.agentRuntime.id === 'codex') {
                    delete cfg.models.providers.openai;
                  }

                  // Talk voice (classic batch TTS). ElevenLabs picks up
                  // ELEVENLABS_API_KEY from env. modelId / voiceId can be
                  // overridden via OPENCLAW_TALK_MODEL / OPENCLAW_TALK_VOICE
                  // env vars; runtime `/voice` slash command persists
                  // user-set values into the same block.
                  cfg.talk = cfg.talk || {};
                  cfg.talk.provider = 'elevenlabs';
                  cfg.talk.providers = cfg.talk.providers || {};
                  cfg.talk.providers.elevenlabs = {
                    modelId: process.env.OPENCLAW_TALK_MODEL || 'eleven_flash_v2_5',
                    voiceId: process.env.OPENCLAW_TALK_VOICE || 'EST9Ui6982FZPSi7gCHi',
                    ...(cfg.talk.providers.elevenlabs || {}),
                  };

                  delete cfg.model;

                  fs.writeFileSync(path, JSON.stringify(cfg, null, 2));
                NODE
                chown 1000:1000 "$CONFIG_PATH"

                AUTH_DIR="/home/node/.openclaw/agents/main/agent"
                mkdir -p "$AUTH_DIR"
                AUTH_FILE="$AUTH_DIR/auth-profiles.json"
                if [ ! -f "$AUTH_FILE" ]; then
                  API_KEY="${OLLAMA_API_KEY:-ollama}"
                  API_BASE="${OLLAMA_BASE:-http://192.168.30.111:11435/v1}"
                  printf '{\n  "ollama": {\n    "api_key": "%s",\n    "api_base": "%s"\n  }\n}\n' "$API_KEY" "$API_BASE" > "$AUTH_FILE"
                fi
                chown -R 1000:1000 "$AUTH_DIR"

                echo "Configuring kubectl with kubeconfig symlink..."
                mkdir -p /home/node/.kube
                if [ -f /home/node/code/cberg-home-nextgen/kubeconfig ]; then
                  ln -sf /home/node/code/cberg-home-nextgen/kubeconfig /home/node/.kube/config
                  echo "Kubeconfig linked from ~/code/cberg-home-nextgen/kubeconfig"
                else
                  echo "Warning: kubeconfig not found at ~/code/cberg-home-nextgen/kubeconfig"
                fi

                echo "Wiring personal-knowledge integrations..."

                # NOTE on $$: Flux kustomize-controller does `${VAR}` substitution
                # against cluster-settings/cluster-secrets. Doubling the dollar
                # ($${VAR}) escapes one pass, leaving ${VAR} for bash at runtime.

                # NOTE: HASS_URL/HASS_TOKEN for hactl are now mapped from the
                # secret in the container env: block, so they're available to
                # both this script and `kubectl exec` sessions.

                # NOTE: mail goes through the Nextcloud Mail REST API
                # (skill mail.py), which fans out to GMX/iCloud/Gmail. No
                # himalaya wiring needed at runtime — the binary stays
                # installed for ad-hoc use but no config is seeded.

                # 2. Materialize MCP server registrations from ConfigMap with
                #    secret-sourced URLs substituted in. The `$$` escapes
                #    Flux's kustomize-controller variable substitution so the
                #    placeholders survive into the runtime container, where
                #    bash and sed expand them at startup.
                if [ -f /etc/openclaw-mcp/mcp-servers.json ]; then
                  mkdir -p /home/node/.openclaw
                  sed \
                    -e "s|__NEXTCLOUD_MCP_URL__|$${NEXTCLOUD_MCP_URL:-}|g" \
                    -e "s|__NEXTCLOUD_MCP_AUTH_HEADER__|$${NEXTCLOUD_MCP_AUTH_HEADER:-}|g" \
                    /etc/openclaw-mcp/mcp-servers.json \
                    > /home/node/.openclaw/mcp-servers.json
                  echo "MCP server defs written to ~/.openclaw/mcp-servers.json"
                fi

                # 3. Install skill CLIs onto PATH. ConfigMap mount is
                #    read-only — copy into PVC bin dir and make executable.
                if [ -d /etc/openclaw-skills ]; then
                  for src in /etc/openclaw-skills/*.py; do
                    [ -f "$src" ] || continue
                    name=$(basename "$src" .py)
                    cp "$src" "/home/node/.openclaw/bin/$name"
                    chmod +x "/home/node/.openclaw/bin/$name"
                  done
                  # Also expose the ARAG playbook prompt for the agent.
                  if [ -f /etc/openclaw-skills/arag-plan.md ]; then
                    cp /etc/openclaw-skills/arag-plan.md /home/node/.openclaw/arag-plan.md
                  fi
                  mkdir -p /home/node/.openclaw/browser-profiles
                  echo "Installed read-only skill CLIs: $(ls /etc/openclaw-skills/*.py 2>/dev/null | xargs -n1 basename | tr '\n' ' ')"
                fi

                # 4. Materialize workspace SKILL.md files so the OpenClaw
                #    skill-workshop plugin discovers them on agent start.
                #    Files in the ConfigMap named skill-<name>.md become
                #    ~/clawd/skills/<name>/SKILL.md.
                if [ -d /etc/openclaw-skills ]; then
                  for src in /etc/openclaw-skills/skill-*.md; do
                    [ -f "$src" ] || continue
                    base=$(basename "$src" .md)
                    name=$${base#skill-}
                    mkdir -p "/home/node/clawd/skills/$name"
                    cp "$src" "/home/node/clawd/skills/$name/SKILL.md"
                  done
                  echo "Seeded workspace skills: $(ls /home/node/clawd/skills/ 2>/dev/null | tr '\n' ' ')"
                fi

                # 5. Codex CLI sandbox tuning.
                #
                # The codex-cli backend hard-codes `--sandbox workspace-write`,
                # which uses bubblewrap to set up an unprivileged user
                # namespace. Talos-hardened kernels block that
                # (bwrap: "No permissions to create a new namespace"), so
                # every agent shell exits before running.
                #
                # The K8s pod is itself an external sandbox (non-root user,
                # dropped caps, no privilege escalation, dedicated PVC). Per
                # codex's own docs, `--dangerously-bypass-approvals-and-sandbox`
                # is the documented escape hatch for exactly this case.
                #
                # Shim the `codex` binary so any `--sandbox <mode>` is
                # rewritten to `--dangerously-bypass-approvals-and-sandbox`
                # before the real CLI runs.
                #
                # Implementation note: the original `codex` is a symlink to
                # an ES-module script under node_modules/@openai/codex/.
                # Writing a shim with `cat >` clobbered the symlink target,
                # and copying it elsewhere broke its node_modules resolution
                # (Error: Missing optional dependency @openai/codex-linux-x64).
                # So instead: replace the symlink with a bash script that
                # invokes `node /<original-path>/codex.js` — keeping the
                # script in its original directory so npm-relative imports
                # still resolve.
                # Repair a previous botched shim install if present.
                rm -f /home/node/.openclaw/bin/codex-real
                if [ -L /home/node/.openclaw/bin/codex ] || ! grep -q "codex-cli sandbox shim" /home/node/.openclaw/bin/codex 2>/dev/null; then
                  rm -f /home/node/.openclaw/bin/codex
                  # Single-quoted heredoc → no bash expansion at write time.
                  # $${...} below is Flux escape: drone/envsubst collapses
                  # $$ -> $ when rendering the manifest, leaving $${...} for
                  # bash to expand at runtime.
                  cat > /home/node/.openclaw/bin/codex <<'SHIM'
                #!/usr/bin/env bash
                # codex-cli sandbox shim. Strips any sandbox-mode arg the
                # caller passed (covers all forms openclaw uses) and replaces
                # them with --dangerously-bypass-approvals-and-sandbox.
                # The pod is already an external sandbox; bwrap can't open
                # a user namespace on the Talos-hardened kernel.
                #
                # Forms intercepted:
                #   --sandbox <mode>       (fresh-run args)
                #   -s <mode>              (same, short form)
                #   -c sandbox_mode=...    (resumeArgs path)
                #   -c sandbox_permissions=...  (alt key)
                CODEX_JS="/home/node/.openclaw/lib/node_modules/@openai/codex/bin/codex.js"
                args=()
                skip_next=0
                bypass_added=0
                add_bypass() {
                  if [ "$${bypass_added}" = "0" ]; then
                    args+=("--dangerously-bypass-approvals-and-sandbox")
                    bypass_added=1
                  fi
                }
                while [ "$${#}" -gt 0 ]; do
                  a="$${1}"
                  shift
                  if [ "$${skip_next}" = "1" ]; then
                    skip_next=0
                    add_bypass
                    continue
                  fi
                  case "$${a}" in
                    --sandbox|-s)
                      skip_next=1
                      ;;
                    --sandbox=*|-s=*)
                      add_bypass
                      ;;
                    -c)
                      if [ "$${#}" -gt 0 ]; then
                        case "$${1}" in
                          sandbox_mode=*|sandbox_permissions=*)
                            shift
                            add_bypass
                            ;;
                          *)
                            args+=(-c "$${1}")
                            shift
                            ;;
                        esac
                      fi
                      ;;
                    *)
                      args+=("$${a}")
                      ;;
                  esac
                done
                exec node "$${CODEX_JS}" "$${args[@]}"
                SHIM
                  chmod +x /home/node/.openclaw/bin/codex
                  echo "Installed codex CLI shim (bypasses bubblewrap)"
                fi

                # Also leave the config.toml tuned for network + env
                # passthrough so any direct `codex` invocations that don't
                # go through the shim still behave sensibly.
                if [ -f /home/node/.codex/config.toml ]; then
                  if ! grep -q '\[sandbox_workspace_write\]' /home/node/.codex/config.toml; then
                    {
                      printf '\n[sandbox_workspace_write]\n'
                      printf 'network_access = true\n'
                    } >> /home/node/.codex/config.toml
                  fi
                  if ! grep -q '\[shell_environment_policy\]' /home/node/.codex/config.toml; then
                    {
                      printf '\n[shell_environment_policy]\n'
                      printf 'inherit = "all"\n'
                    } >> /home/node/.codex/config.toml
                  fi
                fi

                echo "Starting OpenClaw Gateway..."
                mkdir -p /home/node/clawd
                cd /home/node/clawd
                exec /home/node/.openclaw/bin/openclaw gateway --port 18789 --verbose

            env:
              - name: PATH
                value: "/home/node/.local/share/mise/shims:/home/node/.openclaw/bin:/home/node/.local/bin:/home/node/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              # Pip-installed CLIs (hactl, himalaya, obsidian-cli) live under
              # ~/.openclaw/lib/python3.11. PYTHONPATH must be set in the
              # container env so it's inherited by `kubectl exec` sessions,
              # not just the startup script.
              - name: PYTHONUSERBASE
                value: "/home/node/.openclaw"
              - name: PYTHONPATH
                value: "/home/node/.openclaw/lib/python3.11/site-packages"
              # Node configuration
              - name: NODE_ENV
                value: "production"

              # Gateway port
              - name: GATEWAY_PORT
                value: "18789"
              - name: OLLAMA_BASE
                value: "http://192.168.30.111:11434/v1"
              - name: OLLAMA_MODEL
                value: "gemma4:26b"
              - name: OLLAMA_API_KEY
                value: "ollama"
              # Route the embedded agent through the codex CLI backend
              # (registered id "codex-cli"; the openai plugin wires it via
              # registerCliBackend). The codex CLI reads ChatGPT-subscription
              # OAuth tokens from /home/node/.codex/auth.json (persisted in
              # the PVC after a one-time `codex login`).
              - name: OPENCLAW_DEFAULT_MODEL
                value: "codex-cli/gpt-5.5"
              - name: OPENCLAW_DOMAIN
                value: "${SECRET_DOMAIN}"
              # Playwright browsers were installed into the PVC during init —
              # point @playwright/mcp at the same location at runtime.
              - name: PLAYWRIGHT_BROWSERS_PATH
                value: "/home/node/.openclaw/playwright-browsers"
              # hactl expects HASS_URL/HASS_TOKEN; the secret stores them under
              # HA_URL/HA_TOKEN. Map them here so `kubectl exec` shells get
              # them too (envFrom only exposes the original key names).
              - name: HASS_URL
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secret
                    key: HA_URL
              - name: HASS_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secret
                    key: HA_TOKEN
              # GitHub token for mise and git operations
              - name: GITHUB_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secret
                    key: GITHUB_TOKEN
            envFrom:
              - secretRef:
                  name: openclaw-secret

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 18789
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3

              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 18789
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3

              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 18789
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30

            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 2
                memory: 2Gi

            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL

    service:
      main:
        controller: openclaw
        type: ClusterIP
        ports:
          http:
            protocol: TCP
            port: 18789
            targetPort: 18789

    ingress:
      main:
        enabled: true
        className: internal
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "OpenClaw"
          gethomepage.dev/group: "AI"
          gethomepage.dev/icon: "openclaw.png"
          gethomepage.dev/description: "Telegram AI Assistant - OpenClaw Gateway"
        labels:
          gethomepage.dev/enabled: "true"
        hosts:
          - host: openclaw.${SECRET_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - hosts:
              - openclaw.${SECRET_DOMAIN}

    persistence:
      config:
        type: persistentVolumeClaim
        existingClaim: openclaw-data
        advancedMounts:
          openclaw:
            app:
              - path: /home/node
            install-openclaw:
              - path: /home/node

      npm-cache:
        type: emptyDir
        sizeLimit: 2Gi
        advancedMounts:
          openclaw:
            install-openclaw:
              - path: /home/node/.npm

      tmp:
        type: emptyDir
        advancedMounts:
          openclaw:
            app:
              - path: /tmp

      mcp-servers:
        type: configMap
        name: openclaw-mcp-servers
        advancedMounts:
          openclaw:
            app:
              - path: /etc/openclaw-mcp
                readOnly: true

      skills:
        type: configMap
        name: openclaw-skills
        defaultMode: 0755
        advancedMounts:
          openclaw:
            app:
              - path: /etc/openclaw-skills
                readOnly: true
