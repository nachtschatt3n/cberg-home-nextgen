    #!/usr/bin/env python3
    """Sure client (mostly read, whitelisted writes).

    Read:
        sure accounts
        sure account <account_id>
        sure transactions [account_id] [from_iso] [to_iso] [limit]
        sure transaction <txn_id>      # one transaction (helpful before writes)
        sure categories                # available categories
        sure tags                      # available tags

    Write (whitelisted; agent must confirm with user first):
        sure categorize <txn_id> <category_id>
        sure tag <txn_id> <tag_id>[,<tag_id>...]   # comma-separated; replaces tags
        sure note <txn_id>             # body from stdin; replaces notes
        sure reclassify <txn_id> <income|expense>  # flips income↔expense by
                                                    # keeping |amount| and
                                                    # letting Sure apply the
                                                    # right sign via `nature`.

    Auth: Sure uses X-Api-Key header. Writes go via
    PATCH /api/v1/transactions/:id with a {"transaction": {...}} wrapper.
    Block: arbitrary amount/date/account_id changes, deletes.
    Note on reclassify: Sure derives `classification` from amount sign
    (negative → income, positive → expense). To flip it via the API you
    must send BOTH `nature` AND `amount` so calculate_signed_amount runs
    on the server. This verb does exactly that, preserving |amount|.
    """
    import json, os, sys, urllib.parse, urllib.request

    BASE = os.environ["SURE_URL"].rstrip("/")
    TOKEN = os.environ["SURE_TOKEN"]
    HEADERS = {"X-Api-Key": TOKEN, "Accept": "application/json"}

    # Fields the agent is allowed to touch via PATCH. Any other field in a
    # caller payload is silently dropped. Matches the user-approved scope:
    # categorise + tag + note. Amount/date/account moves are forbidden.
    WRITE_FIELDS = {"category_id", "tag_ids", "notes"}

    def _get(path, params=None):
        url = f"{BASE}{path}"
        if params:
            clean = {k: v for k, v in params.items() if v is not None}
            if clean:
                url += "?" + urllib.parse.urlencode(clean)
        req = urllib.request.Request(url, headers=HEADERS, method="GET")
        with urllib.request.urlopen(req, timeout=30) as r:
            return json.loads(r.read())

    def _patch_txn(txn_id, fields):
        clean = {k: v for k, v in fields.items() if k in WRITE_FIELDS}
        if not clean:
            sys.stderr.write(
                f"refused: no whitelisted write fields in payload. "
                f"Allowed: {sorted(WRITE_FIELDS)}\n"
            )
            sys.exit(3)
        body = json.dumps({"transaction": clean}).encode()
        h = {**HEADERS, "Content-Type": "application/json"}
        req = urllib.request.Request(
            f"{BASE}/api/v1/transactions/{txn_id}",
            data=body, headers=h, method="PATCH",
        )
        with urllib.request.urlopen(req, timeout=30) as r:
            return json.loads(r.read())

    def accounts():
        print(json.dumps(_get("/api/v1/accounts"), indent=2))

    def account(account_id):
        print(json.dumps(_get(f"/api/v1/accounts/{account_id}"), indent=2))

    def transactions(account_id=None, frm=None, to=None, limit=100):
        params = {"account_id": account_id, "from": frm, "to": to, "limit": limit}
        print(json.dumps(_get("/api/v1/transactions", params), indent=2))

    def transaction(txn_id):
        print(json.dumps(_get(f"/api/v1/transactions/{txn_id}"), indent=2))

    def categories():
        print(json.dumps(_get("/api/v1/categories"), indent=2))

    def tags():
        print(json.dumps(_get("/api/v1/tags"), indent=2))

    def categorize(txn_id, category_id):
        result = _patch_txn(txn_id, {"category_id": category_id})
        cat = (result.get("category") or {}).get("name")
        print(json.dumps({"id": txn_id, "category": cat, "result": result}, indent=2))

    def tag(txn_id, tag_csv):
        tag_ids = [t.strip() for t in tag_csv.split(",") if t.strip()]
        result = _patch_txn(txn_id, {"tag_ids": tag_ids})
        applied = [t.get("name") for t in (result.get("tags") or [])]
        print(json.dumps({"id": txn_id, "tags": applied, "result": result}, indent=2))

    def note(txn_id):
        raw = sys.stdin.read()
        if not raw.strip():
            sys.stderr.write("sure note: expected note text on stdin\n")
            sys.exit(2)
        result = _patch_txn(txn_id, {"notes": raw.strip()})
        print(json.dumps({"id": txn_id, "notes": result.get("notes")}, indent=2))

    def reclassify(txn_id, target):
        """Flip income↔expense by preserving |amount| and sending `nature`.

        Bypasses _patch_txn's WRITE_FIELDS allowlist on purpose — we send
        `amount` here but only as the existing absolute value, never a
        user-chosen number. That keeps the "no arbitrary amount edits"
        invariant: this verb cannot change how much money the txn is for,
        only which side of the ledger it sits on.
        """
        target = target.lower().strip()
        if target not in ("income", "expense", "inflow", "outflow"):
            sys.stderr.write(
                f"sure reclassify: target must be income|expense (got {target!r})\n"
            )
            sys.exit(2)
        # Normalize inflow/outflow → income/expense for the user-facing
        # confirmation and the post-PATCH check; Sure accepts both.
        canonical = {"inflow": "income", "outflow": "expense"}.get(target, target)

        current = _get(f"/api/v1/transactions/{txn_id}")
        if not isinstance(current, dict) or "amount_cents" not in current:
            sys.stderr.write(f"sure reclassify: txn {txn_id} not found or malformed\n")
            sys.exit(4)
        if current.get("classification") == canonical:
            print(json.dumps({
                "id": txn_id,
                "classification": canonical,
                "noop": True,
                "reason": "already classified that way",
            }, indent=2))
            return

        magnitude = abs(int(current["amount_cents"])) / 100.0

        body = json.dumps({
            "transaction": {"nature": canonical, "amount": magnitude},
        }).encode()
        h = {**HEADERS, "Content-Type": "application/json"}
        req = urllib.request.Request(
            f"{BASE}/api/v1/transactions/{txn_id}",
            data=body, headers=h, method="PATCH",
        )
        with urllib.request.urlopen(req, timeout=30) as r:
            result = json.loads(r.read())

        applied = result.get("classification")
        ok = applied == canonical
        print(json.dumps({
            "id": txn_id,
            "name": result.get("name"),
            "amount": result.get("amount"),
            "classification_before": current.get("classification"),
            "classification_after": applied,
            "success": ok,
            "category": (result.get("category") or {}).get("name"),
        }, indent=2))
        if not ok:
            sys.exit(5)

    def main():
        if len(sys.argv) < 2:
            print(__doc__); sys.exit(2)
        verb = sys.argv[1]
        dispatch = {
            "accounts": lambda: accounts(),
            "account": lambda: account(sys.argv[2]),
            "transactions": lambda: transactions(
                sys.argv[2] if len(sys.argv) > 2 else None,
                sys.argv[3] if len(sys.argv) > 3 else None,
                sys.argv[4] if len(sys.argv) > 4 else None,
                int(sys.argv[5]) if len(sys.argv) > 5 else 100,
            ),
            "transaction": lambda: transaction(sys.argv[2]),
            "categories": lambda: categories(),
            "tags": lambda: tags(),
            "categorize": lambda: categorize(sys.argv[2], sys.argv[3]),
            "tag": lambda: tag(sys.argv[2], sys.argv[3]),
            "note": lambda: note(sys.argv[2]),
            "reclassify": lambda: reclassify(sys.argv[2], sys.argv[3]),
        }
        if verb not in dispatch:
            print(__doc__); sys.exit(2)
        dispatch[verb]()

    if __name__ == "__main__":
        main()

