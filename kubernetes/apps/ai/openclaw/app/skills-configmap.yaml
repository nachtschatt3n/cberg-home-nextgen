  workspace-agents.md: |
    # AGENTS.md — Workspace operating rules

    ## Skill discovery

    Read every file in `skills/<name>/SKILL.md`. Each one declares a
    surface you can shell out to via the codex CLI sandbox (which is
    rewritten to `--dangerously-bypass-approvals-and-sandbox` so the
    skill CLIs can reach their APIs).

    Current skills:

    | Skill | What it does |
    | --- | --- |
    | `nextcloud-mail` | Read mail across GMX/iCloud/Gmail; save drafts (`mail draft`). |
    | `paperless` | Search/get/download archived PDFs. |
    | `sure` | Read finance accounts/transactions (Sure / Maybe-Finance fork). |
    | `home-assistant` | Read HA state via `ha` (REST) or `hactl` (richer CLI). |
    | `telegram-voice` | Synthesise text via ElevenLabs + send as Telegram voice bubble. |

    ## Routing rules

    - **Questions about Mathias's own data** → use the matching skill,
      don't guess from training data. "What's my GMX inbox look like" →
      `mail`. "Did I pay the Apple invoice" → `paperless` + `sure`.
    - **Smart-home questions** → `ha` first, `hactl` for richer lookups.
    - **Voice replies** → only when explicitly asked ("voice this",
      "say it back", "send as voice note"). Default delivery is text.
    - **Cross-reference flows** → see `skills/arag-plan.md` for the
      Paperless ↔ Sure ↔ ARAG bill-status loop.

    ## Constraints

    - Read by default. Writes require Mathias's confirmation, except
      for whitelisted ones (`mail draft`).
    - Don't claim a tool ran when it didn't. If `say` fails, say so.
    - Don't echo secrets back. The pod env contains live API tokens.
    - Stay inside the workspace (`~/clawd`) for any file work; the
      codex sandbox is configured for that root.

  workspace-tools.md: |
    # TOOLS.md — Local tool notes

    These are conventions for the CLIs available in this workspace.
    Tool *availability* is controlled by openclaw plugins + SKILL.md
    files; this is just guidance.

    ## Custom skills on PATH

    ### `mail`
    Nextcloud Mail REST API. Reads cover GMX + iCloud + Gmail in one
    request set. Drafts go to the IMAP Drafts folder via
    `mail draft <account_id>` (JSON payload on stdin). Sends are
    blocked — review the draft in your mail client before sending.

    ### `paperless`
    Read-only Paperless-ngx. `paperless search "<text>"`,
    `paperless get <id>`, `paperless download <id>`. Tag and
    correspondent IDs come back numeric — that's the native form.

    ### `sure`
    Read-only Sure finance API (Maybe-Finance fork). `sure accounts`,
    `sure transactions <account_id> <from> <to>`. Auth is the
    `X-Api-Key` header, set automatically from env.

    ### `ha` and `hactl`
    Home Assistant. `ha` is the read-only REST wrapper (blocks any
    mutation verb). `hactl` is the richer kubectl-style CLI — also
    read-only by policy here, though it *can* mutate so be careful.

    ### `say`
    Synthesises text via ElevenLabs (voice `EST9Ui6982FZPSi7gCHi`,
    model `eleven_flash_v2_5`) and sends as a Telegram voice bubble
    via `sendVoice`. Use the chat_id from the inbound message. Caps
    at 4000 chars to protect the Starter-tier ElevenLabs quota.

    ## Built-in conventions

    ### codex CLI
    The shell tool calls go through `codex`, which is shimmed to
    bypass bwrap (Talos kernel blocks unprivileged user namespaces).
    Network access is enabled and full env is inherited, so the
    skills above can reach their APIs.

    ### Model switching
    Default is `openai/gpt-5.5` (Mathias's ChatGPT subscription via
    codex CLI). Configured alternates:

    - `ollama/gemma4:26b` — local, quality, ~10 tok/s
    - `ollama/gemma4:e2b` — local, fast/small

    If Mathias asks to switch models ("use the small local one",
    "switch to gemma 26b", "go back to GPT"), run from the shell:

    ```bash
    openclaw models set <ref>     # e.g. ollama/gemma4:e2b
    openclaw models status        # confirm
    ```

    The change applies to subsequent agent turns. Mention which
    model you switched to and that further replies will use it.

  workspace-heartbeat.md: |
    # HEARTBEAT.md

    Scheduled, low-context wakeup. Token-cheap by design.

    Rules:
    - Only report items that are **truly new or changed** since the
      last heartbeat.
    - Don't invent tasks from old chat context. The heartbeat sees
      almost no history.
    - If nothing genuinely needs attention, reply `HEARTBEAT_OK` —
      that's the expected default, not a failure mode.
    - If you notice a skill is broken (network error, 4xx/5xx from
      mail / sure / paperless / ha), surface it once with the
      command + exit code, then stay quiet about it until the next
      change.
