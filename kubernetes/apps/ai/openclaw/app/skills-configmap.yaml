    # ARAG medical-bill status cross-reference

    Use this skill when the user asks whether a medical bill is reimbursed.

    Pipeline:

    1. **Find the bill in Paperless.**
       `paperless search "<provider or amount or month>" 10`
       Pick the most likely document and call `paperless get <id>` to extract
       amount, date, and correspondent.

    2. **Find the matching outflow in Sure.**
       `sure accounts` to identify the relevant account, then
       `sure transactions <id> <bill_date - 30d> <bill_date + 30d> 100`.
       Match on (amount within €1, payee, date proximity).

    3. **Check ARAG portal via the `browser` MCP server.**
       - Use the persisted session under
         `/home/node/.openclaw/browser-profiles/default`.
       - If the session is stale, navigate to `$ARAG_LOGIN_URL`, fill
         `$ARAG_USERNAME` and `$ARAG_PASSWORD`. If TOTP is required and
         `$ARAG_TOTP_SECRET` is set, generate the code with the standard
         RFC 6238 routine before submitting.
       - Navigate to the claims/bills section. Read the row matching the
         bill amount and date.

    4. **Return a structured answer:**
       ```json
       {
         "paperless_doc": {"id": ..., "title": ..., "date": ..., "amount": ...},
         "sure_txn":      {"id": ..., "date": ..., "amount": ..., "payee": ...},
         "arag_row":      {"status": "...", "reimbursed_amount": ..., "date": ...},
         "paid_out":      true/false,
         "reimbursed":    true/false
       }
       ```

    Read-only invariants:
    - No POST/PUT/PATCH/DELETE to Paperless, Sure, or HA.
    - Browser may only `navigate`, `fill` on whitelisted login fields,
      `click` on whitelisted selectors, `read_text`, `screenshot`.
    - Never submit ARAG forms other than login.

