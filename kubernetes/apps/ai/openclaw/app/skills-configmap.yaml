    #!/usr/bin/env python3
    """Home Assistant client. Read verbs are unrestricted; write verbs are
    gated by an explicit domain whitelist enforced in code.

    Read:
        ha state <entity_id>
        ha states [domain_filter]
        ha history <entity_id> [hours]
        ha areas
        ha devices

    Write (whitelisted domains only):
        ha call <domain>.<service> [entity_id] [json_data_on_stdin]

    The agent must confirm with the user BEFORE invoking `ha call`.
    See the SKILL.md for the protocol.
    """
    import json, os, subprocess, sys, urllib.parse, urllib.request

    BASE = os.environ["HA_URL"].rstrip("/")
    TOKEN = os.environ["HA_TOKEN"]
    HEADERS = {"Authorization": f"Bearer {TOKEN}", "Accept": "application/json"}

    # Whitelisted service-call domains for ha call. Inside these domains all
    # services are accepted (turn_on, toggle, set_temperature, etc.); the
    # blast radius is bounded by what HA itself exposes for that domain.
    WRITE_DOMAINS = {
        "light", "switch", "scene", "climate", "fan", "cover", "lock",
        "media_player", "vacuum", "button", "valve",
        "input_boolean", "input_number", "input_select", "input_text",
        "script", "notify",
    }
    # Explicitly blocked even if the user asks — these touch HA itself or
    # have effects beyond a single device.
    BLOCKED_DOMAINS = {
        "homeassistant",       # restart, reload_*, etc.
        "system_log",          # log fiddling
        "persistent_notification",  # spam
        "shell_command",       # arbitrary shell exec
        "logger",              # log-level changes
        "automation",          # config edits (trigger via script if needed)
        "group",
    }
    # Legacy guard for older verbs that meant "agent tried to mutate".
    LEGACY_BLOCKED_VERBS = {"service", "trigger", "fire", "set_state", "post", "put", "delete"}

    def _rest_get(path, params=None):
        url = f"{BASE}{path}"
        if params:
            url += "?" + urllib.parse.urlencode(params)
        req = urllib.request.Request(url, headers=HEADERS, method="GET")
        with urllib.request.urlopen(req, timeout=30) as r:
            return json.loads(r.read())

    def _rest_post(path, payload):
        url = f"{BASE}{path}"
        data = json.dumps(payload).encode()
        h = {**HEADERS, "Content-Type": "application/json"}
        req = urllib.request.Request(url, data=data, headers=h, method="POST")
        with urllib.request.urlopen(req, timeout=30) as r:
            body = r.read()
            return json.loads(body) if body else []

    def _hactl(*args):
        proc = subprocess.run(["hactl", *args], capture_output=True, text=True, timeout=30)
        if proc.returncode != 0:
            sys.stderr.write(proc.stderr)
            sys.exit(proc.returncode)
        return proc.stdout

    def state(entity_id):
        print(json.dumps(_rest_get(f"/api/states/{entity_id}"), indent=2))

    def states(domain_filter=None):
        data = _rest_get("/api/states")
        if domain_filter:
            data = [s for s in data if s["entity_id"].startswith(f"{domain_filter}.")]
        print(json.dumps(data, indent=2))

    def history(entity_id, hours=24):
        from datetime import datetime, timedelta, timezone
        start = (datetime.now(timezone.utc) - timedelta(hours=int(hours))).isoformat()
        path = f"/api/history/period/{urllib.parse.quote(start)}"
        print(json.dumps(_rest_get(path, {"filter_entity_id": entity_id}), indent=2))

    def areas():
        try:
            print(_hactl("get", "area"))
        except FileNotFoundError:
            sys.stderr.write("hactl not installed; HA REST has no public areas endpoint\n")
            sys.exit(1)

    def devices():
        try:
            print(_hactl("get", "device"))
        except FileNotFoundError:
            sys.stderr.write("hactl not installed; HA REST has no public devices endpoint\n")
            sys.exit(1)

    def call(domain_service, entity_id=None):
        """Invoke an HA service. Usage:
            ha call <domain>.<service> [entity_id]   # extra JSON via stdin
        Examples:
            ha call light.turn_on light.kitchen
            echo '{"brightness": 180}' | ha call light.turn_on light.kitchen
            ha call scene.turn_on scene.movie_night
        """
        if "." not in domain_service:
            sys.stderr.write("ha call expects <domain>.<service>, e.g. light.turn_on\n")
            sys.exit(2)
        domain, service = domain_service.split(".", 1)
        if domain in BLOCKED_DOMAINS:
            sys.stderr.write(f"refused: domain '{domain}' is permanently blocked (touches HA core / has wide blast radius)\n")
            sys.exit(3)
        if domain not in WRITE_DOMAINS:
            sys.stderr.write(
                f"refused: domain '{domain}' is not in the write whitelist. "
                f"Allowed: {sorted(WRITE_DOMAINS)}\n"
            )
            sys.exit(3)
        payload = {}
        if not sys.stdin.isatty():
            raw = sys.stdin.read().strip()
            if raw:
                try:
                    payload = json.loads(raw)
                except json.JSONDecodeError as e:
                    sys.stderr.write(f"ha call: invalid JSON on stdin: {e}\n")
                    sys.exit(2)
        if entity_id:
            payload.setdefault("entity_id", entity_id)
        result = _rest_post(f"/api/services/{domain}/{service}", payload)
        print(json.dumps({"called": f"{domain}.{service}", "payload": payload, "result": result}, indent=2))

    def main():
        if len(sys.argv) < 2:
            print(__doc__); sys.exit(2)
        verb = sys.argv[1].lower()
        if verb in LEGACY_BLOCKED_VERBS:
            sys.stderr.write(f"refused: '{verb}' is a legacy mutation verb — use `ha call <domain>.<service>` instead\n")
            sys.exit(3)
        dispatch = {"state": state, "states": states, "history": history,
                    "areas": areas, "devices": devices, "call": call}
        if verb not in dispatch:
            print(__doc__); sys.exit(2)
        dispatch[verb](*sys.argv[2:])

    if __name__ == "__main__":
        main()

