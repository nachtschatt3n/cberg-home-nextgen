---
# Read-only OpenClaw skills mounted at /home/node/.openclaw/skills/.
# Symlinked into PATH so the agent can shell out to them by name.
#
# Each skill:
#   - reads URLs/tokens from the openclaw-secret env vars
#   - constructs only GET requests (enforced in code, not just convention)
#   - emits JSON to stdout for the agent to consume
#
# Surfaces:
#   paperless   — search/get/download Paperless documents
#   sure        — accounts/transactions read + whitelisted writes
#                 (categorize / tag / note — confirm-first)
#   ha          — read entity state + whitelisted service calls
#                 (light/switch/scene/etc. — confirm-first)
#   mail        — Nextcloud Mail REST API: accounts / mailboxes / messages
#                 / body / thread / save-draft (fans out to GMX/iCloud/Gmail)
#   nc          — scoped read+write under Nextcloud /openclaw-drafts/
#   say         — synthesize text via ElevenLabs and send back through
#                 Telegram as a voice message (Opus/OGG) or audio (MP3)
#   pallet      — read-only access to the wood-pellet price monitor's
#                 Postgres DB: latest verdict, signal history, per-source
#                 prices, run logs.
#   arag-plan   — prompt template for the Paperless ↔ Sure ↔ ARAG flow
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-skills
  namespace: ai
data:
  paperless.py: |
    #!/usr/bin/env python3
    """Read-only Paperless-ngx client. Usage:
        paperless search "<query>" [limit]
        paperless get <id>
        paperless download <id> [out_path]
    """
    import json, os, sys, urllib.parse, urllib.request

    BASE = os.environ["PAPERLESS_URL"].rstrip("/")
    TOKEN = os.environ["PAPERLESS_TOKEN"]
    HEADERS = {"Authorization": f"Token {TOKEN}", "Accept": "application/json"}

    def _get(path, params=None):
        url = f"{BASE}{path}"
        if params:
            url += "?" + urllib.parse.urlencode(params)
        req = urllib.request.Request(url, headers=HEADERS, method="GET")
        with urllib.request.urlopen(req, timeout=30) as r:
            return r.read()

    def search(query, limit=10):
        data = _get("/api/documents/", {"query": query, "page_size": limit})
        body = json.loads(data)
        results = [
            {"id": d["id"], "title": d.get("title"), "created": d.get("created"),
             "correspondent": d.get("correspondent"), "tags": d.get("tags", [])}
            for d in body.get("results", [])
        ]
        print(json.dumps(results, indent=2))

    def get(doc_id):
        data = _get(f"/api/documents/{int(doc_id)}/")
        print(data.decode())

    def download(doc_id, out_path=None):
        data = _get(f"/api/documents/{int(doc_id)}/download/")
        out_path = out_path or f"/tmp/paperless-{int(doc_id)}.pdf"
        with open(out_path, "wb") as f:
            f.write(data)
        print(json.dumps({"id": int(doc_id), "path": out_path, "bytes": len(data)}))

    def main():
        if len(sys.argv) < 2:
            print(__doc__); sys.exit(2)
        verb = sys.argv[1]
        if verb == "search":
            search(sys.argv[2], int(sys.argv[3]) if len(sys.argv) > 3 else 10)
        elif verb == "get":
            get(sys.argv[2])
        elif verb == "download":
            download(sys.argv[2], sys.argv[3] if len(sys.argv) > 3 else None)
        else:
            print(__doc__); sys.exit(2)

    if __name__ == "__main__":
        main()

