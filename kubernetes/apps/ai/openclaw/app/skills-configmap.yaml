---
# Read-only OpenClaw skills mounted at /home/node/.openclaw/skills/.
# Symlinked into PATH so the agent can shell out to them by name.
#
# Each skill:
#   - reads URLs/tokens from the openclaw-secret env vars
#   - constructs only GET requests (enforced in code, not just convention)
#   - emits JSON to stdout for the agent to consume
#
# Surfaces:
#   paperless   — search/get/download Paperless documents
#   sure        — list accounts / read balances / read transactions
#   ha          — wraps `hactl` for Home Assistant state, history, areas
#   mail        — Nextcloud Mail REST API: accounts / mailboxes / messages
#                 / body / thread (fans out to GMX/iCloud/Gmail internally)
#   say         — synthesize text via ElevenLabs and send back through
#                 Telegram as a voice message (Opus/OGG) or audio (MP3)
#   arag-plan   — prompt template for the Paperless ↔ Sure ↔ ARAG flow
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-skills
  namespace: ai
data:
  paperless.py: |
    #!/usr/bin/env python3
    """Read-only Paperless-ngx client. Usage:
        paperless search "<query>" [limit]
        paperless get <id>
        paperless download <id> [out_path]
    """
    import json, os, sys, urllib.parse, urllib.request

    BASE = os.environ["PAPERLESS_URL"].rstrip("/")
    TOKEN = os.environ["PAPERLESS_TOKEN"]
    HEADERS = {"Authorization": f"Token {TOKEN}", "Accept": "application/json"}

    def _get(path, params=None):
        url = f"{BASE}{path}"
        if params:
            url += "?" + urllib.parse.urlencode(params)
        req = urllib.request.Request(url, headers=HEADERS, method="GET")
        with urllib.request.urlopen(req, timeout=30) as r:
            return r.read()

    def search(query, limit=10):
        data = _get("/api/documents/", {"query": query, "page_size": limit})
        body = json.loads(data)
        results = [
            {"id": d["id"], "title": d.get("title"), "created": d.get("created"),
             "correspondent": d.get("correspondent"), "tags": d.get("tags", [])}
            for d in body.get("results", [])
        ]
        print(json.dumps(results, indent=2))

    def get(doc_id):
        data = _get(f"/api/documents/{int(doc_id)}/")
        print(data.decode())

    def download(doc_id, out_path=None):
        data = _get(f"/api/documents/{int(doc_id)}/download/")
        out_path = out_path or f"/tmp/paperless-{int(doc_id)}.pdf"
        with open(out_path, "wb") as f:
            f.write(data)
        print(json.dumps({"id": int(doc_id), "path": out_path, "bytes": len(data)}))

    def main():
        if len(sys.argv) < 2:
            print(__doc__); sys.exit(2)
        verb = sys.argv[1]
        if verb == "search":
            search(sys.argv[2], int(sys.argv[3]) if len(sys.argv) > 3 else 10)
        elif verb == "get":
            get(sys.argv[2])
        elif verb == "download":
            download(sys.argv[2], sys.argv[3] if len(sys.argv) > 3 else None)
        else:
            print(__doc__); sys.exit(2)

    if __name__ == "__main__":
        main()

  sure.py: |
    #!/usr/bin/env python3
    """Read-only Sure client. Usage:
        sure accounts
        sure account <account_id>
        sure transactions [account_id] [from_iso] [to_iso] [limit]

    Auth: Sure uses an X-Api-Key header (see sure-moneymoney/src/sure-api.mjs).
    """
    import json, os, sys, urllib.parse, urllib.request

    BASE = os.environ["SURE_URL"].rstrip("/")
    TOKEN = os.environ["SURE_TOKEN"]
    HEADERS = {"X-Api-Key": TOKEN, "Accept": "application/json"}

    def _get(path, params=None):
        url = f"{BASE}{path}"
        if params:
            clean = {k: v for k, v in params.items() if v is not None}
            if clean:
                url += "?" + urllib.parse.urlencode(clean)
        req = urllib.request.Request(url, headers=HEADERS, method="GET")
        with urllib.request.urlopen(req, timeout=30) as r:
            return json.loads(r.read())

    def accounts():
        print(json.dumps(_get("/api/v1/accounts"), indent=2))

    def account(account_id):
        print(json.dumps(_get(f"/api/v1/accounts/{account_id}"), indent=2))

    def transactions(account_id=None, frm=None, to=None, limit=100):
        params = {"account_id": account_id, "from": frm, "to": to, "limit": limit}
        print(json.dumps(_get("/api/v1/transactions", params), indent=2))

    def main():
        if len(sys.argv) < 2:
            print(__doc__); sys.exit(2)
        verb = sys.argv[1]
        if verb == "accounts":
            accounts()
        elif verb == "account":
            account(sys.argv[2])
        elif verb == "transactions":
            transactions(sys.argv[2] if len(sys.argv) > 2 else None,
                         sys.argv[3] if len(sys.argv) > 3 else None,
                         sys.argv[4] if len(sys.argv) > 4 else None,
                         int(sys.argv[5]) if len(sys.argv) > 5 else 100)
        else:
            print(__doc__); sys.exit(2)

    if __name__ == "__main__":
        main()

  ha.py: |
    #!/usr/bin/env python3
    """Home Assistant client. Read verbs are unrestricted; write verbs are
    gated by an explicit domain whitelist enforced in code.

    Read:
        ha state <entity_id>
        ha states [domain_filter]
        ha history <entity_id> [hours]
        ha areas
        ha devices

    Write (whitelisted domains only):
        ha call <domain>.<service> [entity_id] [json_data_on_stdin]

    The agent must confirm with the user BEFORE invoking `ha call`.
    See the SKILL.md for the protocol.
    """
    import json, os, subprocess, sys, urllib.parse, urllib.request

    BASE = os.environ["HA_URL"].rstrip("/")
    TOKEN = os.environ["HA_TOKEN"]
    HEADERS = {"Authorization": f"Bearer {TOKEN}", "Accept": "application/json"}

    # Whitelisted service-call domains for ha call. Inside these domains all
    # services are accepted (turn_on, toggle, set_temperature, etc.); the
    # blast radius is bounded by what HA itself exposes for that domain.
    WRITE_DOMAINS = {
        "light", "switch", "scene", "climate", "fan", "cover", "lock",
        "media_player", "vacuum", "button", "valve",
        "input_boolean", "input_number", "input_select", "input_text",
        "script", "notify",
    }
    # Explicitly blocked even if the user asks — these touch HA itself or
    # have effects beyond a single device.
    BLOCKED_DOMAINS = {
        "homeassistant",       # restart, reload_*, etc.
        "system_log",          # log fiddling
        "persistent_notification",  # spam
        "shell_command",       # arbitrary shell exec
        "logger",              # log-level changes
        "automation",          # config edits (trigger via script if needed)
        "group",
    }
    # Legacy guard for older verbs that meant "agent tried to mutate".
    LEGACY_BLOCKED_VERBS = {"service", "trigger", "fire", "set_state", "post", "put", "delete"}

    def _rest_get(path, params=None):
        url = f"{BASE}{path}"
        if params:
            url += "?" + urllib.parse.urlencode(params)
        req = urllib.request.Request(url, headers=HEADERS, method="GET")
        with urllib.request.urlopen(req, timeout=30) as r:
            return json.loads(r.read())

    def _rest_post(path, payload):
        url = f"{BASE}{path}"
        data = json.dumps(payload).encode()
        h = {**HEADERS, "Content-Type": "application/json"}
        req = urllib.request.Request(url, data=data, headers=h, method="POST")
        with urllib.request.urlopen(req, timeout=30) as r:
            body = r.read()
            return json.loads(body) if body else []

    def _hactl(*args):
        proc = subprocess.run(["hactl", *args], capture_output=True, text=True, timeout=30)
        if proc.returncode != 0:
            sys.stderr.write(proc.stderr)
            sys.exit(proc.returncode)
        return proc.stdout

    def state(entity_id):
        print(json.dumps(_rest_get(f"/api/states/{entity_id}"), indent=2))

    def states(domain_filter=None):
        data = _rest_get("/api/states")
        if domain_filter:
            data = [s for s in data if s["entity_id"].startswith(f"{domain_filter}.")]
        print(json.dumps(data, indent=2))

    def history(entity_id, hours=24):
        from datetime import datetime, timedelta, timezone
        start = (datetime.now(timezone.utc) - timedelta(hours=int(hours))).isoformat()
        path = f"/api/history/period/{urllib.parse.quote(start)}"
        print(json.dumps(_rest_get(path, {"filter_entity_id": entity_id}), indent=2))

    def areas():
        try:
            print(_hactl("get", "area"))
        except FileNotFoundError:
            sys.stderr.write("hactl not installed; HA REST has no public areas endpoint\n")
            sys.exit(1)

    def devices():
        try:
            print(_hactl("get", "device"))
        except FileNotFoundError:
            sys.stderr.write("hactl not installed; HA REST has no public devices endpoint\n")
            sys.exit(1)

    def call(domain_service, entity_id=None):
        """Invoke an HA service. Usage:
            ha call <domain>.<service> [entity_id]   # extra JSON via stdin
        Examples:
            ha call light.turn_on light.kitchen
            echo '{"brightness": 180}' | ha call light.turn_on light.kitchen
            ha call scene.turn_on scene.movie_night
        """
        if "." not in domain_service:
            sys.stderr.write("ha call expects <domain>.<service>, e.g. light.turn_on\n")
            sys.exit(2)
        domain, service = domain_service.split(".", 1)
        if domain in BLOCKED_DOMAINS:
            sys.stderr.write(f"refused: domain '{domain}' is permanently blocked (touches HA core / has wide blast radius)\n")
            sys.exit(3)
        if domain not in WRITE_DOMAINS:
            sys.stderr.write(
                f"refused: domain '{domain}' is not in the write whitelist. "
                f"Allowed: {sorted(WRITE_DOMAINS)}\n"
            )
            sys.exit(3)
        payload = {}
        if not sys.stdin.isatty():
            raw = sys.stdin.read().strip()
            if raw:
                try:
                    payload = json.loads(raw)
                except json.JSONDecodeError as e:
                    sys.stderr.write(f"ha call: invalid JSON on stdin: {e}\n")
                    sys.exit(2)
        if entity_id:
            payload.setdefault("entity_id", entity_id)
        result = _rest_post(f"/api/services/{domain}/{service}", payload)
        print(json.dumps({"called": f"{domain}.{service}", "payload": payload, "result": result}, indent=2))

    def main():
        if len(sys.argv) < 2:
            print(__doc__); sys.exit(2)
        verb = sys.argv[1].lower()
        if verb in LEGACY_BLOCKED_VERBS:
            sys.stderr.write(f"refused: '{verb}' is a legacy mutation verb — use `ha call <domain>.<service>` instead\n")
            sys.exit(3)
        dispatch = {"state": state, "states": states, "history": history,
                    "areas": areas, "devices": devices, "call": call}
        if verb not in dispatch:
            print(__doc__); sys.exit(2)
        dispatch[verb](*sys.argv[2:])

    if __name__ == "__main__":
        main()

  mail.py: |
    #!/usr/bin/env python3
    """Mostly read-only Nextcloud Mail client. Talks to the NC Mail REST API,
    which fans out to all configured IMAP backends (GMX/iCloud/Gmail).

    Read verbs:
        mail accounts
        mail mailboxes <account_id>
        mail messages <mailbox_db_id> [limit]
        mail search <query> [account_id] [limit]
        mail body <message_id>          # plaintext body
        mail html <message_id>          # HTML body
        mail thread <message_id>        # full thread metadata
        mail source <message_id>        # raw RFC822

    Write verbs (whitelisted, drafts only):
        mail draft <account_id>         # JSON body from stdin:
                                        #   {"subject":"...", "body":"...",
                                        #    "to":"a@b,c@d", "cc":"", "bcc":"",
                                        #    "isHtml": true,
                                        #    "draftId": <existing-id-or-null>}
                                        # Saves to the Drafts mailbox via
                                        # POST /api/accounts/{id}/draft.
                                        # Does NOT send — outbox/send remain
                                        # blocked.
    """
    import base64, json, os, sys, urllib.parse, urllib.request

    BASE = os.environ["NEXTCLOUD_URL"].rstrip("/")
    USER = os.environ["NEXTCLOUD_USERNAME"]
    PASS = os.environ["NEXTCLOUD_PASSWORD"]
    AUTH = base64.b64encode(f"{USER}:{PASS}".encode()).decode()
    HEADERS = {
        "Authorization": f"Basic {AUTH}",
        "Accept": "application/json",
        "OCS-APIREQUEST": "true",
        "User-Agent": "openclaw-mail/1.0",
    }
    API = f"{BASE}/index.php/apps/mail/api"

    # Block every mutation verb except `draft` (whitelisted below).
    # send/outbox stay blocked so this skill cannot dispatch mail.
    BLOCKED = {"compose", "send", "delete", "move", "trash", "snooze",
               "flag", "tag", "mark", "outbox", "patch"}

    def _get(path, params=None):
        url = f"{API}{path}"
        if params:
            clean = {k: v for k, v in params.items() if v is not None}
            if clean:
                url += "?" + urllib.parse.urlencode(clean)
        req = urllib.request.Request(url, headers=HEADERS, method="GET")
        with urllib.request.urlopen(req, timeout=30) as r:
            ct = r.headers.get("Content-Type", "")
            body = r.read()
            if "application/json" in ct:
                return json.loads(body)
            return body.decode("utf-8", errors="replace")

    def _post(path, payload):
        url = f"{API}{path}"
        data = json.dumps(payload).encode()
        headers = {**HEADERS, "Content-Type": "application/json"}
        req = urllib.request.Request(url, data=data, headers=headers, method="POST")
        with urllib.request.urlopen(req, timeout=30) as r:
            ct = r.headers.get("Content-Type", "")
            body = r.read()
            if "application/json" in ct:
                return json.loads(body)
            return body.decode("utf-8", errors="replace")

    def accounts():
        out = []
        for a in _get("/accounts"):
            out.append({"id": a["id"], "email": a["emailAddress"],
                        "imap_host": a.get("imapHost"),
                        "imap_port": a.get("imapPort")})
        print(json.dumps(out, indent=2))

    def mailboxes(account_id):
        data = _get("/mailboxes", {"accountId": int(account_id)})
        out = []
        for m in data.get("mailboxes", []):
            out.append({
                "databaseId": m["databaseId"],
                "name": m.get("displayName") or m.get("name"),
                "specialRole": m.get("specialRole"),
                "unread": m.get("unread"),
            })
        print(json.dumps({"account": data.get("email"), "mailboxes": out}, indent=2))

    def messages(mailbox_db_id, limit=25):
        data = _get("/messages", {"mailboxId": int(mailbox_db_id), "limit": int(limit)})
        # Trim noisy fields
        slim = []
        for m in (data if isinstance(data, list) else data.get("messages", [])):
            slim.append({
                "id": m.get("databaseId") or m.get("id"),
                "subject": m.get("subject"),
                "from": [f.get("email") for f in (m.get("from") or [])],
                "date": m.get("dateInt") or m.get("sentAt"),
                "flags": m.get("flags"),
                "preview": (m.get("preview") or "")[:120],
            })
        print(json.dumps(slim, indent=2))

    def search(query, account_id=None, limit=25):
        params = {"query": query, "limit": int(limit)}
        if account_id:
            params["accountId"] = int(account_id)
        data = _get("/messages", params)
        print(json.dumps(data, indent=2))

    def body(message_id):
        print(json.dumps(_get(f"/messages/{int(message_id)}/body"), indent=2))

    def html(message_id):
        result = _get(f"/messages/{int(message_id)}/html")
        if isinstance(result, str):
            print(result)
        else:
            print(json.dumps(result, indent=2))

    def thread(message_id):
        print(json.dumps(_get(f"/messages/{int(message_id)}/thread"), indent=2))

    def source(message_id):
        result = _get(f"/messages/{int(message_id)}/source")
        if isinstance(result, str):
            print(result)
        else:
            print(json.dumps(result, indent=2))

    def draft(account_id):
        """Save (or update) a draft. JSON body read from stdin:
            {"subject": "...", "body": "...", "to": "a@b,c@d",
             "cc": "", "bcc": "", "isHtml": true, "draftId": null}
        Lands in the IMAP Drafts mailbox via accounts#draft. Does NOT send."""
        raw = sys.stdin.read()
        if not raw.strip():
            sys.stderr.write("mail draft: expected JSON body on stdin\n")
            sys.exit(2)
        try:
            payload = json.loads(raw)
        except json.JSONDecodeError as e:
            sys.stderr.write(f"mail draft: invalid JSON on stdin: {e}\n")
            sys.exit(2)
        # Defensive defaults — NC Mail requires all three recipient fields
        # to be present even if empty.
        body_payload = {
            "subject":   str(payload.get("subject", "")),
            "body":      str(payload.get("body", "")),
            "to":        str(payload.get("to", "")),
            "cc":        str(payload.get("cc", "")),
            "bcc":       str(payload.get("bcc", "")),
            "isHtml":    bool(payload.get("isHtml", True)),
        }
        if payload.get("draftId") is not None:
            body_payload["draftId"] = int(payload["draftId"])
        result = _post(f"/accounts/{int(account_id)}/draft", body_payload)
        print(json.dumps(result, indent=2))

    def main():
        if len(sys.argv) < 2:
            print(__doc__); sys.exit(2)
        verb = sys.argv[1].lower()
        if verb in BLOCKED:
            sys.stderr.write(f"refused: '{verb}' would mutate mail beyond drafts — blocked\n")
            sys.exit(3)
        dispatch = {
            "accounts": accounts, "mailboxes": mailboxes, "messages": messages,
            "search": search, "body": body, "html": html, "thread": thread,
            "source": source,
            "draft": draft,
        }
        if verb not in dispatch:
            print(__doc__); sys.exit(2)
        dispatch[verb](*sys.argv[2:])

    if __name__ == "__main__":
        main()

  arag-plan.md: |
    # ARAG medical-bill status cross-reference

    Use this skill when the user asks whether a medical bill is reimbursed.

    Pipeline:

    1. **Find the bill in Paperless.**
       `paperless search "<provider or amount or month>" 10`
       Pick the most likely document and call `paperless get <id>` to extract
       amount, date, and correspondent.

    2. **Find the matching outflow in Sure.**
       `sure accounts` to identify the relevant account, then
       `sure transactions <id> <bill_date - 30d> <bill_date + 30d> 100`.
       Match on (amount within €1, payee, date proximity).

    3. **Check ARAG portal via the `browser` MCP server.**
       - Use the persisted session under
         `/home/node/.openclaw/browser-profiles/default`.
       - If the session is stale, navigate to `$ARAG_LOGIN_URL`, fill
         `$ARAG_USERNAME` and `$ARAG_PASSWORD`. If TOTP is required and
         `$ARAG_TOTP_SECRET` is set, generate the code with the standard
         RFC 6238 routine before submitting.
       - Navigate to the claims/bills section. Read the row matching the
         bill amount and date.

    4. **Return a structured answer:**
       ```json
       {
         "paperless_doc": {"id": ..., "title": ..., "date": ..., "amount": ...},
         "sure_txn":      {"id": ..., "date": ..., "amount": ..., "payee": ...},
         "arag_row":      {"status": "...", "reimbursed_amount": ..., "date": ...},
         "paid_out":      true/false,
         "reimbursed":    true/false
       }
       ```

    Read-only invariants:
    - No POST/PUT/PATCH/DELETE to Paperless, Sure, or HA.
    - Browser may only `navigate`, `fill` on whitelisted login fields,
      `click` on whitelisted selectors, `read_text`, `screenshot`.
    - Never submit ARAG forms other than login.

  say.py: |
    #!/usr/bin/env python3
    """say — synthesize text via ElevenLabs and send through Telegram.

    Usage:
        say <chat_id> "<text>" [flags]
        echo "<text>" | say <chat_id> [flags]

    Flags:
        --audio              Send as audio file (MP3) instead of a voice
                             message (default is voice / Opus-OGG).
        --voice-id=<id>      Override ElevenLabs voiceId.

    Reads:
        ELEVENLABS_API_KEY   (env)
        bot token            from /home/node/.openclaw/openclaw.json
                             at channels.telegram.botToken
    """
    import json, os, subprocess, sys, tempfile, urllib.request, uuid

    OPENCLAW_CFG = "/home/node/.openclaw/openclaw.json"
    EL_BASE = "https://api.elevenlabs.io"
    EL_KEY = os.environ.get("ELEVENLABS_API_KEY", "")
    EL_MODEL = os.environ.get("OPENCLAW_TALK_MODEL", "eleven_flash_v2_5")
    EL_VOICE_DEFAULT = os.environ.get(
        "OPENCLAW_TALK_VOICE", "EST9Ui6982FZPSi7gCHi"
    )
    TG_BASE = "https://api.telegram.org"

    def _bot_token():
        with open(OPENCLAW_CFG) as f:
            cfg = json.load(f)
        token = cfg.get("channels", {}).get("telegram", {}).get("botToken", "")
        if not token:
            sys.stderr.write("say: telegram botToken not found in openclaw.json\n")
            sys.exit(2)
        return token

    def _synth_mp3(text, voice_id):
        url = f"{EL_BASE}/v1/text-to-speech/{voice_id}?output_format=mp3_44100_128"
        body = json.dumps({"text": text, "model_id": EL_MODEL}).encode()
        req = urllib.request.Request(
            url, data=body,
            headers={"xi-api-key": EL_KEY, "Content-Type": "application/json"},
            method="POST",
        )
        with urllib.request.urlopen(req, timeout=60) as r:
            return r.read()

    def _mp3_to_ogg_opus(mp3_bytes):
        with tempfile.NamedTemporaryFile(suffix=".mp3", delete=False) as tmp_in:
            tmp_in.write(mp3_bytes)
            in_path = tmp_in.name
        out_path = in_path.replace(".mp3", ".ogg")
        try:
            subprocess.run(
                ["ffmpeg", "-loglevel", "error", "-y",
                 "-i", in_path,
                 "-c:a", "libopus", "-b:a", "32k", "-ac", "1",
                 out_path],
                check=True,
            )
            with open(out_path, "rb") as f:
                return f.read()
        finally:
            for p in (in_path, out_path):
                try: os.unlink(p)
                except FileNotFoundError: pass

    def _telegram_send(method, chat_id, audio, filename, field):
        boundary = "----openclaw" + uuid.uuid4().hex
        parts = []
        parts.append(f"--{boundary}\r\n".encode())
        parts.append(b'Content-Disposition: form-data; name="chat_id"\r\n\r\n')
        parts.append(f"{chat_id}\r\n".encode())
        parts.append(f"--{boundary}\r\n".encode())
        parts.append(
            f'Content-Disposition: form-data; name="{field}"; filename="{filename}"\r\n'.encode()
        )
        parts.append(b"Content-Type: application/octet-stream\r\n\r\n")
        parts.append(audio)
        parts.append(f"\r\n--{boundary}--\r\n".encode())
        payload = b"".join(parts)
        url = f"{TG_BASE}/bot{_bot_token()}/{method}"
        req = urllib.request.Request(
            url, data=payload,
            headers={"Content-Type": f"multipart/form-data; boundary={boundary}"},
            method="POST",
        )
        with urllib.request.urlopen(req, timeout=60) as r:
            return json.loads(r.read())

    def main():
        if not EL_KEY:
            sys.stderr.write("say: ELEVENLABS_API_KEY not set\n"); sys.exit(2)
        if len(sys.argv) < 2:
            print(__doc__); sys.exit(2)
        chat_id = sys.argv[1]
        text = None
        voice_id = EL_VOICE_DEFAULT
        as_audio = False
        rest = sys.argv[2:]
        positional = []
        for a in rest:
            if a == "--audio":
                as_audio = True
            elif a.startswith("--voice-id="):
                voice_id = a.split("=", 1)[1]
            else:
                positional.append(a)
        if positional:
            text = " ".join(positional)
        else:
            text = sys.stdin.read()
        text = text.strip()
        if not text:
            sys.stderr.write("say: empty text — nothing to synthesize\n"); sys.exit(2)
        if len(text) > 4000:
            sys.stderr.write(
                f"say: refused — text length {len(text)} > 4000 chars "
                "(ElevenLabs character budget guard)\n"
            )
            sys.exit(3)
        mp3 = _synth_mp3(text, voice_id)
        if as_audio:
            result = _telegram_send("sendAudio", chat_id, mp3, "openclaw.mp3", "audio")
        else:
            ogg = _mp3_to_ogg_opus(mp3)
            result = _telegram_send("sendVoice", chat_id, ogg, "openclaw.ogg", "voice")
        print(json.dumps(result, indent=2))

    if __name__ == "__main__":
        main()

