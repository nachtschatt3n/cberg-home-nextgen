    #!/usr/bin/env python3
    """say — synthesize text via ElevenLabs and send through Telegram.

    Usage:
        say <chat_id> "<text>" [flags]
        echo "<text>" | say <chat_id> [flags]

    Flags:
        --audio              Send as audio file (MP3) instead of a voice
                             message (default is voice / Opus-OGG).
        --voice-id=<id>      Override ElevenLabs voiceId.

    Reads:
        ELEVENLABS_API_KEY   (env)
        bot token            from /home/node/.openclaw/openclaw.json
                             at channels.telegram.botToken
    """
    import json, os, subprocess, sys, tempfile, urllib.request, uuid

    OPENCLAW_CFG = "/home/node/.openclaw/openclaw.json"
    EL_BASE = "https://api.elevenlabs.io"
    EL_KEY = os.environ.get("ELEVENLABS_API_KEY", "")
    EL_MODEL = os.environ.get("OPENCLAW_TALK_MODEL", "eleven_flash_v2_5")
    EL_VOICE_DEFAULT = os.environ.get(
        "OPENCLAW_TALK_VOICE", "EST9Ui6982FZPSi7gCHi"
    )
    TG_BASE = "https://api.telegram.org"

    def _bot_token():
        with open(OPENCLAW_CFG) as f:
            cfg = json.load(f)
        token = cfg.get("channels", {}).get("telegram", {}).get("botToken", "")
        if not token:
            sys.stderr.write("say: telegram botToken not found in openclaw.json\n")
            sys.exit(2)
        return token

    def _synth_mp3(text, voice_id):
        url = f"{EL_BASE}/v1/text-to-speech/{voice_id}?output_format=mp3_44100_128"
        body = json.dumps({"text": text, "model_id": EL_MODEL}).encode()
        req = urllib.request.Request(
            url, data=body,
            headers={"xi-api-key": EL_KEY, "Content-Type": "application/json"},
            method="POST",
        )
        with urllib.request.urlopen(req, timeout=60) as r:
            return r.read()

    def _mp3_to_ogg_opus(mp3_bytes):
        with tempfile.NamedTemporaryFile(suffix=".mp3", delete=False) as tmp_in:
            tmp_in.write(mp3_bytes)
            in_path = tmp_in.name
        out_path = in_path.replace(".mp3", ".ogg")
        try:
            subprocess.run(
                ["ffmpeg", "-loglevel", "error", "-y",
                 "-i", in_path,
                 "-c:a", "libopus", "-b:a", "32k", "-ac", "1",
                 out_path],
                check=True,
            )
            with open(out_path, "rb") as f:
                return f.read()
        finally:
            for p in (in_path, out_path):
                try: os.unlink(p)
                except FileNotFoundError: pass

    def _telegram_send(method, chat_id, audio, filename, field):
        boundary = "----openclaw" + uuid.uuid4().hex
        parts = []
        parts.append(f"--{boundary}\r\n".encode())
        parts.append(b'Content-Disposition: form-data; name="chat_id"\r\n\r\n')
        parts.append(f"{chat_id}\r\n".encode())
        parts.append(f"--{boundary}\r\n".encode())
        parts.append(
            f'Content-Disposition: form-data; name="{field}"; filename="{filename}"\r\n'.encode()
        )
        parts.append(b"Content-Type: application/octet-stream\r\n\r\n")
        parts.append(audio)
        parts.append(f"\r\n--{boundary}--\r\n".encode())
        payload = b"".join(parts)
        url = f"{TG_BASE}/bot{_bot_token()}/{method}"
        req = urllib.request.Request(
            url, data=payload,
            headers={"Content-Type": f"multipart/form-data; boundary={boundary}"},
            method="POST",
        )
        with urllib.request.urlopen(req, timeout=60) as r:
            return json.loads(r.read())

    def main():
        if not EL_KEY:
            sys.stderr.write("say: ELEVENLABS_API_KEY not set\n"); sys.exit(2)
        if len(sys.argv) < 2:
            print(__doc__); sys.exit(2)
        chat_id = sys.argv[1]
        text = None
        voice_id = EL_VOICE_DEFAULT
        as_audio = False
        rest = sys.argv[2:]
        positional = []
        for a in rest:
            if a == "--audio":
                as_audio = True
            elif a.startswith("--voice-id="):
                voice_id = a.split("=", 1)[1]
            else:
                positional.append(a)
        if positional:
            text = " ".join(positional)
        else:
            text = sys.stdin.read()
        text = text.strip()
        if not text:
            sys.stderr.write("say: empty text — nothing to synthesize\n"); sys.exit(2)
        if len(text) > 4000:
            sys.stderr.write(
                f"say: refused — text length {len(text)} > 4000 chars "
                "(ElevenLabs character budget guard)\n"
            )
            sys.exit(3)
        mp3 = _synth_mp3(text, voice_id)
        if as_audio:
            result = _telegram_send("sendAudio", chat_id, mp3, "openclaw.mp3", "audio")
        else:
            ogg = _mp3_to_ogg_opus(mp3)
            result = _telegram_send("sendVoice", chat_id, ogg, "openclaw.ogg", "voice")
        print(json.dumps(result, indent=2))

    if __name__ == "__main__":
        main()

