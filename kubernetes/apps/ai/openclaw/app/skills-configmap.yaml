  skill-sure.md: |
    ---
    name: sure
    description: Access to the user's Sure (Maybe-Finance fork) — accounts, balances, transactions, plus whitelisted writes (set category, tags, notes on a transaction; flip income↔expense classification when an import got the sign wrong). Use when the user asks about money, balances, recent spending, to cross-reference a bill with a payment, or to clean up uncategorised/mis-classified transactions. Confirm before any write.
    user-invocable: true
    ---

    # Sure

    Mostly-read finance client; can categorise + tag + annotate transactions
    with explicit user confirmation.

    ## Read verbs

    | Command | Purpose |
    | --- | --- |
    | `sure accounts` | List accounts (balance, currency, classification). |
    | `sure account <account_id>` | Detail for one account. |
    | `sure transactions [account_id] [from_iso] [to_iso] [limit]` | List transactions (default 100). |
    | `sure transaction <txn_id>` | Detail for one transaction (use before any write). |
    | `sure categories` | Available categories (id + name). |
    | `sure tags` | Available tags (often empty). |

    Date format is ISO `YYYY-MM-DD`.

    ## Write verbs (CONFIRM FIRST)

    | Command | Purpose |
    | --- | --- |
    | `sure categorize <txn_id> <category_id>` | Assign a category. |
    | `sure tag <txn_id> <tag_id>[,<tag_id>...]` | Replace the transaction's tags. Empty string clears tags. |
    | `sure note <txn_id>` | Replace `notes` (body from stdin). |
    | `sure reclassify <txn_id> <income\|expense>` | Flip income↔expense when the bank import got the sign wrong (see below). |

    The skill PATCH-es `/api/v1/transactions/:id` with a strict
    whitelist: only `category_id`, `tag_ids`, `notes` are accepted in
    the payload. Amount, date, account_id, deletes — all impossible
    from here. The one exception is `reclassify`, which sends
    `nature` + the existing `|amount|` so Sure's server flips the
    sign; the magnitude is preserved, never user-chosen.

    ### Reclassify (income ↔ expense)

    Sure has no editable `classification` field — it's derived from
    the amount sign (`amount.negative? → income, positive → expense`).
    Some bank imports occasionally come in with the wrong sign, e.g.
    a healthcare reimbursement payout to ARAG showing as `income`.

    When the user reports a wrong income/expense classification:

    1. `sure transaction <id>` to confirm payee, amount, current
       `classification`, current `category`.
    2. Confirm in chat: *"The 2026-05-22 ARAG €256.45 row is marked
       `income` but it's a payment out — flip to `expense`?"*
    3. On a yes: `sure reclassify <id> expense`.
    4. The skill returns `classification_before / classification_after`
       and `success: true`. Magnitude is unchanged.

    Don't reclassify *anything* without explicit confirmation — many
    "income-looking" rows are genuine income (e.g. salaries, Kindergeld,
    teaching income, refunds). Ask before flipping.

    ### Protocol — always confirm before writing

    1. `sure transaction <id>` to load the current state if you don't
       already have it (date, amount, payee, current category, notes).
    2. If categorising: `sure categories` once to discover ids; cache
       in the session.
    3. Show Mathias the proposed change in chat as plain text, e.g.
       *"I'll categorise the 2026-05-22 Frankfurt International School
       income (€5,997.17) under `Income` (6a501ef5-…). OK?"*
    4. Wait for an affirmative ("yes", "go", "do it", 👍). Don't infer
       consent from the original "categorise my transactions" intent
       alone — each PATCH is a separate confirmation.
    5. Run the command, print the returned category/tag/notes, and
       summarise.
    6. Batch hint: if Mathias asks "categorise these 10 transactions",
       it's fine to confirm the whole batch once ("these 10 → these
       categories, OK?") rather than 10 separate yeses. But still show
       the planned mapping before executing.

    ## What stays blocked
    - Editing the magnitude of `amount` (reclassify only sends the
      existing absolute value back).
    - Editing date or account.
    - Deleting transactions.
    - Moving transactions between accounts.
    - Creating new transactions (the MoneyMoney sync handles that).

  skill-nc.md: |
    ---
    name: nc
    description: Scoped read/write to a Nextcloud drafts folder (/openclaw-drafts/). Use when the user asks you to save a note, draft document, summary, meeting minutes, or scratch artifact for later review. The scope is enforced in code — you cannot escape this folder.
    user-invocable: true
    ---

    # Nextcloud Drafts

    A safe scratchpad in the user's Nextcloud, mounted at
    `/openclaw-drafts/`. Use it whenever you want to persist text that
    Mathias should review later in the Nextcloud Files UI.

    ## Verbs

    | Command | Purpose |
    | --- | --- |
    | `nc list [subpath]` | List files in the drafts folder (or a subfolder). |
    | `nc read <path>` | Read a file's content to stdout. |
    | `nc write <path>` | Write/overwrite a file (content from stdin). |
    | `nc mkdir <path>` | Create a sub-folder. |
    | `nc rename <old> <new>` | Move/rename within the folder. |
    | `nc delete <path>` | Delete a file/folder (CONFIRM FIRST). |

    All paths are relative to `/openclaw-drafts/`. Absolute paths and
    `..` traversal are stripped by the skill. There's no way to write
    to other Nextcloud folders from here.

    ## Conventions

    - **Naming**: prefer `YYYY-MM-DD-<topic>.md` for date-anchored notes,
      `<topic>.md` for evergreen ones, and a subfolder per topic if
      things multiply (`meetings/`, `summaries/`, `recipes/`, etc.).
    - **Format**: Markdown unless the user specifies otherwise. Add a
      one-line `# Title` and source/timestamp footer so Mathias can
      tell at a glance what it is.
    - **Writes are auto-OK without explicit confirmation** for the
      drafts folder — the whole point is a low-friction scratchpad.
      `delete` is the exception; always confirm before deleting.
    - **Don't dump huge payloads.** Summaries of long mail threads or
      multi-source research belong here, not raw API dumps. If you
      need to persist a raw blob, mention the size first.

    ## Typical flows

    - "Take notes on what we just discussed" →
      `nc write meetings/2026-05-23-discord-debug.md` with markdown
      bullet summary, then tell Mathias the file path.
    - "Save this email as a doc" →
      `mail body <id>` → summarise → `nc write 2026-05-23-apple-invoice.md`.
    - "What was in my drafts from last week?" →
      `nc list` to inventory, then `nc read <path>` on interesting ones.
    - "Delete the old shopping list" → propose `nc delete shopping.md`,
      wait for "yes", then run.

    ## Blast radius
    Bounded to `/openclaw-drafts/`. The agent cannot:
    - Write to `Documents/`, `Photos/`, or any other Nextcloud folder.
    - Share files publicly.
    - Modify Nextcloud Mail / Calendar / Contacts.
    - Touch user files outside the drafts scope.

  skill-pallet.md: |
    ---
    name: pallet
    description: Read-only access to the wood-pellet price-monitor database. Surfaces the latest BUY/HOLD verdict, composite score, local vs national price (€/t), per-source prices, signal history, and weather (heating-degree-days). Use whenever Mathias asks about pellet prices, "should I buy pellets now", or how the heating-fuel market is doing.
    user-invocable: true
    ---

    # Pellet Price Monitor

    A cronjob in `home-automation` scrapes ~10 sources twice a day
    (08:00 and 20:00 Europe/Berlin) — heizpellets24, esyoil, holzkurier,
    DWD weather degree-days, etc. — and writes to a Postgres `pellets`
    DB. This skill is the agent's read-only window into that DB.

    PLZ is `65520` (Bad Camberg), reference amount 6000 kg (~one
    delivery). All prices in €/t.

    ## Verbs

    | Command | Purpose |
    | --- | --- |
    | `pallet status` | Latest verdict + local/national price + delta + composite score. The default for "should I buy pellets now". |
    | `pallet history [days=14]` | Recent verdict + price trajectory. |
    | `pallet signal <run_id>` | Full inputs/rationale of one specific run. |
    | `pallet prices [days=7] [source]` | Raw price observations, optionally filtered to one source. |
    | `pallet runs [limit=10]` | List recent scrape runs (status, source count). |
    | `pallet sources` | Latest price per source (freshness check). |
    | `pallet weather [days=14]` | Heating-degree-day history. |

    ## Verdicts

    The monitor outputs `verdict ∈ {BUY, HOLD, SELL, WATCH}` with a
    composite score 0–100 (higher = more pressure to buy). Recent
    reads have been **HOLD** at composite ~43, meaning prices are
    sideways and no strong signal either way.

    ## Loop: "should I buy pellets?"

    1. `pallet status` → read the verdict + composite + delta_1w.
    2. If the local price is meaningfully below national avg (e.g.
       >5€/t lower) and delta_1w is also negative, mention that as
       supporting context.
    3. If verdict is BUY, recommend going ahead. If HOLD, explain why
       (composite, key inputs from `rationale`). If WATCH/SELL, advise
       waiting.
    4. Offer to look up `pallet signal <run_id>` for the deeper inputs
       breakdown if Mathias wants the reasoning behind the verdict.

    ## Read-only invariants

    - Every cursor is a SELECT. No INSERT/UPDATE/DELETE statements are
      issued by this skill — the cronjob is the only writer.
    - Don't try to start an unscheduled scrape from here. If Mathias
      wants fresh data, point him at `kubectl create job --from=
      cronjob/pallet-price-monitor pallet-now -n home-automation` and
      let him run it.
    ---
    name: telegram-voice
    description: Send a Telegram voice message (Opus/OGG) or audio file (MP3) synthesized via ElevenLabs. Use whenever the user asks you to "say it back", "voice this", "read it out loud", "send a voice note", or otherwise wants audio delivered through Telegram instead of just text.
    user-invocable: false
    ---

    # Telegram Voice

    Synthesize text via ElevenLabs and post it through the Telegram Bot API
    as a voice message (or audio file). Invoke the `say` CLI.

    ## Invocation

    The chat_id is the Telegram user/chat id you received with the inbound
    message — it shows up in your harness context (`chatId=...`). For DMs
    that's the user's Telegram id.

    ```bash
    # Preferred: pipe the text via stdin (no shell-quoting pitfalls)
    echo "your reply here" | say <chat_id>

    # Or pass as a positional arg
    say <chat_id> "your reply here"
    ```

    Flags:

    | Flag | Effect |
    | --- | --- |
    | _(default)_ | `sendVoice` — Opus/OGG voice bubble with waveform. |
    | `--audio` | `sendAudio` — MP3 file, displayed as track with title/duration. |
    | `--voice-id=<id>` | Override ElevenLabs voiceId for this call. |

    Returns Telegram's JSON envelope (`{ok: true, result: {...}}`) on
    success — confirm to the user that the voice note was sent.

    ## When to use it

    - User explicitly asks for audio: "say that back", "voice this",
      "send as voice", "read it aloud".
    - User is on the move and prefers listening — only when they've
      asked or you have strong signal (don't surprise them with voice).
    - For long replies (> ~1 min audio) prefer `--audio` so it appears
      as a file with duration metadata rather than a voice bubble.

    ## Constraints

    - ElevenLabs Starter tier ≈ 30k chars / month — track usage; don't
      voice extremely long messages by default.
    - Hard cap in the skill: refuses text over 4,000 chars (exit 3).
    - Plain text only — no SSML.
    - Always preserve the regular text reply too unless the user
      specifically said "voice only". Default: send text reply first,
      then `say` as a follow-up so they have both.

  skill-home-assistant.md: |
    ---
    name: home-assistant
    description: Read and (with confirmation) control the user's Home Assistant — entity states, device/area inventory, history, plus whitelisted service calls (turn lights on/off, set scenes, adjust climate, run scripts). Use when the user asks about smart home state or wants to control devices.
    user-invocable: true
    ---

    # Home Assistant

    Two complementary CLIs are on PATH:

    | CLI | Use for |
    | --- | --- |
    | `ha` (Python wrapper) | Fast REST queries + whitelisted service calls. |
    | `hactl` (kubectl-style) | Richer read queries — devices, sensors, automations, dashboards. |

    ## Read verbs (`ha`)

    | Command | Purpose |
    | --- | --- |
    | `ha state <entity_id>` | Current state + attributes for one entity. |
    | `ha states [domain_filter]` | All states, optionally filtered (e.g. `ha states light`). |
    | `ha history <entity_id> [hours]` | State changes over the last N hours (default 24). |
    | `ha areas` | Area inventory (via `hactl`). |
    | `ha devices` | Device inventory (via `hactl`). |

    ## Write verb (`ha call`) — CONFIRM FIRST

    ```
    ha call <domain>.<service> [entity_id]    # extra JSON via stdin
    ```

    **Whitelisted domains** (everything else is refused with exit 3):

    `light`, `switch`, `scene`, `climate`, `fan`, `cover`, `lock`,
    `media_player`, `vacuum`, `button`, `valve`, `input_boolean`,
    `input_number`, `input_select`, `input_text`, `script`, `notify`.

    **Permanently blocked** (touches HA core / wide blast radius):

    `homeassistant.*`, `system_log.*`, `persistent_notification.*`,
    `shell_command.*`, `logger.*`, `automation.*` (config edits;
    trigger via `script` if you need to), `group.*`.

    ### Protocol — always confirm before invoking `ha call`

    1. Resolve the entity (use `ha states light` if you need to find it).
    2. Show Mathias the proposed command in chat as plain text, e.g.
       `ha call light.turn_on light.kitchen` or
       `echo '{"brightness":200}' | ha call light.turn_on light.kitchen`.
    3. Wait for an affirmative reply ("yes", "go", "do it", a 👍, etc.).
       Don't infer consent from the original "turn on the lights" request
       alone — the user must approve the specific command you're about to
       run. (Idiomatic exception: if Mathias says "just do it" or
       "yes go ahead and skip confirms for lights tonight", honour that
       within the same session.)
    4. Execute the command, then summarise the result. If HA returned an
       array of changed states (it does for turn_on/off), show which
       entities flipped and to what.
    5. If anything looks wrong (entity not found, service unavailable,
       state didn't change), surface it; don't silently retry.

    ### Examples

    - "Turn on the kitchen light" →
      1. `ha states light` to find `light.kitchen_*`.
      2. Propose `ha call light.turn_on light.kitchen_main`.
      3. Wait for "yes".
      4. Run; confirm new state.

    - "Set the living room to movie mode" →
      1. `ha states scene` to find `scene.movie_*`.
      2. Propose `ha call scene.turn_on scene.movie_night`.
      3. Wait for "yes".
      4. Run.

    - "Dim the bedroom to 20%" →
      1. Propose `echo '{"brightness_pct":20}' | ha call light.turn_on light.bedroom`.
      2. Wait for "yes".

    ## `hactl` (read-only by convention)

    Use for richer inventory queries that the HA REST API doesn't expose
    nicely:

    - `hactl get devices` — device list with manufacturer/area.
    - `hactl get sensors [keyword]` — sensor lookup.
    - `hactl get automations` — list automations.
    - `hactl get dashboards` — Lovelace dashboards.

    `hactl` *can* mutate HA (it's a full admin CLI) but this skill uses
    it only for read queries. Don't shell out to `hactl call` / similar
    write verbs — go through `ha call` instead so the whitelist applies.

