    #!/usr/bin/env python3
    """Nextcloud drafts folder — scope-locked read/write.

    The agent can read, create, and update files under
    /openclaw-drafts/ in the user's Nextcloud. All other paths are
    refused in code — there's no way to escape the folder.

    Usage:
        nc list [subpath]              # list files/folders (default: root)
        nc read <path>                 # read a file's content
        nc write <path>                # write file (content from stdin)
        nc mkdir <path>                # create a sub-folder
        nc rename <old> <new>          # move/rename within the folder
        nc delete <path>               # delete file/folder (CONFIRM FIRST)

    All paths are relative to /openclaw-drafts/. Absolute paths and
    `..` traversal are stripped.
    """
    import base64, os, sys, urllib.parse, urllib.request, xml.etree.ElementTree as ET

    BASE = os.environ["NEXTCLOUD_URL"].rstrip("/")
    USER = os.environ["NEXTCLOUD_USERNAME"]
    PASS = os.environ["NEXTCLOUD_PASSWORD"]
    AUTH = base64.b64encode(f"{USER}:{PASS}".encode()).decode()
    ROOT = f"/remote.php/dav/files/{USER}/openclaw-drafts"

    HEADERS = {
        "Authorization": f"Basic {AUTH}",
        "User-Agent": "openclaw-nc/1.0",
    }

    def _safe_path(rel):
        rel = (rel or "").strip().lstrip("/")
        parts = [p for p in rel.split("/") if p not in ("", ".", "..")]
        if any(p.startswith("..") for p in parts):
            sys.stderr.write("nc: path traversal blocked\n"); sys.exit(3)
        return "/".join(parts)

    def _url(rel):
        rel = _safe_path(rel)
        return f"{BASE}{ROOT}/{urllib.parse.quote(rel)}" if rel else f"{BASE}{ROOT}/"

    def _req(method, rel, data=None, extra_headers=None, timeout=30):
        h = dict(HEADERS)
        if extra_headers: h.update(extra_headers)
        req = urllib.request.Request(_url(rel), data=data, headers=h, method=method)
        try:
            with urllib.request.urlopen(req, timeout=timeout) as r:
                return r.status, r.read()
        except urllib.error.HTTPError as e:
            return e.code, e.read()

    def list_(subpath=""):
        body = (
            '<?xml version="1.0" encoding="UTF-8"?>'
            '<d:propfind xmlns:d="DAV:"><d:prop>'
            '<d:displayname/><d:getcontentlength/><d:getlastmodified/><d:resourcetype/>'
            '</d:prop></d:propfind>'
        )
        status, raw = _req("PROPFIND", subpath, data=body.encode(),
                           extra_headers={"Depth": "1", "Content-Type": "application/xml"})
        if status not in (207, 200):
            sys.stderr.write(f"nc list: HTTP {status}\n{raw.decode(errors='replace')[:300]}\n")
            sys.exit(1)
        ns = {"d": "DAV:"}
        rows = []
        # Strip the prefix matching our root so we emit relative paths.
        root_prefix = ROOT
        for resp in ET.fromstring(raw).findall("d:response", ns):
            href = resp.find("d:href", ns).text or ""
            href_decoded = urllib.parse.unquote(href)
            rel = href_decoded.replace(root_prefix, "", 1).lstrip("/")
            if rel == "":  # the folder itself
                continue
            prop = resp.find("d:propstat/d:prop", ns)
            is_dir = prop.find("d:resourcetype/d:collection", ns) is not None
            size = prop.findtext("d:getcontentlength", default="", namespaces=ns)
            mtime = prop.findtext("d:getlastmodified", default="", namespaces=ns)
            rows.append({"path": rel.rstrip("/"), "type": "dir" if is_dir else "file",
                         "size": int(size) if size else None, "mtime": mtime})
        import json; print(json.dumps(rows, indent=2))

    def read(path):
        status, raw = _req("GET", path)
        if status != 200:
            sys.stderr.write(f"nc read {path}: HTTP {status}\n"); sys.exit(1)
        sys.stdout.buffer.write(raw)

    def write(path):
        body = sys.stdin.buffer.read()
        status, raw = _req("PUT", path, data=body,
                           extra_headers={"Content-Type": "application/octet-stream"})
        if status not in (200, 201, 204):
            sys.stderr.write(f"nc write {path}: HTTP {status}\n{raw.decode(errors='replace')[:300]}\n"); sys.exit(1)
        print(f'{{"path":"{path}","bytes":{len(body)},"http":{status}}}')

    def mkdir(path):
        status, raw = _req("MKCOL", path)
        if status not in (201, 405):  # 405 = already exists
            sys.stderr.write(f"nc mkdir {path}: HTTP {status}\n"); sys.exit(1)
        print(f'{{"path":"{path}","created":{status==201},"http":{status}}}')

    def rename(old, new):
        new_safe = _safe_path(new)
        h = dict(HEADERS)
        h["Destination"] = f"{BASE}{ROOT}/{urllib.parse.quote(new_safe)}"
        status, raw = _req("MOVE", old, extra_headers=h)
        if status not in (201, 204):
            sys.stderr.write(f"nc rename {old} -> {new}: HTTP {status}\n"); sys.exit(1)
        print(f'{{"from":"{old}","to":"{new}","http":{status}}}')

    def delete(path):
        status, raw = _req("DELETE", path)
        if status not in (204, 404):
            sys.stderr.write(f"nc delete {path}: HTTP {status}\n"); sys.exit(1)
        print(f'{{"path":"{path}","deleted":{status==204},"http":{status}}}')

    def main():
        if len(sys.argv) < 2:
            print(__doc__); sys.exit(2)
        verb = sys.argv[1].lower()
        dispatch = {
            "list":   lambda: list_(sys.argv[2] if len(sys.argv) > 2 else ""),
            "read":   lambda: read(sys.argv[2]),
            "write":  lambda: write(sys.argv[2]),
            "mkdir":  lambda: mkdir(sys.argv[2]),
            "rename": lambda: rename(sys.argv[2], sys.argv[3]),
            "delete": lambda: delete(sys.argv[2]),
        }
        if verb not in dispatch:
            print(__doc__); sys.exit(2)
        dispatch[verb]()

    if __name__ == "__main__":
        main()

