    #!/usr/bin/env python3
    """Read-only wood-pellet price-monitor client.

    The pallet-price-monitor cronjob (home-automation namespace) scrapes
    ~10 sources twice daily and writes to Postgres. This skill queries
    that DB for the agent.

    Usage:
        pallet status                       # latest verdict + key prices
        pallet history [days=14]            # signal trajectory
        pallet signal <run_id>              # full inputs+rationale of one run
        pallet prices [days=7] [source]     # raw price observations
        pallet runs [limit=10]              # recent scrape runs
        pallet sources                      # per-source freshness
        pallet weather [days=14]            # heating-degree-day history

    Read-only: every cursor is a SELECT; no INSERT/UPDATE/DELETE issued.
    """
    import json, os, sys
    try:
        import pg8000.dbapi as pg
    except ImportError:
        sys.stderr.write("pallet: pg8000 not installed; reinstall via `pip install --user pg8000`\n")
        sys.exit(1)

    CONN = dict(
        host=os.environ["PELLET_PG_HOST"],
        port=int(os.environ.get("PELLET_PG_PORT", "5432")),
        database=os.environ["PELLET_PG_DB"],
        user=os.environ["PELLET_PG_USER"],
        password=os.environ["PELLET_PG_PASSWORD"],
    )

    def _q(sql, args=()):
        with pg.connect(**CONN) as conn:
            cur = conn.cursor()
            cur.execute(sql, args)
            cols = [d[0] for d in cur.description] if cur.description else []
            rows = [dict(zip(cols, r)) for r in cur.fetchall()]
            return rows

    def _emit(obj):
        def default(o):
            from datetime import datetime, date
            from decimal import Decimal
            if isinstance(o, (datetime, date)):
                return o.isoformat()
            if isinstance(o, Decimal):
                return float(o)
            return str(o)
        print(json.dumps(obj, indent=2, default=default))

    def status():
        rows = _q("""
            SELECT s.run_id, s.computed_at, s.verdict, s.composite_score,
                   s.spot_score, s.structural_score,
                   s.local_price_eur_per_t, s.national_avg_eur_per_t,
                   s.delta_1w, s.delta_1m, s.delta_3m, s.rationale,
                   r.status AS run_status
            FROM signals s JOIN runs r ON r.id = s.run_id
            ORDER BY s.run_id DESC LIMIT 1
        """)
        _emit(rows[0] if rows else {})

    def history(days=14):
        rows = _q("""
            SELECT run_id, computed_at, verdict, composite_score,
                   local_price_eur_per_t, national_avg_eur_per_t,
                   delta_1w
            FROM signals
            WHERE computed_at > now() - (%s || ' days')::interval
            ORDER BY computed_at DESC
        """, (str(int(days)),))
        _emit(rows)

    def signal(run_id):
        rows = _q("""
            SELECT s.*, r.started_at, r.status AS run_status
            FROM signals s JOIN runs r ON r.id = s.run_id
            WHERE s.run_id = %s
        """, (int(run_id),))
        _emit(rows[0] if rows else {})

    def prices(days=7, source=None):
        if source:
            rows = _q("""
                SELECT observed_at, source_id, price_eur_per_t, plz, amount_kg, raw
                FROM prices
                WHERE observed_at > now() - (%s || ' days')::interval
                  AND source_id = %s
                ORDER BY observed_at DESC
                LIMIT 200
            """, (str(int(days)), source))
        else:
            rows = _q("""
                SELECT observed_at, source_id, price_eur_per_t, plz, amount_kg
                FROM prices
                WHERE observed_at > now() - (%s || ' days')::interval
                ORDER BY observed_at DESC
                LIMIT 200
            """, (str(int(days)),))
        _emit(rows)

    def runs(limit=10):
        rows = _q("""
            SELECT id, started_at, finished_at, status,
                   array_length(sources_run, 1) AS source_count
            FROM runs ORDER BY id DESC LIMIT %s
        """, (int(limit),))
        _emit(rows)

    def sources():
        rows = _q("""
            SELECT DISTINCT ON (source_id)
                   source_id, observed_at, price_eur_per_t
            FROM prices
            ORDER BY source_id, observed_at DESC
        """)
        _emit(rows)

    def weather(days=14):
        rows = _q("""
            SELECT observed_at, station_id, hdd_value, raw
            FROM weather
            WHERE observed_at > now() - (%s || ' days')::interval
            ORDER BY observed_at DESC LIMIT 200
        """, (str(int(days)),))
        _emit(rows)

    def main():
        if len(sys.argv) < 2:
            print(__doc__); sys.exit(2)
        verb = sys.argv[1].lower()
        dispatch = {
            "status": status, "history": history, "signal": signal,
            "prices": prices, "runs": runs, "sources": sources,
            "weather": weather,
        }
        if verb not in dispatch:
            print(__doc__); sys.exit(2)
        dispatch[verb](*sys.argv[2:])

    if __name__ == "__main__":
        main()

