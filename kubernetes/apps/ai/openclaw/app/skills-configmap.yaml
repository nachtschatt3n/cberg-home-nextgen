    #!/usr/bin/env python3
    """Mostly read-only Nextcloud Mail client. Talks to the NC Mail REST API,
    which fans out to all configured IMAP backends (GMX/iCloud/Gmail).

    Read verbs:
        mail accounts
        mail mailboxes <account_id>
        mail messages <mailbox_db_id> [limit]
        mail search <query> [account_id] [limit]
        mail body <message_id>          # plaintext body
        mail html <message_id>          # HTML body
        mail thread <message_id>        # full thread metadata
        mail source <message_id>        # raw RFC822

    Write verbs (whitelisted, drafts only):
        mail attach <file-or-url>       # uploads to NC Mail local attachments
                                        # store; prints {"id":<int>,
                                        # "fileName":..., "mimeType":...}.
                                        # Source: local path OR http(s) URL.
        mail draft <account_id>         # JSON body from stdin:
                                        #   {"subject":"...", "body":"...",
                                        #    "to":"a@b,c@d", "cc":"", "bcc":"",
                                        #    "isHtml": true,
                                        #    "draftId": <existing-id-or-null>,
                                        #    "attachments": [<id>, <id>...] }
                                        # No attachments: lands in IMAP Drafts
                                        # via POST /api/accounts/{id}/draft.
                                        # With attachments: routes through
                                        # POST /api/outbox (sendAt=null so
                                        # the message STAYS in the outbox
                                        # for review — never auto-sends).
                                        # Does NOT send — outbox/send remain
                                        # blocked.
    """
    import base64, json, mimetypes, os, sys, urllib.error, urllib.parse, urllib.request, uuid

    BASE = os.environ["NEXTCLOUD_URL"].rstrip("/")
    USER = os.environ["NEXTCLOUD_USERNAME"]
    PASS = os.environ["NEXTCLOUD_PASSWORD"]
    AUTH = base64.b64encode(f"{USER}:{PASS}".encode()).decode()
    HEADERS = {
        "Authorization": f"Basic {AUTH}",
        "Accept": "application/json",
        "OCS-APIREQUEST": "true",
        "User-Agent": "openclaw-mail/1.0",
    }
    API = f"{BASE}/index.php/apps/mail/api"

    # Block every mutation verb except `draft` (whitelisted below).
    # send/outbox stay blocked so this skill cannot dispatch mail.
    BLOCKED = {"compose", "send", "delete", "move", "trash", "snooze",
               "flag", "tag", "mark", "outbox", "patch"}

    def _get(path, params=None):
        url = f"{API}{path}"
        if params:
            clean = {k: v for k, v in params.items() if v is not None}
            if clean:
                url += "?" + urllib.parse.urlencode(clean)
        req = urllib.request.Request(url, headers=HEADERS, method="GET")
        with urllib.request.urlopen(req, timeout=30) as r:
            ct = r.headers.get("Content-Type", "")
            body = r.read()
            if "application/json" in ct:
                return json.loads(body)
            return body.decode("utf-8", errors="replace")

    def _post(path, payload):
        url = f"{API}{path}"
        data = json.dumps(payload).encode()
        headers = {**HEADERS, "Content-Type": "application/json"}
        req = urllib.request.Request(url, data=data, headers=headers, method="POST")
        with urllib.request.urlopen(req, timeout=30) as r:
            ct = r.headers.get("Content-Type", "")
            body = r.read()
            if "application/json" in ct:
                return json.loads(body)
            return body.decode("utf-8", errors="replace")

    def _post_multipart(path, field_name, filename, content, mimetype):
        boundary = "----openclaw" + uuid.uuid4().hex
        url = f"{API}{path}"
        parts = []
        parts.append(f"--{boundary}\r\n".encode())
        parts.append(
            f'Content-Disposition: form-data; name="{field_name}"; filename="{filename}"\r\n'.encode()
        )
        parts.append(f"Content-Type: {mimetype}\r\n\r\n".encode())
        parts.append(content)
        parts.append(f"\r\n--{boundary}--\r\n".encode())
        body = b"".join(parts)
        headers = {**HEADERS, "Content-Type": f"multipart/form-data; boundary={boundary}"}
        # Remove Accept: application/json — multipart endpoint returns JSON anyway
        req = urllib.request.Request(url, data=body, headers=headers, method="POST")
        with urllib.request.urlopen(req, timeout=120) as r:
            return json.loads(r.read())

    def accounts():
        out = []
        for a in _get("/accounts"):
            out.append({"id": a["id"], "email": a["emailAddress"],
                        "imap_host": a.get("imapHost"),
                        "imap_port": a.get("imapPort")})
        print(json.dumps(out, indent=2))

    def mailboxes(account_id):
        data = _get("/mailboxes", {"accountId": int(account_id)})
        out = []
        for m in data.get("mailboxes", []):
            out.append({
                "databaseId": m["databaseId"],
                "name": m.get("displayName") or m.get("name"),
                "specialRole": m.get("specialRole"),
                "unread": m.get("unread"),
            })
        print(json.dumps({"account": data.get("email"), "mailboxes": out}, indent=2))

    def messages(mailbox_db_id, limit=25):
        data = _get("/messages", {"mailboxId": int(mailbox_db_id), "limit": int(limit)})
        # Trim noisy fields
        slim = []
        for m in (data if isinstance(data, list) else data.get("messages", [])):
            slim.append({
                "id": m.get("databaseId") or m.get("id"),
                "subject": m.get("subject"),
                "from": [f.get("email") for f in (m.get("from") or [])],
                "date": m.get("dateInt") or m.get("sentAt"),
                "flags": m.get("flags"),
                "preview": (m.get("preview") or "")[:120],
            })
        print(json.dumps(slim, indent=2))

    def search(query, account_id=None, limit=25):
        params = {"query": query, "limit": int(limit)}
        if account_id:
            params["accountId"] = int(account_id)
        data = _get("/messages", params)
        print(json.dumps(data, indent=2))

    def body(message_id):
        print(json.dumps(_get(f"/messages/{int(message_id)}/body"), indent=2))

    def html(message_id):
        result = _get(f"/messages/{int(message_id)}/html")
        if isinstance(result, str):
            print(result)
        else:
            print(json.dumps(result, indent=2))

    def thread(message_id):
        print(json.dumps(_get(f"/messages/{int(message_id)}/thread"), indent=2))

    def source(message_id):
        result = _get(f"/messages/{int(message_id)}/source")
        if isinstance(result, str):
            print(result)
        else:
            print(json.dumps(result, indent=2))

    def attach(source):
        """Upload a single file to NC Mail's local attachments store.
        Source: filesystem path OR http(s):// URL.
        Prints {"id": <int>, "fileName": ..., "mimeType": ..., "type": "local"}
        which the caller can pass to `mail draft` as an `attachments: [<id>]` item."""
        if source.startswith("http://") or source.startswith("https://"):
            with urllib.request.urlopen(source, timeout=120) as r:
                content = r.read()
                mt = r.headers.get("Content-Type", "application/octet-stream").split(";")[0].strip()
            fn = os.path.basename(urllib.parse.urlparse(source).path) or "download.bin"
        else:
            with open(source, "rb") as fh:
                content = fh.read()
            fn = os.path.basename(source)
            mt = mimetypes.guess_type(fn)[0] or "application/octet-stream"
        result = _post_multipart("/attachments", "attachment", fn, content, mt)
        # NC Mail returns {id, fileName, mimeType}; ensure id is int for downstream
        if isinstance(result, dict) and "id" in result:
            result["id"] = int(result["id"])
            result.setdefault("type", "local")
        print(json.dumps(result, indent=2))

    def _split_recipients(value):
        """Accept either a comma-separated string ('a@b,c@d') or a list of
        strings/objects. Return the [{label, email}, ...] shape outbox expects."""
        if not value:
            return []
        if isinstance(value, str):
            items = [p.strip() for p in value.split(",") if p.strip()]
        elif isinstance(value, list):
            items = value
        else:
            items = [value]
        out = []
        for it in items:
            if isinstance(it, dict):
                email = it.get("email") or it.get("address") or ""
                if email:
                    out.append({"label": it.get("label") or email, "email": email})
            elif isinstance(it, str) and it.strip():
                out.append({"label": it.strip(), "email": it.strip()})
        return out

    def _normalize_attachments(value):
        """Accept [int, int] OR [{type, id}, ...] OR [{id}]. Return outbox shape."""
        if not value:
            return []
        out = []
        for it in value:
            if isinstance(it, int):
                out.append({"type": "local", "id": int(it)})
            elif isinstance(it, str) and it.isdigit():
                out.append({"type": "local", "id": int(it)})
            elif isinstance(it, dict) and "id" in it:
                out.append({"type": it.get("type", "local"), "id": int(it["id"])})
        return out

    def draft(account_id):
        """Save (or update) a draft. JSON body read from stdin:
            {"subject": "...", "body": "...", "to": "a@b,c@d",
             "cc": "", "bcc": "", "isHtml": true, "draftId": null,
             "attachments": [<int>, ...]}

        Without `attachments`: lands in the IMAP Drafts mailbox via
        accounts#draft (POST /accounts/{id}/draft).

        With `attachments`: routes through the custom openclaw_mail NC
        app (POST /apps/openclaw_mail/api/draft) which builds the full
        MIME message (text/html + attachments) and APPENDs it to the
        account's IMAP Drafts mailbox with the \\Draft flag. Drafts
        appear in any IMAP client, just like a manual NC Mail draft.
        This path never sends.
        """
        raw = sys.stdin.read()
        if not raw.strip():
            sys.stderr.write("mail draft: expected JSON body on stdin\n")
            sys.exit(2)
        try:
            payload = json.loads(raw)
        except json.JSONDecodeError as e:
            sys.stderr.write(f"mail draft: invalid JSON on stdin: {e}\n")
            sys.exit(2)

        attachments = _normalize_attachments(payload.get("attachments"))

        if not attachments:
            # IMAP-Drafts path. NC Mail requires all three recipient fields
            # to be present even if empty.
            body_payload = {
                "subject":   str(payload.get("subject", "")),
                "body":      str(payload.get("body", "")),
                "to":        str(payload.get("to", "")),
                "cc":        str(payload.get("cc", "")),
                "bcc":       str(payload.get("bcc", "")),
                "isHtml":    bool(payload.get("isHtml", True)),
            }
            if payload.get("draftId") is not None:
                body_payload["draftId"] = int(payload["draftId"])
            result = _post(f"/accounts/{int(account_id)}/draft", body_payload)
            print(json.dumps(result, indent=2))
            return

        # IMAP-Drafts-with-attachments path via custom openclaw_mail app.
        # The app accepts the same recipient comma-strings and a bare-int
        # attachments[] (the IDs returned by `mail attach`).
        oc_url = f"{BASE}/index.php/apps/openclaw_mail/api/draft"
        oc_payload = {
            "accountId":  int(account_id),
            "subject":    str(payload.get("subject", "")),
            "body":       str(payload.get("body", "")),
            "to":         str(payload.get("to", "")),
            "cc":         str(payload.get("cc", "")),
            "bcc":        str(payload.get("bcc", "")),
            "isHtml":     bool(payload.get("isHtml", True)),
            "attachments": [a["id"] for a in attachments],
        }
        data = json.dumps(oc_payload).encode()
        headers = {**HEADERS, "Content-Type": "application/json"}
        req = urllib.request.Request(oc_url, data=data, headers=headers, method="POST")
        try:
            with urllib.request.urlopen(req, timeout=60) as r:
                result = json.loads(r.read())
        except urllib.error.HTTPError as e:
            body_err = e.read().decode("utf-8", errors="replace")
            sys.stderr.write(f"mail draft (attachments): HTTP {e.code}: {body_err}\n")
            sys.exit(4)
        print(json.dumps(result, indent=2))

    def main():
        if len(sys.argv) < 2:
            print(__doc__); sys.exit(2)
        verb = sys.argv[1].lower()
        if verb in BLOCKED:
            sys.stderr.write(f"refused: '{verb}' would mutate mail beyond drafts — blocked\n")
            sys.exit(3)
        dispatch = {
            "accounts": accounts, "mailboxes": mailboxes, "messages": messages,
            "search": search, "body": body, "html": html, "thread": thread,
            "source": source,
            "draft": draft, "attach": attach,
        }
        if verb not in dispatch:
            print(__doc__); sys.exit(2)
        dispatch[verb](*sys.argv[2:])

    if __name__ == "__main__":
        main()

