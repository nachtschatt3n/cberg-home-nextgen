    ---
    name: nextcloud-mail
    description: Access to the user's Nextcloud Mail across GMX, iCloud, and Gmail. Use whenever the user asks about emails, inbox status, recent messages, to summarize/search mail, or to draft a reply (with or without photo/PDF attachments). Drafts — with or without attachments — always land in the account's IMAP Drafts mailbox; never sends. All other mutations (send, delete, move, flag) remain blocked.
    user-invocable: true
    ---

    # Nextcloud Mail

    Mostly read-only client for the user's Nextcloud Mail (which fans out
    to GMX, iCloud, and Gmail). Invoke the `mail` CLI from your shell tool.

    ## Read verbs

    | Command | Purpose |
    | --- | --- |
    | `mail accounts` | List all configured mail accounts (id, email, IMAP host). |
    | `mail mailboxes <account_id>` | Folder tree + unread counts for an account. |
    | `mail messages <mailbox_db_id> [limit]` | List recent messages (default 25). |
    | `mail search <query> [account_id] [limit]` | Server-side search. |
    | `mail body <message_id>` | Plaintext body of a message. |
    | `mail html <message_id>` | HTML body of a message. |
    | `mail thread <message_id>` | Full thread metadata. |
    | `mail source <message_id>` | Raw RFC822. |

    ## Write verbs (drafts only)

    ### Plain draft (no attachments)

    `mail draft <account_id>` with no `attachments` key (or `[]`) saves the
    draft to the account's **IMAP Drafts** mailbox via
    `POST /api/accounts/{id}/draft`. **JSON body is read from stdin**:

    ```json
    {
      "subject": "Re: ALTERNATE - Rechnung",
      "body":    "Hi — bestätige den Eingang …",
      "to":      "person@example.com",
      "cc":      "",
      "bcc":     "",
      "isHtml":  true,
      "draftId": null
    }
    ```

    - `to` / `cc` / `bcc` are comma-separated. Empty strings are fine for
      cc/bcc, but the keys must exist.
    - Pass `draftId` if you want to **update** an existing draft (otherwise
      omit or `null` for a new one).
    - `isHtml=true` is the default and matches NC Mail's UI behaviour.
    - Returns `{ "id": <new_or_updated_draftId> }` on success.

    Typical agent invocation:

    ```bash
    echo '{"subject":"Re: Apple Invoice","body":"<p>Bestätigt.</p>","to":"no_reply@email.apple.com","cc":"","bcc":"","isHtml":true}' \
      | mail draft 1
    ```

    ### Attachments

    Upstream NC Mail's `accounts#draft` route silently drops attachments
    (open issue [nextcloud/mail#458][issue-458] since 2017). To work
    around that, the cluster runs a tiny custom Nextcloud app —
    `openclaw_mail` — that exposes `POST /apps/openclaw_mail/api/draft`.
    The app reuses NC Mail's own `TransmissionService` + `MimeMessage`
    pipeline to build a full MIME message with attachments, then APPENDs
    it to the account's IMAP Drafts mailbox with the `\Draft` flag.

    [issue-458]: https://github.com/nextcloud/mail/issues/458

    From the agent's perspective the flow is the same as a plain draft,
    just with an extra `attachments` key:

    1. **Upload** each file (local path OR http(s) URL):

       ```bash
       mail attach /tmp/rechnung-foto.jpg
       # → {"id": 42, "fileName": "rechnung-foto.jpg",
       #    "mimeType": "image/jpeg", "type": "local"}
       ```

    2. **Compose** the draft with the returned attachment IDs. Whether
       the array is empty or not, the draft ends up in the same IMAP
       Drafts folder — visible in any mail client, including GMX webmail:

       ```bash
       echo '{
         "subject":"Foto zur Rechnung",
         "body":"<p>Wie besprochen — Foto im Anhang.</p>",
         "to":"person@example.com",
         "cc":"","bcc":"",
         "isHtml":true,
         "attachments":[42]
       }' | mail draft 1
       ```

       Attachment IDs may be bare ints (`[42]`) or `{type,id}` objects
       (`[{"type":"local","id":42}]`). On success the helper returns
       `{success, uid, mailboxId, attachmentsAttached}`.

    ## Loop for "what are my latest emails?"

    1. `mail accounts` — get account IDs.
    2. For each account, `mail mailboxes <id>` and pick the mailbox with
       `specialRole=inbox`. Note its `databaseId`.
    3. `mail messages <inbox_db_id> 5` to get the 5 newest messages.
    4. Summarize subject + from + date + preview. If the user asks for
       details, follow up with `mail body <message_id>`.

    ## Loop for "draft a reply to that email"

    1. `mail thread <message_id>` to get the existing thread context and
       identify the right `accountId` + recipients.
    2. Compose subject (prefix `Re:` if missing) and body. Use HTML if you
       need formatting; plain text wrapped in `<p>` paragraphs is fine.
    3. If the user mentioned attaching a photo/PDF, run
       `mail attach <path_or_url>` for each file and collect the returned
       `id` values into the draft payload's `attachments` array.
    4. Pipe the JSON into `mail draft <account_id>` and confirm the
       returned id/uid to the user. The draft lives in the account's
       **IMAP Drafts** mailbox in both cases — visible in any mail
       client (NC Mail web UI, GMX webmail, Mail.app, K-9, etc.).

    ## What stays blocked
    - `send`, `outbox`, `compose` — no SMTP send via this skill.
    - `delete`, `move`, `trash`, `snooze`, `flag`, `tag`, `mark`, `patch` —
      all refused with exit 3.

