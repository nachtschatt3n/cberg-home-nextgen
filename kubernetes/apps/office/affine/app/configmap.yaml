apiVersion: v1
kind: ConfigMap
metadata:
  name: affine-configmap
  namespace: office
data:
  config.json: |
    {
      "$schema": "https://raw.githubusercontent.com/toeverything/AFFiNE/canary/.docker/selfhost/schema.json",
      "calendar": {
        "caldav": {
          "enabled": true,
          "allowCustomProvider": false,
          "providers": [
            {
              "id": "nextcloud",
              "label": "Nextcloud",
              "serverUrl": "https://drive.${SECRET_DOMAIN}/remote.php/dav/",
              "authType": "basic",
              "requiresAppPassword": true,
              "docsUrl": "https://docs.nextcloud.com/server/latest/user_manual/en/session_management.html#managing-devices"
            }
          ],
          "allowedHosts": [
            "drive.${SECRET_DOMAIN}"
          ],
          "blockPrivateNetwork": false,
          "requestTimeoutMs": 10000,
          "maxRedirects": 5
        }
      },
      "storages": {
        "avatar": {
          "storage": {
            "provider": "fs",
            "bucket": "avatars",
            "config": {
              "path": "~/.affine/storage"
            }
          }
        },
        "blob": {
          "storage": {
            "provider": "fs",
            "bucket": "blobs",
            "config": {
              "path": "~/.affine/storage"
            }
          }
        }
      },
      "copilot": {
        "enabled": false,
        "providers": {
          "profiles": [],
          "defaults": {}
        },
        "storage": {
          "provider": "fs",
          "bucket": "copilot",
          "config": {
            "path": "~/.affine/storage"
          }
        }
      },
      "indexer": {
        "enabled": false
      }
    }
