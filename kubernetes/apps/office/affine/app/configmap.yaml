apiVersion: v1
kind: ConfigMap
metadata:
  name: affine-configmap
  namespace: office
data:
  config.json: |
    {
      "$schema": "https://raw.githubusercontent.com/toeverything/AFFiNE/canary/.docker/selfhost/schema.json",
      "calendar": {
        "caldav": {
          "enabled": true,
          "allowCustomProvider": false,
          "providers": [
            {
              "id": "nextcloud",
              "label": "Nextcloud",
              "serverUrl": "https://drive.${SECRET_DOMAIN}/remote.php/dav/",
              "authType": "basic",
              "requiresAppPassword": true,
              "docsUrl": "https://docs.nextcloud.com/server/latest/user_manual/en/session_management.html#managing-devices"
            }
          ],
          "allowedHosts": [
            "drive.${SECRET_DOMAIN}"
          ],
          "blockPrivateNetwork": false,
          "requestTimeoutMs": 10000,
          "maxRedirects": 5
        }
      },
      "storages": {
        "avatar": {
          "storage": {
            "provider": "fs",
            "bucket": "avatars",
            "config": {
              "path": "~/.affine/storage"
            }
          }
        },
        "blob": {
          "storage": {
            "provider": "fs",
            "bucket": "blobs",
            "config": {
              "path": "~/.affine/storage"
            }
          }
        }
      },
      "copilot": {
        "enabled": true,
        "scenarios": {
          "override_enabled": true,
          "scenarios": {
            "audio_transcribing": "gemini-2.5-flash",
            "chat": "qwen3:30b-instruct",
            "embedding": "text-embedding-3-small",
            "image": "gpt-image-1",
            "coding": "qwen3:30b-instruct",
            "complex_text_generation": "qwen3:30b-instruct",
            "quick_decision_making": "qwen3:30b-instruct",
            "quick_text_generation": "qwen3:30b-instruct",
            "polish_and_summarize": "qwen3:30b-instruct"
          }
        },
        "providers": {
          "openai": {
            "apiKey": "ollama",
            "baseURL": "http://192.168.30.111:11435/v1",
            "oldApiStyle": true
          },
          "defaults": {
            "fallback": "openai-default",
            "text": "openai-default",
            "object": "openai-default",
            "structured": "openai-default",
            "embedding": "openai-default"
          }
        },
        "storage": {
          "provider": "fs",
          "bucket": "copilot",
          "config": {
            "path": "~/.affine/storage"
          }
        }
      },
      "indexer": {
        "enabled": false
      }
    }
