---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: affine-db
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        strategy: Recreate
        pod:
          annotations:
            secret.reloader.stakater.com/reload: affine-secret
        containers:
          main:
            image:
              repository: pgvector/pgvector
              tag: pg16
              pullPolicy: IfNotPresent
            env:
              - name: POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: affine-secret
                    key: DB_USERNAME
              - name: POSTGRES_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: affine-secret
                    key: DB_PASSWORD
              - name: POSTGRES_DB
                valueFrom:
                  secretKeyRef:
                    name: affine-secret
                    key: DB_DATABASE
              - name: POSTGRES_INITDB_ARGS
                value: "--data-checksums"
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 1Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
                  initialDelaySeconds: 30
                  periodSeconds: 20
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          postgres:
            port: 5432

    persistence:
      data:
        enabled: true
        existingClaim: affine-db-data
        globalMounts:
          - path: /var/lib/postgresql/data
