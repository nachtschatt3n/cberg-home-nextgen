---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: affine
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    timeout: 20m
    remediation:
      retries: 3
  upgrade:
    timeout: 20m
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: affine-db
    - name: affine-redis
  values:
    controllers:
      main:
        strategy: Recreate
        pod:
          annotations:
            secret.reloader.stakater.com/reload: affine-secret
        initContainers:
          predeploy:
            image:
              repository: ghcr.io/toeverything/affine
              tag: 0.26.3
              pullPolicy: IfNotPresent
            command:
              - sh
              - -c
              - node ./scripts/self-host-predeploy.js
            env:
              - name: TZ
                value: ${TIMEZONE}
              - name: DATABASE_URL
                valueFrom:
                  secretKeyRef:
                    name: affine-secret
                    key: DATABASE_URL
              - name: REDIS_SERVER_HOST
                value: affine-redis
              - name: REDIS_SERVER_PORT
                value: "6379"
              - name: AFFINE_SERVER_EXTERNAL_URL
                value: https://affine.${SECRET_DOMAIN}
              - name: AFFINE_SERVER_HOST
                value: affine.${SECRET_DOMAIN}
              - name: AFFINE_SERVER_HTTPS
                value: "true"
              - name: AFFINE_INDEXER_ENABLED
                value: "false"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
        containers:
          main:
            image:
              repository: ghcr.io/toeverything/affine
              tag: 0.26.3
              pullPolicy: IfNotPresent
            env:
              - name: TZ
                value: ${TIMEZONE}
              - name: DATABASE_URL
                valueFrom:
                  secretKeyRef:
                    name: affine-secret
                    key: DATABASE_URL
              - name: REDIS_SERVER_HOST
                value: affine-redis
              - name: REDIS_SERVER_PORT
                value: "6379"
              - name: AFFINE_SERVER_EXTERNAL_URL
                value: https://affine.${SECRET_DOMAIN}
              - name: AFFINE_SERVER_HOST
                value: affine.${SECRET_DOMAIN}
              - name: AFFINE_SERVER_HTTPS
                value: "true"
              - name: AFFINE_INDEXER_ENABLED
                value: "false"
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 2Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 3010
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 60
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: *port

    ingress:
      main:
        enabled: true
        className: internal
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "AFFiNE"
          gethomepage.dev/group: "Office"
          gethomepage.dev/icon: "mdi-note-multiple"
          gethomepage.dev/description: "Collaborative knowledge base and workspace"
        labels:
          gethomepage.dev/enabled: "true"
        hosts:
          - host: affine.${SECRET_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - hosts:
              - affine.${SECRET_DOMAIN}

    persistence:
      config:
        enabled: true
        existingClaim: affine-config
        globalMounts:
          - path: /root/.affine/config
      storage:
        enabled: true
        existingClaim: affine-storage
        globalMounts:
          - path: /root/.affine/storage
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
