---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: penpot
  namespace: office
spec:
  interval: 30m
  chart:
    spec:
      chart: penpot
      version: 1.5.0
      sourceRef:
        kind: HelmRepository
        name: penpot
        namespace: flux-system
  maxHistory: 1
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  # 1.1.0 dropped the bundled postgresql/valkey subcharts — DB + cache now
  # live as standalone HelmReleases (penpot-db, penpot-cache) that penpot
  # connects to via config.postgresql.host / config.redis.host.
  dependsOn:
    - name: penpot-db
      namespace: office
    - name: penpot-cache
      namespace: office
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Ingress
              name: penpot
            patch: |
              - op: add
                path: /metadata/labels/gethomepage.dev~1enabled
                value: "true"
          # Inject wait-for initContainers into the backend Deployment so it
          # blocks until the standalone DB + cache are reachable. The penpot
          # chart exposes no initContainers values key.
          # Pattern: docs/sops/container-dependencies.md (busybox + nc -z loop).
          - target:
              kind: Deployment
              name: penpot-backend
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: penpot-backend
              spec:
                template:
                  spec:
                    initContainers:
                      - name: wait-for-postgresql
                        image: busybox:stable
                        command:
                          - sh
                          - -c
                          - |
                            until nc -z penpot-db 5432; do
                              echo "waiting for penpot-db:5432..."
                              sleep 2
                            done
                      - name: wait-for-redis
                        image: busybox:stable
                        command:
                          - sh
                          - -c
                          - |
                            until nc -z penpot-cache 6379; do
                              echo "waiting for penpot-cache:6379..."
                              sleep 2
                            done
  values:
    # Application configuration (1.1.0 moved publicUri/flags/secretKey and
    # the DB/redis connection details all under `config`).
    config:
      publicUri: "https://penpot.${SECRET_DOMAIN}"
      flags: "disable-registration enable-login-with-password disable-email-verification"
      # Session/token secret — reuse the existing PENPOT_SECRET_KEY so logins
      # carry over (renamed to apiSecretKey in 1.1.0).
      existingSecret: penpot-secret
      secretKeys:
        apiSecretKey: PENPOT_SECRET_KEY
      postgresql:
        host: penpot-db
        port: 5432
        username: penpot
        database: penpot
        existingSecret: penpot-secret
        secretKeys:
          passwordKey: PENPOT_POSTGRESQL_PASSWORD
      redis:
        host: penpot-cache
        port: 6379
        database: "0"
      objectsStorage:
        storageBackend: "fs"
        filesystem:
          directory: "/opt/data/assets"

    # Backend service configuration
    backend:
      replicaCount: 1
      service:
        type: ClusterIP
        port: 6060
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 2Gi

    # Frontend service configuration
    frontend:
      replicaCount: 1
      service:
        type: ClusterIP
        port: 8080
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    # Exporter service configuration
    exporter:
      replicaCount: 1
      service:
        type: ClusterIP
        port: 6061
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    # Persistence for assets — the existing CIFS RWX claim with the design
    # file blobs (hash-prefixed dirs under /opt/data/assets).
    persistence:
      assets:
        enabled: true
        existingClaim: penpot-assets
        size: 20Gi

    # Ingress configuration
    ingress:
      enabled: true
      className: external
      annotations:
        external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: "Penpot"
        gethomepage.dev/description: "Open-source design and prototyping platform"
        gethomepage.dev/group: "Office"
        gethomepage.dev/icon: "penpot.png"
        gethomepage.dev/pod-selector: "app.kubernetes.io/instance=penpot,app.kubernetes.io/name=penpot-backend"
      hosts:
        - penpot.${SECRET_DOMAIN}
      tls:
        - secretName: penpot-tls
          hosts:
            - penpot.${SECRET_DOMAIN}
