---
# Standalone PostgreSQL for Penpot — re-platformed off the deprecated Bitnami
# chart. The bitnamilegacy mirror froze at PG17 and the current Bitnami charts
# paywall pinned image tags (default `tag: latest`), so the chart 15→18 bump
# could not actually deliver PG18. Now a plain official `postgres` image via
# bjw-s app-template. Penpot held no meaningful data, so the cutover is a fresh
# init (the old `data-penpot-db-0` PVC is wiped during migration).
#
# Service name MUST stay `penpot-db` and DB/user `penpot` — the penpot chart
# connects to penpot-db:5432 with creds from penpot-secret (unchanged).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: penpot-db
  namespace: office
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      penpot-db:
        type: statefulset
        containers:
          app:
            image:
              repository: postgres
              tag: "18.4"
            env:
              POSTGRES_USER: penpot
              POSTGRES_DB: penpot
              # PGDATA in a subdir so the volume's lost+found doesn't trip
              # initdb's "directory not empty" check.
              PGDATA: /var/lib/postgresql/data/pgdata
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: penpot-secret
                    key: PENPOT_POSTGRESQL_PASSWORD
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["pg_isready", "-U", "penpot", "-d", "penpot"]
                  initialDelaySeconds: 20
                  periodSeconds: 20
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["pg_isready", "-U", "penpot", "-d", "penpot"]
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
    service:
      main:
        controller: penpot-db
        ports:
          postgres:
            port: 5432
    persistence:
      data:
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 10Gi
        advancedMounts:
          penpot-db:
            app:
              - path: /var/lib/postgresql/data
