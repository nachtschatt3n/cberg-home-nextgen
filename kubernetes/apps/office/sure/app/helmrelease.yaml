---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sure
spec:
  interval: 30m
  chart:
    spec:
      chart: sure
      version: 0.6.9
      sourceRef:
        kind: HelmRepository
        name: sure
        namespace: flux-system
  install:
    timeout: 20m
    remediation:
      retries: 3
  upgrade:
    timeout: 20m
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: sure-pg
    - name: sure-redis
  # Post-render patch: the Sure chart hard-codes ingress metadata.labels
  # and doesn't expose a values pass-through, so we inject the Homepage
  # discovery label here (doc-check.py enforces both annotation + label).
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Ingress
              name: sure
            patch: |
              - op: add
                path: /metadata/labels/gethomepage.dev~1enabled
                value: "true"
  values:
    image:
      repository: ghcr.io/we-promise/sure
      # Chart.appVersion is "v0.7.0" but the image is published as "0.7.0"
      # (no leading v). Pin explicitly to avoid ImagePullBackOff.
      tag: "0.7.0"
      pullPolicy: IfNotPresent

    # ---------------- Rails config ----------------
    rails:
      env: production
      # Chart loads SECRET_KEY_BASE + ACTIVE_RECORD_ENCRYPTION_* directly from this Secret
      existingSecret: sure-secret
      encryptionEnv:
        enabled: true
      settings:
        SELF_HOSTED: "true"
        ONBOARDING_STATE: "open"
        AI_DEBUG_MODE: "false"
      # Explicit, minimal extra env. The DATABASE_URL/REDIS_URL helpers auto-resolve
      # to "" once CNPG + Redis subcharts are disabled, so we inject them ourselves
      # via extraEnvVars (below).
      extraEnv: {}
      extraEnvVars:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: sure-secret
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: sure-secret
              key: REDIS_URL
        - name: OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: sure-secret
              key: OIDC_CLIENT_ID
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: sure-secret
              key: OIDC_CLIENT_SECRET
        - name: OIDC_ISSUER
          valueFrom:
            secretKeyRef:
              name: sure-secret
              key: OIDC_ISSUER
        # Built-in assistant → OpenAI-compatible Ollama on Mac Mini (docs/sops/ai-integration.md).
        # Keeps ASSISTANT_TYPE unset so family.assistant_type stays "builtin".
        - name: OPENAI_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: sure-secret
              key: OPENAI_ACCESS_TOKEN
        - name: OPENAI_URI_BASE
          valueFrom:
            secretKeyRef:
              name: sure-secret
              key: OPENAI_URI_BASE
        - name: OPENAI_MODEL
          valueFrom:
            secretKeyRef:
              name: sure-secret
              key: OPENAI_MODEL
        # Widen the OpenAI HTTP client timeout (upstream default 60s) so
        # slow local LLM inference (Ollama on Mac Mini) finishes before
        # Net::ReadTimeout. Bumped from 900 → 1800 to leave headroom for
        # larger merchant-detection models that produce reliable URLs
        # (gemma4:26b returns names but rarely URLs, so the auto-detector
        # silently skips). Read once per-request in Provider::Openai.
        - name: OPENAI_REQUEST_TIMEOUT
          value: "1800"
        # Consumed by zz_bank_refresh_overrides.rb (sure-overrides-initializer
        # ConfigMap): clamps AutoCategorizeJob / AutoDetectMerchantsJob batches
        # so a single LLM request fits inside OPENAI_REQUEST_TIMEOUT on Ollama.
        - name: AUTO_CATEGORIZE_BATCH_SIZE
          value: "5"
        - name: AUTO_DETECT_MERCHANTS_BATCH_SIZE
          value: "5"
      externalAssistant:
        enabled: false

    # ---------------- Disable bundled DB / Redis (Path C) ----------------
    # We run our own Postgres (office/sure/postgres-helmrelease.yaml) and
    # Redis (redis-helmrelease.yaml) via bjw-s app-template. This keeps the
    # cluster free of CloudNativePG + OT-Redis-Operator just for one app.
    cnpg:
      enabled: false
      cluster:
        enabled: false
    cloudnative-pg:
      enabled: false
    redisOperator:
      enabled: false
      managed:
        enabled: false
    redisSimple:
      enabled: false

    # ---------------- Migrations ----------------
    migrations:
      strategy: job

    # ---------------- Web (Rails server) ----------------
    web:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1536Mi
      # Mount PVC for Active Storage uploads (transaction attachments etc.)
      extraVolumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: sure-storage
        - name: rails-overrides
          configMap:
            name: sure-overrides-initializer
      extraVolumeMounts:
        - name: uploads
          mountPath: /rails/storage
        - name: rails-overrides
          mountPath: /rails/config/initializers/zz_bank_refresh_overrides.rb
          subPath: zz_bank_refresh_overrides.rb
          readOnly: true

    # ---------------- Worker (Sidekiq) ----------------
    worker:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi
      extraVolumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: sure-storage
        - name: rails-overrides
          configMap:
            name: sure-overrides-initializer
      extraVolumeMounts:
        - name: uploads
          mountPath: /rails/storage
        - name: rails-overrides
          mountPath: /rails/config/initializers/zz_bank_refresh_overrides.rb
          subPath: zz_bank_refresh_overrides.rb
          readOnly: true
      # Co-schedule worker onto the same node as web so both can mount the RWO
      # sure-storage Longhorn PVC. Without this, rollouts deadlock on Multi-Attach.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: sure
                  app.kubernetes.io/instance: sure
                  app.kubernetes.io/component: web
              topologyKey: kubernetes.io/hostname

    # ---------------- Ingress (internal, Homepage-registered) ----------------
    ingress:
      enabled: true
      className: internal
      annotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: "Sure"
        gethomepage.dev/group: "Office"
        # simpleicons 404s on "maybefinance"; dashboard-icons has no entry.
        # Use the Sure project's own favicon from its GitHub repo.
        gethomepage.dev/icon: "https://raw.githubusercontent.com/we-promise/sure/main/public/favicon.ico"
        gethomepage.dev/description: "Personal finance — accounts, budgets, investments"
      hosts:
        - host: sure.${SECRET_DOMAIN}
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - sure.${SECRET_DOMAIN}
