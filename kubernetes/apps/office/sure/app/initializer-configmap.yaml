---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sure-overrides-initializer
  namespace: office
data:
  # Rails initializer mounted into /rails/config/initializers on web + worker.
  # Purpose: the upstream rule actions chunk LLM work into 20-tx batches,
  # which blows past Sure's OpenAI HTTP timeout when the backend is a slow
  # local LLM (Ollama gemma4:26b on Mac Mini). We re-chunk at the common
  # Family choke points so every job sends <= <N>_BATCH_SIZE transactions.
  # OPENAI_REQUEST_TIMEOUT (already env-configurable upstream) widens the
  # per-request window. Together they keep AI enrichment healthy on
  # self-hosted CPU-only inference.
  zz_bank_refresh_overrides.rb: |
    Rails.application.config.after_initialize do
      Family.class_eval do
        def auto_categorize_transactions_later(transactions, rule_run_id: nil)
          batch = ENV.fetch("AUTO_CATEGORIZE_BATCH_SIZE", 5).to_i
          ids = transactions.respond_to?(:pluck) ? transactions.pluck(:id) : transactions.map(&:id)
          ids.each_slice(batch) do |slice|
            AutoCategorizeJob.perform_later(self, transaction_ids: slice, rule_run_id: rule_run_id)
          end
        end

        def auto_detect_transaction_merchants_later(transactions, rule_run_id: nil)
          batch = ENV.fetch("AUTO_DETECT_MERCHANTS_BATCH_SIZE", 5).to_i
          ids = transactions.respond_to?(:pluck) ? transactions.pluck(:id) : transactions.map(&:id)
          ids.each_slice(batch) do |slice|
            AutoDetectMerchantsJob.perform_later(self, transaction_ids: slice, rule_run_id: rule_run_id)
          end
        end
      end

      # Upstream RuleRun#complete_job! does an unconditional decrement!(:pending_jobs_count)
      # which trips the `>= 0` validation when a Sidekiq retry replays a job whose
      # rule_run was already finalized — the job then loops in the retry queue forever.
      # Make it idempotent: skip if already success, only decrement when > 0.
      RuleRun.class_eval do
        def complete_job!(modified_count: 0)
          with_lock do
            return if status == "success"
            increment!(:transactions_modified, modified_count) if modified_count > 0
            decrement!(:pending_jobs_count) if pending_jobs_count > 0
            update!(status: "success") if pending_jobs_count <= 0
          end
        end
      end
    end
