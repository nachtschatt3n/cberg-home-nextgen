---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: media-dashboard
  namespace: media
---
# Permissions in own namespace: list/get jobs, cronjobs, pods; read pod logs;
# create jobs (for trigger buttons). No delete, no exec, no secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: media-dashboard
  namespace: media
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [batch]
    resources: [cronjobs]
    verbs: [get, list]
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: media-dashboard
  namespace: media
subjects:
  - kind: ServiceAccount
    name: media-dashboard
    namespace: media
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: media-dashboard
