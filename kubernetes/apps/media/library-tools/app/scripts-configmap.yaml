---
apiVersion: v1
kind: ConfigMap
metadata:
  name: library-tools-scripts
  namespace: media
data:

  # =========================================================================
  # common.py — shared helpers, mount paths, redacted logger, ffprobe wrapper
  # =========================================================================
  common.py: |
    """Shared helpers for library-tools scripts.

    Privacy: all logging goes through `log()` which redacts media titles
    by default. Only counts and structural identifiers are emitted.
    """
    import os
    import re
    import subprocess
    import sys
    import json
    import urllib.request
    import urllib.error
    from pathlib import Path

    # Mount path inside any library-tools job pod that mounts plex-media-smb.
    # Layout under MEDIA_ROOT:
    #   Movies/, "TV Shows"/, Music/, YouTube/
    MEDIA_ROOT = Path(os.environ.get("MEDIA_ROOT", "/data/data"))
    JDOWNLOADER_ROOT = Path(os.environ.get("JDOWNLOADER_ROOT", "/intake"))

    SECTIONS = {
        "movies":   MEDIA_ROOT / "Movies",
        "tv":       MEDIA_ROOT / "TV Shows",
        "music":    MEDIA_ROOT / "Music",
        # YouTube is not in data/ — it's at /media/downloads/tube-archivist/,
        # owned by Tube Archivist and consumed by Jellyfin only. Not audited here.
    }

    # Filename patterns
    EP_RE       = re.compile(r"[Ss](\d{2})[Ee](\d{2})")
    # Year regex MUST constrain to 1900-2099. A naive `(\d{4})` matches
    # `(1080)` / `(720)` / `(2160)` — resolution leaked into the folder name —
    # which silently breaks year-restricted TMDb queries downstream.
    YEAR_RE     = re.compile(r"\((19[0-9]{2}|20[0-9]{2})\)")
    YT_ID_RE    = re.compile(r"\[([A-Za-z0-9_-]{11})\]")

    # Redaction guard: ban the printing of arbitrary filename text.
    # Use log_count() / log_event() / log_path_anonymous() instead of print().
    def log(msg, count=None):
        """Structural log line. msg must NOT include any media title."""
        if count is not None:
            print(f"{msg}: {count}", flush=True)
        else:
            print(msg, flush=True)

    def log_event(category, severity="info", **fields):
        """Emit a structured event. Fields must be counts/booleans/identifiers."""
        rec = {"event": category, "severity": severity, **fields}
        print(json.dumps(rec, sort_keys=True), flush=True)

    def anon_path(p: Path) -> str:
        """Return an anonymised path: only the section and depth, no titles."""
        try:
            rel = p.relative_to(MEDIA_ROOT)
            parts = rel.parts
            if not parts:
                return "<root>"
            section = parts[0]
            return f"{section}/<item>" + ("/<sub>" * (len(parts) - 2) if len(parts) > 2 else "")
        except ValueError:
            return "<external>"

    # ---- ffprobe wrapper ---------------------------------------------------
    def ffprobe(path: Path) -> dict:
        """Return {width, height, duration, bit_rate, size, fps} or {} on failure."""
        if not path.exists():
            return {}
        try:
            r = subprocess.run(
                ["ffprobe", "-v", "error",
                 "-select_streams", "v:0",
                 "-show_entries", "stream=width,height,r_frame_rate",
                 "-show_entries", "format=duration,bit_rate,size",
                 "-of", "json", str(path)],
                capture_output=True, timeout=60, check=False,
            )
            if r.returncode != 0:
                return {}
            data = json.loads(r.stdout or "{}")
            stream = (data.get("streams") or [{}])[0]
            fmt = data.get("format", {})
            fps_raw = stream.get("r_frame_rate", "0/1")
            try:
                num, den = fps_raw.split("/")
                fps = float(num) / float(den) if float(den) else 0.0
            except Exception:
                fps = 0.0
            return {
                "width":    int(stream.get("width") or 0),
                "height":   int(stream.get("height") or 0),
                "fps":      round(fps, 3),
                "duration": float(fmt.get("duration") or 0),
                "bit_rate": int(fmt.get("bit_rate") or 0),
                "size":     int(fmt.get("size") or 0),
            }
        except Exception as e:
            log_event("ffprobe-error", severity="warn", error=type(e).__name__)
            return {}

    # ---- image dimension probe (pure stdlib — no ffprobe needed) -----------
    def image_dims(path: Path) -> tuple[int, int]:
        """Return (width, height) by reading JPEG / PNG headers directly.

        Pure stdlib — no ffprobe, no Pillow. Returns (0, 0) on any failure
        (missing file, unsupported format, truncated header). Sufficient for
        the audit's threshold check (poster ≥ 600 px, fanart ≥ 1280 px).
        """
        try:
            with open(path, "rb") as f:
                head = f.read(32)
                # PNG: 8-byte signature, then IHDR chunk with width @16-19, height @20-23
                if head.startswith(b"\x89PNG\r\n\x1a\n"):
                    return (int.from_bytes(head[16:20], "big"),
                            int.from_bytes(head[20:24], "big"))
                # JPEG: walk segments to find SOF0/SOF2 marker
                if head.startswith(b"\xff\xd8"):
                    f.seek(2)
                    while True:
                        b = f.read(1)
                        if not b or b != b"\xff":
                            return (0, 0)
                        # Skip fill bytes (0xFF padding)
                        while b == b"\xff":
                            b = f.read(1)
                            if not b:
                                return (0, 0)
                        marker = b[0]
                        # SOF markers: C0..CF except C4, C8, CC
                        if marker in (0xC0, 0xC1, 0xC2, 0xC3, 0xC5, 0xC6, 0xC7,
                                      0xC9, 0xCA, 0xCB, 0xCD, 0xCE, 0xCF):
                            f.read(3)  # length(2) + precision(1)
                            h = int.from_bytes(f.read(2), "big")
                            w = int.from_bytes(f.read(2), "big")
                            return (w, h)
                        # Standalone markers (no length): SOI, EOI, RSTn, TEM
                        if marker in (0xD0, 0xD1, 0xD2, 0xD3, 0xD4, 0xD5,
                                      0xD6, 0xD7, 0xD8, 0xD9, 0x01):
                            continue
                        # All other markers have a length field; skip the segment
                        size_bytes = f.read(2)
                        if len(size_bytes) < 2:
                            return (0, 0)
                        seg_len = int.from_bytes(size_bytes, "big") - 2
                        if seg_len > 0:
                            f.seek(seg_len, 1)
            return (0, 0)
        except Exception:
            return (0, 0)

    # ---- atomic move helper ------------------------------------------------
    def atomic_mv(src: Path, dst: Path) -> bool:
        """mv src → dst on the same filesystem; verify size > 0; never overwrite."""
        if dst.exists():
            log_event("mv-skip-exists", path=anon_path(dst))
            return False
        if not src.exists():
            log_event("mv-skip-missing-src", path=anon_path(src), severity="warn")
            return False
        src_size = src.stat().st_size
        if src_size == 0:
            log_event("mv-skip-empty-src", path=anon_path(src), severity="warn")
            return False
        dst.parent.mkdir(parents=True, exist_ok=True)
        try:
            os.replace(str(src), str(dst))   # atomic on same fs
        except OSError as e:
            log_event("mv-fail", severity="error", error=str(e), path=anon_path(src))
            return False
        # verify
        if not dst.exists() or dst.stat().st_size != src_size:
            log_event("mv-verify-fail", severity="critical", path=anon_path(dst))
            return False
        log_event("mv-ok", src=anon_path(src), dst=anon_path(dst), bytes=src_size)
        return True

    # ---- HTTP helper -------------------------------------------------------
    def http_get(url: str, headers: dict = None, timeout: int = 30) -> bytes | None:
        req = urllib.request.Request(url, headers=headers or {})
        try:
            with urllib.request.urlopen(req, timeout=timeout) as r:
                return r.read() if r.status == 200 else None
        except urllib.error.HTTPError as e:
            if e.code != 404:
                log_event("http-error", severity="warn", code=e.code)
            return None
        except Exception as e:
            log_event("http-error", severity="warn", error=type(e).__name__)
            return None

    # ---- TMDb query helpers (German-first, exact-match scoring) -------------
    # Documented in docs/sops/media-library-standards.md ("TMDb integration")
    # and .claude/agents/media-manager.md ("TMDb query ladder").
    import urllib.parse as _urllib_parse

    # Release tokens stripped from raw folder names before TMDb query.
    # CRITICAL: do NOT add 2-letter language codes here (e.g. `fr`, `it`) — they
    # eat real words like `Fremde`, `Fragtime`, `From`, `Italienisch`.
    _NOISE = re.compile(
        r'\b(german|deutsch|dl|dual|english|spanish|italian|'
        r'bdrip|brrip|webrip|web-?dl|hdtv|hdrip|dvdrip|dvdr|bluray|blu-ray|'
        r'x264|x265|h\.?264|h\.?265|hevc|xvid|divx|aac|ac3|dts|dts-?hd|dtshd|atmos|truehd|dubbed|'
        r'1080p|720p|2160p|480p|360p|4k|uhd|hdr|sdr|10bit|8bit|hd|sd|ws|web|'
        r'unrated|extended|extreme|director\'?s?|dc|uncut|repack|proper|'
        r'internal|limited|read-?nfo|readnfo|crucial|opium|fme|wayne|sauerkraut|'
        r'empire|tk|fnd|spicy|zerotwo|anime|bimbambino|aniem|ast4u|gds|fsk|'
        r'remastered|remaster|criterion|imax|theatrical|complete|special|edition|platinum|teil|'
        r'\.|-|_)+\s*',
        re.IGNORECASE,
    )

    def umlaut_fix(s: str) -> str:
        """German romanisation: ae→ä, oe→ö, ue→ü."""
        return (s.replace('ae','ä').replace('oe','ö').replace('ue','ü')
                 .replace('Ae','Ä').replace('Oe','Ö').replace('Ue','Ü'))

    def clean_tmdb_query(folder_name: str):
        """Extract (clean_title, year_or_None) suitable for TMDb search."""
        m = YEAR_RE.search(folder_name)   # honours 1900-2099 constraint
        if m:
            year = int(m.group(1))
            raw = folder_name[:m.start()] + folder_name[m.end():]
        else:
            year = None
            raw = folder_name
        # Strip [bracket junk] and (NN) parenthetical sequence numbers
        raw = re.sub(r'\[[^\]]*\]', ' ', raw)
        raw = re.sub(r'\(\d{1,4}\)', ' ', raw)
        # Strip user prefix patterns: "A01 Title", "tm-foo", etc.
        raw = re.sub(r'^[A-Za-z]\d{1,2}\s+', '', raw)
        raw = re.sub(r'^(tm-|muhhd-|d-|dung-|tk-)\s*', '', raw, flags=re.IGNORECASE)
        # Replace separators with spaces
        title = raw.replace('.', ' ').replace('_', ' ').replace('-', ' ')
        # Strip release tokens
        while True:
            new = _NOISE.sub(' ', title)
            if new == title: break
            title = new
        return ' '.join(title.split()).strip(), year

    def tmdb_best_match(query: str, results: list) -> dict | None:
        """Strict scoring: exact > startswith > contains > popularity.

        Without this, `results[0]` is sorted by TMDb's relevance which
        favours the most *popular* match — `<franchise>` query returns
        `<franchise>: <newer-sequel>` because the sequel is currently
        more popular than the original.
        """
        if not results: return None
        ql = query.lower().strip()
        scored = []
        for r in results:
            title = (r.get('title') or r.get('name') or '').lower().strip()
            pop = r.get('popularity', 0)
            if title == ql: score = 10000 + pop
            elif title.startswith(ql + ' ') or title.startswith(ql + ':'): score = 5000 + pop
            elif ql in title: score = 1000 + pop
            else: score = pop
            scored.append((score, r))
        scored.sort(key=lambda x: -x[0])
        return scored[0][1]

    def tmdb_search(kind: str, query: str, year: int | None = None,
                    language: str | None = None, api_key: str = '') -> list:
        """Single TMDb search call. kind ∈ {movie, tv}.
        api_key MUST be a v3 key (32-char hex). v4 Bearer JWT returns 401."""
        if not query or not api_key: return []
        path = "movie" if kind == "movie" else "tv"
        q = _urllib_parse.quote_plus(query)
        url = f"https://api.themoviedb.org/3/search/{path}?api_key={api_key}&query={q}"
        if year and kind == "movie": url += f"&year={year}"
        if language: url += f"&language={language}"
        body = http_get(url)
        if not body: return []
        try: return (json.loads(body).get('results') or [])
        except (json.JSONDecodeError, ValueError): return []

    def tmdb_smart(kind: str, folder_name: str, api_key: str,
                   prefer_lang: str = 'de-DE') -> dict | None:
        """Multi-strategy TMDb lookup with German preference + exact-match scoring.
        Returns the best matching item or None."""
        title, year = clean_tmdb_query(folder_name)
        if not title: return None
        candidates = [(title, "clean")]
        u = umlaut_fix(title)
        if u != title: candidates.append((u, "umlaut"))
        # Try year-restricted first (most accurate when year present), then loose
        for q, _label in candidates:
            for y in (year, None) if year else (None,):
                for lang in (prefer_lang, None):
                    results = tmdb_search(kind, q, y, lang, api_key)
                    item = tmdb_best_match(q, results)
                    if item: return item
        return None

    # ---- safety: refuse share-root operations ------------------------------
    BANNED_DELETE_PATHS = {
        Path("/data"), Path("/data/data"), Path("/intake"),
        MEDIA_ROOT, JDOWNLOADER_ROOT,
    }

    def assert_safe_target(path: Path):
        """Raise if path is the share root or contains a glob."""
        p = path.resolve()
        if "*" in str(path) or "?" in str(path):
            raise SystemExit(f"REFUSED: glob in path: {anon_path(path)}")
        for banned in BANNED_DELETE_PATHS:
            if p == banned.resolve():
                raise SystemExit(f"REFUSED: target is share root: {anon_path(path)}")
        if not str(p).startswith(str(MEDIA_ROOT.resolve())) \
           and not str(p).startswith(str(JDOWNLOADER_ROOT.resolve())):
            raise SystemExit(f"REFUSED: target outside known mount: {anon_path(path)}")

  # =========================================================================
  # audit.py — read-only library walker, emits markdown + JSON to stdout
  # =========================================================================
  audit.py: |
    """Audit the media library for compliance with media-library-standards.

    Read-only. Emits a markdown summary (heading lines) and per-section JSON
    counts to stdout. Does NOT name individual items — only counts and
    anonymous identifiers (`item #1`, `item #2`, ...).
    """
    import sys
    from pathlib import Path
    from xml.etree import ElementTree as ET
    sys.path.insert(0, "/app")
    from common import (
        SECTIONS, MEDIA_ROOT, EP_RE, YEAR_RE, YT_ID_RE,
        log, log_event, anon_path, image_dims,
    )

    POSTER_MIN_WIDTH = 600
    FANART_MIN_WIDTH = 1280

    def check_movie(folder: Path) -> dict:
        """Compliance record for one movie folder."""
        name = folder.name
        # Layout: must be a folder named "Title (Year)"
        layout_ok = bool(YEAR_RE.search(name))
        # Filename: must contain matching .mkv/.mp4 inside
        media = next((f for f in folder.iterdir()
                      if f.is_file() and f.suffix.lower() in {".mkv", ".mp4", ".avi", ".m4v"}),
                     None)
        filename_ok = media is not None and media.stem == name
        # NFO
        nfo = folder / f"{name}.nfo"
        nfo_ok = False
        if nfo.exists():
            try:
                root = ET.parse(nfo).getroot()
                nfo_ok = bool(root.find(".//title") is not None and root.find(".//year") is not None)
            except Exception:
                nfo_ok = False
        # Poster + Fanart
        poster = folder / "poster.jpg"
        fanart = folder / "fanart.jpg"
        pw, _ = image_dims(poster) if poster.exists() else (0, 0)
        fw, _ = image_dims(fanart) if fanart.exists() else (0, 0)
        return {
            "layout":  layout_ok,
            "filename": filename_ok,
            "nfo":     nfo_ok,
            "poster":  pw >= POSTER_MIN_WIDTH,
            "fanart":  fw >= FANART_MIN_WIDTH,
        }

    def audit_movies():
        root = SECTIONS["movies"]
        if not root.is_dir():
            log("Movies: section root missing")
            return None
        # Two cases: (a) folder = movie (nested = compliant); (b) loose .mkv (flat = non-compliant)
        # Filter `_*` folders (e.g. _duplicates/, _archive/) — they're operator
        # housekeeping, not library content. Otherwise they show as
        # 1 false-positive non-compliant item per audit run.
        nested, flat = [], []
        movie_nfo_orphan = 0      # Plex/Jellyfin auto-write — should be deduped
        drift_count = 0           # nfo year ≠ folder year (ignoring 1080/720 since YEAR_RE blocks those now)
        inner_basename_mismatch = 0
        for entry in sorted(root.iterdir()):
            if entry.name.startswith('_'):
                continue
            if entry.is_dir():
                rec = check_movie(entry)
                nested.append(rec)
                # Bonus checks (don't affect compliance %, just surfaced)
                if (entry / "movie.nfo").exists() and (entry / f"{entry.name}.nfo").exists():
                    movie_nfo_orphan += 1
                # Drift: parse nfo, compare to folder
                nfo_path = entry / f"{entry.name}.nfo"
                if nfo_path.exists():
                    try:
                        from xml.etree import ElementTree as _ET
                        nfo_root = _ET.parse(nfo_path).getroot()
                        nfo_year = (nfo_root.findtext('.//year') or '').strip()
                        m = YEAR_RE.search(entry.name)
                        if m and nfo_year and abs(int(nfo_year) - int(m.group(1))) > 5:
                            drift_count += 1
                    except Exception:
                        pass
                # Inner-file basename consistency
                for inner in entry.iterdir():
                    if inner.is_file() and inner.suffix.lower() in {".mkv", ".mp4", ".avi", ".m4v"}:
                        if inner.stem != entry.name and "- cd" not in inner.stem:
                            inner_basename_mismatch += 1
            elif entry.is_file() and entry.suffix.lower() in {".mkv", ".mp4", ".avi", ".m4v"}:
                flat.append(entry.name)
        total = len(nested) + len(flat)
        if total == 0:
            return {"section": "movies", "items": 0}
        compliant = sum(1 for r in nested if all(r.values()))
        return {
            "section":              "movies",
            "items":                total,
            "nested":               len(nested),
            "flat":                 len(flat),
            "compliant":            compliant,
            "layout_pct":           round(100 * len(nested) / total, 1),
            "nfo_pct":              round(100 * sum(r["nfo"] for r in nested) / max(len(nested), 1), 1),
            "poster_pct":           round(100 * sum(r["poster"] for r in nested) / max(len(nested), 1), 1),
            "fanart_pct":           round(100 * sum(r["fanart"] for r in nested) / max(len(nested), 1), 1),
            "movie_nfo_orphan":     movie_nfo_orphan,
            "drift":                drift_count,
            "inner_basename_mismatch": inner_basename_mismatch,
        }

    def audit_tv():
        root = SECTIONS["tv"]
        if not root.is_dir():
            log("TV Shows: section root missing")
            return None
        # Filter `_*` housekeeping folders (same reason as audit_movies)
        shows = [s for s in sorted(root.iterdir()) if s.is_dir() and not s.name.startswith('_')]
        episodes_total, episodes_in_season = 0, 0
        series_compliant = 0
        for show in shows:
            tvshow_nfo = show / "tvshow.nfo"
            poster_w, _ = image_dims(show / "poster.jpg") if (show / "poster.jpg").exists() else (0, 0)
            fanart_w, _ = image_dims(show / "fanart.jpg") if (show / "fanart.jpg").exists() else (0, 0)
            series_ok = (tvshow_nfo.exists()
                         and poster_w >= POSTER_MIN_WIDTH
                         and fanart_w >= FANART_MIN_WIDTH)
            if series_ok:
                series_compliant += 1
            # Walk episodes
            for ep in show.rglob("*"):
                if ep.is_file() and ep.suffix.lower() in {".mkv", ".mp4", ".avi", ".m4v"}:
                    episodes_total += 1
                    if ep.parent.name.lower().startswith("season"):
                        episodes_in_season += 1
        return {
            "section":              "tv",
            "shows":                len(shows),
            "shows_compliant":      series_compliant,
            "episodes_total":       episodes_total,
            "episodes_in_season":   episodes_in_season,
            "season_layout_pct":    round(100 * episodes_in_season / max(episodes_total, 1), 1),
            "series_compliance_pct": round(100 * series_compliant / max(len(shows), 1), 1),
        }

    def main():
        log("# Media Library Audit")
        log(f"Mount root: {MEDIA_ROOT}")
        log("")
        log("YouTube (Tube Archivist) is Jellyfin-only and not audited here.")
        log("")
        results = []
        for fn in (audit_movies, audit_tv):
            r = fn()
            if r:
                results.append(r)
                log_event("audit-section", **r)
        log("")
        log("## Summary")
        for r in results:
            log(f"- {r['section']}: " + ", ".join(
                f"{k}={v}" for k, v in r.items() if k != "section"))
        # Exit non-zero if any section has < 80% compliance somewhere
        worst = 100.0
        for r in results:
            for k, v in r.items():
                if k.endswith("_pct") and isinstance(v, (int, float)):
                    worst = min(worst, v)
        log(f"\nWorst compliance metric: {worst}%")
        # Always exit 0 — the audit ran successfully if it walked the share.
        # Low compliance is a number, not a Job failure; alerting on it
        # belongs to a metrics exporter, not a CronJob exit code.
        sys.exit(0)

    if __name__ == "__main__":
        main()

  # =========================================================================
  # rescan.py — trigger Plex + Jellyfin library refresh
  # =========================================================================
  rescan.py: |
    """Trigger library rescan in Plex + Jellyfin.

    Required env (from media-manager-tokens secret):
      PLEX_URL          (default http://plex-plex-media-server.media.svc.cluster.local:32400)
      PLEX_TOKEN
      PLEX_SECTION_IDS  (comma-separated, e.g. "1,2,3")
      JELLYFIN_URL      (default http://jellyfin.media.svc.cluster.local:8096)
      JELLYFIN_API_KEY

    Note: the Plex chart names its service `plex-plex-media-server`, NOT `plex`.
    Defaults below match the actual cluster service names — overriding via env
    is supported but rarely needed.
    """
    import os
    import sys
    import urllib.request
    import urllib.error
    sys.path.insert(0, "/app")
    from common import log, log_event

    def post(url, headers=None):
        req = urllib.request.Request(url, headers=headers or {}, method="POST")
        try:
            with urllib.request.urlopen(req, timeout=30) as r:
                return r.status
        except urllib.error.HTTPError as e:
            return e.code
        except Exception as e:
            log_event("rescan-error", severity="warn", error=type(e).__name__)
            return 0

    def main():
        plex_url = os.environ.get("PLEX_URL", "http://plex-plex-media-server.media.svc.cluster.local:32400")
        plex_token = os.environ.get("PLEX_TOKEN", "")
        sections = [s.strip() for s in os.environ.get("PLEX_SECTION_IDS", "").split(",") if s.strip()]
        jf_url = os.environ.get("JELLYFIN_URL", "http://jellyfin.media.svc.cluster.local:8096")
        jf_key = os.environ.get("JELLYFIN_API_KEY", "")

        if plex_token and sections:
            for sid in sections:
                code = post(f"{plex_url}/library/sections/{sid}/refresh?X-Plex-Token={plex_token}")
                log_event("plex-rescan", section=sid, status=code)
        else:
            log_event("plex-rescan-skipped", reason="missing-token-or-sections", severity="warn")

        if jf_key:
            code = post(f"{jf_url}/Library/Refresh", headers={"X-Emby-Token": jf_key})
            log_event("jellyfin-rescan", status=code)
        else:
            log_event("jellyfin-rescan-skipped", reason="missing-key", severity="warn")

    if __name__ == "__main__":
        main()

  # =========================================================================
  # cleanup.py — `rm -rf` of an explicit subpath only, with re-verification
  # =========================================================================
  cleanup.py: |
    """Remove a specific JDownloader subdirectory after re-verifying that all
    its media files exist at known destination paths with size > 0.

    Required env:
      CLEANUP_PATH           absolute path inside /intake (no globs)
      VERIFY_DESTINATIONS    JSON list of dst paths that MUST all exist with
                             size > 0 before any rm. Empty list => REFUSE.
    """
    import json
    import os
    import shutil
    import sys
    from pathlib import Path
    sys.path.insert(0, "/app")
    from common import (
        log, log_event, anon_path, assert_safe_target, JDOWNLOADER_ROOT,
    )

    def main():
        path = Path(os.environ.get("CLEANUP_PATH", ""))
        verify = os.environ.get("VERIFY_DESTINATIONS", "")
        if not str(path):
            sys.exit("REFUSED: CLEANUP_PATH unset")
        if not verify:
            sys.exit("REFUSED: VERIFY_DESTINATIONS empty (no proof that moves succeeded)")
        try:
            destinations = [Path(p) for p in json.loads(verify)]
        except Exception:
            sys.exit("REFUSED: VERIFY_DESTINATIONS not valid JSON list")
        if not destinations:
            sys.exit("REFUSED: VERIFY_DESTINATIONS list is empty")

        # Hard rail: target must be a real subpath of /intake, not a glob, not the root
        assert_safe_target(path)
        if path == JDOWNLOADER_ROOT:
            sys.exit("REFUSED: refuses to delete the intake root itself")

        # Pre-flight: every destination must exist with size > 0
        missing = []
        for d in destinations:
            if not d.exists():
                missing.append(("missing", anon_path(d)))
            elif d.is_file() and d.stat().st_size == 0:
                missing.append(("empty", anon_path(d)))
        if missing:
            log_event("cleanup-refused", severity="critical",
                      reason="verification-failed", missing=missing)
            sys.exit(1)

        # OK to remove
        if not path.exists():
            log_event("cleanup-skip-missing", path=anon_path(path))
            return
        log_event("cleanup-remove-start", path=anon_path(path))
        shutil.rmtree(path)
        log_event("cleanup-remove-ok", path=anon_path(path))

    if __name__ == "__main__":
        main()

  # =========================================================================
  # organize.py — apply a move plan from stdin (JSON)
  # =========================================================================
  organize.py: |
    """Apply a move plan from stdin.

    Plan format (JSON):
      {"dry_run": true,
       "moves": [{"src": "/intake/foo.mkv", "dst": "/data/data/Movies/Foo (2024)/Foo (2024).mkv"},
                 ...]}

    Refuses globs, refuses share-root targets, mv-only (atomic on same fs),
    verify-before-delete is implicit (mv does not delete src on failure).
    """
    import json
    import sys
    from pathlib import Path
    sys.path.insert(0, "/app")
    from common import atomic_mv, assert_safe_target, log, log_event, anon_path

    def main():
        try:
            plan = json.load(sys.stdin)
        except Exception as e:
            sys.exit(f"REFUSED: stdin is not valid JSON: {e}")
        moves = plan.get("moves", [])
        dry_run = bool(plan.get("dry_run", True))   # default safe
        if not moves:
            sys.exit("REFUSED: empty moves list")

        for m in moves:
            src = Path(m["src"])
            dst = Path(m["dst"])
            assert_safe_target(src)
            assert_safe_target(dst)

        log_event("organize-start", count=len(moves), dry_run=dry_run)
        ok, fail = 0, 0
        for m in moves:
            src, dst = Path(m["src"]), Path(m["dst"])
            if dry_run:
                log_event("organize-plan", src=anon_path(src), dst=anon_path(dst))
                ok += 1
                continue
            if atomic_mv(src, dst):
                ok += 1
            else:
                fail += 1
        log_event("organize-done", ok=ok, fail=fail, dry_run=dry_run)
        sys.exit(0 if fail == 0 else 1)

    if __name__ == "__main__":
        main()

  # =========================================================================
  # sidecar.py — fetch + write .nfo + poster + fanart for one item
  # =========================================================================
  sidecar.py: |
    """Fetch sidecars (.nfo + poster.jpg + fanart.jpg) from TMDb for one movie
    or one TV show folder.

    Required env:
      ITEM_PATH        absolute path of the movie folder OR show folder
      ITEM_KIND        "movie" | "show"
      TMDB_API_KEY     **MUST be a v3 API key** (32-char hex) — the v4 Bearer
                       JWT is sent as Authorization header and does NOT work
                       as the `?api_key=` query param. Wrong key → HTTP 401.
                       Get the v3 key from https://www.themoviedb.org/settings/api
      TMDB_QUERY       title to search (omit to derive from folder name via
                       common.clean_tmdb_query; useful for batch retry)
      TMDB_YEAR        optional year (movies). Year-restricted queries are
                       ~99% accurate when the year is right.

    Strategy: tmdb_smart() in common.py applies the German-first +
    umlaut-fallback + exact-match-scoring ladder. Eliminates the popularity
    bug where `<franchise>` query returned `<franchise>: <newer-sequel>`.
    """
    import os
    import sys
    from pathlib import Path
    sys.path.insert(0, "/app")
    from common import (
        http_get, log_event, anon_path, assert_safe_target,
        tmdb_smart, tmdb_search, tmdb_best_match,
    )

    IMG = "https://image.tmdb.org/t/p"

    def write_nfo(target: Path, kind: str, item: dict):
        title = item.get("title") or item.get("name") or ""
        year = (item.get("release_date") or item.get("first_air_date") or "")[:4]
        tag = "movie" if kind == "movie" else "tvshow"
        plot = (item.get('overview') or '').replace('<', '&lt;')
        body = (
            f"<{tag}>\n"
            f"  <title>{title}</title>\n"
            f"  <year>{year}</year>\n"
            f'  <uniqueid type="tmdb">{item.get("id", "")}</uniqueid>\n'
            f"  <plot>{plot}</plot>\n"
            f"</{tag}>\n"
        )
        target.write_text(body, encoding="utf-8")
        log_event("nfo-written", path=anon_path(target))

    def fetch_image(url: str, target: Path):
        body = http_get(url)
        if body:
            target.write_bytes(body)
            log_event("image-written", path=anon_path(target), bytes=len(body))
        else:
            log_event("image-fetch-failed", path=anon_path(target), severity="warn")

    def main():
        item_path = Path(os.environ.get("ITEM_PATH", ""))
        kind = os.environ.get("ITEM_KIND", "")
        query = os.environ.get("TMDB_QUERY", "")
        year = os.environ.get("TMDB_YEAR", "")
        key = os.environ.get("TMDB_API_KEY", "")
        if not (item_path and kind and key):
            sys.exit("REFUSED: missing one of ITEM_PATH/ITEM_KIND/TMDB_API_KEY")
        if kind not in {"movie", "show"}:
            sys.exit("REFUSED: ITEM_KIND must be 'movie' or 'show'")
        assert_safe_target(item_path)
        if not item_path.is_dir():
            sys.exit("REFUSED: ITEM_PATH does not exist or is not a directory")

        # Two paths:
        # 1. Explicit TMDB_QUERY supplied (manual override) → year-restricted
        #    single search with exact-match scoring.
        # 2. No explicit query → use tmdb_smart() to derive from folder name
        #    with the full strategy ladder (German-first, umlauts, prefix
        #    stripping, etc.). This is the smart-retry mode.
        if query:
            year_int = int(year) if year and year.isdigit() else None
            results = tmdb_search(kind, query, year_int, 'de-DE', key)
            if not results:
                results = tmdb_search(kind, query, year_int, None, key)
            item = tmdb_best_match(query, results)
        else:
            item = tmdb_smart(kind, item_path.name, key)

        if not item:
            log_event("tmdb-no-match", severity="warn")
            sys.exit(2)

        nfo_name = "tvshow.nfo" if kind == "show" else f"{item_path.name}.nfo"
        # Drop any pre-existing nfos so we don't end up with both
        # <folder>.nfo and movie.nfo (Plex/Jellyfin auto-write `movie.nfo`).
        for f in item_path.iterdir():
            if f.is_file() and f.suffix.lower() == '.nfo':
                try: f.unlink()
                except OSError: pass
        write_nfo(item_path / nfo_name, kind, item)

        if item.get("poster_path"):
            fetch_image(f"{IMG}/w780{item['poster_path']}", item_path / "poster.jpg")
        if item.get("backdrop_path"):
            fetch_image(f"{IMG}/w1920{item['backdrop_path']}", item_path / "fanart.jpg")

    if __name__ == "__main__":
        main()

  # =========================================================================
  # cleanup_nfos.py — delete redundant `movie.nfo` next to `<folder>.nfo`
  # =========================================================================
  # Plex/Jellyfin auto-write `movie.nfo` during library scans alongside any
  # existing `<folder>.nfo`. Both readers tolerate either, but having both
  # creates drift over time. This script keeps `<folder>.nfo` (the SOP
  # canonical) and removes the auto-generated duplicate.
  #
  # Read-only walk: each Movies/<X>/ folder, if both `<X>.nfo` and `movie.nfo`
  # exist, delete `movie.nfo`.
  # =========================================================================
  # =========================================================================
  # metadata_coverage.py — server-side metadata coverage check
  # =========================================================================
  # Queries Plex (per section) + Jellyfin and reports coverage %.
  # On-disk audit (audit.py) shows nfo/poster files exist; this shows whether
  # Plex/Jellyfin actually parsed + indexed them. Result emitted as JSON on
  # last stdout line; dashboard reads via kubectl-equivalent API.
  # =========================================================================
  metadata_coverage.py: |
    """Plex + Jellyfin server-side metadata coverage report.

    Required env (from media-manager-tokens secret):
      PLEX_URL, PLEX_TOKEN, PLEX_SECTION_IDS  (comma-separated)
      JELLYFIN_URL, JELLYFIN_API_KEY

    Output: structured log lines (`coverage-section`, `coverage-jellyfin`)
    AND a final compact JSON on the last stdout line that the dashboard
    parses. Dashboard reads via pod-log kubectl API.
    """
    import json, os, sys, time, urllib.request, urllib.error
    sys.path.insert(0, "/app")
    from common import log_event

    def http_get_json(url, headers=None):
        req = urllib.request.Request(url, headers=headers or {})
        try:
            with urllib.request.urlopen(req, timeout=30) as r:
                if r.status != 200: return None
                return json.loads(r.read())
        except urllib.error.HTTPError as e:
            log_event("coverage-http-error", severity="warn", code=e.code)
            return None
        except Exception as e:
            log_event("coverage-http-error", severity="warn", error=type(e).__name__)
            return None

    def plex_section(plex_url, token, sid):
        # Plex returns XML by default; ask for JSON via Accept header.
        url = f"{plex_url}/library/sections/{sid}/all?X-Plex-Token={token}"
        data = http_get_json(url, headers={"Accept": "application/json"})
        if not data:
            return None
        container = data.get("MediaContainer", {})
        items = container.get("Metadata", []) or []
        total = len(items)
        summary = sum(1 for i in items if (i.get("summary") or "").strip())
        thumb   = sum(1 for i in items if (i.get("thumb") or "").strip())
        art     = sum(1 for i in items if (i.get("art") or "").strip())
        title   = container.get("title1") or container.get("librarySectionTitle") or ""
        return {
            "section_id": sid,
            "title": title,
            "total": total,
            "with_summary": summary,
            "with_thumb": thumb,
            "with_art": art,
            "summary_pct": round(100*summary/total, 1) if total else 0.0,
            "thumb_pct":   round(100*thumb/total, 1)   if total else 0.0,
            "art_pct":     round(100*art/total, 1)     if total else 0.0,
        }

    def plex_unmatched(plex_url, token, sid):
        """Item count Plex marks as 'unmatched' in this section."""
        url = f"{plex_url}/library/sections/{sid}/unmatched?X-Plex-Token={token}"
        data = http_get_json(url, headers={"Accept": "application/json"})
        if not data:
            return 0
        return len(data.get("MediaContainer", {}).get("Metadata", []) or [])

    def jellyfin_items(jf_url, key):
        # Jellyfin: query Items recursively, including Movies + Series at top level.
        url = (f"{jf_url}/Items?Recursive=true"
               f"&IncludeItemTypes=Movie,Series"
               f"&Fields=Overview,ImageTags,BackdropImageTags"
               f"&Limit=10000")
        data = http_get_json(url, headers={"X-Emby-Token": key})
        if not data:
            return None
        items = data.get("Items", []) or []
        total = len(items)
        overview = sum(1 for i in items if (i.get("Overview") or "").strip())
        primary  = sum(1 for i in items if (i.get("ImageTags") or {}).get("Primary"))
        backdrop = sum(1 for i in items if i.get("BackdropImageTags"))
        return {
            "total":               total,
            "with_overview":       overview,
            "with_primary_image":  primary,
            "with_backdrop_image": backdrop,
            "overview_pct":  round(100*overview/total, 1) if total else 0.0,
            "primary_pct":   round(100*primary/total, 1)  if total else 0.0,
            "backdrop_pct":  round(100*backdrop/total, 1) if total else 0.0,
        }

    def main():
        plex_url = os.environ.get("PLEX_URL", "http://plex-plex-media-server.media.svc.cluster.local:32400")
        plex_token = os.environ.get("PLEX_TOKEN", "")
        plex_sids = [s.strip() for s in os.environ.get("PLEX_SECTION_IDS", "").split(",") if s.strip()]
        jf_url = os.environ.get("JELLYFIN_URL", "http://jellyfin.media.svc.cluster.local:8096")
        jf_key = os.environ.get("JELLYFIN_API_KEY", "")

        result = {"timestamp": int(time.time()), "plex": [], "jellyfin": None}

        if plex_token and plex_sids:
            for sid in plex_sids:
                sec = plex_section(plex_url, plex_token, sid)
                if sec:
                    sec["unmatched"] = plex_unmatched(plex_url, plex_token, sid)
                    result["plex"].append(sec)
                    log_event("coverage-section", server="plex", **{
                        k: v for k, v in sec.items() if k != "title"
                    })
        else:
            log_event("coverage-skipped", server="plex", reason="missing-token-or-sections", severity="warn")

        if jf_key:
            jf = jellyfin_items(jf_url, jf_key)
            if jf:
                result["jellyfin"] = jf
                log_event("coverage-jellyfin", **jf)
        else:
            log_event("coverage-skipped", server="jellyfin", reason="missing-key", severity="warn")

        # Final line: compact JSON that the dashboard parses
        print("COVERAGE_RESULT_JSON " + json.dumps(result, separators=(',', ':')))

    if __name__ == "__main__":
        main()

  cleanup_nfos.py: |
    """Periodic cleanup: delete redundant `movie.nfo` Plex/Jellyfin auto-writes.

    No env required. Safe by construction:
      - Only deletes the literal filename `movie.nfo`
      - Only when a sibling `<folder>.nfo` exists in the same directory
      - Only inside MEDIA_ROOT/Movies (skips _* folders)
      - Reports counts; never lists titles
    """
    import os, sys
    from pathlib import Path
    sys.path.insert(0, "/app")
    from common import SECTIONS, log, log_event

    def main():
        root = SECTIONS["movies"]
        if not root.is_dir():
            sys.exit("REFUSED: Movies section root missing")
        deleted = inspected = 0
        for d in sorted(os.listdir(root)):
            full = root / d
            if not full.is_dir() or d.startswith('_'):
                continue
            inspected += 1
            movie_nfo = full / "movie.nfo"
            folder_nfo = full / f"{d}.nfo"
            if movie_nfo.exists() and folder_nfo.exists():
                try:
                    movie_nfo.unlink()
                    deleted += 1
                except OSError as e:
                    log_event("nfo-cleanup-fail", severity="warn", error=type(e).__name__)
        log_event("nfo-cleanup-done", inspected=inspected, deleted=deleted)
        log(f"Deleted {deleted} redundant movie.nfo files (kept canonical <folder>.nfo)")
        sys.exit(0)

    if __name__ == "__main__":
        main()
