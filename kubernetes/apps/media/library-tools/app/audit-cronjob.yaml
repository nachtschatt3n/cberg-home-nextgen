---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: media-library-audit
  namespace: media
spec:
  schedule: "15 4 * * *"   # daily at 04:15 local
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          restartPolicy: Never
          # Init container provides a static ffprobe binary in /tools.
          # Static build = no runtime apt-get, no shared-library juggling,
          # no privilege needed in the main container. Image is purpose-built
          # for "drop a static ffmpeg binary into a sidecar volume".
          initContainers:
            - name: install-ffprobe
              image: mwader/static-ffmpeg:7.1
              command: ["sh", "-c", "cp /ffprobe /tools/ffprobe && chmod +x /tools/ffprobe"]
              volumeMounts:
                - name: tools
                  mountPath: /tools
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  memory: 64Mi
          containers:
            - name: audit
              image: python:3.11-slim
              command: ["python", "/app/audit.py"]
              env:
                - name: MEDIA_ROOT
                  value: "/data/data"
                - name: PATH
                  value: "/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              volumeMounts:
                - name: tools
                  mountPath: /tools
                  readOnly: true
                - name: scripts
                  mountPath: /app
                - name: media
                  mountPath: /data
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
          volumes:
            - name: tools
              emptyDir: {}
            - name: scripts
              configMap:
                name: library-tools-scripts
            - name: media
              persistentVolumeClaim:
                claimName: plex-media-smb   # read-only mount; uses Plex's PVC
