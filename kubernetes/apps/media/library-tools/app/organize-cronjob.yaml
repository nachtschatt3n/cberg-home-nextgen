---
# Suspended CronJob — invoked on-demand via:
#   kubectl -n media create job --from=cronjob/media-organize media-organize-<id> -- \
#     /bin/sh -ec 'cat /plan/plan.json | python /app/organize.py'
# A move plan must be supplied via stdin (mount a ConfigMap as /plan or use
# --command -- with a shell that pipes in the plan). See the dashboard or the
# media-manager sub-agent for full invocation patterns.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: media-organize
  namespace: media
spec:
  schedule: "0 0 31 2 *"   # never (Feb 31 is invalid)
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          restartPolicy: Never
          containers:
            - name: organize
              image: python:3.11-slim
              command: ["python", "/app/organize.py"]
              env:
                - name: MEDIA_ROOT
                  value: "/data/data"
                - name: JDOWNLOADER_ROOT
                  value: "/intake"
              volumeMounts:
                - name: scripts
                  mountPath: /app
                - name: media
                  mountPath: /data
                - name: intake
                  mountPath: /intake
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
          volumes:
            - name: scripts
              configMap:
                name: library-tools-scripts
            - name: media
              persistentVolumeClaim:
                claimName: plex-media-smb
            - name: intake
              persistentVolumeClaim:
                claimName: jdownloader-intake
