---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: media-dashboard
  namespace: media
  labels:
    gethomepage.dev/enabled: "true"
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Media Dashboard"
    gethomepage.dev/description: "Audit + intake + Plex/Jellyfin rescan triggers"
    gethomepage.dev/group: "Media"
    gethomepage.dev/icon: "mdi-folder-cog"
spec:
  ingressClassName: internal
  rules:
    - host: "media-dashboard.${SECRET_DOMAIN}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: media-dashboard
                port:
                  number: 80
  tls:
    - hosts:
        - "media-dashboard.${SECRET_DOMAIN}"
