---
# Suspended CronJob — invoked on-demand to remove a SPECIFIC JDownloader
# subdirectory after re-verifying every move target exists with size > 0.
# Refuses globs, share roots, missing VERIFY_DESTINATIONS. See cleanup.py.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: media-cleanup
  namespace: media
spec:
  schedule: "0 0 31 2 *"   # never
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          restartPolicy: Never
          containers:
            - name: cleanup
              image: python:3.11-slim
              command: ["python", "/app/cleanup.py"]
              env:
                - name: MEDIA_ROOT
                  value: "/data/data"
                - name: JDOWNLOADER_ROOT
                  value: "/intake"
                # Overridden per-invocation:
                # CLEANUP_PATH, VERIFY_DESTINATIONS
              volumeMounts:
                - name: scripts
                  mountPath: /app
                - name: media
                  mountPath: /data
                  readOnly: true   # cleanup never writes to library, only verifies
                - name: intake
                  mountPath: /intake
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 256Mi
          volumes:
            - name: scripts
              configMap:
                name: library-tools-scripts
            - name: media
              persistentVolumeClaim:
                claimName: plex-media-smb
            - name: intake
              persistentVolumeClaim:
                claimName: jdownloader-intake
