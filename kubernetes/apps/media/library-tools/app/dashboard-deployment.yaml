---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-dashboard
  namespace: media
  labels:
    app.kubernetes.io/name: media-dashboard
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: media-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: media-dashboard
    spec:
      serviceAccountName: media-dashboard
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: dashboard
          image: python:3.11-slim
          command: ["python", "/app/dashboard.py"]
          env:
            - name: INTAKE_ROOT
              value: "/intake"
            - name: PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: app
              mountPath: /app
            - name: intake
              mountPath: /intake
              readOnly: true
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: app
          configMap:
            name: media-dashboard
        - name: intake
          persistentVolumeClaim:
            claimName: jdownloader-intake
