---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: "cifs-jellyfin-media"
provisioner: smb.csi.k8s.io
# subdir is the share root and apps share this filesystem with Plex; reclaim
# MUST stay Retain so a PVC delete cannot recursively wipe the share. See
# docs/sops/storage-safety.md (2026-04-26 incident).
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true
mountOptions:
  - vers=3.1.1
  - dir_mode=0777
  - file_mode=0777
  - uid=1000
  - gid=1000
  - noperm
  - noatime
  - rsize=1048576
  - wsize=1048576
  - cache=loose
  - actimeo=30
  - serverino
parameters:
  source: "//${NAS_HOSTNAME}/media"
  subdir: "/"
  csi.storage.k8s.io/node-stage-secret-name: "csi-driver-smb"
  csi.storage.k8s.io/node-stage-secret-namespace: "kube-system"
  csi.storage.k8s.io/provisioner-secret-name: "csi-driver-smb"
  csi.storage.k8s.io/provisioner-secret-namespace: "kube-system"
