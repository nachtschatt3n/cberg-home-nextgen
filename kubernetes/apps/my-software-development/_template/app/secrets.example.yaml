---
# TEMPLATE ONLY — do NOT commit this file with real values.
# This file is NOT matched by SOPS path rules (*.sops.yaml required).
# Usage: cp secrets.example.yaml secrets.sops.yaml → fill in values → sops -e -i secrets.sops.yaml → commit secrets.sops.yaml only
apiVersion: v1
kind: Secret
metadata:
  name: opencode-PROJECT_NAME-secrets
stringData:
  GH_TOKEN: <github-personal-access-token>
  REPO_NAME: <owner/repo>
  OPENCODE_SERVER_PASSWORD: <web-ui-password>
  OPENCODE_SERVER_USERNAME: opencode
  ANTHROPIC_API_KEY: <anthropic-api-key>
  OPENAI_API_KEY: <openai-api-key>
  GEMINI_API_KEY: <gemini-api-key>
  DEV_SERVER_CMD: "npm run dev -- --host 0.0.0.0"
