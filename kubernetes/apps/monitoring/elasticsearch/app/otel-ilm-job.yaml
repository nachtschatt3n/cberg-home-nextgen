---
# Bootstraps ILM retention policies for OTel native data streams.
# Runs once after Elasticsearch is ready; safe to re-run (PUT is idempotent).
# Retention: logs=7d, metrics=7d, traces=7d
apiVersion: batch/v1
kind: Job
metadata:
  name: elasticsearch-otel-ilm-bootstrap
  namespace: monitoring
  annotations:
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: curlimages/curl:8.19.0
          imagePullPolicy: IfNotPresent
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-es-elastic-user
                  key: elastic
          volumeMounts:
            - name: config
              mountPath: /config
            - name: es-certs
              mountPath: /certs
              readOnly: true
          command:
            - sh
            - -c
            - |
              set -euo pipefail
              ES_URL="https://elasticsearch-es-http.monitoring.svc:9200"
              CACERT="--cacert /certs/ca.crt"
              AUTH="-u elastic:$${ELASTIC_PASSWORD}"

              # Wait for Elasticsearch to be ready
              for i in $(seq 1 60); do
                if curl -sSf $CACERT $AUTH "$${ES_URL}" >/dev/null 2>&1; then
                  echo "Elasticsearch is ready."
                  break
                fi
                echo "Waiting for Elasticsearch ($i/60)..."
                sleep 5
              done

              curl -sSf $CACERT $AUTH "$${ES_URL}" >/dev/null 2>&1 || {
                echo "Elasticsearch did not become ready in time." >&2
                exit 1
              }

              # Single-node: set default replicas to 0 to avoid permanent YELLOW
              echo "Setting default replicas to 0 (single-node cluster)..."
              curl -sSf $CACERT $AUTH \
                -H 'Content-Type: application/json' \
                -X PUT "$${ES_URL}/_index_template/single-node-defaults" \
                -d '{"index_patterns":["*"],"priority":1,"template":{"settings":{"number_of_replicas":0}}}'
              echo ""

              # Apply ILM policies
              for policy in logs metrics traces; do
                echo "Applying $${policy}@lifecycle ..."
                curl -sSf $CACERT $AUTH \
                  -H 'Content-Type: application/json' \
                  -X PUT "$${ES_URL}/_ilm/policy/$${policy}%40lifecycle" \
                  --data-binary "@/config/$${policy}-lifecycle.json"
                echo ""
              done

              # Set Data Stream Lifecycle (DSL) retention on OTel data streams.
              # DSL overrides ILM for these streams; must be set explicitly.
              # Data streams may not exist yet on a fresh cluster — only set DSL if they do.
              set_dsl() {
                local stream="$1"
                local status
                status=$(curl -s -o /dev/null -w '%{http_code}' $CACERT $AUTH \
                  "$${ES_URL}/_data_stream/$${stream}")
                if [ "$${status}" = "200" ]; then
                  echo "Setting DSL retention: $${stream}=7d ..."
                  curl -sSf $CACERT $AUTH \
                    -H 'Content-Type: application/json' \
                    -X PUT "$${ES_URL}/_data_stream/$${stream}/_lifecycle" \
                    -d '{"data_retention":"7d"}'
                  echo ""
                else
                  echo "Skipping DSL for $${stream} (not yet created, status=$${status})"
                fi
              }

              set_dsl "logs-generic-default"
              set_dsl "metrics-generic.otel-default"

              echo "OTel ILM policies and DSL retention applied successfully."
      volumes:
        - name: config
          configMap:
            name: elasticsearch-otel-ilm
        - name: es-certs
          secret:
            secretName: elasticsearch-es-http-certs-public
            items:
              - key: tls.crt
                path: ca.crt
