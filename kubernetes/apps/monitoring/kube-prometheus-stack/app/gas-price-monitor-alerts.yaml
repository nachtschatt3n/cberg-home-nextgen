---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app.kubernetes.io/name: kube-prometheus-stack
    app.kubernetes.io/part-of: kube-prometheus-stack
    release: kube-prometheus-stack
  name: gas-price-monitor-alerts
  namespace: monitoring
spec:
  groups:
    - interval: 30s
      name: gas-price-monitor.pods.health
      rules:
        - alert: GasPriceMonitorPodNotReady
          annotations:
            description: Gas price monitor pod {{ $labels.pod }} has been not ready for
              more than 5 minutes. The Tankerkoenig fuel-price dashboard is unreachable.
            summary: Gas price monitor pod {{ $labels.pod }} is not ready
          expr: |
            sum by (namespace, pod) (
              kube_pod_status_ready{namespace="my-software-production", pod=~"gas-price-monitor-.*", condition="true"}
            ) == 0
          for: 5m
          labels:
            category: my-software-production
            component: gas-price-monitor
            severity: critical
        - alert: GasPriceMonitorPodCrashLooping
          annotations:
            description: Gas price monitor pod {{ $labels.pod }} has restarted {{ $value | printf
              "%.0f" }} times in the last 15 minutes.
            summary: Gas price monitor pod {{ $labels.pod }} is crash looping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="my-software-production", pod=~"gas-price-monitor-.*"}[15m]) * 900 > 2
          for: 5m
          labels:
            category: my-software-production
            component: gas-price-monitor
            severity: critical
        - alert: GasPriceMonitorPodRestarted
          annotations:
            description: Gas price monitor pod {{ $labels.pod }} has restarted at least
              once in the last 15 minutes. Monitor for repeated restarts.
            summary: Gas price monitor pod {{ $labels.pod }} restarted
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="my-software-production", pod=~"gas-price-monitor-.*"}[15m]) > 0
          for: 1m
          labels:
            category: my-software-production
            component: gas-price-monitor
            severity: warning
