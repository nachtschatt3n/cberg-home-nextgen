apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: telegram
  namespace: monitoring
  labels:
    alertmanager-config: telegram
spec:
  route:
    receiver: telegram
    groupBy:
      - alertname
    groupWait: 1s
    groupInterval: 1s
    repeatInterval: 120s
    # Match all alerts from any namespace by not specifying namespace matchers
    matchers: []
    routes:
      # Suppress Watchdog and InfoInhibitor — both are control-plane synthetic alerts,
      # not real conditions. InfoInhibitor fires when any warning is active; it exists
      # solely to suppress severity=info alerts via inhibition rules.
      - receiver: "null"
        matchers:
          - name: alertname
            value: Watchdog
      - receiver: "null"
        matchers:
          - name: alertname
            value: InfoInhibitor
      # General warning alerts - immediate first notification, then every 4 hours
      - receiver: telegram
        matchers:
          - name: severity
            value: warning
        groupWait: 1s
        groupInterval: 15m  # Allow grouping similar alerts for 15 minutes
        repeatInterval: 4h   # Repeat every 4 hours if still firing
        continue: false
      # Storage-specific warning alerts (more specific route, handled first if category=storage)
      - receiver: telegram
        matchers:
          - name: severity
            value: warning
          - name: category
            value: storage
        groupWait: 1s
        groupInterval: 15m  # Allow grouping similar alerts for 15 minutes
        repeatInterval: 4h   # Repeat every 4 hours if still firing
        continue: false
  receivers:
    # Null receiver for suppressed alerts (like Watchdog)
    - name: "null"
    - name: telegram
      telegramConfigs:
        - botToken:
            name: alertmanager-telegram-secret
            key: bot-token
          chatID: -1003112342088  # home operation channel
          parseMode: HTML  # use HTML parsing to avoid escaping issues
          sendResolved: true
          message: |
            🚨 <b>{{ .CommonLabels.alertname }}</b> ({{ len .Alerts }} alerts)
            Severity: {{ .CommonLabels.severity | toUpper }}
            {{- if .CommonLabels.component }} | Component: {{ .CommonLabels.component }}{{- end }}
            {{- if .CommonLabels.node }} | Node: {{ .CommonLabels.node }}{{- end }}
            
            {{- if gt (len .Alerts) 10 }}
            ⚠️ Showing first 10 of {{ len .Alerts }} alerts:
            {{- end }}
            {{- range $i, $alert := .Alerts }}
            {{- if lt $i 10 }}
            • {{- if $alert.Annotations.summary }} {{ $alert.Annotations.summary }}{{- else }} {{ $alert.Labels.alertname }}{{- end }}
            {{- if $alert.Labels.node }} [{{ $alert.Labels.node }}]{{- end }}
            {{- end }}
            {{- end }}
            {{- if gt (len .Alerts) 10 }}
            
            ... and more alerts ({{ len .Alerts }} total)
            {{- end }}
