---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app.kubernetes.io/name: kube-prometheus-stack
    app.kubernetes.io/part-of: kube-prometheus-stack
    release: kube-prometheus-stack
  name: memgraph-alerts
  namespace: monitoring
spec:
  groups:
    - interval: 30s
      name: memgraph.pods.health
      rules:
        - alert: MemgraphPodNotReady
          annotations:
            description: Memgraph pod {{ $labels.pod }} has been not ready for more
              than 5 minutes. The graph database may be unavailable.
            summary: Memgraph pod {{ $labels.pod }} is not ready
          expr: |
            sum by (namespace, pod) (
              kube_pod_status_ready{namespace="databases", pod=~"memgraph-.*", condition="true"}
            ) == 0
          for: 5m
          labels:
            category: databases
            component: memgraph
            severity: critical
        - alert: MemgraphPodCrashLooping
          annotations:
            description: Memgraph pod {{ $labels.pod }} has restarted {{ $value | printf
              "%.0f" }} times in the last 15 minutes.
            summary: Memgraph pod {{ $labels.pod }} is crash looping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="databases", pod=~"memgraph-.*"}[15m]) * 900 > 2
          for: 5m
          labels:
            category: databases
            component: memgraph
            severity: critical
        - alert: MemgraphPodRestarted
          annotations:
            description: Memgraph pod {{ $labels.pod }} has restarted at least once
              in the last 15 minutes. Monitor for repeated restarts.
            summary: Memgraph pod {{ $labels.pod }} restarted
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="databases", pod=~"memgraph-.*"}[15m]) > 0
          for: 1m
          labels:
            category: databases
            component: memgraph
            severity: warning
