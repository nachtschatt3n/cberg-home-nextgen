---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: macos-apps-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kube-prometheus-stack
    app.kubernetes.io/part-of: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
    - name: findmy-traccar-sync.health
      interval: 30s
      rules:
        - alert: FindMyTraccarSyncDown
          # prometheus-operator sets the job label on ScrapeConfig targets to
          # scrapeConfig/<namespace>/<name>, not the bare name — use the real
          # operator-generated job label so this actually matches.
          expr: up{job="scrapeConfig/monitoring/findmy-traccar-sync"} == 0
          for: 5m
          labels:
            severity: warning
            category: macos
            component: findmy-traccar-sync
          annotations:
            summary: "FindMy Traccar sync daemon is down"
            description: "The findmy-traccar-sync metrics endpoint on {{ $labels.instance }} has been unreachable for more than 5 minutes. The daemon may have crashed or the Mac may be offline."

        - alert: FindMyTraccarSyncFailing
          expr: findmy_sync_errors_total > 0 and increase(findmy_sync_errors_total[1h]) > 3
          for: 10m
          labels:
            severity: warning
            category: macos
            component: findmy-traccar-sync
          annotations:
            summary: "FindMy Traccar sync is failing repeatedly"
            description: "The findmy-traccar-sync daemon on {{ $labels.instance }} has had {{ $value | printf \"%.0f\" }} errors in the last hour."

        - alert: FindMyTraccarSyncStale
          # up == 1 gate: only fire when the target is reachable, so Down/Stale
          # don't double-fire (Down covers the scrape-unreachable case). The
          # `> 0` guard is dropped: the daemon now seeds the metric from the
          # newest persisted lastSuccessAt on startup (before serving), so there
          # is no reset-to-0 window on the 6h self-restart. Threshold 5400s (90m)
          # ≈ 18 missed cycles at the 300s interval.
          expr: up{job="scrapeConfig/monitoring/findmy-traccar-sync"} == 1 and (time() - findmy_sync_last_success_timestamp_seconds) > 5400
          for: 5m
          labels:
            severity: warning
            category: macos
            component: findmy-traccar-sync
          annotations:
            summary: "FindMy Traccar sync has not succeeded recently"
            description: "The last successful sync on {{ $labels.instance }} was {{ $value | humanizeDuration }} ago. Expected interval is 5 minutes; this exceeds ~18 missed cycles."

        - alert: FindMyTraccarNoDevicesFound
          expr: findmy_sync_devices_found == 0 and findmy_sync_devices_total > 0
          for: 1h
          labels:
            severity: critical
            category: macos
            component: findmy-traccar-sync
          annotations:
            summary: "FindMy Traccar sync found no device locations"
            description: "No devices had locations in the last sync on {{ $labels.instance }}. Check Apple account authentication and network connectivity."

    - name: bank-refresh.health
      interval: 30s
      rules:
        - alert: BankRefreshDown
          # prometheus-operator sets the job label on ScrapeConfig targets to
          # scrapeConfig/<namespace>/<name>, not the bare name — use the real
          # operator-generated job label so this actually matches.
          expr: up{job="scrapeConfig/monitoring/bank-refresh"} == 0
          for: 5m
          labels:
            severity: warning
            category: macos
            component: bank-refresh
          annotations:
            summary: "Bank refresh app is down"
            description: "The bank-refresh metrics endpoint on {{ $labels.instance }} has been unreachable for more than 5 minutes. The app may have been quit or the Mac may be offline."

        - alert: BankRefreshFailing
          expr: bank_refresh_state{state="failure"} == 1
          for: 15m
          labels:
            severity: warning
            category: macos
            component: bank-refresh
          annotations:
            summary: "Bank refresh is in failure state"
            description: "The bank-refresh app on {{ $labels.instance }} has been in failure state for more than 15 minutes."

        - alert: BankRefreshStale
          expr: bank_refresh_last_success_timestamp_seconds > 0 and (time() - bank_refresh_last_success_timestamp_seconds) > 86400
          for: 5m
          labels:
            severity: warning
            category: macos
            component: bank-refresh
          annotations:
            summary: "Bank refresh has not succeeded in over 24 hours"
            description: "The last successful bank refresh on {{ $labels.instance }} was {{ $value | humanizeDuration }} ago."

    - name: arag-scrape.health
      interval: 30s
      rules:
        - alert: AragScrapeDown
          # prometheus-operator sets the job label on ScrapeConfig targets to
          # scrapeConfig/<namespace>/<name>, not the bare name — so up{job="arag-scrape"}
          # never matches (the sibling bank-refresh/findmy Down alerts are silently
          # broken for this reason). Use the real operator-generated job label.
          expr: up{job="scrapeConfig/monitoring/arag-scrape"} == 0
          for: 15m
          labels:
            severity: warning
            category: macos
            component: arag-scrape
          annotations:
            summary: "ARAG scrape metrics endpoint is down"
            description: "The arag-scrape metrics endpoint on {{ $labels.instance }} has been unreachable for more than 15 minutes. The menubar app may have been quit or the Mac may be offline."

        - alert: AragScrapeStale
          expr: time() - arag_scrape_last_success_timestamp_seconds > 46800
          for: 10m
          labels:
            severity: warning
            category: macos
            component: arag-scrape
          annotations:
            summary: "ARAG scrape has not succeeded recently"
            description: "The last successful ARAG scrape on {{ $labels.instance }} was {{ $value | humanizeDuration }} ago. Expected cycle is every 6 hours; this exceeds ~2 missed cycles."

        - alert: AragScrapeFailing
          expr: increase(arag_scrape_errors_total[6h]) > 3
          for: 10m
          labels:
            severity: warning
            category: macos
            component: arag-scrape
          annotations:
            summary: "ARAG scrape is failing repeatedly"
            description: "The arag-scrape pipeline on {{ $labels.instance }} has had {{ $value | printf \"%.0f\" }} errors in the last 6 hours."

        - alert: AragScrapeEmulatorDown
          expr: arag_scrape_emulator_up == 0
          for: 30m
          labels:
            severity: warning
            category: macos
            component: arag-scrape
          annotations:
            summary: "ARAG scrape Android emulator is down"
            description: "The Android emulator backing the arag-scrape pipeline on {{ $labels.instance }} has been reported down for more than 30 minutes. Scrapes cannot run without it."
