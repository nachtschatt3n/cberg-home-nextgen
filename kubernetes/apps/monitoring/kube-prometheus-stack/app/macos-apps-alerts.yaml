---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: macos-apps-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kube-prometheus-stack
    app.kubernetes.io/part-of: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
    - name: findmy-traccar-sync.health
      interval: 30s
      rules:
        - alert: FindMyTraccarSyncDown
          expr: up{job="findmy-traccar-sync"} == 0
          for: 5m
          labels:
            severity: warning
            category: macos
            component: findmy-traccar-sync
          annotations:
            summary: "FindMy Traccar sync daemon is down"
            description: "The findmy-traccar-sync metrics endpoint on {{ $labels.instance }} has been unreachable for more than 5 minutes. The daemon may have crashed or the Mac may be offline."

        - alert: FindMyTraccarSyncFailing
          expr: findmy_sync_errors_total > 0 and increase(findmy_sync_errors_total[1h]) > 3
          for: 10m
          labels:
            severity: warning
            category: macos
            component: findmy-traccar-sync
          annotations:
            summary: "FindMy Traccar sync is failing repeatedly"
            description: "The findmy-traccar-sync daemon on {{ $labels.instance }} has had {{ $value | printf \"%.0f\" }} errors in the last hour."

        - alert: FindMyTraccarSyncStale
          expr: findmy_sync_last_success_timestamp_seconds > 0 and (time() - findmy_sync_last_success_timestamp_seconds) > 3600
          for: 5m
          labels:
            severity: warning
            category: macos
            component: findmy-traccar-sync
          annotations:
            summary: "FindMy Traccar sync has not succeeded recently"
            description: "The last successful sync on {{ $labels.instance }} was {{ $value | humanizeDuration }} ago. Expected interval is 15 minutes."

        - alert: FindMyTraccarNoDevicesFound
          expr: findmy_sync_devices_found == 0 and findmy_sync_devices_total > 0
          for: 30m
          labels:
            severity: warning
            category: macos
            component: findmy-traccar-sync
          annotations:
            summary: "FindMy Traccar sync found no device locations"
            description: "No devices had locations in the last sync on {{ $labels.instance }}. Check Apple account authentication and network connectivity."

    - name: bank-refresh.health
      interval: 30s
      rules:
        - alert: BankRefreshDown
          expr: up{job="bank-refresh"} == 0
          for: 5m
          labels:
            severity: warning
            category: macos
            component: bank-refresh
          annotations:
            summary: "Bank refresh app is down"
            description: "The bank-refresh metrics endpoint on {{ $labels.instance }} has been unreachable for more than 5 minutes. The app may have been quit or the Mac may be offline."

        - alert: BankRefreshFailing
          expr: bank_refresh_state{state="failure"} == 1
          for: 15m
          labels:
            severity: warning
            category: macos
            component: bank-refresh
          annotations:
            summary: "Bank refresh is in failure state"
            description: "The bank-refresh app on {{ $labels.instance }} has been in failure state for more than 15 minutes."

        - alert: BankRefreshStale
          expr: bank_refresh_last_success_timestamp_seconds > 0 and (time() - bank_refresh_last_success_timestamp_seconds) > 86400
          for: 5m
          labels:
            severity: warning
            category: macos
            component: bank-refresh
          annotations:
            summary: "Bank refresh has not succeeded in over 24 hours"
            description: "The last successful bank refresh on {{ $labels.instance }} was {{ $value | humanizeDuration }} ago."
