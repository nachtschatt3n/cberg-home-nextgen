---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: otel-collector-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kube-prometheus-stack
    app.kubernetes.io/part-of: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
    - name: otel-collector.pipeline.health
      interval: 30s
      rules:
        # ES auth failure — fires when the exporter gets persistent 401/security_exception
        # from Elasticsearch (bad credentials, rotated secret, API key invalidated).
        # Uses send_failed metrics which increment on every rejected bulk flush.
        - alert: EdotCollectorESAuthError
          expr: |
            increase(otelcol_exporter_send_failed_log_records{exporter=~"elasticsearch/.*"}[5m]) > 0
            or
            increase(otelcol_exporter_send_failed_metric_points{exporter=~"elasticsearch/.*"}[5m]) > 0
          for: 3m
          labels:
            severity: critical
            category: logging
            component: otel-collector
          annotations:
            summary: "edot-collector cannot write to Elasticsearch (auth/connection error)"
            description: >-
              edot-collector exporter {{ $labels.exporter }} has been failing to flush
              to Elasticsearch for 3+ minutes ({{ $value }} records dropped in last 5m).
              Most likely cause: 401 security_exception — check if the ES password
              secret was rotated or the user was locked out.
              Check logs: kubectl logs -n monitoring deployment/edot-collector | grep -i "flush failed"
              Check secret: kubectl get secret elasticsearch-es-elastic-user -n monitoring

        # General export failures (non-auth: network, ES overload, etc.)
        - alert: OtelCollectorExportFailed
          expr: increase(otelcol_exporter_send_failed_log_records{exporter=~"elasticsearch/.*"}[5m]) > 500
          for: 10m
          labels:
            severity: warning
            category: logging
            component: otel-collector
          annotations:
            summary: "OTel collector export failures on {{ $labels.instance }}"
            description: >-
              OTel collector on {{ $labels.instance }} failed to send {{ $value }} log
              records in the last 5 minutes. This usually indicates Elasticsearch
              connectivity or authentication issues. Check edot-collector logs and ES
              cluster health.

        - alert: OtelCollectorDroppedLogs
          expr: increase(otelcol_processor_dropped_log_records_total[5m]) > 0
          for: 1m
          labels:
            severity: critical
            category: logging
            component: otel-collector
          annotations:
            summary: "OTel collector dropping log records on {{ $labels.instance }}"
            description: >-
              OTel collector on {{ $labels.instance }} dropped {{ $value }} log records
              in the last 5 minutes due to memory limiter or queue overflow.
              Logs are being permanently lost. Check memory usage and ES write health.

        - alert: OtelCollectorQueueFull
          expr: otelcol_exporter_queue_size / otelcol_exporter_queue_capacity > 0.8
          for: 5m
          labels:
            severity: warning
            category: logging
            component: otel-collector
          annotations:
            summary: "OTel collector export queue is {{ $value | humanizePercentage }} full on {{ $labels.instance }}"
            description: >-
              OTel collector export queue on {{ $labels.instance }} is above 80% capacity.
              If it fills completely, new telemetry will be dropped. Check Elasticsearch
              write performance and edot-collector pod resources.

    - name: otel-collector.availability
      interval: 30s
      rules:
        - alert: EdotCollectorDown
          expr: |
            kube_deployment_status_replicas_available{deployment="edot-collector",namespace="monitoring"}
            < kube_deployment_spec_replicas{deployment="edot-collector",namespace="monitoring"}
          for: 5m
          labels:
            severity: critical
            category: logging
            component: otel-collector
          annotations:
            summary: "edot-collector gateway is unreachable"
            description: >-
              The edot-collector gateway deployment has been unreachable for 5 minutes.
              All telemetry (logs, metrics, traces) from node collectors will be backed
              up or dropped until it recovers.
              Check: kubectl get pods -n monitoring -l app=edot-collector

        - alert: OtelDaemonCollectorDown
          expr: kube_daemonset_status_number_ready{daemonset="otel-operator-daemon-collector",namespace="monitoring"}
            < kube_daemonset_status_desired_number_scheduled{daemonset="otel-operator-daemon-collector",namespace="monitoring"}
          for: 5m
          labels:
            severity: warning
            category: logging
            component: otel-collector
          annotations:
            summary: "OTel DaemonSet collector not running on all nodes"
            description: >-
              The OTel daemon collector DaemonSet does not have a running pod on all
              nodes. Logs and host metrics will be missing from affected nodes.
              Check: kubectl get pods -n monitoring -l app.kubernetes.io/managed-by=opentelemetry-operator

    - name: otel-collector.es-ingestion
      interval: 30s
      rules:
        # Closes the 2026-07-17 blind spot: ES metric ingestion stalled for ~32h
        # (RED corrupt shard + a stalled TSDB rollover -> timestamp_error) with NO
        # alert firing. The failure-based alerts above key off send_failed_* series
        # that this collector build does not export; the *sent* counters ARE
        # exported and reliable, so a flat sent-rate is the true "ingestion stopped"
        # signal. The elasticsearch-obs-recovery CronJob auto-heals both causes;
        # this fires only if it could not.
        - alert: EsMetricsIngestionStalled
          expr: rate(otelcol_exporter_sent_metric_points_total{exporter="elasticsearch/metrics"}[10m]) == 0
          for: 15m
          labels:
            severity: critical
            category: logging
            component: otel-collector
          annotations:
            summary: "Elasticsearch metric ingestion has stalled (0 points/s for 25m+)"
            description: >-
              The edot-collector elasticsearch/metrics exporter has persisted 0 metric
              points for 15m+. Likely causes: ES cluster RED (corrupt shard) or a
              stalled TSDB rollover (write-index time_series window expired ->
              timestamp_error). The elasticsearch-obs-recovery CronJob should auto-heal
              within ~10m; if this is still firing it could not. Check its last run
              (kubectl get jobs -n monitoring | grep obs-recovery) and
              GET _cluster/health / _data_stream/metrics-generic.otel-default.
        - alert: EsLogIngestionStalled
          expr: rate(otelcol_exporter_sent_log_records_total{exporter="elasticsearch/logs"}[10m]) == 0
          for: 15m
          labels:
            severity: critical
            category: logging
            component: otel-collector
          annotations:
            summary: "Elasticsearch log ingestion has stalled (0 records/s for 25m+)"
            description: >-
              The edot-collector elasticsearch/logs exporter has persisted 0 log
              records for 15m+. Likely ES RED or an exporter/connectivity failure —
              application logs are not being stored. Check ES cluster health and
              edot-collector logs.
