---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sweep-dashboard
  namespace: monitoring
  labels:
    app.kubernetes.io/name: sweep-dashboard
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: sweep-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sweep-dashboard
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dashboard
          # Pin to a specific commit SHA — `:latest` is non-deterministic
          # when builds race (per memory `project_image_rebuild_gap`).
          image: ghcr.io/nachtschatt3n/sweep-dashboard:sha-b3f562f
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: SWEEP_PG_DSN
              valueFrom:
                secretKeyRef:
                  name: sweep-dashboard
                  key: SWEEP_PG_DSN
            - name: DASHBOARD_WORKERS
              value: "2"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
