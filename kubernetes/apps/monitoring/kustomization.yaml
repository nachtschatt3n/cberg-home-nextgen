# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
components:
  - ../../flux/components/common
resources:
  - ./grafana/ks.yaml
  - ./headlamp/ks.yaml
  - ./kube-prometheus-stack/ks.yaml
  - ./unpoller/ks.yaml
  - ./uptime-kuma/ks.yaml
  - ./eck-operator/ks.yaml
  - ./elasticsearch/ks.yaml
  - ./kibana/ks.yaml
  - ./edot-collector/ks.yaml
  - ./otel-operator/ks.yaml
patches:
  # PSA override: privileged required for prometheus-node-exporter
  # DaemonSet (hostNetwork + hostPath /proc /sys).
  - target:
      kind: Namespace
      name: monitoring
    patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: monitoring
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
