---
apiVersion: v1
kind: Service
metadata:
  name: edot-collector
  namespace: monitoring
  labels:
    app: edot-collector
spec:
  type: ClusterIP
  selector:
    app: edot-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: metrics
      port: 8888
      targetPort: 8888
      protocol: TCP
