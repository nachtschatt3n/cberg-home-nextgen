---
apiVersion: v1
kind: ConfigMap
metadata:
  name: edot-collector-config
  namespace: monitoring
data:
  otel.yml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      # Talos kernel logs (kmsg) shipped via KmsgLogConfig as json_lines over TCP.
      # Captures mce:/Hardware Error/thermal/panic lines that survive a reboot —
      # see docs/troubleshooting/node-reboot-observability.md (Tier 2).
      tcplog/talos-kernel:
        listen_address: 0.0.0.0:5171
        # add_attributes => each record gets net.peer.ip = the source node
        # (192.168.55.11/12/13), the only way to attribute a kmsg line to a node
        # (Talos kmsg carries no hostname).
        add_attributes: true
        operators:
          - type: json_parser
            parse_from: body
            parse_to: attributes
            on_error: send_quiet
          - type: move
            from: attributes.msg
            to: body
            on_error: send_quiet
          - type: add
            field: attributes.log_source
            value: talos-kernel

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
        spike_limit_mib: 100
      filter/drop-malformed-json-log-keys:
        error_mode: ignore
        log_conditions:
          - 'IsString(log.body) and IsMatch(log.body, "(?s)^\\s*\\{.*(?:\"\\.[^\"]*\"\\s*:|\"[^\"]*\\.\\.[^\"]*\"\\s*:|\"[^\"]*\\.\"\\s*:).*")'
      batch:
        send_batch_size: 1000
        send_batch_max_size: 1500
        timeout: 5s

    exporters:
      elasticsearch/logs:
        endpoints:
          - https://elasticsearch-es-http.monitoring.svc:9200
        user: elastic
        password: $${env:ES_PASSWORD}
        tls:
          insecure_skip_verify: true
        logs_index: logs-generic-default
        mapping:
          mode: otel
      elasticsearch/talos-kernel:
        endpoints:
          - https://elasticsearch-es-http.monitoring.svc:9200
        user: elastic
        password: $${env:ES_PASSWORD}
        tls:
          insecure_skip_verify: true
        # dedicated index so kmsg fields (priority/facility/seq/clock) can't
        # collide with app-log field types in logs-generic-default
        logs_index: logs-talos.kernel-default
        mapping:
          mode: otel
      elasticsearch/metrics:
        endpoints:
          - https://elasticsearch-es-http.monitoring.svc:9200
        user: elastic
        password: $${env:ES_PASSWORD}
        tls:
          insecure_skip_verify: true
        metrics_index: metrics-generic.otel-default
        mapping:
          mode: otel
      elasticsearch/traces:
        endpoints:
          - https://elasticsearch-es-http.monitoring.svc:9200
        user: elastic
        password: $${env:ES_PASSWORD}
        tls:
          insecure_skip_verify: true
        traces_index: traces-generic-default
        mapping:
          mode: otel

    service:
      extensions: [health_check]
      pipelines:
        logs:
          receivers: [otlp]
          processors: [memory_limiter, filter/drop-malformed-json-log-keys, batch]
          exporters: [elasticsearch/logs]
        logs/talos-kernel:
          receivers: [tcplog/talos-kernel]
          processors: [memory_limiter, batch]
          exporters: [elasticsearch/talos-kernel]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [elasticsearch/metrics]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [elasticsearch/traces]
      telemetry:
        logs:
          level: info
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
