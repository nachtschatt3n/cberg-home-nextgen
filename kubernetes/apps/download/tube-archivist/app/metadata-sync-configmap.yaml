---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tube-archivist-nfo-sync
  namespace: download
data:
  sync_nfo.py: |
    import os
    import json
    import urllib.request
    import base64
    import xml.etree.ElementTree as ET
    from datetime import datetime
    
    ES_URL = os.environ.get("ES_URL", "http://tube-archivist-elasticsearch:9200")
    ES_USER = os.environ.get("ELASTIC_USER", "elastic")
    ES_PASSWORD = os.environ.get("ELASTIC_PASSWORD", "")
    VIDEO_ROOT = "/youtube"
    
    def get_all_videos():
        # Fetching a large batch. For >10k videos, scrolling is needed, but this suffices for most.
        url = f"{ES_URL}/ta_video/_search?size=10000"
        try:
            req = urllib.request.Request(url)
            if ES_PASSWORD:
                auth_str = f"{ES_USER}:{ES_PASSWORD}"
                b64_auth = base64.b64encode(auth_str.encode()).decode()
                req.add_header("Authorization", f"Basic {b64_auth}")
            
            with urllib.request.urlopen(req) as response:
                data = json.load(response)
                return data['hits']['hits']
        except Exception as e:
            print(f"Error fetching from ES: {e}")
            return []
    
    def build_file_map(root_dir):
        file_map = {}
        print(f"Scanning {root_dir}...")
        for root, dirs, files in os.walk(root_dir):
            for file in files:
                if file.endswith(('.mp4', '.mkv', '.webm')):
                    base_name = os.path.splitext(file)[0]
                    
                    # Strategy 0: Exact 11-char ID match (files named [ID].mp4)
                    if len(base_name) == 11:
                        file_map[base_name] = os.path.join(root, file)
                        continue

                    # Strategy 1: Check if filename ends with -[ID] (default TA behavior)
                    # Note: IDs can contain dashes, so we look at the last 11 chars if preceded by a dash?
                    # Or simply split. TA default is Title-ID.
                    if '-' in base_name:
                        # Try the last part first
                        parts = base_name.split('-')
                        possible_id = parts[-1]
                        if len(possible_id) == 11:
                             file_map[possible_id] = os.path.join(root, file)
                             continue
                        
                        # Special handling if ID contains dashes (less common in this format but possible if simplistic split used)
                        # But TA usually cleans title.
                        # Let's try checking the last 11 characters if they look like an ID
                        if len(base_name) > 12 and base_name[-12] == '-':
                             possible_id = base_name[-11:]
                             file_map[possible_id] = os.path.join(root, file)
                             continue
                    
                    # Strategy 2: Check for [ID] brackets
                    if '[' in base_name and ']' in base_name:
                        try:
                            possible_id = base_name.split('[')[-1].split(']')[0]
                            if len(possible_id) == 11:
                                file_map[possible_id] = os.path.join(root, file)
                                continue
                        except IndexError:
                            pass
        
        print(f"Found {len(file_map)} video files candidates.")
        return file_map
    
    def format_date(published_val):
        if not published_val:
            return "", ""
            
        # Check if it's a timestamp (int or string looking like int)
        try:
            ts = float(published_val)
            # Simple heuristic: if it's huge, it's a timestamp. 
            # Year 3000 is 32503680000. Year 1970 is 0.
            # If it's just "2023", float("2023") is 2023.
            # Timestamps are usually > 1000000000 (since 2001).
            if ts > 1000000000:
                dt = datetime.fromtimestamp(ts)
                return dt.strftime("%Y-%m-%d"), str(dt.year)
        except ValueError:
            pass
            
        # Fallback: assume it's already a string like YYYY-MM-DD or similar
        pub_str = str(published_val)
        year = pub_str[:4]
        return pub_str, year

    def create_nfo(video_data, file_path, season=None, episode_num=None):
        """Write per-video NFO using <episodedetails> schema.

        Was <movie> originally; Jellyfin's TV-shows library Nfo reader doesn't
        parse <movie> for items inside a Series, so episode-level metadata
        (plot, premiere date) was being dropped. <episodedetails> fixes this.

        season  = year from published date (each year = one Season)
        episode_num = ordinal within year (sorted by upload date ascending)
        """
        source = video_data['_source']

        root = ET.Element("episodedetails")

        title = source.get('title', 'Unknown')
        ET.SubElement(root, "title").text = title
        ET.SubElement(root, "originaltitle").text = title

        # showtitle = channel name; required for Jellyfin Series association
        channel_name = None
        channel_data = source.get('channel')
        if isinstance(channel_data, dict):
            channel_name = channel_data.get('channel_name')
        if not channel_name:
            channel_name = source.get('channel_name', '')
        if channel_name:
            ET.SubElement(root, "showtitle").text = channel_name

        # Season + episode: year-as-season, ordinal-within-year-as-episode
        if season is not None:
            ET.SubElement(root, "season").text = str(season)
        if episode_num is not None:
            ET.SubElement(root, "episode").text = str(episode_num)

        desc = source.get('description', '')
        ET.SubElement(root, "plot").text = desc
        ET.SubElement(root, "outline").text = desc
        # NOTE: lockdata=true tells Jellyfin not to refresh from internet
        # downloaders. Safe because we set the TA library to only use
        # the TubeArchivist metadata fetcher (no TheMovieDb fallback).
        ET.SubElement(root, "lockdata").text = "true"

        published_raw = source.get('published', '')
        date_str, year_str = format_date(published_raw)

        if date_str:
            # <aired> is preferred for Episode items in Jellyfin/Kodi
            ET.SubElement(root, "aired").text = date_str
            ET.SubElement(root, "premiered").text = date_str
            ET.SubElement(root, "year").text = year_str

        if channel_name:
            ET.SubElement(root, "studio").text = channel_name

        vid_id = video_data['_id']
        # uniqueid is preferred by modern Kodi/Jellyfin
        uid = ET.SubElement(root, "uniqueid", type="youtube", default="true")
        uid.text = vid_id

        # Legacy ID tag
        ET.SubElement(root, "id").text = vid_id

        ET.SubElement(root, "genre").text = "YouTube"

        # Write NFO
        tree = ET.ElementTree(root)
        if hasattr(ET, 'indent'):
            ET.indent(tree, space="  ", level=0)

        nfo_path = os.path.splitext(file_path)[0] + ".nfo"

        # Check if update is needed could be added here, but overwriting ensures freshness
        try:
            tree.write(nfo_path, encoding="utf-8", xml_declaration=True)
        except Exception as e:
            print(f"Failed to write NFO {nfo_path}: {e}")

    def create_show_nfo(folder_path, channel_name):
        if not channel_name:
            return

        # Create tvshow.nfo
        root = ET.Element("tvshow")
        ET.SubElement(root, "title").text = channel_name
        ET.SubElement(root, "plot").text = f"Videos from {channel_name}"
        ET.SubElement(root, "lockdata").text = "true"
        
        tree = ET.ElementTree(root)
        if hasattr(ET, 'indent'):
            ET.indent(tree, space="  ", level=0)
            
        try:
            tree.write(os.path.join(folder_path, "tvshow.nfo"), encoding="utf-8", xml_declaration=True)
        except Exception as e:
            print(f"Failed to write tvshow.nfo: {e}")

        # Create artist.nfo (for Music Videos)
        root = ET.Element("artist")
        ET.SubElement(root, "name").text = channel_name
        ET.SubElement(root, "biography").text = f"Videos from {channel_name}"
        ET.SubElement(root, "lockdata").text = "true"
        
        tree = ET.ElementTree(root)
        if hasattr(ET, 'indent'):
            ET.indent(tree, space="  ", level=0)
            
        try:
            tree.write(os.path.join(folder_path, "artist.nfo"), encoding="utf-8", xml_declaration=True)
        except Exception as e:
            print(f"Failed to write artist.nfo: {e}")
    
    def main():
        print("Starting NFO sync...")
        videos = get_all_videos()
        print(f"Retrieved {len(videos)} videos from Elasticsearch.")

        if not videos:
            return

        file_map = build_file_map(VIDEO_ROOT)

        # Phase 1: collect all videos that have matching files on disk,
        # plus their (folder, year, sort_key) so we can group + assign
        # episode numbers.
        matched = []
        for video in videos:
            vid_id = video['_id']
            if vid_id not in file_map:
                continue
            file_path = file_map[vid_id]
            folder = os.path.dirname(file_path)
            published_raw = video['_source'].get('published', '')
            date_str, year_str = format_date(published_raw)
            try:
                year = int(year_str) if year_str else 0
            except (TypeError, ValueError):
                year = 0
            # Sort key: numeric timestamp where possible, else date string
            try:
                sort_key = float(published_raw) if published_raw else 0
            except (TypeError, ValueError):
                sort_key = date_str or ''
            matched.append({
                'video': video,
                'file_path': file_path,
                'folder': folder,
                'year': year,
                'sort_key': sort_key,
            })

        # Phase 2: sort by (folder, year, sort_key) so each (folder, year)
        # group is contiguous and ordered ascending by upload date.
        # Coerce sort_key to a comparable type (all string for safety).
        matched.sort(key=lambda v: (v['folder'], v['year'], str(v['sort_key'])))

        # Phase 3: assign episode numbers per (folder, year) group.
        current_group = None
        episode_counter = 0
        for entry in matched:
            group = (entry['folder'], entry['year'])
            if group != current_group:
                current_group = group
                episode_counter = 0
            episode_counter += 1
            entry['episode_num'] = episode_counter

        # Phase 4: write episode .nfo (with season+episode) + tvshow.nfo per channel.
        count = 0
        processed_channels = set()
        for entry in matched:
            video = entry['video']
            file_path = entry['file_path']
            folder = entry['folder']
            season = entry['year'] if entry['year'] else None
            episode_num = entry['episode_num']

            create_nfo(video, file_path, season=season, episode_num=episode_num)

            # Channel-level nfo (write once per folder)
            if folder not in processed_channels:
                channel_name = None
                channel_data = video['_source'].get('channel')
                if isinstance(channel_data, dict):
                    channel_name = channel_data.get('channel_name')
                if not channel_name:
                    channel_name = video['_source'].get('channel_name')
                if channel_name:
                    create_show_nfo(folder, channel_name)
                    processed_channels.add(folder)

            count += 1

        print(f"Sync completed. Processed {count} videos across {len(processed_channels)} channels.")
    
    if __name__ == "__main__":
        main()