# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: download
components:
  - ../../flux/components/common
resources:
  - ./jdownloader/ks.yaml
  - ./tube-archivist/ks.yaml
patches:
  # PSA override: privileged required for tube-archivist's bundled
  # elasticsearch StatefulSet which adds IPC_LOCK capability for memlock.
  # Target = not-used (namespace transformer runs after patches).
  - target:
      kind: Namespace
      name: not-used
    patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: not-used
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged