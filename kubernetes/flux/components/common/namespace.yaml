---
apiVersion: v1
kind: Namespace
metadata:
  name: not-used
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
  labels:
    # Default PSA = baseline. Per-NS lifts to "privileged" via kustomize
    # patches in each apps/<ns>/kustomization.yaml — the patch target
    # MUST be `name: not-used` because the kustomize namespace transformer
    # runs AFTER patches, so at patch time the resource is still named
    # `not-used` from this component.
    # Privileged (7): databases, home-automation, kube-system, media,
    #   monitoring, storage, download (ES IPC_LOCK).
    # Baseline (8): ai, backup, cert-manager, default, my-software-{dev,prod},
    #   network, office.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
