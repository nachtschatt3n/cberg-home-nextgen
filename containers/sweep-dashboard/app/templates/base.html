<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}sweep{% endblock %} · cberg-home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"
          integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
          crossorigin="anonymous"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .sev-critical { background: #fee2e2; color: #991b1b; }
    .sev-warning  { background: #fef3c7; color: #92400e; }
    .sev-monitor  { background: #fef9c3; color: #854d0e; }
    .sev-deferred { background: #e5e7eb; color: #1f2937; }
    .sev-clean    { background: #dcfce7; color: #166534; }
    .sev-accepted { background: #dbeafe; color: #1e40af; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
  <header class="bg-white border-b border-gray-200">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-6">
      <a href="/" class="font-semibold text-lg">cberg-home sweep</a>
      <nav class="flex gap-4 text-sm text-gray-600">
        <a href="/" class="hover:text-gray-900">Summary</a>
        <a href="/findings" class="hover:text-gray-900">Findings</a>
        <a href="/slos" class="hover:text-gray-900">SLOs</a>
        <a href="/policies" class="hover:text-gray-900">📋 Policies</a>
        <a href="/cycles" class="hover:text-gray-900">Cycles</a>
      </nav>
      <div class="ml-auto text-xs text-gray-400">read-only · sweep_reader</div>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
