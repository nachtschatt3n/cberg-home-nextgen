---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: solarfocus-scraper build & push

on:
  push:
    branches: [main]
    tags: ["solarfocus-scraper-v*"]
    paths:
      - "apps/solarfocus-scraper/**"
      - ".github/workflows/solarfocus-scraper.yaml"
  pull_request:
    branches: [main]
    paths:
      - "apps/solarfocus-scraper/**"
      - ".github/workflows/solarfocus-scraper.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/solarfocus-scraper

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=match,pattern=solarfocus-scraper-v(.*),group=1
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/solarfocus-scraper/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
