# Known-recurring noise the LLM should not re-classify each run.
# Each entry: a substring matched against alert/finding lines.
recurring_alerts:
  - alertname: CPUThrottlingHigh
    namespace: penpot
    workload: valkey
    note: idle valkey scrape; cosmetic
  - alertname: KubePodNotReady
    namespace: ai
    pod: icloud-docker-mu
    note: upstream 503 — known
flaky_zigbee_devices:
  - "Soil sensor 3"
flaky_iot_devices:
  - name: "Shelly Entry Window Blinds"
    note: Shelly WiFi device intermittently unreachable — generates homeassistant.components.shelly fetch errors
unexpected_jobs:
  - prefix: manual-
    note: ad-hoc cronjobs invoked by hand
known_services_without_endpoints:
  - namespace: home-automation
    service: pallet-price-monitor
    note: CronJob-based scraper (runs 08:00 and 20:00 Europe/Berlin); Prometheus metrics service has 0 endpoints between runs — expected
known_es_error_spikes:
  - namespace: backup
    workload: icloud-docker-mu
    note: HTTP 410/530/503 from Apple CDN for expired/unavailable iCloud file URLs — benign sync failures
