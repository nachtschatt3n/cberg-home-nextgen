# Known-recurring noise the LLM should not re-classify each run.
# Each entry: a substring matched against alert/finding lines.
recurring_alerts:
  - alertname: CPUThrottlingHigh
    namespace: penpot
    workload: valkey
    note: idle valkey scrape; cosmetic
  - alertname: KubePodNotReady
    namespace: ai
    pod: icloud-docker-mu
    note: upstream 503 — known
flaky_zigbee_devices:
  - "Soil sensor 3"
  # Aqara battery temp sensors — classic Zigbee flap pattern
  - "Upper Hallway Temp Sensor"
  - "Kids Room Temp Sensor"
  - "Guest toilet Temp sensor"
flaky_iot_devices:
  - name: "Shelly Entry Window Blinds"
    note: Shelly WiFi device intermittently unreachable — generates homeassistant.components.shelly fetch errors
  # Solar inverter — diurnal (offline overnight / cloudy days)
  - name: "S1"
    note: OpenDTU solar inverter — designed to go offline at night, not a real outage
  # Tesla — sleep cycle (designed to disconnect to save battery)
  - name: "Tessy"
    note: TeslaFi — Tesla disconnects during sleep, expected
  # Smoker — only on while cooking
  - name: "SIR-RIBS-A-LOT"
    note: Traeger pellet grill — only powered while cooking
  # Wyze cameras — chronic flap from upstream wyzeapi
  - name: "Heater room"
    note: Wyze camera — chronic flap from upstream wyzeapi cloud
  - name: "Stairs Cam"
    note: Wyze camera — chronic flap from upstream wyzeapi cloud
  # Alexa devices — flap when idle / unreachable, integration recovers
  - name: "Echo Show dinnig room"
    note: Alexa device — flaps when idle, expected
  - name: "Fire TV"
    note: Alexa device — flaps when idle, expected
  - name: "Guest Room Echo"
    note: Alexa device — flaps when idle, expected
  - name: "Kids Echo Dot"
    note: Alexa device — flaps when idle, expected
  - name: "Living Room Echo show 5"
    note: Alexa device — flaps when idle, expected
  - name: "Master Bedroom Echo Dot"
    note: Alexa device — flaps when idle, expected
  - name: "Rest Room Echo Dot"
    note: Alexa device — flaps when idle, expected
  - name: "kitchen Echo Show 8 2nd Gen"
    note: Alexa device — flaps when idle, expected
unexpected_jobs:
  - prefix: manual-
    note: ad-hoc cronjobs invoked by hand
known_services_without_endpoints:
  - namespace: home-automation
    service: pallet-price-monitor
    note: CronJob-based scraper (runs 08:00 and 20:00 Europe/Berlin); Prometheus metrics service has 0 endpoints between runs — expected
known_es_error_spikes:
  - namespace: backup
    workload: icloud-docker-mu
    note: HTTP 410/530/503 from Apple CDN for expired/unavailable iCloud file URLs — benign sync failures

# Home Assistant integrations whose error rate is dominated by upstream/cloud
# backend issues outside operator control. The sweep should only flag these if
# the per-cycle error count exceeds the listed threshold.
known_ha_error_sources:
  - integration: homeassistant.components.miele
    threshold_per_cycle: 100
    note: Miele cloud coordinator timeouts (`Timeout fetching miele data`) — backend latency exceeds default integration timeout. Self-recovers each cycle, paired with `Fetching miele data recovered`. Live data flows. No automation impact. Out of operator control.
